name: Deploy Admin Website

on:
  push:
    branches: [ main ]
    paths:
      - 'admin/**'
      - 'shared/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      
      - name: Deploy to admin.taagc.website
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "admin/*,shared/*"
          target: "/var/www/admin.taagc.website/"
          strip_components: 1
