name: Deploy Main Website

on:
  push:
    branches: [ main ]
    paths:
      - 'public/**'
      - 'shared/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      
      - name: Deploy to taagc.website
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "public/*,shared/*"
          target: "/var/www/taagc.website/"
          strip_components: 1
