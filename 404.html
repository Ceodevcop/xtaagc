<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creating Page | TAAGC Global</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:'Inter',sans-serif;
            background:linear-gradient(135deg,#0a2540,#1a3a4f);
            color:white;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }
        .creator-card{
            background:white;
            border-radius:32px;
            padding:48px;
            max-width:600px;
            width:100%;
            text-align:center;
            color:#1e293b;
            box-shadow:0 25px 50px rgba(0,0,0,0.3);
        }
        .creator-icon{
            width:100px;
            height:100px;
            background:linear-gradient(135deg,#0a2540,#3a5a78);
            border-radius:30px;
            display:flex;
            align-items:center;
            justify-content:center;
            margin:0 auto 30px;
            color:white;
            font-size:48px;
        }
        h1{font-size:32px;margin-bottom:16px;color:#0a2540;}
        .url-display{
            background:#f8fafc;
            padding:16px 24px;
            border-radius:40px;
            font-family:monospace;
            font-size:18px;
            color:#0a2540;
            margin:20px 0;
            border:2px solid #c19a6b;
        }
        .progress-bar{
            width:100%;
            height:8px;
            background:#e2e8f0;
            border-radius:4px;
            margin:30px 0;
            overflow:hidden;
        }
        .progress-fill{
            width:0%;
            height:100%;
            background:#c19a6b;
            animation:progress 2s ease-in-out forwards;
        }
        @keyframes progress{
            0%{width:0%;}
            100%{width:100%;}
        }
        .steps{
            text-align:left;
            margin:30px 0;
            padding:20px;
            background:#f8fafc;
            border-radius:16px;
        }
        .step{
            display:flex;
            align-items:center;
            gap:12px;
            padding:12px 0;
            border-bottom:1px solid #e2e8f0;
            color:#64748b;
        }
        .step:last-child{border-bottom:none;}
        .step i{width:24px;}
        .step.completed{color:#0a2540;}
        .step.completed i{color:#2e7d5e;}
        
        .btn{
            display:inline-flex;
            align-items:center;
            gap:10px;
            padding:14px 32px;
            background:#c19a6b;
            color:white;
            text-decoration:none;
            border-radius:40px;
            font-weight:600;
            margin-top:20px;
            transition:0.3s;
        }
        .btn:hover{
            background:#b38b5e;
            transform:translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="creator-card" id="creatorCard">
        <div class="creator-icon">
            <i class="fas fa-magic"></i>
        </div>
        
        <h1>Creating Your Page</h1>
        <p style="color:#64748b; margin-bottom:20px;">The page you requested doesn't exist yet. We're creating it for you right now.</p>
        
        <div class="url-display" id="urlDisplay">
            https://taagc.website/<span id="pageSlug">loading...</span>
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        
        <div class="steps" id="steps">
            <div class="step" id="step1">
                <i class="fas fa-circle-notch fa-spin"></i>
                <span>Analyzing request...</span>
            </div>
            <div class="step" id="step2">
                <i class="fas fa-circle-notch fa-spin"></i>
                <span>Creating page template...</span>
            </div>
            <div class="step" id="step3">
                <i class="fas fa-circle-notch fa-spin"></i>
                <span>Saving to database...</span>
            </div>
            <div class="step" id="step4">
                <i class="fas fa-circle-notch fa-spin"></i>
                <span>Deploying to server...</span>
            </div>
        </div>
        
        <div id="actionButton" style="display:none;">
            <a href="#" id="redirectLink" class="btn">
                <i class="fas fa-arrow-right"></i> View Your Page
            </a>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // ===== GET REQUESTED URL =====
        const requestedPath = window.location.pathname.substring(1); // Remove leading slash
        const requestedUrl = window.location.href;
        const pageSlug = requestedPath || 'home';
        
        document.getElementById('pageSlug').innerHTML = pageSlug;
        
        // ===== PAGE TEMPLATES =====
        const pageTemplates = {
            // Default template for any new page
            default: {
                title: pageSlug.split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' '),
                sections: [
                    {
                        type: 'hero',
                        order: 1,
                        data: {
                            title: pageSlug.split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' '),
                            subtitle: 'Welcome to this new page created by TAAGC Global',
                            ctaText: 'Get Started',
                            ctaLink: '/register'
                        }
                    },
                    {
                        type: 'content',
                        order: 2,
                        data: {
                            title: 'About This Page',
                            content: '<p>This page was automatically created when you requested it. Our system detected that this page didn\'t exist and generated it in real-time.</p><p>You can now customize this page through the admin panel.</p>'
                        }
                    },
                    {
                        type: 'cta',
                        order: 3,
                        data: {
                            title: 'Ready to Get Started?',
                            subtitle: 'Join TAAGC Global today',
                            buttonText: 'Register Now',
                            buttonLink: '/register'
                        }
                    }
                ],
                meta: {
                    description: `Page created automatically for ${pageSlug}`,
                    keywords: `${pageSlug}, TAAGC, global trade`
                },
                settings: {
                    showInNav: false,
                    template: 'default',
                    isPublished: true
                },
                createdAt: serverTimestamp(),
                updatedAt: serverTimestamp(),
                createdBy: 'system',
                status: 'published'
            },
            
            // Sector page templates
            agriculture: {
                title: 'Agriculture & Agri-Business',
                sections: [
                    {
                        type: 'hero',
                        order: 1,
                        data: {
                            title: 'Agriculture & <span class="text-gold">Agri-Business</span>',
                            subtitle: 'Sustainable farming, agri-processing, and supply chain optimization for global food security.',
                            ctaText: 'Explore Agriculture',
                            ctaLink: '/register'
                        }
                    },
                    {
                        type: 'services',
                        order: 2,
                        data: {
                            title: 'Our Agricultural Services',
                            services: [
                                { icon: 'fa-seedling', title: 'Farm Management', description: 'Large-scale commercial farming operations' },
                                { icon: 'fa-industry', title: 'Agri-Processing', description: 'State-of-the-art processing facilities' },
                                { icon: 'fa-truck', title: 'Supply Chain', description: 'Integrated logistics solutions' }
                            ]
                        }
                    }
                ]
            },
            
            grain: {
                title: 'Grain Processing & Milling',
                sections: [
                    {
                        type: 'hero',
                        order: 1,
                        data: {
                            title: 'Grain Processing & <span class="text-gold">Milling</span>',
                            subtitle: 'Industrial-scale grain processing, storage, and value-added manufacturing.',
                            ctaText: 'Explore Grain Processing',
                            ctaLink: '/register'
                        }
                    }
                ]
            },
            
            ict: {
                title: 'ICT & Digital Transformation',
                sections: [
                    {
                        type: 'hero',
                        order: 1,
                        data: {
                            title: 'ICT & <span class="text-gold">Digital Transformation</span>',
                            subtitle: 'Enterprise digital transformation, infrastructure deployment, and cybersecurity.',
                            ctaText: 'Explore ICT',
                            ctaLink: '/register'
                        }
                    }
                ]
            },
            
            contracts: {
                title: 'General Contracts & Infrastructure',
                sections: [
                    {
                        type: 'hero',
                        order: 1,

                            title: 'General Contracts & <span class="text-gold">Infrastructure</span>',

                    }
                ]
            },
            
            merchandise: {

                    {
                        type: 'hero',
                        order: 1,
                        data: {
                            title: 'General Merchandise & <span class="text-gold">Global Trade</span>',
                            subtitle: 'Global procurement, logistics, and supply chain solutions for consumer goods.',
                            ctaText: 'Explore Merchandise',
                            ctaLink: '/register'
                        }
                    }
                ]
            },
            
            // User dashboard pages
            dashboard: {
                title: 'My Dashboard',
                sections: [
                    {
                        type: 'dashboard',
                        order: 1,
                        data: {
                            userType: 'individual'

                    }
                ]
            },
            
            profile: {
                title: 'My Profile',
                sections: [
                    {
                        type: 'profile',
                        order: 1,
                        data: {}
                    }
                ]
            },
            
            orders: {
                title: 'My Orders',
                sections: [
                    {
                        type: 'orders',
                        order: 1,

                    }
                ]
            },
            
            tracking: {
                title: 'Shipment Tracking',
                sections: [
                    {

                    }
                ]
            },
            
            quotes: {
                title: 'Quote Requests',
                sections: [
                    {
                        type: 'quotes',

                    }
                ]
            },
            
            portfolio: {
                title: 'My Portfolio',
                sections: [
                    {
                        type: 'portfolio',
                        order: 1,
                        data: {}
                    }
                ]
            },
            
            opportunities: {
                title: 'Investment Opportunities',
                sections: [
                    {
                        type: 'opportunities',
                        order: 1,
                        data: {}
                    }
                ]
            },
            
            statements: {
                title: 'Financial Statements',
                sections: [
                    {
                        type: 'statements',
                        order: 1,

                    }
                ]
            },
            
            projects: {
                title: 'My Projects',
                sections: [
                    {
                        type: 'projects',

                    }
                ]
            },
            
            bids: {
                title: 'My Bids',
                sections: [
                    {
                        type: 'bids',

                        data: {}
                    }
                ]
            },
            
            invoices: {
                title: 'Invoices',
                sections: [
                    {
                        type: 'invoices',
                        order: 1,
                        data: {}
                    }
                ]
            },
            
            support: {
                title: 'Customer Support',
                sections: [
                    {
                        type: 'support',
                        order: 1,
                        data: {}
                    }
                ]
            },
            
            verification: {
                title: 'Identity Verification',
                sections: [
                    {
                        type: 'verification',
                        order: 1,
                        data: {}
                    }
                ]
            }
        };

        // ===== ANIMATE STEPS =====
        async function animateSteps() {
            // Step 1: Analyzing
            await new Promise(r => setTimeout(r, 500));
            document.getElementById('step1').innerHTML = '<i class="fas fa-check-circle" style="color:#2e7d5e;"></i> <span>Analyzing request... Complete!</span>';
            document.getElementById('step1').classList.add('completed');
            
            // Step 2: Creating template
            await new Promise(r => setTimeout(r, 700));
            document.getElementById('step2').innerHTML = '<i class="fas fa-check-circle" style="color:#2e7d5e;"></i> <span>Creating page template... Complete!</span>';
            document.getElementById('step2').classList.add('completed');
            
            // Step 3: Saving to database
            await new Promise(r => setTimeout(r, 600));
            document.getElementById('step3').innerHTML = '<i class="fas fa-check-circle" style="color:#2e7d5e;"></i> <span>Saving to database... Complete!</span>';
            document.getElementById('step3').classList.add('completed');
            
            // Step 4: Deploying
            await new Promise(r => setTimeout(r, 500));
            document.getElementById('step4').innerHTML = '<i class="fas fa-check-circle" style="color:#2e7d5e;"></i> <span>Deploying to server... Complete!</span>';
            document.getElementById('step4').classList.add('completed');
        }

        // ===== CREATE PAGE IN DATABASE =====
        async function createPage() {
            try {
                // Get template based on slug
                const template = pageTemplates[pageSlug] || pageTemplates.default;
                
                // Create page data
                const pageData = {
                    ...template,
                    slug: pageSlug,
                    url: requestedUrl,
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp(),
                    createdBy: 'system',
                    status: 'published'
                };
                
                // Save to Firestore
                await setDoc(doc(db, "pages", pageSlug), pageData);
                
                console.log(`✅ Page created: ${pageSlug}`);
                
                // Show success button
                document.getElementById('actionButton').style.display = 'block';
                document.getElementById('redirectLink').href = `/${pageSlug}`;
                
            } catch (error) {
                console.error('Error creating page:', error);
                document.getElementById('steps').innerHTML += `
                    <div style="color:#e53e3e; margin-top:20px; padding:16px; background:#fff5f5; border-radius:12px;">
                        <i class="fas fa-exclamation-triangle"></i> Error creating page: ${error.message}
                    </div>
                `;
            }
        }

        // ===== INIT =====
        async function init() {
            await animateSteps();
            await createPage();
        }

        init();
    </script>
</body>
  </html>
