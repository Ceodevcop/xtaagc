<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | TAAGC Global</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:'Inter',sans-serif;
            background:linear-gradient(135deg,#0a2540,#1a3a4f);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }
        .login-card{
            background:white;
            border-radius:32px;
            padding:48px;
            max-width:480px;
            width:100%;
            box-shadow:0 25px 50px rgba(0,0,0,0.3);
        }
        .logo{
            display:flex;
            align-items:center;
            gap:12px;
            margin-bottom:30px;
        }
        .logo-icon{
            width:48px;
            height:48px;
            background:linear-gradient(135deg,#0a2540,#3a5a78);
            border-radius:12px;
            display:flex;
            align-items:center;
            justify-content:center;
            color:white;
            font-size:24px;
            font-weight:700;
        }
        .logo-text{
            font-size:24px;
            font-weight:700;
            color:#0a2540;
            font-family:'Playfair Display',serif;
        }
        .logo-text span{color:#c19a6b;}
        
        h1{font-size:28px;margin-bottom:8px;color:#0a2540;}
        .admin-badge{
            display:inline-block;
            background:#c19a6b20;
            color:#c19a6b;
            padding:6px 16px;
            border-radius:40px;
            font-size:13px;
            font-weight:600;
            margin-bottom:24px;
        }
        .form-group{margin-bottom:20px;}
        label{
            display:block;
            margin-bottom:8px;
            font-weight:600;
            color:#0a2540;
        }
        .input-wrapper{
            position:relative;
        }
        .input-icon{
            position:absolute;
            left:16px;
            top:50%;
            transform:translateY(-50%);
            color:#a0aec0;
        }
        input{
            width:100%;
            padding:14px 16px 14px 48px;
            border:2px solid #e2e8f0;
            border-radius:12px;
            font-size:15px;
            transition:0.3s;
        }
        input:focus{
            border-color:#c19a6b;
            outline:none;
            box-shadow:0 0 0 4px rgba(193,154,107,0.1);
        }
        .btn{
            display:flex;
            align-items:center;
            justify-content:center;
            gap:10px;
            width:100%;
            padding:16px;
            background:#0a2540;
            color:white;
            border:none;
            border-radius:12px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
            margin-top:20px;
        }
        .btn:hover{
            background:#1a3a4f;
            transform:translateY(-2px);
        }
        .alert{
            padding:16px;
            border-radius:12px;
            margin-top:20px;
            display:none;
        }
        .alert-error{
            background:#fff5f5;
            border-left:4px solid #e53e3e;
            color:#742a2a;
        }
        .admin-info{
            background:#f8fafc;
            border-radius:12px;
            padding:16px;
            margin-top:30px;
            font-size:14px;
            color:#64748b;
            text-align:center;
        }
        .admin-info strong{
            color:#0a2540;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <div class="logo-icon">A</div>
            <div class="logo-text"><span>TAAGC</span> ADMIN</div>
        </div>

        <span class="admin-badge">
            <i class="fas fa-shield-alt"></i> SUPER ADMIN ACCESS
        </span>

        <h1>Admin Login</h1>
        <p style="color:#64748b; margin-bottom:24px;">Sign in with your administrator credentials</p>

        <div id="alertMessage" class="alert"></div>

        <form id="adminLoginForm" onsubmit="event.preventDefault(); adminLogin();">
            <div class="form-group">
                <label><i class="fas fa-envelope" style="color:#c19a6b;"></i> Email</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="email" value="priahmz@gmail.com" placeholder="admin@taagc.com" required>
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-lock" style="color:#c19a6b;"></i> Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" value="Admin/Taagc/001" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn" id="loginBtn">
                <i class="fas fa-shield-alt"></i> Login to Admin Panel
            </button>
        </form>

        <div class="admin-info">
            <i class="fas fa-crown" style="color:#c19a6b; margin-right:8px;"></i>
            <strong>Ahmad Hamza</strong> - Super Administrator<br>
            <span style="font-size:12px;">priahmz@gmail.com</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword,
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { 
            getFirestore, 
            doc, 
            getDoc, 
            updateDoc,
            serverTimestamp 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAI1MrcP977UgRLQoePxl64JOSyj9v4WpI",
            authDomain: "xtaagc.firebaseapp.com",
            projectId: "xtaagc",
            storageBucket: "xtaagc.firebasestorage.app",
            messagingSenderId: "256073982437",
            appId: "1:256073982437:web:8da63bb7acc86c0ca98f0c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.adminLogin = async function() {
            const btn = document.getElementById('loginBtn');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';
            btn.disabled = true;
            
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // Check if user is admin
                const idTokenResult = await user.getIdTokenResult();
                const isAdmin = idTokenResult.claims.admin === true;
                
                if (!isAdmin) {
                    // Check Firestore as fallback
                    const adminDoc = await getDoc(doc(db, "admins", user.uid));
                    if (!adminDoc.exists()) {
                        throw new Error('Access denied. Admin privileges required.');
                    }
                }
                
                // Update last login
                await updateDoc(doc(db, "admins", user.uid), {
                    lastLogin: serverTimestamp(),
                    lastLoginIP: 'web'
                }).catch(() => {});
                
                // Redirect to admin dashboard
                window.location.href = '/admin/dashboard.html';
                
            } catch (error) {
                console.error('Login error:', error);
                
                const alertDiv = document.getElementById('alertMessage');
                alertDiv.className = 'alert alert-error';
                alertDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${error.message}`;
                alertDiv.style.display = 'flex';
                
                btn.innerHTML = '<i class="fas fa-shield-alt"></i> Login to Admin Panel';
                btn.disabled = false;
            }
        };

        // Check if already logged in
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const idTokenResult = await user.getIdTokenResult();
                if (idTokenResult.claims.admin === true) {
                    window.location.href = '/admin/dashboard.html';
                }
            }
        });
    </script>
</body>
</html>
