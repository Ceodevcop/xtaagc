<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | TAAGC Global</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:'Inter',sans-serif;
            background:linear-gradient(135deg,#0a2540,#1a3a4f);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }
        .login-card{
            background:white;
            border-radius:32px;
            padding:48px;
            max-width:480px;
            width:100%;
            box-shadow:0 25px 50px rgba(0,0,0,0.3);
        }
        .logo{
            display:flex;
            align-items:center;
            gap:12px;
            margin-bottom:30px;
        }
        .logo-icon{
            width:48px;
            height:48px;
            background:linear-gradient(135deg,#0a2540,#3a5a78);
            border-radius:12px;
            display:flex;
            align-items:center;
            justify-content:center;
            color:white;
            font-size:24px;
            font-weight:700;
        }
        .logo-text{
            font-size:24px;
            font-weight:700;
            color:#0a2540;
            font-family:'Playfair Display',serif;
        }
        .logo-text span{color:#c19a6b;}
        h1{font-size:28px;margin-bottom:8px;color:#0a2540;}
        .admin-badge{
            display:inline-block;
            background:#c19a6b20;
            color:#c19a6b;
            padding:6px 16px;
            border-radius:40px;
            font-size:13px;
            font-weight:600;
            margin-bottom:24px;
        }
        .form-group{
            margin-bottom:20px;
        }
        label{
            display:block;
            margin-bottom:8px;
            font-weight:600;
            color:#0a2540;
        }
        .input-wrapper{
            position:relative;
        }
        .input-icon{
            position:absolute;
            left:16px;
            top:50%;
            transform:translateY(-50%);
            color:#a0aec0;
        }
        input{
            width:100%;
            padding:14px 16px 14px 48px;
            border:2px solid #e2e8f0;
            border-radius:12px;
            font-size:15px;
            transition:0.3s;
        }
        input:focus{
            border-color:#c19a6b;
            outline:none;
            box-shadow:0 0 0 4px rgba(193,154,107,0.1);
        }
        .btn{
            display:flex;
            align-items:center;
            justify-content:center;
            gap:10px;
            width:100%;
            padding:16px;
            background:#0a2540;
            color:white;
            border:none;
            border-radius:12px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
            margin-top:20px;
        }
        .btn:hover{
            background:#1a3a4f;
            transform:translateY(-2px);
        }
        .alert{
            padding:16px;
            border-radius:12px;
            margin-top:20px;
            display:none;
        }
        .alert-error{
            background:#fff5f5;
            border-left:4px solid #e53e3e;
            color:#742a2a;
            display:flex;
            align-items:center;
            gap:8px;
        }
        .alert-success{
            background:#f0fff4;
            border-left:4px solid #2e7d5e;
            color:#22543d;
            display:flex;
            align-items:center;
            gap:8px;
        }
        .loading{
            display:inline-block;
            width:20px;
            height:20px;
            border:3px solid rgba(255,255,255,0.3);
            border-top-color:white;
            border-radius:50%;
            animation:spin 1s linear infinite;
        }
        @keyframes spin{to{transform:rotate(360deg);}}
        .setup-link{
            margin-top:30px;
            text-align:center;
            font-size:14px;
            color:#64748b;
        }
        .setup-link a{
            color:#c19a6b;
            text-decoration:none;
            font-weight:600;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <div class="logo-icon">A</div>
            <div class="logo-text"><span>TAAGC</span> ADMIN</div>
        </div>

        <span class="admin-badge">
            <i class="fas fa-shield-alt"></i> ADMINISTRATOR ACCESS
        </span>

        <h1>Admin Login</h1>
        <p style="color:#64748b; margin-bottom:24px;">Enter your administrator credentials</p>

        <div id="alertMessage" class="alert"></div>

        <form id="adminLoginForm" onsubmit="event.preventDefault(); adminLogin();">
            <div class="form-group">
                <label><i class="fas fa-envelope" style="color:#c19a6b;"></i> Email</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="email" placeholder="admin@taagc.com" value="priahmz@gmail.com" required>
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock" style="color:#c19a6b;"></i> Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" placeholder="••••••••" value="Admin/Taagc/001" required>
                </div>
            </div>
            <button type="submit" class="btn" id="loginBtn">
                <i class="fas fa-shield-alt"></i> Login to Admin Panel
            </button>
        </form>
        
        <div class="setup-link">
            <i class="fas fa-cog"></i> First time? <a href="/setup-admin.html">Create administrator account</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword,
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { 
            getFirestore, 
            doc, 
            getDoc 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAI1MrcP977UgRLQoePxl64JOSyj9v4WpI",
            authDomain: "xtaagc.firebaseapp.com",
            projectId: "xtaagc",
            storageBucket: "xtaagc.firebasestorage.app",
            messagingSenderId: "256073982437",
            appId: "1:256073982437:web:8da63bb7acc86c0ca98f0c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.adminLogin = async function() {
            const btn = document.getElementById('loginBtn');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const alertDiv = document.getElementById('alertMessage');
            
            if (!email || !password) {
                alertDiv.className = 'alert alert-error';
                alertDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Please enter both email and password';
                return;
            }
            
            btn.innerHTML = '<span class="loading"></span> Verifying...';
            btn.disabled = true;
            
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                let isAdmin = false;
                let adminData = null;
                
                // MANUAL OVERRIDE for Ahmad Hamza
                if (email === 'priahmz@gmail.com') {
                    isAdmin = true;
                    adminData = {
                        name: 'Ahmad Hamza',
                        email: 'priahmz@gmail.com',
                        role: 'super-admin',
                        roleName: 'Super Administrator'
                    };
                } else {
                    // Check Firestore
                    try {
                        const adminDoc = await getDoc(doc(db, "admins", user.uid));
                        if (adminDoc.exists()) {
                            isAdmin = true;
                            adminData = adminDoc.data();
                        }
                    } catch (e) {}
                }
                
                if (isAdmin) {
                    sessionStorage.setItem('taagc_admin', JSON.stringify({
                        uid: user.uid,
                        ...adminData
                    }));
                    
                    alertDiv.className = 'alert alert-success';
                    alertDiv.innerHTML = `<i class="fas fa-check-circle"></i> Welcome, ${adminData?.name || 'Administrator'}! Redirecting...`;
                    
                    setTimeout(() => {
                        window.location.href = '/admin/dashboard.html';
                    }, 1500);
                    
                } else {
                    throw new Error('Access denied. Admin privileges required.');
                }
                
            } catch (error) {
                let errorMessage = 'Invalid email or password';
                if (error.code === 'auth/user-not-found') errorMessage = 'No account found with this email';
                if (error.code === 'auth/wrong-password') errorMessage = 'Incorrect password';
                
                alertDiv.className = 'alert alert-error';
                alertDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${errorMessage}`;
                
                btn.innerHTML = '<i class="fas fa-shield-alt"></i> Login to Admin Panel';
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
