<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Agency - TAAGC Admin</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Assets -->
    <link rel="stylesheet" href="/assets/css/admin.css">
    <script src="/assets/js/admin.js" defer></script>
    
    <style>
        .create-form {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .form-section {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: var(--space-xl);
            margin-bottom: var(--space-xl);
            border: 1px solid #e2e8f0;
        }
        
        .section-title {
            color: var(--primary);
            margin-bottom: var(--space-lg);
            padding-bottom: var(--space-sm);
            border-bottom: 2px solid var(--accent);
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }
        
        .logo-upload {
            width: 100px;
            height: 100px;
            background: var(--bg);
            border: 2px dashed #e2e8f0;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .logo-upload:hover {
            border-color: var(--accent);
            background: rgba(193,154,107,0.05);
        }
        
        .logo-upload i {
            font-size: 32px;
            color: var(--accent);
        }
        
        .tier-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--space-md);
            margin-bottom: var(--space-xl);
        }
        
        .tier-card {
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .tier-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
        }
        
        .tier-card.selected {
            border-color: var(--accent);
            background: rgba(193,154,107,0.05);
        }
        
        .tier-icon {
            font-size: 32px;
            margin-bottom: var(--space-sm);
        }
        
        .tier-name {
            font-weight: 700;
            margin-bottom: var(--space-xs);
        }
        
        .tier-commission {
            color: var(--accent);
            font-weight: 600;
        }
        
        .commission-slider {
            display: flex;
            align-items: center;
            gap: var(--space-md);
        }
        
        .commission-input {
            width: 100px;
            text-align: center;
        }
        
        .commission-range {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar">...</aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-plus-circle" style="color: var(--accent);"></i> Add New Agency</h1>
                    <p>Register a new partner agency</p>
                </div>
                <div class="top-bar-actions">
                    <button class="btn btn-outline" onclick="location.href='/agencies/index.html'">
                        <i class="fas fa-arrow-left"></i> Back to Agencies
                    </button>
                    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>

            <div class="create-form">
                <form id="createAgencyForm" onsubmit="handleSubmit(event)">
                    <!-- Basic Information -->
                    <div class="form-section">
                        <h3 class="section-title"><i class="fas fa-info-circle"></i> Basic Information</h3>
                        
                        <div class="flex gap-3" style="margin-bottom: var(--space-lg);">
                            <div class="logo-upload" onclick="uploadLogo()">
                                <i class="fas fa-cloud-upload-alt"></i>
                            </div>
                            <div style="flex: 1;">
                                <div class="form-group">
                                    <label class="field-required">Agency Name</label>
                                    <input type="text" id="name" class="form-control" required placeholder="e.g., Global Marketing Solutions">
                                </div>
                            </div>
                        </div>
                        
                        <div class="grid-2">
                            <div class="form-group">
                                <label class="field-required">Contact Person</label>
                                <input type="text" id="contact" class="form-control" required placeholder="Full name">
                            </div>
                            
                            <div class="form-group">
                                <label class="field-required">Email Address</label>
                                <input type="email" id="email" class="form-control" required placeholder="contact@agency.com">
                            </div>
                            
                            <div class="form-group">
                                <label>Phone Number</label>
                                <input type="tel" id="phone" class="form-control" placeholder="+1 234 567 8900">
                            </div>
                            
                            <div class="form-group">
                                <label>Website</label>
                                <input type="url" id="website" class="form-control" placeholder="www.agency.com">
                            </div>
                        </div>
                    </div>

                    <!-- Agency Details -->
                    <div class="form-section">
                        <h3 class="section-title"><i class="fas fa-building"></i> Agency Details</h3>
                        
                        <div class="grid-2">
                            <div class="form-group">
                                <label class="field-required">Category</label>
                                <select id="category" class="form-control" required>
                                    <option value="">Select Category</option>
                                    <option value="marketing">Marketing Agency</option>
                                    <option value="sales">Sales Partner</option>
                                    <option value="tech">Technology Partner</option>
                                    <option value="consulting">Consulting</option>
                                    <option value="referral">Referral Partner</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label class="field-required">Country</label>
                                <select id="country" class="form-control" required>
                                    <option value="">Select Country</option>
                                    <option value="USA">United States</option>
                                    <option value="UK">United Kingdom</option>
                                    <option value="Canada">Canada</option>
                                    <option value="Singapore">Singapore</option>
                                    <option value="Germany">Germany</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label>Address Line 1</label>
                                <input type="text" id="address1" class="form-control" placeholder="Street address">
                            </div>
                            
                            <div class="form-group">
                                <label>Address Line 2</label>
                                <input type="text" id="address2" class="form-control" placeholder="Suite, unit, etc.">
                            </div>
                            
                            <div class="form-group">
                                <label>City</label>
                                <input type="text" id="city" class="form-control" placeholder="City">
                            </div>
                            
                            <div class="form-group">
                                <label>State/Province</label>
                                <input type="text" id="state" class="form-control" placeholder="State">
                            </div>
                            
                            <div class="form-group">
                                <label>Postal Code</label>
                                <input type="text" id="zip" class="form-control" placeholder="Postal code">
                            </div>
                            
                            <div class="form-group">
                                <label>Tax ID / VAT Number</label>
                                <input type="text" id="taxId" class="form-control" placeholder="Tax identification">
                            </div>
                        </div>
                    </div>

                    <!-- Tier & Commission -->
                    <div class="form-section">
                        <h3 class="section-title"><i class="fas fa-percent"></i> Tier & Commission</h3>
                        
                        <label>Select Partner Tier</label>
                        <div class="tier-selector">
                            <div class="tier-card" onclick="selectTier('platinum')">
                                <div class="tier-icon" style="color: #8b5cf6;">👑</div>
                                <div class="tier-name">Platinum</div>
                                <div class="tier-commission">15-20%</div>
                            </div>
                            <div class="tier-card" onclick="selectTier('gold')">
                                <div class="tier-icon" style="color: #f59e0b;">⭐</div>
                                <div class="tier-name">Gold</div>
                                <div class="tier-commission">12-15%</div>
                            </div>
                            <div class="tier-card" onclick="selectTier('silver')">
                                <div class="tier-icon" style="color: #94a3b8;">🥈</div>
                                <div class="tier-name">Silver</div>
                                <div class="tier-commission">8-12%</div>
                            </div>
                            <div class="tier-card" onclick="selectTier('bronze')">
                                <div class="tier-icon" style="color: #b45309;">🥉</div>
                                <div class="tier-name">Bronze</div>
                                <div class="tier-commission">5-8%</div>
                            </div>
                        </div>
                        
                        <div class="commission-slider">
                            <div style="flex: 1;">
                                <label>Commission Rate (%)</label>
                                <input type="range" id="commissionRange" class="commission-range" min="0" max="25" step="0.5" value="12" oninput="updateCommission()">
                            </div>
                            <div class="commission-input">
                                <input type="number" id="commission" class="form-control" value="12" step="0.5" min="0" max="25" onchange="updateRange()">
                                <small>%</small>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>Payment Terms</label>
                            <select id="paymentTerms" class="form-control">
                                <option value="net15">Net 15</option>
                                <option value="net30" selected>Net 30</option>
                                <option value="net45">Net 45</option>
                                <option value="net60">Net 60</option>
                            </select>
                        </div>
                    </div>

                    <!-- Contract Information -->
                    <div class="form-section">
                        <h3 class="section-title"><i class="fas fa-file-contract"></i> Contract Information</h3>
                        
                        <div class="grid-2">
                            <div class="form-group">
                                <label>Contract Start Date</label>
                                <input type="date" id="contractStart" class="form-control" value="2024-03-09">
                            </div>
                            
                            <div class="form-group">
                                <label>Contract End Date</label>
                                <input type="date" id="contractEnd" class="form-control" value="2025-03-09">
                            </div>
                            
                            <div class="form-group">
                                <label>Contract Type</label>
                                <select id="contractType" class="form-control">
                                    <option value="exclusive">Exclusive Partnership</option>
                                    <option value="non-exclusive" selected>Non-Exclusive</option>
                                    <option value="referral">Referral Only</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label>Auto-Renewal</label>
                                <select id="autoRenew" class="form-control">
                                    <option value="yes">Yes, auto-renew</option>
                                    <option value="no">No, manual renewal</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>Contract Notes</label>
                            <textarea id="contractNotes" class="form-control" rows="3" placeholder="Special terms, conditions, etc."></textarea>
                        </div>
                        
                        <div class="form-group">
                            <label class="checkbox">
                                <input type="checkbox" id="termsAgree" required>
                                <span>I confirm that the contract has been signed and agreed upon</span>
                            </label>
                        </div>
                    </div>

                    <!-- Form Actions -->
                    <div class="flex gap-2" style="justify-content: flex-end;">
                        <button type="button" class="btn btn-outline" onclick="location.href='/agencies/index.html'">
                            Cancel
                        </button>
                        <button type="submit" class="btn btn-primary" id="submitBtn">
                            <i class="fas fa-save"></i> Create Agency
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script>
        let selectedTier = 'gold';

        function selectTier(tier) {
            selectedTier = tier;
            document.querySelectorAll('.tier-card').forEach(card => card.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            
            // Set default commission based on tier
            const commissions = {
                'platinum': 18,
                'gold': 14,
                'silver': 10,
                'bronze': 6
            };
            
            document.getElementById('commission').value = commissions[tier];
            document.getElementById('commissionRange').value = commissions[tier];
        }

        function updateCommission() {
            const range = document.getElementById('commissionRange');
            const input = document.getElementById('commission');
            input.value = range.value;
        }

        function updateRange() {
            const range = document.getElementById('commissionRange');
            const input = document.getElementById('commission');
            range.value = input.value;
        }

        function uploadLogo() {
            TAAGC.ui.showToast('Logo upload feature coming soon', 'info');
        }

        async function handleSubmit(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerHTML = '<span class="spinner"></span> Creating...';
            submitBtn.disabled = true;
            
            try {
                // Collect form data
                const agencyData = {
                    name: document.getElementById('name').value,
                    contact: document.getElementById('contact').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    website: document.getElementById('website').value,
                    category: document.getElementById('category').value,
                    country: document.getElementById('country').value,
                    address: {
                        line1: document.getElementById('address1').value,
                        line2: document.getElementById('address2').value,
                        city: document.getElementById('city').value,
                        state: document.getElementById('state').value,
                        zip: document.getElementById('zip').value
                    },
                    taxId: document.getElementById('taxId').value,
                    tier: selectedTier,
                    commission: parseFloat(document.getElementById('commission').value),
                    paymentTerms: document.getElementById('paymentTerms').value,
                    contract: {
                        start: document.getElementById('contractStart').value,
                        end: document.getElementById('contractEnd').value,
                        type: document.getElementById('contractType').value,
                        autoRenew: document.getElementById('autoRenew').value === 'yes',
                        notes: document.getElementById('contractNotes').value
                    },
                    status: 'pending',
                    createdAt: new Date().toISOString()
                };
                
                // Simulate API call
                await new Promise(resolve => setTimeout(resolve, 1500));
                
                TAAGC.ui.showToast('Agency created successfully!', 'success');
                
                setTimeout(() => {
                    location.href = '/agencies/index.html';
                }, 1500);
                
            } catch (error) {
                TAAGC.ui.showToast('Error creating agency', 'error');
                submitBtn.innerHTML = '<i class="fas fa-save"></i> Create Agency';
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
