<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agencies Management - TAAGC</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/admin/assets/css/admin.css">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar (same structure) -->
        <aside class="sidebar">
            <!-- ... same sidebar ... -->
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-building" style="color: var(--accent);"></i> Agencies Management</h1>
                    <p>Manage partner agencies and their API access</p>
                </div>
                <div class="top-bar-actions">
                    <button class="btn btn-primary" onclick="location.href='/agencies/create.html'">
                        <i class="fas fa-plus"></i> Add Agency
                    </button>
                    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-building"></i></div>
                    <div class="stat-value" id="totalAgencies">0</div>
                    <div class="stat-label">Active Agencies</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-key"></i></div>
                    <div class="stat-value" id="activeKeys">0</div>
                    <div class="stat-label">Active API Keys</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
                    <div class="stat-value" id="totalCommissions">$0</div>
                    <div class="stat-label">Total Commissions</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-clock"></i></div>
                    <div class="stat-value" id="pendingPayments">0</div>
                    <div class="stat-label">Pending Payments</div>
                </div>
            </div>

            <!-- Agencies List -->
            <div class="card">
                <div class="card-header">
                    <h2><i class="fas fa-list"></i> Partner Agencies</h2>
                </div>
                
                <div class="table-container">
                    <table id="agenciesTable">
                        <thead>
                            <tr>
                                <th>Agency</th>
                                <th>Contact</th>
                                <th>API Key</th>
                                <th>Commission</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="agenciesTableBody">
                            <tr><td colspan="6" class="text-center">Loading agencies...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="/admin/assets/js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await loadAgencies();
        });
        
        async function loadAgencies() {
            try {
                const response = await TAAGC.api.agencies.getAll();
                const agencies = response.agencies || [];
                
                document.getElementById('totalAgencies').textContent = agencies.length;
                document.getElementById('activeKeys').textContent = agencies.filter(a => a.apiKey).length;
                
                const totalCommissions = agencies.reduce((sum, a) => sum + (a.commissions || 0), 0);
                document.getElementById('totalCommissions').textContent = TAAGC.data.formatCurrency(totalCommissions);
                
                const tbody = document.getElementById('agenciesTableBody');
                tbody.innerHTML = agencies.map(agency => `
                    <tr>
                        <td>
                            <strong>${agency.name}</strong><br>
                            <small>${agency.code || 'N/A'}</small>
                        </td>
                        <td>
                            ${agency.contactName}<br>
                            <small>${agency.email}</small>
                        </td>
                        <td>
                            <code>${agency.apiKey ? '••••••••' : 'No API key'}</code>
                            ${agency.apiKey ? '<i class="fas fa-check-circle" style="color: var(--success);"></i>' : ''}
                        </td>
                        <td>${agency.commissionRate || 0}%</td>
                        <td><span class="badge badge-${agency.status === 'active' ? 'success' : 'warning'}">${agency.status}</span></td>
                        <td>
                            <button class="btn btn-sm btn-outline" onclick="viewAgency('${agency.id}')"><i class="fas fa-eye"></i></button>
                            <button class="btn btn-sm btn-outline-accent" onclick="generateApiKey('${agency.id}')"><i class="fas fa-key"></i></button>
                        </td>
                    </tr>
                `).join('');
                
            } catch (error) {
                TAAGC.ui.showToast('Error loading agencies', 'error');
            }
        }
        
        function viewAgency(id) {
            location.href = `/agencies/view.html?id=${id}`;
        }
        
        async function generateApiKey(id) {
            try {
                const response = await TAAGC.api.agencies.generateApiKey(id);
                TAAGC.ui.showToast(`New API Key generated: ${response.apiKey}`, 'success');
                loadAgencies();
            } catch (error) {
                TAAGC.ui.showToast('Error generating API key', 'error');
            }
        }
    </script>
</body>
</html>
