<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Audit Logs - TAAGC Admin</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Assets -->
    <link rel="stylesheet" href="/assets/css/admin.css">
    <script src="/assets/js/admin.js" defer></script>
    
    <style>
        .audit-filters {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            margin-bottom: var(--space-xl);
            border: 1px solid #e2e8f0;
        }
        
        .audit-timeline {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: var(--space-xl);
            border: 1px solid #e2e8f0;
        }
        
        .timeline-header {
            display: grid;
            grid-template-columns: 200px 1fr 150px 100px;
            background: var(--bg);
            padding: var(--space-md) var(--space-lg);
            border-radius: var(--radius-md);
            font-weight: 600;
            color: var(--primary);
            margin-bottom: var(--space-md);
        }
        
        .timeline-row {
            display: grid;
            grid-template-columns: 200px 1fr 150px 100px;
            padding: var(--space-md) var(--space-lg);
            border-bottom: 1px solid #e2e8f0;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .timeline-row:hover {
            background: var(--bg);
        }
        
        .audit-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
        }
        
        .audit-create {
            background: rgba(16,185,129,0.1);
            color: var(--success);
        }
        
        .audit-update {
            background: rgba(59,130,246,0.1);
            color: var(--info);
        }
        
        .audit-delete {
            background: rgba(229,62,62,0.1);
            color: var(--danger);
        }
        
        .audit-sync {
            background: rgba(139,92,246,0.1);
            color: var(--purple);
        }
        
        .audit-login {
            background: rgba(245,158,11,0.1);
            color: var(--warning);
        }
        
        .ip-address {
            font-family: monospace;
            font-size: 12px;
            color: var(--light);
        }
        
        .user-agent {
            font-size: 11px;
            color: var(--lighter);
            max-width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .details-panel {
            background: var(--bg);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            margin-top: var(--space-sm);
            display: none;
        }
        
        .timeline-row.expanded .details-panel {
            display: block;
        }
        
        .changes-list {
            list-style: none;
            margin-top: var(--space-sm);
        }
        
        .change-item {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            padding: var(--space-xs) 0;
            font-size: 13px;
        }
        
        .change-field {
            width: 120px;
            color: var(--light);
        }
        
        .change-old {
            color: var(--danger);
            text-decoration: line-through;
        }
        
        .change-new {
            color: var(--success);
        }
        
        .change-arrow {
            color: var(--light);
        }
        
        .severity-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
        }
        
        .severity-high {
            background: var(--danger);
        }
        
        .severity-medium {
            background: var(--warning);
        }
        
        .severity-low {
            background: var(--success);
        }
        
        .export-section {
            display: flex;
            gap: var(--space-sm);
            margin-bottom: var(--space-lg);
            justify-content: flex-end;
        }
        
        .export-btn {
            padding: var(--space-xs) var(--space-md);
            background: var(--white);
            border: 1px solid #e2e8f0;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .export-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        
        .stats-mini {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--space-md);
            margin-bottom: var(--space-lg);
        }
        
        .stat-mini {
            background: var(--white);
            padding: var(--space-md);
            border-radius: var(--radius-md);
            border: 1px solid #e2e8f0;
            text-align: center;
        }
        
        .stat-mini-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }
        
        .stat-mini-label {
            font-size: 11px;
            color: var(--light);
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar">...</aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-history" style="color: var(--accent);"></i> Bank Audit Logs</h1>
                    <p>Complete audit trail of all bank activities</p>
                </div>
                <div class="top-bar-actions">
                    <button class="btn btn-outline" onclick="exportAuditLogs()">
                        <i class="fas fa-download"></i> Export Logs
                    </button>
                    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>

            <!-- Mini Stats -->
            <div class="stats-mini">
                <div class="stat-mini">
                    <div class="stat-mini-value">1,234</div>
                    <div class="stat-mini-label">Total Events</div>
                </div>
                <div class="stat-mini">
                    <div class="stat-mini-value">45</div>
                    <div class="stat-mini-label">Today</div>
                </div>
                <div class="stat-mini">
                    <div class="stat-mini-value">12</div>
                    <div class="stat-mini-label">This Hour</div>
                </div>
                <div class="stat-mini">
                    <div class="stat-mini-value">3</div>
                    <div class="stat-mini-label">Critical</div>
                </div>
            </div>

            <!-- Filters -->
            <div class="audit-filters">
                <div class="grid-3">
                    <div class="form-group">
                        <label>Date Range</label>
                        <div class="flex gap-2">
                            <input type="date" class="form-control" value="2024-03-01">
                            <input type="date" class="form-control" value="2024-03-09">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Event Type</label>
                        <select class="form-control">
                            <option>All Events</option>
                            <option>Bank Created</option>
                            <option>Bank Updated</option>
                            <option>Bank Deleted</option>
                            <option>Account Added</option>
                            <option>Account Removed</option>
                            <option>Sync Performed</option>
                            <option>API Key Generated</option>
                            <option>Settings Changed</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>User</label>
                        <select class="form-control">
                            <option>All Users</option>
                            <option>System</option>
                            <option>Admin</option>
                            <option>John Smith</option>
                            <option>Sarah Wilson</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Bank</label>
                        <select class="form-control">
                            <option>All Banks</option>
                            <option>Chase Bank</option>
                            <option>Bank of America</option>
                            <option>Wells Fargo</option>
                            <option>HSBC</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Severity</label>
                        <select class="form-control">
                            <option>All</option>
                            <option>High</option>
                            <option>Medium</option>
                            <option>Low</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Search</label>
                        <input type="text" class="form-control" placeholder="Search logs...">
                    </div>
                </div>
                
                <div class="flex-between" style="margin-top: var(--space-md);">
                    <button class="btn btn-primary">Apply Filters</button>
                    <button class="btn btn-outline">Reset</button>
                </div>
            </div>

            <!-- Audit Timeline -->
            <div class="audit-timeline">
                <div class="timeline-header">
                    <div>Timestamp</div>
                    <div>Event Details</div>
                    <div>User / IP</div>
                    <div>Severity</div>
                </div>
                
                <div id="auditLogs">
                    <!-- Audit log entries will be loaded here -->
                </div>
                
                <!-- Pagination -->
                <div class="flex-center" style="margin-top: var(--space-xl);">
                    <div class="pagination">
                        <button class="page-link"><i class="fas fa-chevron-left"></i></button>
                        <button class="page-link active">1</button>
                        <button class="page-link">2</button>
                        <button class="page-link">3</button>
                        <button class="page-link">4</button>
                        <button class="page-link">5</button>
                        <span class="page-link">...</span>
                        <button class="page-link">12</button>
                        <button class="page-link"><i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function generateAuditLogs() {
            const logs = [];
            const events = [
                { type: 'create', action: 'Bank Created', bank: 'Chase Bank', user: 'Admin', severity: 'low' },
                { type: 'update', action: 'Bank Updated', bank: 'Bank of America', user: 'John Smith', severity: 'low' },
                { type: 'sync', action: 'Sync Performed', bank: 'Wells Fargo', user: 'System', severity: 'low' },
                { type: 'delete', action: 'Account Removed', bank: 'HSBC', user: 'Admin', severity: 'medium' },
                { type: 'update', action: 'API Key Regenerated', bank: 'Chase Bank', user: 'Sarah Wilson', severity: 'high' },
                { type: 'login', action: 'API Connection Tested', bank: 'DBS Bank', user: 'System', severity: 'low' },
                { type: 'update', action: 'Settings Changed', bank: 'Chase Bank', user: 'Admin', severity: 'medium' }
            ];
            
            const ips = ['192.168.1.100', '10.0.0.45', '172.16.0.1', '203.0.113.78'];
            const userAgents = [
                'Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0.0.0',
                'Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7) Safari/17.3',
                'Mozilla/5.0 (iPhone; CPU iPhone OS 17_3 like Mac OS X) Mobile/15E148'
            ];
            
            for (let i = 0; i < 20; i++) {
                const event = events[Math.floor(Math.random() * events.length)];
                const date = new Date();
                date.setMinutes(date.getMinutes() - i * 15);
                
                const severityClass = {
                    'low': 'severity-low',
                    'medium': 'severity-medium',
                    'high': 'severity-high'
                }[event.severity];
                
                const auditClass = {
                    'create': 'audit-create',
                    'update': 'audit-update',
                    'delete': 'audit-delete',
                    'sync': 'audit-sync',
                    'login': 'audit-login'
                }[event.type];
                
                logs.push(`
                    <div class="timeline-row" onclick="toggleAuditDetails('audit${i}')">
                        <div>
                            <div>${date.toLocaleDateString()}</div>
                            <small style="color: var(--light);">${date.toLocaleTimeString()}</small>
                        </div>
                        <div>
                            <div>
                                <span class="audit-badge ${auditClass}">${event.action}</span>
                                <strong>${event.bank}</strong>
                            </div>
                            <div class="user-agent">${userAgents[Math.floor(Math.random() * userAgents.length)]}</div>
                        </div>
                        <div>
                            <div>${event.user}</div>
                            <div class="ip-address">${ips[Math.floor(Math.random() * ips.length)]}</div>
                        </div>
                        <div>
                            <span class="severity-indicator ${severityClass}"></span>
                            <span style="text-transform: capitalize;">${event.severity}</span>
                        </div>
                        
                        <!-- Details Panel -->
                        <div class="details-panel" id="details-audit${i}">
                            <div class="grid-2">
                                <div>
                                    <strong>Event Details</strong>
                                    <div class="info-row">
                                        <span class="info-label">Event ID:</span>
                                        <span class="info-value">aud_${1000 + i}</span>
                                    </div>
                                    <div class="info-row">
                                        <span class="info-label">Timestamp:</span>
                                        <span class="info-value">${date.toISOString()}</span>
                                    </div>
                                    <div class="info-row">
                                        <span class="info-label">Event Type:</span>
                                        <span class="info-value">${event.type}</span>
                                    </div>
                                </div>
                                <div>
                                    <strong>Changes</strong>
                                    <ul class="changes-list">
                                        <li class="change-item">
                                            <span class="change-field">Bank Name:</span>
                                            <span class="change-old">Old Bank Name</span>
                                            <span class="change-arrow">→</span>
                                            <span class="change-new">${event.bank}</span>
                                        </li>
                                        <li class="change-item">
                                            <span class="change-field">Status:</span>
                                            <span class="change-old">pending</span>
                                            <span class="change-arrow">→</span>
                                            <span class="change-new">active</span>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                `);
            }
            
            return logs.join('');
        }

        function loadAuditLogs() {
            document.getElementById('auditLogs').innerHTML = generateAuditLogs();
        }

        function toggleAuditDetails(id) {
            const details = document.getElementById(`details-${id}`);
            const row = event.currentTarget;
            
            if (details.style.display === 'block') {
                details.style.display = 'none';
                row.classList.remove('expanded');
            } else {
                details.style.display = 'block';
                row.classList.add('expanded');
            }
        }

        function exportAuditLogs() {
            TAAGC.ui.showToast('Exporting audit logs...', 'info');
        }

        loadAuditLogs();
    </script>
</body>
</html>
