<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banks Management - TAAGC</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/admin/assets/css/admin.css">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon">TA</div>
                <h2><span>TAAGC</span> ADMIN</h2>
            </div>
            
            <div class="user-info">
                <div class="user-avatar" data-user-avatar>A</div>
                <div data-user-field="name">Loading...</div>
                <div style="font-size: 12px; opacity: 0.7;" data-user-field="email"></div>
                <span class="user-role" data-user-field="role"></span>
            </div>
            
            <nav class="nav-menu">
                <div class="nav-section">MAIN</div>
                <a href="/dashboard.html" class="nav-item"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="/banks/index.html" class="nav-item active"><i class="fas fa-university"></i> Banks</a>
                <a href="/agencies/index.html" class="nav-item"><i class="fas fa-building"></i> Agencies</a>
                <a href="/transactions/index.html" class="nav-item"><i class="fas fa-exchange-alt"></i> Transactions</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-university" style="color: var(--accent);"></i> Banks Management</h1>
                    <p>Manage connected banks and financial institutions</p>
                </div>
                <div class="top-bar-actions">
                    <button class="btn btn-primary" onclick="location.href='/banks/create.html'">
                        <i class="fas fa-plus"></i> Connect Bank
                    </button>
                    <button class="btn btn-outline" onclick="syncAllBanks()">
                        <i class="fas fa-sync-alt"></i> Sync All
                    </button>
                    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-university"></i></div>
                    <div class="stat-value" id="totalBanks">0</div>
                    <div class="stat-label">Connected Banks</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-credit-card"></i></div>
                    <div class="stat-value" id="totalAccounts">0</div>
                    <div class="stat-label">Bank Accounts</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-dollar-sign"></i></div>
                    <div class="stat-value" id="totalBalance">$0</div>
                    <div class="stat-label">Total Balance</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-exchange-alt"></i></div>
                    <div class="stat-value" id="pendingSync">0</div>
                    <div class="stat-label">Pending Sync</div>
                </div>
            </div>

            <!-- Banks List -->
            <div class="card">
                <div class="card-header">
                    <h2><i class="fas fa-list"></i> Connected Banks</h2>
                    <div class="flex gap-2">
                        <input type="text" id="searchBanks" class="form-control" placeholder="Search banks..." style="width: 250px;">
                        <select id="statusFilter" class="form-control" style="width: 150px;">
                            <option value="">All Status</option>
                            <option value="connected">Connected</option>
                            <option value="disconnected">Disconnected</option>
                            <option value="pending">Pending</option>
                        </select>
                    </div>
                </div>
                
                <div class="table-container">
                    <table id="banksTable">
                        <thead>
                            <tr>
                                <th>Bank</th>
                                <th>Account</th>
                                <th>Balance</th>
                                <th>Status</th>
                                <th>Last Sync</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="banksTableBody">
                            <tr><td colspan="6" class="text-center">Loading banks...</td></tr>
                        </tbody>
                    </table>
                </div>
                
                <!-- Pagination -->
                <div class="pagination" id="pagination"></div>
            </div>
        </main>
    </div>

    <script src="/admin/assets/js/admin.js"></script>
    <script>
        let banks = [];
        
        document.addEventListener('DOMContentLoaded', async () => {
            await loadBanks();
        });
        
        async function loadBanks() {
            try {
                const response = await TAAGC.api.banks.getAll();
                banks = response.banks || [];
                renderBanks(banks);
                
                // Update stats
                document.getElementById('totalBanks').textContent = banks.length;
                document.getElementById('totalAccounts').textContent = banks.reduce((sum, b) => sum + (b.accounts || 1), 0);
                
                const totalBalance = banks.reduce((sum, b) => sum + (b.balance || 0), 0);
                document.getElementById('totalBalance').textContent = TAAGC.data.formatCurrency(totalBalance);
                document.getElementById('pendingSync').textContent = banks.filter(b => b.status === 'pending').length;
                
            } catch (error) {
                TAAGC.ui.showToast('Error loading banks', 'error');
            }
        }
        
        function renderBanks(banksToRender) {
            const tbody = document.getElementById('banksTableBody');
            
            if (banksToRender.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center">No banks found</td></tr>';
                return;
            }
            
            tbody.innerHTML = banksToRender.map(bank => `
                <tr>
                    <td>
                        <div class="flex gap-2">
                            <div class="bank-logo" style="width: 40px; height: 40px; background: ${bank.color || '#0a2540'};">
                                <i class="fas fa-university"></i>
                            </div>
                            <div>
                                <strong>${bank.name}</strong><br>
                                <small>${bank.code || 'N/A'}</small>
                            </div>
                        </div>
                    </td>
                    <td>${bank.accountNumber || '****1234'}</td>
                    <td><strong>${TAAGC.data.formatCurrency(bank.balance || 0)}</strong></td>
                    <td>
                        <span class="api-status ${bank.status === 'connected' ? 'connected' : 'disconnected'}">
                            <i class="fas fa-circle"></i> ${bank.status || 'Unknown'}
                        </span>
                    </td>
                    <td>${TAAGC.data.timeAgo(bank.lastSync)}</td>
                    <td>
                        <button class="btn btn-sm btn-outline" onclick="viewBank('${bank.id}')"><i class="fas fa-eye"></i></button>
                        <button class="btn btn-sm btn-outline-accent" onclick="syncBank('${bank.id}')"><i class="fas fa-sync-alt"></i></button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteBank('${bank.id}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }
        
        function viewBank(id) {
            location.href = `/banks/view.html?id=${id}`;
        }
        
        async function syncBank(id) {
            try {
                await TAAGC.api.banks.sync(id);
                TAAGC.ui.showToast('Bank synced successfully', 'success');
                loadBanks();
            } catch (error) {
                TAAGC.ui.showToast('Error syncing bank', 'error');
            }
        }
        
        async function syncAllBanks() {
            TAAGC.ui.showToast('Starting sync for all banks...', 'info');
            for (const bank of banks) {
                await syncBank(bank.id);
            }
        }
        
        function deleteBank(id) {
            TAAGC.ui.confirm('Are you sure you want to disconnect this bank?', async () => {
                try {
                    await TAAGC.api.banks.delete(id);
                    TAAGC.ui.showToast('Bank disconnected', 'success');
                    loadBanks();
                } catch (error) {
                    TAAGC.ui.showToast('Error disconnecting bank', 'error');
                }
            });
        }
        
        // Search
        document.getElementById('searchBanks').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = banks.filter(b => 
                b.name.toLowerCase().includes(term) ||
                (b.code || '').toLowerCase().includes(term)
            );
            renderBanks(filtered);
        });
        
        // Filter
        document.getElementById('statusFilter').addEventListener('change', (e) => {
            const status = e.target.value;
            if (!status) {
                renderBanks(banks);
            } else {
                const filtered = banks.filter(b => b.status === status);
                renderBanks(filtered);
            }
        });
    </script>
</body>
</html>
