<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin Dashboard</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#f8fafc}.dashboard{display:flex;min-height:100vh}.sidebar{width:280px;background:linear-gradient(180deg,#0a2540,#1a3a4f);color:#fff;position:fixed;height:100vh;overflow-y:auto}.sidebar-header{padding:30px 20px;border-bottom:1px solid rgba(255,255,255,.1)}.sidebar-logo{display:flex;align-items:center;gap:12px}.logo-icon{width:48px;height:48px;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#0a2540;font-size:24px;font-weight:700}.logo-text{font-size:20px;font-weight:700}.logo-text span{color:#c19a6b}.admin-profile{background:rgba(255,255,255,.1);border-radius:12px;padding:20px;margin:20px;display:flex;align-items:center;gap:15px}.admin-avatar{width:56px;height:56px;background:#c19a6b;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700}.nav-menu{padding:20px}.nav-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:8px;color:rgba(255,255,255,.8);margin-bottom:5px;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-size:15px}.nav-item:hover,.nav-item.active{background:#c19a6b;color:#fff}.main-content{flex:1;margin-left:280px;padding:30px}.header{background:#fff;border-radius:16px;padding:20px 30px;margin-bottom:30px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 4px rgba(0,0,0,.02)}.logout-btn{background:#e53e3e;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px}.logout-btn:hover{background:#c53030}.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:30px}.stat-card{background:#fff;padding:24px;border-radius:16px;border:1px solid #e2e8f0}.stat-icon{width:48px;height:48px;background:linear-gradient(135deg,#0a2540,#3a5a78);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;margin-bottom:16px}.stat-number{font-size:32px;font-weight:700;color:#0a2540}.section{background:#fff;border-radius:16px;padding:24px;margin-bottom:30px;border:1px solid #e2e8f0}.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}.section-header h2{display:flex;align-items:center;gap:10px;color:#0a2540}table{width:100%;border-collapse:collapse}th{text-align:left;padding:12px;background:#f8fafc;color:#0a2540;font-weight:600}td{padding:12px;border-bottom:1px solid #e2e8f0}.status-badge{padding:4px 12px;border-radius:40px;font-size:12px;font-weight:600;display:inline-block}.status-active{background:#d4edda;color:#155724}.status-pending{background:#fff3cd;color:#856404}.btn-sm{padding:6px 12px;border:1px solid #e2e8f0;border-radius:6px;background:#fff;cursor:pointer}.hidden{display:none}.loading{text-align:center;padding:40px;color:#64748b}</style></head><body><div class="dashboard"><aside class="sidebar"><div class="sidebar-header"><div class="sidebar-logo"><div class="logo-icon">A</div><div class="logo-text"><span>TAAGC</span> ADMIN</div></div></div><div class="admin-profile"><div class="admin-avatar" id="adminAvatar">A</div><div><div id="adminName" style="font-weight:600">Loading...</div><div id="adminRole" style="font-size:12px;opacity:.8">Administrator</div></div></div><div class="nav-menu"><button class="nav-item active" onclick="showSection('dashboard')"><i class="fas fa-tachometer-alt"></i> Dashboard</button><button class="nav-item" onclick="showSection('users')"><i class="fas fa-users"></i> Users</button><button class="nav-item" onclick="showSection('companies')"><i class="fas fa-building"></i> Companies</button></div></aside><main class="main-content"><div class="header"><h1><i class="fas fa-tachometer-alt" style="color:#c19a6b;margin-right:10px"></i> Admin Dashboard</h1><button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button></div><div id="dashboardSection"><div class="stats-grid"><div class="stat-card"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="stat-number" id="totalUsers">0</div><div>Total Users</div></div><div class="stat-card"><div class="stat-icon"><i class="fas fa-building"></i></div><div class="stat-number" id="pendingCompanies">0</div><div>Pending Companies</div></div><div class="stat-card"><div class="stat-icon"><i class="fas fa-tags"></i></div><div class="stat-number" id="totalListings">0</div><div>Total Listings</div></div><div class="stat-card"><div class="stat-icon"><i class="fas fa-dollar-sign"></i></div><div class="stat-number" id="totalRevenue">$0</div><div>Revenue</div></div></div><div class="section"><div class="section-header"><h2><i class="fas fa-clock" style="color:#c19a6b"></i> Recent Activity</h2></div><div id="recentActivity">Loading...</div></div></div><div id="usersSection" class="hidden"><div class="section"><h2>User Management</h2><table><thead><tr><th>Name</th><th>Email</th><th>Status</th><th>Actions</th></tr></thead><tbody id="usersTable"></tbody></table></div></div><div id="companiesSection" class="hidden"><div class="section"><h2>Company Verification</h2><table><thead><tr><th>Company</th><th>Email</th><th>Status</th><th>Actions</th></tr></thead><tbody id="companiesTable"></tbody></table></div></div></main></div><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script><script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAI1MrcP977UgRLQoePxl64JOSyj9v4WpI",
  authDomain: "xtaagc.firebaseapp.com",
  projectId: "xtaagc",
  storageBucket: "xtaagc.firebasestorage.app",
  messagingSenderId: "256073982437",
  appId: "1:256073982437:web:8da63bb7acc86c0ca98f0c"
};

firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db = firebase.firestore();

// Check auth
(function() {
  const adminData = localStorage.getItem('taagc_admin') || sessionStorage.getItem('taagc_admin');
  if (!adminData) window.location.href = '/admin/';
  else {
    try {
      const admin = JSON.parse(adminData);
      document.getElementById('adminName').innerHTML = admin.name || 'Admin';
      document.getElementById('adminRole').innerHTML = admin.role || 'Administrator';
      document.getElementById('adminAvatar').innerHTML = (admin.name || 'A').charAt(0);
      loadData();
    } catch(e) {
      localStorage.removeItem('taagc_admin');
      sessionStorage.removeItem('taagc_admin');
      window.location.href = '/admin/';
    }
  }
})();

async function loadData() {
  const usersSnap = await db.collection('users').get();
  const companiesSnap = await db.collection('companies').where('status','==','pending').get();
  const listingsSnap = await db.collection('listings').get();
  
  document.getElementById('totalUsers').innerHTML = usersSnap.size;
  document.getElementById('pendingCompanies').innerHTML = companiesSnap.size;
  document.getElementById('totalListings').innerHTML = listingsSnap.size;
  
  loadUsers();
  loadCompanies();
  loadActivity();
}

async function loadUsers() {
  const snap = await db.collection('users').limit(5).get();
  let html = '';
  snap.forEach(d => {
    const u = d.data();
    html += `<tr><td>${u.name||''}</td><td>${u.email||''}</td><td><span class="status-badge status-active">Active</span></td><td><button class="btn-sm">View</button></td></tr>`;
  });
  document.getElementById('usersTable').innerHTML = html;
}

async function loadCompanies() {
  const snap = await db.collection('companies').limit(5).get();
  let html = '';
  snap.forEach(d => {
    const c = d.data();
    html += `<tr><td>${c.name||''}</td><td>${c.email||''}</td><td><span class="status-badge status-pending">Pending</span></td><td><button class="btn-sm">Verify</button></td></tr>`;
  });
  document.getElementById('companiesTable').innerHTML = html;
}

async function loadActivity() {
  const snap = await db.collection('audit_logs').orderBy('timestamp','desc').limit(5).get();
  let html = '<ul>';
  snap.forEach(d => {
    const log = d.data();
    html += `<li>${log.action} - ${new Date(log.timestamp?.toDate()).toLocaleTimeString()}</li>`;
  });
  html += '</ul>';
  document.getElementById('recentActivity').innerHTML = html;
}

window.showSection = function(s) {
  document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('dashboardSection').style.display = s==='dashboard'?'block':'none';
  document.getElementById('usersSection').style.display = s==='users'?'block':'none';
  document.getElementById('companiesSection').style.display = s==='companies'?'block':'none';
};

document.getElementById('logoutBtn').addEventListener('click', function() {
  localStorage.removeItem('taagc_admin');
  sessionStorage.removeItem('taagc_admin');
  auth.signOut();
  window.location.href = '/admin/';
});
</script></body></html>
