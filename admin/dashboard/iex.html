
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Panel - TAAGC</title>
    
    <!-- Firebase 8.10.1 SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Your existing styles - keep them exactly as they are */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: #f3f4f6;
        }
        .dashboard {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 300px;
            background: linear-gradient(180deg, #0a2540 0%, #1e3a5f 100%);
            color: white;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        .sidebar-header {
            padding: 30px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            width: 48px;
            height: 48px;
            background: #c19a6b;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
        }
        .logo-text {
            font-size: 20px;
            font-weight: 700;
        }
        .logo-text span {
            color: #c19a6b;
        }
        .admin-badge {
            background: rgba(193, 154, 107, 0.2);
            border: 1px solid #c19a6b;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 14px;
            margin-top: 15px;
            display: inline-block;
            font-weight: 500;
        }
        .nav-menu {
            padding: 20px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 10px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: 500;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }
        .nav-item i {
            width: 20px;
            color: #c19a6b;
            font-size: 16px;
        }
        .nav-item:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .nav-item.active {
            background: #c19a6b;
            color: white;
        }
        .nav-item.active i {
            color: white;
        }
        .nav-divider {
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 20px 0;
        }
        .main-content {
            flex: 1;
            margin-left: 300px;
            padding: 30px;
        }
        .top-header {
            background: white;
            border-radius: 16px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .header-title h1 {
            color: #0a2540;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .notification-badge {
            position: relative;
            cursor: pointer;
        }
        .notification-badge i {
            font-size: 20px;
            color: #64748b;
        }
        .badge-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #e53e3e;
            color: white;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 600;
        }
        .admin-profile-mini {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: #f8fafc;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .admin-profile-mini:hover {
            background: #e2e8f0;
        }
        .admin-avatar {
            width: 40px;
            height: 40px;
            background: #c19a6b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 16px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        .stat-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #0a2540, #1e3a5f);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin-bottom: 16px;
        }
        .stat-label {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #0a2540;
            margin-bottom: 5px;
        }
        .stat-change {
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .positive { color: #10b981; }
        .negative { color: #e53e3e; }
        .section {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .section-header h2 {
            color: #0a2540;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }
        .btn-primary {
            background: #0a2540;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            background: #1e3a5f;
        }
        .btn-secondary {
            background: #f8fafc;
            color: #0a2540;
            border: 1px solid #e2e8f0;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn-secondary:hover {
            background: #e2e8f0;
        }
        .table-responsive {
            overflow-x: auto;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }
        .admin-table th {
            text-align: left;
            padding: 15px;
            background: #f8fafc;
            color: #0a2540;
            font-weight: 600;
            font-size: 14px;
        }
        .admin-table td {
            padding: 15px;
            border-bottom: 1px solid #e2e8f0;
        }
        .status-badge {
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }
        .status-active { background: #10b98120; color: #10b981; }
        .status-pending { background: #f59e0b20; color: #f59e0b; }
        .loading {
            text-align: center;
            padding: 50px;
            color: #64748b;
        }
        .loading i {
            font-size: 40px;
            color: #c19a6b;
            margin-bottom: 20px;
        }
        .error-message {
            text-align: center;
            padding: 50px;
            color: #e53e3e;
            background: white;
            border-radius: 16px;
            margin-bottom: 30px;
        }
        .fix-banner {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            border-radius: 8px;
            padding: 30px;
            margin: 30px 0;
            color: #155724;
            text-align: center;
        }
        .fix-banner h2 {
            margin-bottom: 20px;
            font-size: 24px;
        }
        .fix-banner p {
            margin-bottom: 15px;
            font-size: 16px;
        }
        .fix-banner button {
            background: #155724;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
        .fix-banner button:hover {
            background: #0f3d1f;
        }
        .chart-container {
            height: 300px;
            margin-top: 20px;
            position: relative;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">SA</div>
                    <div class="logo-text"><span>TAAGC</span> SUPER ADMIN</div>
                </div>
                <div class="admin-badge" id="adminId">Super Admin</div>
            </div>
            <div class="nav-menu">
                <button class="nav-item active" data-section="system-overview">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>System Overview</span>
                </button>
                <button class="nav-item" data-section="investor-management">
                    <i class="fas fa-users"></i>
                    <span>Investor Management</span>
                </button>
                <button class="nav-item" data-section="projects-management">
                    <i class="fas fa-building"></i>
                    <span>Projects Management</span>
                </button>
                <button class="nav-item" data-section="funds-management">
                    <i class="fas fa-wallet"></i>
                    <span>Funds Management</span>
                </button>
                <button class="nav-item" data-section="transactions-management">
                    <i class="fas fa-exchange-alt"></i>
                    <span>Transactions</span>
                </button>
                <div class="nav-divider"></div>
                <button class="nav-item" data-section="withdrawals-management">
                    <i class="fas fa-hand-holding-usd"></i>
                    <span>Withdrawals</span>
                </button>
                <button class="nav-item" data-section="profits-management">
                    <i class="fas fa-chart-line"></i>
                    <span>Profits</span>
                </button>
                <button class="nav-item" data-section="reports-management">
                    <i class="fas fa-file-alt"></i>
                    <span>Reports</span>
                </button>
                <button class="nav-item" data-section="notifications-management">
                    <i class="fas fa-bell"></i>
                    <span>Notifications</span>
                </button>
                <button class="nav-item" data-section="settings-management">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </button>
                <div class="nav-divider"></div>
                <button class="nav-item" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-header">
                <div class="header-title">
                    <h1>
                        <i class="fas fa-tachometer-alt" style="color: #c19a6b;"></i>
                        <span id="pageTitle">System Overview</span>
                    </h1>
                </div>
                <div class="header-actions">
                    <div class="notification-badge" id="notificationBell">
                        <i class="far fa-bell"></i>
                        <span class="badge-count">0</span>
                    </div>
                    <div class="admin-profile-mini" id="profileMenu">
                        <div class="admin-avatar" id="adminAvatar">SA</div>
                        <div>
                            <div id="adminName" style="font-weight: 600;">Loading...</div>
                            <div style="font-size: 12px; color: #64748b;" id="adminRole">Super Admin</div>
                        </div>
                        <i class="fas fa-chevron-down" style="color: #64748b; font-size: 12px;"></i>
                    </div>
                </div>
            </div>

            <div id="content-area">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading admin panel...</p>
                </div>
            </div>
        </main>
    </div>

    <div id="actionModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Action Modal</h3>
            <div id="modalBody"></div>
            <div class="modal-actions">
                <button class="btn-primary" id="modalConfirm">Confirm</button>
                <button class="btn-secondary" id="modalCancel">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAI1MrcP977UgRLQoePxl64JOSyj9v4WpI",
            authDomain: "xtaagc.firebaseapp.com",
            projectId: "xtaagc",
            storageBucket: "xtaagc.appspot.com",
            messagingSenderId: "256073982437",
            appId: "1:256073982437:web:8da63bb7acc86c0ca98f0c"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Global variables
        let currentUser = null;
        let adminData = null;
        let currentChart = null;

        // =============== AUTO-FIX FUNCTION ===============
        // This function creates the missing user document automatically
        async function createUserDocument(user) {
            console.log('Creating user document for:', user.uid);
            
            // Generate a display name from email
            const emailName = user.email ? user.email.split('@')[0] : 'Super Admin';
            const displayName = emailName.replace(/[._-]/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
            
            // Create the user document
            const userData = {
                uid: user.uid,
                email: user.email || '',
                fullName: displayName,
                role: 'admin',
                isSuperAdmin: true,
                generatedId: 'AD' + Math.floor(Math.random() * 10000).toString().padStart(4, '0'),
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
                status: 'active',
                permissions: [
                    'manage_users',
                    'manage_content',
                    'view_analytics',
                    'system_config',
                    'delete_data',
                    'manage_admins'
                ],
                emailVerified: user.emailVerified || false,
                createdBy: 'auto-fix'
            };

            try {
                await db.collection('users').doc(user.uid).set(userData, { merge: true });
                console.log('✅ User document created successfully');
                return userData;
            } catch (error) {
                console.error('Error creating user document:', error);
                throw error;
            }
        }

        // =============== AUTH STATE OBSERVER WITH AUTO-FIX ===============
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = '/admin/';
                return;
            }

            try {
                currentUser = user;
                
                // Show loading
                document.getElementById('content-area').innerHTML = `
                    <div class="loading">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Checking admin access for: ${user.email}</p>
                    </div>
                `;

                // Try to get user document
                let userDoc = await db.collection('users').doc(user.uid).get();
                
                // ===== AUTO-FIX: If document doesn't exist, create it =====
                if (!userDoc.exists) {
                    console.log('⚠️ User document not found - auto-creating...');
                    
                    document.getElementById('content-area').innerHTML = `
                        <div class="fix-banner">
                            <h2>🔧 First-Time Setup</h2>
                            <p>Welcome, ${user.email}!</p>
                            <p>We're setting up your admin profile automatically...</p>
                            <div class="loading">
                                <i class="fas fa-spinner fa-spin"></i>
                                <p>Creating admin profile...</p>
                            </div>
                        </div>
                    `;
                    
                    // Create the document
                    adminData = await createUserDocument(user);
                    
                    // Show success message briefly
                    document.getElementById('content-area').innerHTML = `
                        <div class="fix-banner" style="background: #d4edda; color: #155724;">
                            <h2>✅ Setup Complete!</h2>
                            <p>Your admin profile has been created successfully.</p>
                            <p>Redirecting to dashboard...</p>
                        </div>
                    `;
                    
                    // Wait a moment then reload to get fresh data
                    await new Promise(resolve => setTimeout(resolve, 2000));
                    window.location.reload();
                    return;
                }

                // If document exists, load the dashboard
                adminData = userDoc.data();

                // Update header
                document.getElementById('adminAvatar').textContent = (adminData.fullName || 'SA').charAt(0).toUpperCase();
                document.getElementById('adminName').textContent = adminData.fullName || user.email || 'Super Admin';
                document.getElementById('adminRole').textContent = adminData.isSuperAdmin ? 'Super Admin' : 'Admin';
                document.getElementById('adminId').textContent = adminData.generatedId || 'ADMIN';

                // Update last login
                await db.collection('users').doc(user.uid).update({
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                }).catch(() => {});

                // Load default section
                showSection('system-overview');

            } catch (error) {
                console.error('Auth error:', error);
                
                // Show error with retry button
                document.getElementById('content-area').innerHTML = `
                    <div class="error-message">
                        <i class="fas fa-exclamation-circle" style="font-size: 48px; margin-bottom: 20px;"></i>
                        <h3>Error: ${error.message}</h3>
                        <p>User: ${user?.email}</p>
                        <button class="btn-primary" onclick="window.location.reload()" style="margin-top: 20px;">
                            <i class="fas fa-redo"></i> Retry
                        </button>
                    </div>
                `;
            }
        });

        // Navigation
        document.querySelectorAll('.nav-item[data-section]').forEach(item => {
            item.addEventListener('click', function() {
                const section = this.dataset.section;
                showSection(section);
            });
        });

        function showSection(sectionId) {
            // Update active nav
            document.querySelectorAll('.nav-item').forEach(nav => {
                nav.classList.remove('active');
            });
            const activeNav = document.querySelector(`[data-section="${sectionId}"]`);
            if (activeNav) activeNav.classList.add('active');

            // Update title
            const titles = {
                'system-overview': 'System Overview',
                'investor-management': 'Investor Management',
                'projects-management': 'Projects Management',
                'funds-management': 'Funds Management',
                'transactions-management': 'Transactions',
                'withdrawals-management': 'Withdrawals',
                'profits-management': 'Profits',
                'reports-management': 'Reports',
                'notifications-management': 'Notifications',
                'settings-management': 'Settings'
            };
            document.getElementById('pageTitle').textContent = titles[sectionId] || sectionId;

            // Load section
            loadSection(sectionId);
        }

        // System Overview
        function loadSystemOverview() {
            const html = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-users"></i></div>
                        <div class="stat-label">Total Investors</div>
                        <div class="stat-value">156</div>
                        <div class="stat-change positive"><i class="fas fa-arrow-up"></i> +12 this month</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-building"></i></div>
                        <div class="stat-label">Active Projects</div>
                        <div class="stat-value">23</div>
                        <div class="stat-change positive"><i class="fas fa-arrow-up"></i> +5 new</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-dollar-sign"></i></div>
                        <div class="stat-label">Total Funds</div>
                        <div class="stat-value">$2.5M</div>
                        <div class="stat-change positive"><i class="fas fa-arrow-up"></i> +15.3%</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-hand-holding-usd"></i></div>
                        <div class="stat-label">Pending Withdrawals</div>
                        <div class="stat-value">12</div>
                        <div class="stat-change negative"><i class="fas fa-exclamation-circle"></i> $45.5K</div>
                    </div>
                </div>

                <div class="section">
                    <div class="section-header">
                        <h2><i class="fas fa-chart-line"></i> Platform Growth</h2>
                    </div>
                    <div class="chart-container">
                        <canvas id="growthChart"></canvas>
                    </div>
                </div>

                <div class="section">
                    <div class="section-header">
                        <h2><i class="fas fa-user-plus"></i> Recent Investors</h2>
                        <button class="btn-secondary" onclick="showSection('investor-management')">View All</button>
                    </div>
                    <div class="table-responsive">
                        <table class="admin-table">
                            <thead>
                                <tr><th>ID</th><th>Name</th><th>Investment</th><th>Status</th></tr>
                            </thead>
                            <tbody>
                                <tr><td>Ti001</td><td>John Doe</td><td>$50,000</td><td><span class="status-badge status-active">Active</span></td></tr>
                                <tr><td>Ti002</td><td>Jane Smith</td><td>$75,000</td><td><span class="status-badge status-active">Active</span></td></tr>
                                <tr><td>Ti003</td><td>Robert Johnson</td><td>$25,000</td><td><span class="status-badge status-pending">Pending</span></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            document.getElementById('content-area').innerHTML = html;
            setTimeout(() => initGrowthChart(), 100);
        }

        function initGrowthChart() {
            const ctx = document.getElementById('growthChart')?.getContext('2d');
            if (!ctx) return;

            if (currentChart) currentChart.destroy();

            currentChart = new Chart(ctx, {
                type: 'line',
                data: {

        // Modal functions
        function showModal(title, body) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = body;
            document.getElementById('actionModal').classList.add('active');
        }

        function hideModal() {
            document.getElementById('actionModal').classList.remove('active');
        }

        document.getElementById('modalCancel').addEventListener('click', hideModal);
