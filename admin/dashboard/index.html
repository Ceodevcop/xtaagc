<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAAGC Real-Time Admin Dashboard</title>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* Basic styling, modals, tables, buttons */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:#f8fafc}
.dashboard{display:flex;min-height:100vh}
.sidebar{width:280px;background:linear-gradient(180deg,#0a2540,#1a3a4f);color:#fff;position:fixed;height:100vh;overflow-y:auto}
.sidebar-header{padding:30px 20px;border-bottom:1px solid rgba(255,255,255,.1)}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:8px;color:rgba(255,255,255,.8);margin-bottom:5px;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-size:15px;transition:all .2s}
.nav-item:hover,.nav-item.active{background:#c19a6b;color:#fff}
.main-content{flex:1;margin-left:280px;padding:30px}
.header{background:white;border-radius:16px;padding:20px 30px;margin-bottom:30px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 4px rgba(0,0,0,.02)}
button{padding:8px 12px;border-radius:6px;border:none;background:#2563eb;color:#fff;cursor:pointer}
button:hover{background:#1d4ed8}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:12px;border-bottom:1px solid #e2e8f0;text-align:left}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);align-items:center;justify-content:center}
.modal-content{background:#fff;padding:20px;border-radius:12px;width:400px;max-width:90%}
.close-btn{float:right;cursor:pointer;color:#e53e3e;font-weight:700}
.status-label{padding:4px 8px;border-radius:6px;color:#fff;font-weight:600}
.status-pending{background:#f59e0b}
.status-approved{background:#10b981}
.status-rejected{background:#ef4444}
</style>
</head>
<body>
<div class="dashboard">
<aside class="sidebar">
<div class="sidebar-header"><div class="sidebar-logo"><div class="logo-icon">A</div><div class="logo-text"><span>TAAGC</span> ADMIN</div></div></div>
<div class="nav-menu">
<div class="nav-item active" data-section="dashboard">Dashboard</div>
<div class="nav-item" data-section="users">Users</div>
<div class="nav-item" data-section="companies">Companies</div>
<div class="nav-item" data-section="roles">Roles</div>
<div class="nav-item" data-section="audit">Audit Logs</div>
</div>
</aside>
<main class="main-content">
<div class="header"><h1>Admin Dashboard</h1><button id="logoutBtn">Logout</button></div>
<div id="dashboardSection" class="section"></div>
<div id="usersSection" class="section" style="display:none;"><h2>Users</h2><input id="userSearch" placeholder="Search users..."><div id="usersList"></div></div>
<div id="companiesSection" class="section" style="display:none;"><h2>Companies</h2><input id="companySearch" placeholder="Search companies..."><div id="companiesList"></div></div>
<div id="rolesSection" class="section" style="display:none;"><h2>Admins</h2><input id="newAdminEmail" placeholder="Email"><input id="newAdminPassword" placeholder="Password"><select id="newAdminRole"><option value="admin">Admin</option><option value="super_admin">Super Admin</option></select><button id="createAdminBtn">Create Admin</button><ul id="adminList"></ul></div>
<div id="auditSection" class="section" style="display:none;"><h2>Audit Logs</h2><input id="auditSearch" placeholder="Search logs..."><div id="auditList"></div></div>
<canvas id="statsChart" style="margin-top:20px;max-width:600px;"></canvas>
</main>
</div>
<div class="modal" id="editModal"><div class="modal-content"><span class="close-btn" id="modalClose">&times;</span><div id="modalBody"></div><button id="modalSaveBtn">Save</button></div></div>
<script>
const firebaseConfig={apiKey:"AIzaSyAI1MrcP977UgRLQoePxl64JOSyj9v4WpI",authDomain:"xtaagc.firebaseapp.com",projectId:"xtaagc",storageBucket:"xtaagc.firebasestorage.app",messagingSenderId:"256073982437",appId:"1:256073982437:web:8da63bb7acc86c0ca98f0c"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();
let currentAdminRole='';

// Section navigation
document.querySelectorAll('.nav-item').forEach(item=>{item.addEventListener('click',()=>{document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));item.classList.add('active');document.querySelectorAll('main .section').forEach(sec=>sec.style.display='none');document.getElementById(item.dataset.section+'Section').style.display='block';});});

// Logout
document.getElementById('logoutBtn').addEventListener('click',()=>auth.signOut());

// Global API functions
window.getUsers=async()=>{const snap=await db.collection('users').get();return snap.docs.map(d=>({id:d.id,...d.data()}));};
window.updateUser=async(id,data)=>{await db.collection('users').doc(id).update(data);logAction('Updated user: '+id);};
window.deleteUser=async(id)=>{await db.collection('users').doc(id).delete();logAction('Deleted user: '+id);};
window.getCompanies=async()=>{const snap=await db.collection('companies').get();return snap.docs.map(d=>({id:d.id,...d.data()}));};
window.updateCompany=async(id,data)=>{await db.collection('companies').doc(id).update(data);logAction('Updated company: '+id);};
window.deleteCompany=async(id)=>{await db.collection('companies').doc(id).delete();logAction('Deleted company: '+id);};
window.approveCompany=async(id)=>{await db.collection('companies').doc(id).update({status:'approved'});logAction('Approved company: '+id);};
window.rejectCompany=async(id)=>{await db.collection('companies').doc(id).update({status:'rejected'});logAction('Rejected company: '+id);};
window.createAdmin=async(email,password,role)=>{const cred=await auth.createUserWithEmailAndPassword(email,password);await db.collection('admins').doc(cred.user.uid).set({email,role,active:true,createdAt:firebase.firestore.FieldValue.serverTimestamp()});logAction(`Created admin: ${email}`);};
window.getAuditLogs=async()=>{const snap=await db.collection('audit_logs').orderBy('timestamp','desc').limit(50).get();return snap.docs.map(d=>d.data());};

async function logAction(action){const user=auth.currentUser;await db.collection('audit_logs').add({action,adminEmail:user.email,userId:user.uid,timestamp:firebase.firestore.FieldValue.serverTimestamp()});}

// Load dashboard stats and chart
function renderChart(users,companies,pending){const ctx=document.getElementById('statsChart').getContext('2d');new Chart(ctx,{type:'bar',data:{labels:['Users','Companies','Pending'],datasets:[{label:'Counts',data:[users,companies,pending],backgroundColor:['#2563eb','#c19a6b','#f59e0b']}]},options:{responsive:true}});}

async function loadDashboard(){const usersSnap=await db.collection('users').get();const companiesSnap=await db.collection('companies').get();const pendingSnap=await db.collection('companies').where('status','==','pending').get();document.getElementById('dashboardSection').innerHTML=`Users: ${usersSnap.size}, Companies: ${companiesSnap.size}, Pending: ${pendingSnap.size}`;renderChart(usersSnap.size,companiesSnap.size,pendingSnap.size);}

// Real-time updates
db.collection('users').onSnapshot(()=>loadDashboard());
db.collection('companies').onSnapshot(()=>loadDashboard());
db.collection('audit_logs').onSnapshot(()=>loadAuditLogs());

// Example modal editing function (users/companies)
const modal=document.getElementById('editModal');
document.getElementById('modalClose').onclick=()=>modal.style.display='none';
function editUserModal(id){modal.style.display='flex';modal.querySelector('#modalBody').innerHTML=`<input id='modalName' placeholder='Name'><input id='modalEmail' placeholder='Email'><input id='modalStatus' placeholder='Status'>`;modal.querySelector('#modalSaveBtn').onclick=async()=>{await updateUser(id,{name:document.getElementById('modalName').value,email:document.getElementById('modalEmail').value,status:document.getElementById('modalStatus').value});modal.style.display='none';};}

function editCompanyModal(id){modal.style.display='flex';modal.querySelector('#modalBody').innerHTML=`<input id='modalName' placeholder='Company Name'><input id='modalEmail' placeholder='Email'><select id='modalStatus'><option value='pending'>Pending</option><option value='approved'>Approved</option><option value='rejected'>Rejected</option></select>`;modal.querySelector('#modalSaveBtn').onclick=async()=>{await updateCompany(id,{name:document.getElementById('modalName').value,email:document.getElementById('modalEmail').value,status:document.getElementById('modalStatus').value});modal.style.display='none';};}

// Real-time audit logs
async function loadAuditLogs(){const logs=await getAuditLogs();let html='<table><thead><tr><th>Action</th><th>Admin</th><th>Time</th></tr></thead><tbody>';logs.forEach(l=>{const time=l.timestamp?.toDate?l.timestamp.toDate().toLocaleString():'Just now';html+=`<tr><td>${l.action}</td><td>${l.adminEmail}</td><td>${time}</td></tr>`;});html+='</tbody></table>';document.getElementById('auditList').innerHTML=html;}

// Initial load
auth.onAuthStateChanged(user=>{if(!user)window.location.href='../index.html';else loadDashboard();});
</script>
</body>
</html>
