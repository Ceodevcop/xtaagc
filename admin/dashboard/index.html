<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TAAGC Admin</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/admin/assets/css/admin.css">
    <script src="/admin/assets/js/admin.js"></script>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="admin-sidebar-header">
                <div class="admin-logo">TA</div>
                <h2><span>TAAGC</span> ADMIN</h2>
            </div>
            
            <div class="admin-user">
                <div class="admin-avatar" data-user-avatar>A</div>
                <h4 data-user-field="name">Loading...</h4>
                <p data-user-field="email">loading...</p>
                <span data-user-field="role" class="badge">Admin</span>
            </div>
            
            <nav class="admin-nav">
                <a href="/admin/dashboard.html" class="admin-nav-item active">
                    <i class="fas fa-tachometer-alt"></i> <span>Dashboard</span>
                </a>
                <a href="/admin/users/index.html" class="admin-nav-item">
                    <i class="fas fa-users"></i> <span>Users</span>
                </a>
                <a href="/admin/investments/index.html" class="admin-nav-item">
                    <i class="fas fa-chart-line"></i> <span>Investments</span>
                </a>
                <a href="/admin/projects/index.html" class="admin-nav-item">
                    <i class="fas fa-building"></i> <span>Projects</span>
                </a>
                
                <!-- Super Admin Only -->
                <a href="/admin/admins/index.html" class="admin-nav-item super-admin-only">
                    <i class="fas fa-user-shield"></i> <span>Manage Admins</span>
                </a>
                <a href="/admin/settings/general.html" class="admin-nav-item super-admin-only">
                    <i class="fas fa-cog"></i> <span>Settings</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <div class="admin-topbar">
                <div class="admin-page-title">
                    <h1>Dashboard</h1>
                    <p>Welcome back, <span data-user-field="name"></span></p>
                </div>
                
                <div class="flex gap-2">
                    <button class="btn btn-outline" id="toggleSidebar">
                        <i class="fas fa-bars"></i>
                    </button>
                    <button class="btn btn-danger" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>

            <!-- Stats Grid -->
            <div class="stats-grid" id="statsContainer">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-users"></i></div>
                    <div class="stat-value" id="totalUsers">0</div>
                    <div class="stat-label">Total Users</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
                    <div class="stat-value" id="totalInvestments">$0</div>
                    <div class="stat-label">Total Investments</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-building"></i></div>
                    <div class="stat-value" id="totalProjects">0</div>
                    <div class="stat-label">Active Projects</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-exchange-alt"></i></div>
                    <div class="stat-value" id="totalTransactions">0</div>
                    <div class="stat-label">Transactions</div>
                </div>
            </div>

            <!-- Recent Activity -->
            <div class="card">
                <div class="card-header">
                    <h2><i class="fas fa-clock"></i> Recent Activity</h2>
                    <button class="btn btn-sm btn-outline" onclick="loadActivity()">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                </div>
                <div class="table-container">
                    <table id="activityTable">
                        <thead>
                            <tr>
                                <th>User</th>
                                <th>Action</th>
                                <th>Time</th>
                            </tr>
                        </thead>
                        <tbody id="activityBody">
                            <tr><td colspan="3" class="text-center">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        // Load dashboard data
        async function loadDashboard() {
            try {
                const response = await TAAGC.api.get('/admin/stats');
                const stats = response.stats;
                
                document.getElementById('totalUsers').textContent = stats.users || 0;
                document.getElementById('totalInvestments').textContent = 
                    TAAGC.data.formatCurrency(stats.investments || 0);
                document.getElementById('totalProjects').textContent = stats.projects || 0;
                document.getElementById('totalTransactions').textContent = stats.transactions || 0;
                
            } catch (error) {
                TAAGC.ui.showToast('Error loading dashboard stats', 'error');
            }
        }
        
        async function loadActivity() {
            try {
                const response = await TAAGC.api.get('/admin/activity', { limit: 10 });
                const tbody = document.getElementById('activityBody');
                
                if (!response.activities || response.activities.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="text-center">No recent activity</td></tr>';
                    return;
                }
                
                tbody.innerHTML = response.activities.map(activity => `
                    <tr>
                        <td>${activity.user || 'System'}</td>
                        <td>${activity.action}</td>
                        <td>${TAAGC.data.timeAgo(activity.timestamp)}</td>
                    </tr>
                `).join('');
                
            } catch (error) {
                TAAGC.ui.showToast('Error loading activity', 'error');
            }
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadDashboard();
            loadActivity();
        });
    </script>
</body>
</html>
