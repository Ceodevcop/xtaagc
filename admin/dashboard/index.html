<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAAGC Admin Dashboard</title>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* --- Your previous CSS retained and enhanced for admin controls --- */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:#f8fafc}
.dashboard{display:flex;min-height:100vh}
.sidebar{width:280px;background:linear-gradient(180deg,#0a2540,#1a3a4f);color:#fff;position:fixed;height:100vh;overflow-y:auto}
.sidebar-header{padding:30px 20px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:48px;height:48px;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#0a2540;font-size:24px;font-weight:700}
.logo-text{font-size:20px;font-weight:700}
.logo-text span{color:#c19a6b}
.admin-profile{background:rgba(255,255,255,.1);border-radius:12px;padding:20px;margin:20px;display:flex;align-items:center;gap:15px}
.admin-avatar{width:56px;height:56px;background:#c19a6b;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700}
.nav-menu{padding:20px}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:8px;color:rgba(255,255,255,.8);margin-bottom:5px;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-size:15px;transition:all .2s}
.nav-item:hover,.nav-item.active{background:#c19a6b;color:#fff}
.main-content{flex:1;margin-left:280px;padding:30px}
.header{background:white;border-radius:16px;padding:20px 30px;margin-bottom:30px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 4px rgba(0,0,0,.02)}
.logout-btn{background:#e53e3e;color:white;border:none;padding:10px 20px;border-radius:8px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px}
.logout-btn:hover{background:#c53030}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:30px}
.stat-card{background:white;padding:24px;border-radius:16px;border:1px solid #e2e8f0}
.stat-icon{width:48px;height:48px;background:linear-gradient(135deg,#0a2540,#3a5a78);border-radius:12px;display:flex;align-items:center;justify-content:center;color:white;margin-bottom:16px}
.stat-number{font-size:32px;font-weight:700;color:#0a2540}
.section{background:white;border-radius:16px;padding:24px;margin-bottom:30px;border:1px solid #e2e8f0}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.section-header h2{display:flex;align-items:center;gap:10px;color:#0a2540}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px;background:#f8fafc;color:#0a2540;font-weight:600}
td{padding:12px;border-bottom:1px solid #e2e8f0}
.status-box{background:#f8fafc;border-radius:8px;padding:15px;margin-bottom:20px;font-size:13px}
input,select,button{font-family:'Inter',sans-serif}
</style>
</head>
<body>
<div class="dashboard">
<aside class="sidebar">
<div class="sidebar-header">
<div class="sidebar-logo">
<div class="logo-icon">A</div>
<div class="logo-text"><span>TAAGC</span> ADMIN</div>
</div>
</div>
<div class="admin-profile">
<div class="admin-avatar" id="adminAvatar">A</div>
<div>
<div id="adminName" style="font-weight:600;">Loading...</div>
<div id="adminEmail" style="font-size:12px;">admin@taagc.com</div>
</div>
</div>
<div class="nav-menu">
<div class="nav-item active"><i class="fas fa-tachometer-alt"></i> Dashboard</div>
<div class="nav-item"><i class="fas fa-users"></i> Users</div>
<div class="nav-item"><i class="fas fa-building"></i> Companies</div>
<div class="nav-item"><i class="fas fa-user-shield"></i> Roles</div>
<div class="nav-item"><i class="fas fa-file-alt"></i> Audit Logs</div>
</div>
</aside>

<main class="main-content">
<div id="status" class="status-box">Loading dashboard...</div>

<div class="header">
<h1><i class="fas fa-tachometer-alt" style="color:#c19a6b;margin-right:10px;"></i> Admin Dashboard</h1>
<button class="logout-btn" id="logoutBtn" disabled><i class="fas fa-sign-out-alt"></i> Logout</button>
</div>

<div class="stats-grid" id="statsSection" style="display:none;">
<div class="stat-card"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="stat-number" id="totalUsers">0</div><div>Total Users</div></div>
<div class="stat-card"><div class="stat-icon"><i class="fas fa-building"></i></div><div class="stat-number" id="totalCompanies">0</div><div>Total Companies</div></div>
<div class="stat-card"><div class="stat-icon"><i class="fas fa-check-circle"></i></div><div class="stat-number" id="pendingVerifications">0</div><div>Pending</div></div>
<div class="stat-card"><div class="stat-icon"><i class="fas fa-clock"></i></div><div class="stat-number" id="systemUptime">99.9%</div><div>Uptime</div></div>
</div>

<div class="section" id="activitySection" style="display:none;">
<div class="section-header"><h2><i class="fas fa-clock" style="color:#c19a6b;"></i> Recent Activity</h2></div>
<div id="recentActivity">Loading activity...</div>
</div>

<div class="section" id="roleSection" style="display:none;">
<div class="section-header"><h2><i class="fas fa-user-shield" style="color:#c19a6b;"></i> Admin Roles</h2></div>
<input id="newAdminEmail" type="email" placeholder="New Admin Email">
<input id="newAdminPassword" type="password" placeholder="Password (min 6 chars)">
<select id="newAdminRole"><option value="admin">Admin</option><option value="super_admin">Super Admin</option></select>
<button id="createAdminBtn">Create Admin</button>
<div id="rolesStatus"></div>
<ul id="adminList"></ul>
</div>

</main>
</div>

<script>
// --- Firebase Init ---
const firebaseConfig = {
  apiKey: "AIzaSyAI1MrcP977UgRLQoePxl64JOSyj9v4WpI",
  authDomain: "xtaagc.firebaseapp.com",
  projectId: "xtaagc",
  storageBucket: "xtaagc.firebasestorage.app",
  messagingSenderId: "256073982437",
  appId: "1:256073982437:web:8da63bb7acc86c0ca98f0c"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// --- Auth & Session ---
auth.onAuthStateChanged(async (user) => {
  if (!user) window.location.href = '../index.html';

  const adminDoc = await db.collection('admins').doc(user.uid).get();
  const role = adminDoc.data().role || 'admin';
  document.getElementById('adminName').innerText = adminDoc.data().email;
  document.getElementById('adminEmail').innerText = user.email;
  document.getElementById('adminAvatar').innerText = adminDoc.data().email.charAt(0).toUpperCase();
  document.getElementById('status').innerText = '✅ Dashboard loaded';
  document.getElementById('status').style.color = 'green';
  document.getElementById('logoutBtn').disabled = false;
  document.getElementById('statsSection').style.display = 'grid';
  document.getElementById('activitySection').style.display = 'block';

  if (role === 'super_admin') document.getElementById('roleSection').style.display = 'block';

  loadDashboardData();
  if (role === 'super_admin') loadAdminRoles();
});

// --- Load Dashboard Stats ---
async function loadDashboardData() {
  try {
    const usersSnap = await db.collection('users').get();
    const companiesSnap = await db.collection('companies').get();
    const pendingSnap = await db.collection('companies').where('status','==','pending').get();
    document.getElementById('totalUsers').innerText = usersSnap.size;
    document.getElementById('totalCompanies').innerText = companiesSnap.size;
    document.getElementById('pendingVerifications').innerText = pendingSnap.size;

    const activitySnap = await db.collection('audit_logs').orderBy('timestamp','desc').limit(5).get();
    let html = '<table><thead><tr><th>Action</th><th>User</th><th>Time</th></tr></thead><tbody>';
    if(activitySnap.empty) html += '<tr><td colspan="3" style="text-align:center">No recent activity</td></tr>';
    else activitySnap.forEach(doc => {
      const log = doc.data();
      const time = log.timestamp?.toDate?.() || new Date().toLocaleString();
      html += `<tr><td>${log.action||'Unknown'}</td><td>${log.adminEmail||log.userId||'System'}</td><td>${time}</td></tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('recentActivity').innerHTML = html;
  } catch(e) { document.getElementById('recentActivity').innerText='Error loading data: '+e.message; }
}

// --- Super Admin Role Management ---
async function loadAdminRoles(){
  const snapshot = await db.collection('admins').get();
  const list = document.getElementById('adminList'); list.innerHTML='';
  snapshot.forEach(doc => {
    const d = doc.data();
    const li = document.createElement('li');
    li.innerText = `${d.email} - ${d.role} - ${d.active?'Active':'Inactive'}`;
    list.appendChild(li);
  });
}

document.getElementById('createAdminBtn').onclick=async ()=>{
  const email=document.getElementById('newAdminEmail').value.trim();
  const password=document.getElementById('newAdminPassword').value.trim();
  const role=document.getElementById('newAdminRole').value;
  const status=document.getElementById('rolesStatus');
  if(!email||!password){status.innerText='❌ All fields required';return;}
  status.innerText='⏳ Creating admin...';document.getElementById('createAdminBtn').disabled=true;
  try{
    const cred=await auth.createUserWithEmailAndPassword(email,password);
    await db.collection('admins').doc(cred.user.uid).set({email,role,active:true,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    status.innerText=`✅ ${role} created: ${email}`;
    document.getElementById('createAdminBtn').disabled=false;
    loadAdminRoles();
  }catch(e){status.innerText='❌ '+e.message;document.getElementById('createAdminBtn').disabled=false;}
}

// --- Logout ---
document.getElementById('logoutBtn').addEventListener('click',async ()=>{
  await auth.signOut();
  window.location.href='../index.html';
});
</script>
</body>
</html>
