<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAAGC Full Admin Dashboard</title>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:#f8fafc}
.dashboard{display:flex;min-height:100vh}
.sidebar{width:280px;background:linear-gradient(180deg,#0a2540,#1a3a4f);color:#fff;position:fixed;height:100vh;overflow-y:auto}
.sidebar-header{padding:30px 20px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:48px;height:48px;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#0a2540;font-size:24px;font-weight:700}
.logo-text{font-size:20px;font-weight:700}
.logo-text span{color:#c19a6b}
.admin-profile{background:rgba(255,255,255,.1);border-radius:12px;padding:20px;margin:20px;display:flex;align-items:center;gap:15px}
.admin-avatar{width:56px;height:56px;background:#c19a6b;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700}
.nav-menu{padding:20px}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:8px;color:rgba(255,255,255,.8);margin-bottom:5px;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-size:15px;transition:all .2s}
.nav-item:hover,.nav-item.active{background:#c19a6b;color:#fff}
.main-content{flex:1;margin-left:280px;padding:30px}
.header{background:white;border-radius:16px;padding:20px 30px;margin-bottom:30px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 4px rgba(0,0,0,.02)}
.logout-btn{background:#e53e3e;color:white;border:none;padding:10px 20px;border-radius:8px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px}
.logout-btn:hover{background:#c53030}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:30px}
.stat-card{background:white;padding:24px;border-radius:16px;border:1px solid #e2e8f0}
.stat-icon{width:48px;height:48px;background:linear-gradient(135deg,#0a2540,#3a5a78);border-radius:12px;display:flex;align-items:center;justify-content:center;color:white;margin-bottom:16px}
.stat-number{font-size:32px;font-weight:700;color:#0a2540}
.section{background:white;border-radius:16px;padding:24px;margin-bottom:30px;border:1px solid #e2e8f0}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.section-header h2{display:flex;align-items:center;gap:10px;color:#0a2540}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px;background:#f8fafc;color:#0a2540;font-weight:600}
td{padding:12px;border-bottom:1px solid #e2e8f0}
.status-box{background:#f8fafc;border-radius:8px;padding:15px;margin-bottom:20px;font-size:13px}
input,select,button{font-family:'Inter',sans-serif;margin:5px 0;padding:8px;border-radius:6px;border:1px solid #ccc}
button{background:#2563eb;color:white;border:none;cursor:pointer}
button:hover{background:#1d4ed8}
</style>
</head>
<body>
<div class="dashboard">
<aside class="sidebar">
<div class="sidebar-header"><div class="sidebar-logo"><div class="logo-icon">A</div><div class="logo-text"><span>TAAGC</span> ADMIN</div></div></div>
<div class="admin-profile"><div class="admin-avatar" id="adminAvatar">A</div><div><div id="adminName" style="font-weight:600;">Loading...</div><div id="adminEmail" style="font-size:12px;">admin@taagc.com</div></div></div>
<div class="nav-menu">
<div class="nav-item active" data-section="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</div>
<div class="nav-item" data-section="users"><i class="fas fa-users"></i> Users</div>
<div class="nav-item" data-section="companies"><i class="fas fa-building"></i> Companies</div>
<div class="nav-item" data-section="roles"><i class="fas fa-user-shield"></i> Roles</div>
<div class="nav-item" data-section="audit"><i class="fas fa-file-alt"></i> Audit Logs</div>
</div>
</aside>
<main class="main-content">
<div id="status" class="status-box">Loading dashboard...</div>
<div class="header"><h1><i class="fas fa-tachometer-alt" style="color:#c19a6b;margin-right:10px;"></i> Admin Dashboard</h1><button class="logout-btn" id="logoutBtn" disabled><i class="fas fa-sign-out-alt"></i> Logout</button></div>
<div id="dashboardSection" class="section">Stats will load...</div>
<div id="usersSection" class="section" style="display:none;"><h2>Users</h2><div id="usersList">Loading...</div></div>
<div id="companiesSection" class="section" style="display:none;"><h2>Companies</h2><div id="companiesList">Loading...</div></div>
<div id="rolesSection" class="section" style="display:none;"><h2>Admin Roles</h2><input id="newAdminEmail" type="email" placeholder="Email"><input id="newAdminPassword" type="password" placeholder="Password"><select id="newAdminRole"><option value="admin">Admin</option><option value="super_admin">Super Admin</option></select><button id="createAdminBtn">Create Admin</button><div id="rolesStatus"></div><ul id="adminList"></ul></div>
<div id="auditSection" class="section" style="display:none;"><h2>Audit Logs</h2><div id="auditList">Loading...</div></div>
</main>
</div>
<script>
const firebaseConfig={apiKey:"AIzaSyAI1MrcP977UgRLQoePxl64JOSyj9v4WpI",authDomain:"xtaagc.firebaseapp.com",projectId:"xtaagc",storageBucket:"xtaagc.firebasestorage.app",messagingSenderId:"256073982437",appId:"1:256073982437:web:8da63bb7acc86c0ca98f0c"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

// Section switching
document.querySelectorAll('.nav-item').forEach(item=>{item.addEventListener('click',()=>{document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));item.classList.add('active');const section=item.dataset.section;document.querySelectorAll('main .section').forEach(sec=>sec.style.display='none');document.getElementById(section+'Section').style.display='block';});});

// Auth
auth.onAuthStateChanged(async user=>{if(!user)return window.location.href='../index.html';const adminDoc=await db.collection('admins').doc(user.uid).get();const role=adminDoc.data()?.role||'admin';document.getElementById('adminName').innerText=adminDoc.data().email;document.getElementById('adminEmail').innerText=user.email;document.getElementById('adminAvatar').innerText=adminDoc.data().email.charAt(0).toUpperCase();document.getElementById('logoutBtn').disabled=false;loadStats();loadUsers();loadCompanies();if(role==='super_admin'){document.getElementById('rolesSection').style.display='block';loadRoles();}loadAuditLogs();});

// Logout
document.getElementById('logoutBtn').addEventListener('click',async()=>{await auth.signOut();window.location.href='../index.html';});

// Load Stats
async function loadStats(){const usersSnap=await db.collection('users').get();const companiesSnap=await db.collection('companies').get();const pendingSnap=await db.collection('companies').where('status','==','pending').get();document.getElementById('dashboardSection').innerHTML=`<div class='stats-grid'><div class='stat-card'><div class='stat-icon'><i class='fas fa-users'></i></div><div class='stat-number'>${usersSnap.size}</div><div>Users</div></div><div class='stat-card'><div class='stat-icon'><i class='fas fa-building'></i></div><div class='stat-number'>${companiesSnap.size}</div><div>Companies</div></div><div class='stat-card'><div class='stat-icon'><i class='fas fa-check-circle'></i></div><div class='stat-number'>${pendingSnap.size}</div><div>Pending</div></div></div>`;}

// Users Section
async function loadUsers(){const snap=await db.collection('users').get();let html='<table><thead><tr><th>Name</th><th>Email</th><th>Status</th><th>Actions</th></tr></thead><tbody>';snap.forEach(doc=>{const u=doc.data();html+=`<tr><td>${u.name}</td><td>${u.email}</td><td>${u.status}</td><td><button onclick="editUser('${doc.id}')">Edit</button><button onclick="deleteUser('${doc.id}')">Delete</button></td></tr>`;});html+='</tbody></table>';document.getElementById('usersList').innerHTML=html;}
async function editUser(id){const doc=await db.collection('users').doc(id).get();const u=doc.data();const newName=prompt('Edit Name',u.name);const newEmail=prompt('Edit Email',u.email);const newStatus=prompt('Edit Status',u.status);if(newName&&newEmail&&newStatus){await db.collection('users').doc(id).update({name:newName,email:newEmail,status:newStatus});loadUsers();logAction('Edited user: '+newEmail);}}
async function deleteUser(id){if(confirm('Delete this user?')){await db.collection('users').doc(id).delete();loadUsers();logAction('Deleted user: '+id);}}

// Companies Section
async function loadCompanies(){const snap=await db.collection('companies').get();let html='<table><thead><tr><th>Name</th><th>Email</th><th>Status</th><th>Actions</th></tr></thead><tbody>';snap.forEach(doc=>{const c=doc.data();html+=`<tr><td>${c.name}</td><td>${c.email}</td><td>${c.status}</td><td><button onclick="editCompany('${doc.id}')">Edit</button><button onclick="approveCompany('${doc.id}')">Approve</button><button onclick="rejectCompany('${doc.id}')">Reject</button><button onclick="deleteCompany('${doc.id}')">Delete</button></td></tr>`;});html+='</tbody></table>';document.getElementById('companiesList').innerHTML=html;}
async function editCompany(id){const doc=await db.collection('companies').doc(id).get();const c=doc.data();const newName=prompt('Edit Name',c.name);const newEmail=prompt('Edit Email',c.email);const newStatus=prompt('Edit Status',c.status);if(newName&&newEmail&&newStatus){await db.collection('companies').doc(id).update({name:newName,email:newEmail,status:newStatus});loadCompanies();logAction('Edited company: '+newEmail);}}
async function approveCompany(id){await db.collection('companies').doc(id).update({status:'approved'});loadCompanies();logAction('Approved Company');}
async function rejectCompany(id){await db.collection('companies').doc(id).update({status:'rejected'});loadCompanies();logAction('Rejected Company');}
async function deleteCompany(id){if(confirm('Delete this company?')){await db.collection('companies').doc(id).delete();loadCompanies();logAction('Deleted company: '+id);}}

// Roles Section
async function loadRoles(){const snap=await db.collection('admins').get();const list=document.getElementById('adminList');list.innerHTML='';snap.forEach(doc=>{const d=doc.data();const li=document.createElement('li');li.innerText=`${d.email} - ${d.role} - ${d.active?'Active':'Inactive'}`;list.appendChild(li);});}
document.getElementById('createAdminBtn').onclick=async()=>{const email=document.getElementById('newAdminEmail').value.trim();const password=document.getElementById('newAdminPassword').value.trim();const role=document.getElementById('newAdminRole').value;if(!email||!password)return alert('All fields required');const cred=await auth.createUserWithEmailAndPassword(email,password);await db.collection('admins').doc(cred.user.uid).set({email,role,active:true,createdAt:firebase.firestore.FieldValue.serverTimestamp()});loadRoles();logAction(`Created ${role} admin: ${email}`);}

// Audit Logs
async function loadAuditLogs(){const snap=await db.collection('audit_logs').orderBy('timestamp','desc').limit(10).get();let html='<table><thead><tr><th>Action</th><th>User</th><th>Time</th></tr></thead><tbody>';snap.forEach(doc=>{const l=doc.data();const t=l.timestamp?.toDate?.()||new Date();html+=`<tr><td>${l.action}</td><td>${l.adminEmail||l.userId||'System'}</td><td>${t.toLocaleString()}</td></tr>`;});html+='</tbody></table>';document.getElementById('auditList').innerHTML=html;}

// Log Action
async function logAction(action){const user=auth.currentUser;await db.collection('audit_logs').add({action,adminEmail:user.email,userId:user.uid,timestamp:firebase.firestore.FieldValue.serverTimestamp()});loadAuditLogs();}
</script>
</body>
</html>
