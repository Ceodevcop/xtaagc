<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Panel - TAAGC</title>
    
    <!-- Firebase 8.10.1 SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <!-- Chart.js for analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #f3f4f6;
        }

        /* Dashboard Layout */
        .dashboard {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 300px;
            background: linear-gradient(180deg, #0a2540 0%, #1e3a5f 100%);
            color: white;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .sidebar-header {
            padding: 30px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: #c19a6b;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
        }

        .logo-text span {
            color: #c19a6b;
        }

        .admin-badge {
            background: rgba(193, 154, 107, 0.2);
            border: 1px solid #c19a6b;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 14px;
            margin-top: 15px;
            display: inline-block;
            font-weight: 500;
        }

        .nav-menu {
            padding: 20px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 10px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: 500;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }

        .nav-item i {
            width: 20px;
            color: #c19a6b;
            font-size: 16px;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .nav-item.active {
            background: #c19a6b;
            color: white;
        }

        .nav-item.active i {
            color: white;
        }

        .nav-divider {
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 20px 0;
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            margin-left: 300px;
            padding: 30px;
        }

        /* Top Header */
        .top-header {
            background: white;
            border-radius: 16px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .header-title h1 {
            color: #0a2540;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .notification-badge {
            position: relative;
            cursor: pointer;
        }

        .notification-badge i {
            font-size: 20px;
            color: #64748b;
        }

        .badge-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #e53e3e;
            color: white;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 600;
        }

        .admin-profile-mini {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: #f8fafc;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .admin-profile-mini:hover {
            background: #e2e8f0;
        }

        .admin-avatar {
            width: 40px;
            height: 40px;
            background: #c19a6b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 16px;
        }

        /* System Overview Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #0a2540, #1e3a5f);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin-bottom: 16px;
        }

        .stat-label {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #0a2540;
            margin-bottom: 5px;
        }

        .stat-change {
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .positive { color: #10b981; }
        .negative { color: #e53e3e; }

        /* Section Styles */
        .section {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .section-header h2 {
            color: #0a2540;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }

        .section-actions {
            display: flex;
            gap: 10px;
        }

        .btn-primary {
            background: #0a2540;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background: #1e3a5f;
        }

        .btn-secondary {
            background: #f8fafc;
            color: #0a2540;
            border: 1px solid #e2e8f0;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #c19a6b;
            color: #c19a6b;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            transition: all 0.3s;
        }

        .btn-outline:hover {
            background: #c19a6b;
            color: white;
        }

        /* Tables */
        .table-responsive {
            overflow-x: auto;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }

        .admin-table th {
            text-align: left;
            padding: 15px;
            background: #f8fafc;
            color: #0a2540;
            font-weight: 600;
            font-size: 14px;
        }

        .admin-table td {
            padding: 15px;
            border-bottom: 1px solid #e2e8f0;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status-active { 
            background: #10b98120; 
            color: #10b981; 
        }
        
        .status-pending { 
            background: #f59e0b20; 
            color: #f59e0b; 
        }
        
        .status-approved { 
            background: #10b98120; 
            color: #10b981; 
        }
        
        .status-rejected { 
            background: #e53e3e20; 
            color: #e53e3e; 
        }
        
        .status-completed { 
            background: #64748b20; 
            color: #64748b; 
        }

        /* Action Buttons */
        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 0 4px;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .action-btn.approve {
            background: #10b98120;
            color: #10b981;
        }

        .action-btn.approve:hover {
            background: #10b981;
            color: white;
        }

        .action-btn.reject {
            background: #e53e3e20;
            color: #e53e3e;
        }

        .action-btn.reject:hover {
            background: #e53e3e;
            color: white;
        }

        .action-btn.view {
            background: #3b82f620;
            color: #3b82f6;
        }

        .action-btn.view:hover {
            background: #3b82f6;
            color: white;
        }

        .action-btn.edit {
            background: #f59e0b20;
            color: #f59e0b;
        }

        .action-btn.edit:hover {
            background: #f59e0b;
            color: white;
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-card {
            background: #f8fafc;
            border-radius: 12px;
            padding: 20px;
        }

        .info-card h3 {
            color: #0a2540;
            font-size: 16px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #64748b;
            font-size: 13px;
        }

        .info-value {
            font-weight: 600;
            color: #0a2540;
            font-size: 14px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }

        .tab:hover {
            background: #f8fafc;
        }

        .tab.active {
            background: #0a2540;
            color: white;
        }

        /* Search Box */
        .search-box {
            padding: 10px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            width: 300px;
            font-size: 14px;
        }

        .search-box:focus {
            border-color: #c19a6b;
            outline: none;
        }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            min-width: 150px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            color: #0a2540;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Chart Container */
        .chart-container {
            height: 300px;
            margin-top: 20px;
            position: relative;
        }

        /* Loading States */
        .loading {
            text-align: center;
            padding: 50px;
            color: #64748b;
        }

        .loading i {
            font-size: 40px;
            color: #c19a6b;
            margin-bottom: 20px;
        }

        /* Error Message */
        .error-message {
            text-align: center;
            padding: 50px;
            color: #e53e3e;
            background: white;
            border-radius: 16px;
            margin-bottom: 30px;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 80px;
            }
            .sidebar .logo-text,
            .sidebar .nav-item span,
            .sidebar .admin-badge {
                display: none;
            }
            .main-content {
                margin-left: 80px;
            }
            .nav-item {
                justify-content: center;
                padding: 14px;
            }
            .nav-item i {
                margin: 0;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">SA</div>
                    <div class="logo-text"><span>TAAGC</span> SUPER ADMIN</div>
                </div>
                <div class="admin-badge" id="adminId">Super Admin</div>
            </div>

            <div class="nav-menu">
                <!-- Main Navigation -->
                <button class="nav-item active" data-section="system-overview">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>System Overview / Admin Summary</span>
                </button>
                <button class="nav-item" data-section="investor-management">
                    <i class="fas fa-users"></i>
                    <span>Investor Management</span>
                </button>
                <button class="nav-item" data-section="projects-management">
                    <i class="fas fa-building"></i>
                    <span>Investment Projects / Opportunities</span>
                </button>
                <button class="nav-item" data-section="funds-management">
                    <i class="fas fa-wallet"></i>
                    <span>Funds & Wallet Management</span>
                </button>
                <button class="nav-item" data-section="transactions-management">
                    <i class="fas fa-exchange-alt"></i>
                    <span>Transactions Management</span>
                </button>
                
                <div class="nav-divider"></div>
                
                <button class="nav-item" data-section="withdrawals-management">
                    <i class="fas fa-hand-holding-usd"></i>
                    <span>Withdrawal Requests & Approvals</span>
                </button>
                <button class="nav-item" data-section="profits-management">
                    <i class="fas fa-chart-line"></i>
                    <span>Profit & Returns Management</span>
                </button>
                <button class="nav-item" data-section="reports-management">
                    <i class="fas fa-file-alt"></i>
                    <span>Reports & Documents</span>
                </button>
                <button class="nav-item" data-section="notifications-management">
                    <i class="fas fa-bell"></i>
                    <span>Notifications & Communication</span>
                </button>
                <button class="nav-item" data-section="settings-management">
                    <i class="fas fa-cog"></i>
                    <span>Security, Roles & System Settings</span>
                </button>
                
                <div class="nav-divider"></div>
                
                <!-- Logout -->
                <button class="nav-item" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Header -->
            <div class="top-header">
                <div class="header-title">
                    <h1>
                        <i class="fas fa-tachometer-alt" style="color: #c19a6b;"></i>
                        <span id="pageTitle">System Overview</span>
                    </h1>
                </div>
                <div class="header-actions">
                    <div class="notification-badge" id="notificationBell">
                        <i class="far fa-bell"></i>
                        <span class="badge-count" id="notificationCount">0</span>
                    </div>
                    <div class="admin-profile-mini" id="profileMenu">
                        <div class="admin-avatar" id="adminAvatar">SA</div>
                        <div>
                            <div id="adminName" style="font-weight: 600;">Loading...</div>
                            <div style="font-size: 12px; color: #64748b;" id="adminRole">Super Admin</div>
                        </div>
                        <i class="fas fa-chevron-down" style="color: #64748b; font-size: 12px;"></i>
                    </div>
                </div>
            </div>

            <!-- Dynamic Content Sections -->
            <div id="content-area">
                <!-- Content will be loaded here -->
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading admin panel...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Template -->
    <div id="actionModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Action Modal</h3>
            <div id="modalBody"></div>
            <div class="modal-actions">
                <button class="btn-primary" id="modalConfirm">Confirm</button>
                <button class="btn-secondary" id="modalCancel">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAI1MrcP977UgRLQoePxl64JOSyj9v4WpI",
            authDomain: "xtaagc.firebaseapp.com",
            projectId: "xtaagc",
            storageBucket: "xtaagc.appspot.com",
            messagingSenderId: "256073982437",
            appId: "1:256073982437:web:8da63bb7acc86c0ca98f0c"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Global variables
        let currentUser = null;
        let adminData = null;
        let currentChart = null;

        // Check authentication and admin role
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            try {
                // Get user data
                const userDoc = await db.collection('users').doc(user.uid).get();
                
                if (!userDoc.exists) {
                    showError('User profile not found.');
                    return;
                }

                adminData = userDoc.data();

                // Verify this is an admin
                if (adminData.role !== 'admin') {
                    showError('Access denied. Super Admins only.');
                    setTimeout(() => {
                        auth.signOut();
                        window.location.href = 'index.html';
                    }, 3000);
                    return;
                }

                currentUser = user;

                // Update header with admin info
                document.getElementById('adminAvatar').textContent = (adminData.fullName || 'SA').charAt(0).toUpperCase();
                document.getElementById('adminName').textContent = adminData.fullName || 'Super Admin';
                document.getElementById('adminRole').textContent = 'Super Admin';
                document.getElementById('adminId').textContent = adminData.generatedId || 'Super Admin';

                // Load initial section
                showSection('system-overview');

            } catch (error) {
                console.error('Auth error:', error);
                showError('Error loading admin panel.');
            }
        });

        // Navigation
        document.querySelectorAll('.nav-item[data-section]').forEach(item => {
            item.addEventListener('click', function() {
                const section = this.dataset.section;
                showSection(section);
            });
        });

        // Profile menu click
        document.getElementById('profileMenu').addEventListener('click', () => {
            showSection('settings-management');
        });

        // Notification bell click
        document.getElementById('notificationBell').addEventListener('click', () => {
            showSection('notifications-management');
        });

        // Show selected section
        function showSection(sectionId) {
            // Update active nav
            document.querySelectorAll('.nav-item').forEach(nav => {
                nav.classList.remove('active');
            });
            document.querySelector(`[data-section="${sectionId}"]`).classList.add('active');

            // Update page title
            const titles = {
                'system-overview': 'System Overview / Admin Summary',
                'investor-management': 'Investor Management',
                'projects-management': 'Investment Projects / Opportunities',
                'funds-management': 'Funds & Wallet Management',
                'transactions-management': 'Transactions Management',
                'withdrawals-management': 'Withdrawal Requests & Approvals',
                'profits-management': 'Profit & Returns Management',
                'reports-management': 'Reports & Documents',
                'notifications-management': 'Notifications & Communication',
                'settings-management': 'Security, Roles & System Settings'
            };
            document.getElementById('pageTitle').textContent = titles[sectionId];

            // Load section content
            loadSection(sectionId);
        }

        // Load section content
        function loadSection(sectionId) {
            const contentArea = document.getElementById('content-area');
            
            switch(sectionId) {
                case 'system-overview':
                    loadSystemOverview();
                    break;
                case 'investor-management':
                    loadInvestorManagement();
                    break;
                case 'projects-management':
                    loadProjectsManagement();
                    break;
                case 'funds-management':
                    loadFundsManagement();
                    break;
                case 'transactions-management':
                    loadTransactionsManagement();
                    break;
                case 'withdrawals-management':
                    loadWithdrawalsManagement();
                    break;
                case 'profits-management':
                    loadProfitsManagement();
                    break;
                case 'reports-management':
                    loadReportsManagement();
                    break;
                case 'notifications-management':
                    loadNotificationsManagement();
                    break;
                case 'settings-management':
                    loadSettingsManagement();
                    break;
            }
        }

        // 1. System Overview / Admin Summary
        function loadSystemOverview() {
            const html = `

        // Modal functions
        function showModal(title, body) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = body;
            document.getElementById('actionModal').classList.add('active');
        }

        function hideModal() {
            document.getElementById('actionModal').classList.remove('active');
        }

        // Modal confirm/cancel
        document.getElementById('modalCancel').addEventListener('click', hideModal);
        document.getElementById('modalConfirm').addEventListener('click', () => {
            hideModal();
            alert('Action confirmed (implement actual logic)');

        // Show error message
        function showError(message) {
            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = `
                <div class="error-message">
                    <i class="fas fa-exclamation-circle" style="font-size: 48px; margin-bottom: 20px;"></i>
                    <p>${message}</p>
                </div>
            `;
        }

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            try {
                await auth.signOut();
                window.location.href = 'index.html';
