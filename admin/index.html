<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - TAAGC Global</title>
    
    <!-- Fonts & Icons ONLY - No Firebase in browser! -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- ONE CSS file -->
    <link rel="stylesheet" href="/assets/css/admin.css">
    
    <style>
        /* Your beautiful styles remain exactly the same */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a2540, #1a3a4f);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            max-width: 420px;
            width: 100%;
        }

        .login-card {
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #0a2540, #2a4a6a);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            color: white;
            font-size: 32px;
            font-weight: 800;
        }

        .logo h2 {
            color: #0a2540;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .logo h2 span {
            color: #c19a6b;
        }

        .logo p {
            color: #64748b;
            font-size: 14px;
        }

        .alert {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            display: none;
        }

        .alert-success {
            background: #dcfce7;
            border: 1px solid #10b981;
            color: #10b981;
        }

        .alert-error {
            background: #fee2e2;
            border: 1px solid #e53e3e;
            color: #e53e3e;
        }

        .alert-warning {
            background: #fff3cd;
            border: 1px solid #f59e0b;
            color: #856404;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #1e293b;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group label i {
            color: #c19a6b;
            margin-right: 8px;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 16px;
        }

        .form-control {
            width: 100%;
            padding: 16px 20px 16px 50px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: #c19a6b;
            outline: none;
            box-shadow: 0 0 0 3px rgba(193,154,107,0.1);
        }

        .password-field {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            cursor: pointer;
            font-size: 18px;
        }

        .toggle-password:hover {
            color: #c19a6b;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #64748b;
            font-size: 14px;
            cursor: pointer;
        }

        .checkbox input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #c19a6b;
        }

        .forgot-link {
            color: #c19a6b;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #0a2540, #1a3a4f);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(10,37,64,0.2);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .info-box {
            background: #f8fafc;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 13px;
        }

        .setup-link {
            text-align: center;
            margin-top: 20px;
        }

        .setup-link a {
            color: #c19a6b;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-crown"></i>
                </div>
                <h2><span>TAAGC</span> ADMIN</h2>
                <p>Enter your credentials to access admin panel</p>
            </div>

            <div id="loginAlert" class="alert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" class="form-control" id="email" value="ceo@taagc.website" required>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <div class="password-field">
                        <div class="input-group">
                            <i class="fas fa-key"></i>
                            <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                        </div>
                        <i class="fas fa-eye toggle-password" id="togglePassword" onclick="togglePassword()"></i>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox" id="rememberMe" checked>
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link" onclick="handleForgotPassword(event)">
                        <i class="fas fa-question-circle"></i> Forgot Password?
                    </a>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Login to Dashboard
                </button>
            </form>

            <div class="setup-link">
                <p>First time? <a href="/admin/setup.html">Setup Super Admin</a></p>
            </div>
        </div>
    </div>

    <!-- ONE JS file - Clean and secure -->
    <script src="/assets/js/admin.js"></script>
    
    <script>
        // ============================================
        // SIMPLE LOGIN - NO FIREBASE IN BROWSER!
        // ============================================
        
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('togglePassword');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        function showAlert(message, type) {
            const alert = document.getElementById('loginAlert');
            alert.className = `alert alert-${type}`;
            
            const icons = {
                success: 'check-circle',
                error: 'exclamation-circle',
                warning: 'exclamation-triangle',
                info: 'info-circle'
            };
            
            alert.innerHTML = `<i class="fas fa-${icons[type]}"></i> ${message}`;
            alert.style.display = 'flex';
            
            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }

        async function handleForgotPassword(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            
            if (!email) {
                showAlert('Please enter your email', 'warning');
                return;
            }

            try {
                // Call your API instead of direct Firebase
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showAlert('Password reset email sent!', 'success');
                } else {
                    showAlert(data.error || 'Error sending reset email', 'error');
                }
            } catch (error) {
                showAlert('Network error', 'error');
            }
        }

        // Login using API with DEBUGGING
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const loginBtn = document.getElementById('loginBtn');
            
            // Clear any existing tokens before login
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminUser');
            sessionStorage.removeItem('adminToken');
            sessionStorage.removeItem('adminUser');
            
            console.log('========== LOGIN DEBUG START ==========');
            console.log('1. Login attempt started');
            console.log('2. Email:', email);
            console.log('3. Remember Me:', rememberMe);
            
            try {
                loginBtn.innerHTML = '<span class="spinner"></span> Logging in...';
                loginBtn.disabled = true;

                console.log('4. Sending request to /api/auth/login');
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, rememberMe })
                });

                console.log('5. Response status:', response.status);
                console.log('5. Response headers:', {
                    'content-type': response.headers.get('content-type'),
                    'status': response.status
                });

                const data = await response.json();
                console.log('6. Response data:', data);

                if (!response.ok) {
                    console.error('7. Login failed:', data.error);
                    throw new Error(data.error || 'Login failed');
                }

                console.log('7. Login successful');
                console.log('8. Token received:', data.token ? 'Yes (length: ' + data.token.length + ')' : 'No');
                console.log('8. User data:', data.user);

                // ✅ Store token
                if (rememberMe) {
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminUser', JSON.stringify(data.user));
                    console.log('9. Token saved to localStorage');
                } else {
                    sessionStorage.setItem('adminToken', data.token);
                    sessionStorage.setItem('adminUser', JSON.stringify(data.user));
                    console.log('9. Token saved to sessionStorage');
                }

                // Verify storage
                const storedToken = localStorage.getItem('adminToken') || sessionStorage.getItem('adminToken');
                const storedUser = localStorage.getItem('adminUser') || sessionStorage.getItem('adminUser');
                
                console.log('10. Stored token exists:', !!storedToken);
                console.log('10. Stored token value:', storedToken ? storedToken.substring(0, 20) + '...' : 'null');
                console.log('10. Stored user exists:', !!storedUser);
                
                if (storedUser) {
                    try {
                        const parsedUser = JSON.parse(storedUser);
                        console.log('10. Parsed user:', parsedUser);
                    } catch (e) {
                        console.error('10. Error parsing stored user:', e);
                    }
                }

                showAlert(`Welcome back, ${data.user.fullName || 'Admin'}!`, 'success');

                console.log('11. Waiting 1.5 seconds before redirect...');
                
                setTimeout(() => {
                    console.log('12. Redirecting to /dashboard/');
                    console.log('========== LOGIN DEBUG END ==========');
                    window.location.href = '/dashboard/';
                }, 1500);

            } catch (error) {
                console.error('❌ Login error:', error);
                console.error('Error stack:', error.stack);
                showAlert(error.message, 'error');
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Dashboard';
                loginBtn.disabled = false;
                console.log('========== LOGIN DEBUG END (WITH ERRORS) ==========');
            }
        });

        // Redirect if already logged in (with debug)
        (function() {
            console.log('========== INITIAL CHECK ==========');
            const localToken = localStorage.getItem('adminToken');
            const sessionToken = sessionStorage.getItem('adminToken');
            const localUser = localStorage.getItem('adminUser');
            const sessionUser = sessionStorage.getItem('adminUser');
            
            console.log('Initial check - localStorage token:', localToken ? 'Present' : 'Missing');
            console.log('Initial check - sessionStorage token:', sessionToken ? 'Present' : 'Missing');
            console.log('Initial check - localStorage user:', localUser ? 'Present' : 'Missing');
            console.log('Initial check - sessionStorage user:', sessionUser ? 'Present' : 'Missing');
            
            if (localToken || sessionToken) {
                console.log('Token found, redirecting to dashboard');
                window.location.href = '/dashboard/';
            } else {
                console.log('No token found, staying on login page');
            }
            console.log('========== INITIAL CHECK END ==========');
        })();
    </script>
</body>
</html>
