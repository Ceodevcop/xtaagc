<!-- admin/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAAGC Admin Login</title>
    <link rel="stylesheet" href="css/admin-login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Background Particles -->
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    
    <!-- Login Container -->
    <div class="login-container">
        <!-- Logo -->
        <div class="logo">
            <div class="logo-icon">A</div>
            <h1><span>TAAGC</span> Admin</h1>
            <p>TRIPLE A AHAL GLOBAL CONCEPT</p>
        </div>
        
        <!-- Login Form -->
        <form id="loginForm" class="login-form">
            <!-- Email Input -->
            <div class="input-group">
                <label for="email">
                    <i class="fas fa-envelope"></i> Admin Email
                </label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="email" id="email" placeholder="admin@taagc.website" required>
                </div>
            </div>
            
            <!-- Password Input -->
            <div class="input-group">
                <label for="password">
                    <i class="fas fa-key"></i> Password
                </label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" required>
                    <button type="button" class="password-toggle" id="togglePassword">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            
            <!-- Submit Button -->
            <button type="submit" class="submit-btn" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Login to Admin Panel
            </button>
            
            <!-- Loading Spinner -->
            <div class="loading-spinner" id="loadingSpinner"></div>
        </form>
        
        <!-- Error Message -->
        <div id="errorMessage" class="error-message" style="display: none;">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText"></span>
        </div>
        
        <!-- Admin Contact -->
        <div class="admin-note">
            <p>For access issues, contact:</p>
            <a href="mailto:priahmz@gmail.com" class="admin-contact">
                <i class="fas fa-envelope"></i> priahmz@gmail.com
            </a>
        </div>
    </div>
    
    <!-- Company Tagline -->
    <div class="company-tagline">
        © 2024 TRIPLE A AHAL GLOBAL CONCEPT
    </div>

    <!-- JavaScript -->
    <script type="module" src="js/auth.js"></script>
    <script>
        // Password toggle functionality
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        // Form submission with loading state
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('loginBtn');
            const loadingSpinner = document.getElementById('loadingSpinner');
            const errorMessage = document.getElementById('errorMessage');
            
            // Show loading
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
            loadingSpinner.style.display = 'block';
            errorMessage.style.display = 'none';
            
            // Get form data
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Simulate login delay (remove in production)
            setTimeout(() => {
                // Reset button state
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Admin Panel';
                loadingSpinner.style.display = 'none';
                
                // Show error for demo (remove in production)
                document.getElementById('errorText').textContent = 
                    'Please use Firebase Authentication setup first';
                errorMessage.style.display = 'flex';
                
                // In production, this would call your auth.js module
                // authManager.login(email, password);
            }, 1500);
        });

        // Add input focus effects
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.parentElement.classList.add('focused');
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.parentElement.classList.remove('focused');
            });
        });

        // Add keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            // Ctrl+Enter to submit form
            if (e.ctrlKey && e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
            
            // Escape to clear form
            if (e.key === 'Escape') {
                document.getElementById('loginForm').reset();
            }
        });
    </script>
    
    <!-- Styles for additional enhancements -->
    <style>
        /* Additional animations */
        .focused label {
            color: #667eea !important;
            transform: translateX(5px);
            transition: all 0.3s ease;
        }
        
        /* Autofill styles */
        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 1000px rgba(255, 255, 255, 0.9) inset !important;
            -webkit-text-fill-color: #2d3748 !important;
            border-color: #667eea !important;
        }
        
        @media (prefers-color-scheme: dark) {
            input:-webkit-autofill {
                -webkit-box-shadow: 0 0 0 1000px rgba(45, 55, 72, 0.9) inset !important;
                -webkit-text-fill-color: #e2e8f0 !important;
            }
        }
        
        /* Selection color */
        ::selection {
            background: rgba(102, 126, 234, 0.3);
            color: white;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #764ba2, #667eea);
        }
    </style>
</body>
    </html>
