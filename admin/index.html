<!-- admin/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAAGC Admin Login</title>
    <link rel="stylesheet" href="css/admin-login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>
<body>
    <!-- Background Elements -->
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    
    <!-- Login Container -->
    <div class="login-container">
        <!-- Logo -->
        <div class="logo">
            <div class="logo-icon">
                <i class="fas fa-shield-alt"></i>
            </div>
            <h1><span>TAAGC</span> Admin</h1>
            <p>Secure Administration Panel</p>
        </div>
        
        <!-- Login Form -->
        <form id="loginForm" class="login-form">
            <!-- Email Input -->
            <div class="input-group">
                <label for="email">
                    <i class="fas fa-envelope"></i> Admin Email
                </label>
                <div class="input-wrapper">
                    <i class="fas fa-user-shield"></i>
                    <input type="email" id="email" placeholder="admin@taagc.website" required
                           autocomplete="username" autocorrect="off" autocapitalize="none">
                </div>
            </div>
            
            <!-- Password Input -->
            <div class="input-group">
                <label for="password">
                    <i class="fas fa-key"></i> Password
                </label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" required
                           autocomplete="current-password">
                    <button type="button" class="password-toggle" id="togglePassword"
                            aria-label="Show password">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            
            <!-- Remember Me -->
            <div class="remember-me">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe">
                    <i class="fas fa-check-circle"></i> Remember me
                </label>
            </div>
            
            <!-- Submit Button -->
            <button type="submit" class="submit-btn" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Secure Login
            </button>
            
            <!-- Loading Spinner -->
            <div class="loading-spinner" id="loadingSpinner"></div>
        </form>
        
        <!-- Error Message -->
        <div id="errorMessage" class="error-message" style="display: none;">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText"></span>
        </div>
        
        <!-- Success Message -->
        <div id="successMessage" class="success-message" style="display: none;">
            <i class="fas fa-check-circle"></i>
            <span id="successText"></span>
        </div>
        
        <!-- Forgot Password -->
        <div class="forgot-password">
            <a href="#" id="forgotPassword">
                <i class="fas fa-question-circle"></i> Forgot Password?
            </a>
        </div>
        
        <!-- Security Info -->
        <div class="security-info">
            <p><i class="fas fa-shield-alt"></i> Secure SSL Connection</p>
            <p><i class="fas fa-clock"></i> Session expires in 24 hours</p>
        </div>
    </div>
    
    <!-- Company Tagline -->
    <div class="company-tagline">
        <i class="fas fa-globe"></i> © 2024 TRIPLE A AHAL GLOBAL CONCEPT
    </div>

    <!-- Firebase and Auth Scripts -->
    <script type="module" src="../../firebase-config.js"></script>
    <script type="module" src="js/auth-system.js"></script>
    
    <!-- Login Logic -->
    <script type="module">
        import { authSystem } from './js/auth-system.js';
        
        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');
        const rememberMe = document.getElementById('rememberMe');
        const loginBtn = document.getElementById('loginBtn');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const successMessage = document.getElementById('successMessage');
        const successText = document.getElementById('successText');
        const forgotPassword = document.getElementById('forgotPassword');
        
        // Password toggle
        togglePassword.addEventListener('click', function() {
            const icon = this.querySelector('i');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
                this.setAttribute('aria-label', 'Hide password');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
                this.setAttribute('aria-label', 'Show password');
            }
        });
        
        // Form submission
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Validate inputs
            if (!emailInput.value || !passwordInput.value) {
                showError('Please fill in all fields');
                return;
            }
            
            if (!isValidEmail(emailInput.value)) {
                showError('Please enter a valid email address');
                return;
            }
            
            // Disable form and show loading
            setFormState('loading');
            
            try {
                // Attempt login
                const result = await authSystem.login(
                    emailInput.value,
                    passwordInput.value,
                    rememberMe.checked
                );
                
                if (result.success) {
                    // Show success
                    showSuccess('Login successful! Redirecting...');
                    
                    // Redirect to dashboard after short delay
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                }
            } catch (error) {
                // Show error
                showError(error.message);
                
                // Clear password on error
                passwordInput.value = '';
                
                // Re-enable form
                setFormState('ready');
            }
        });
        
        // Forgot password
        forgotPassword.addEventListener('click', async function(e) {
            e.preventDefault();
            
            const email = prompt('Please enter your email address to reset password:');
            if (!email) return;
            
            if (!isValidEmail(email)) {
                alert('Please enter a valid email address');
                return;
            }
            
            try {
                await authSystem.resetPassword(email);
                alert('Password reset email sent! Please check your inbox.');
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });
        
        // Utility functions
        function isValidEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }
        
        function showError(message) {
            errorText.textContent = message;
            errorMessage.style.display = 'flex';
            successMessage.style.display = 'none';
            
            // Auto-hide after 5 seconds
            setTimeout(() => {
                errorMessage.style.display = 'none';
            }, 5000);
        }
        
        function showSuccess(message) {
            successText.textContent = message;
            successMessage.style.display = 'flex';
            errorMessage.style.display = 'none';
        }
        
        function setFormState(state) {
            if (state === 'loading') {
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
                loadingSpinner.style.display = 'block';
                emailInput.disabled = true;
                passwordInput.disabled = true;
                rememberMe.disabled = true;
            } else {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Secure Login';
                loadingSpinner.style.display = 'none';
                emailInput.disabled = false;
                passwordInput.disabled = false;
                rememberMe.disabled = false;
            }
        }
        
        // Check if already logged in
        authSystem.onAuthStateChange((state) => {
            if (state.isAuthenticated && state.isAdmin) {
                // Already logged in as admin, redirect to dashboard
                window.location.href = 'dashboard.html';
            }
        });
        
        // Auto-focus email input
        emailInput.focus();
        
        // Add enter key navigation
        emailInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && emailInput.value) {
                passwordInput.focus();
            }
        });
        
        passwordInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && passwordInput.value) {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
        
        // Add security warning for caps lock
        passwordInput.addEventListener('keyup', (e) => {
            if (e.getModifierState('CapsLock')) {
                showError('Caps Lock is ON');
            }
        });
    </script>
</body>
</html>
