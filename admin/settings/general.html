<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Settings - TAAGC (CEO)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="/admin/assets/css/admin.css">
    <script src="/admin/assets/js/admin.js"></script>
</head>
<body class="super-admin">
    <div class="admin-container">
        <aside class="admin-sidebar">...</aside>

        <main class="admin-main">
            <div class="admin-topbar">
                <div class="admin-page-title">
                    <h1><i class="fas fa-cog"></i> System Settings</h1>
                    <p>CEO Only - Configure platform settings</p>
                </div>
            </div>

            <div class="card">
                <div class="tabs">
                    <div class="tab active" onclick="showTab('general')">General</div>
                    <div class="tab" onclick="showTab('security')">Security</div>
                    <div class="tab" onclick="showTab('api')">API</div>
                    <div class="tab" onclick="showTab('email')">Email</div>
                    <div class="tab" onclick="showTab('backup')">Backup</div>
                </div>

                <!-- General Settings -->
                <div id="general-tab">
                    <form id="settingsForm">
                        <div class="grid-2">
                            <div class="form-group">
                                <label>Company Name</label>
                                <input type="text" class="form-control" id="companyName" value="TAAGC Global">
                            </div>
                            
                            <div class="form-group">
                                <label>Support Email</label>
                                <input type="email" class="form-control" id="supportEmail" value="support@taagc.com">
                            </div>
                            
                            <div class="form-group">
                                <label>Currency</label>
                                <select class="form-control" id="currency">
                                    <option value="USD">USD ($)</option>
                                    <option value="EUR">EUR (€)</option>
                                    <option value="GBP">GBP (£)</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label>Timezone</label>
                                <select class="form-control" id="timezone">
                                    <option value="UTC">UTC</option>
                                    <option value="EST">EST</option>
                                    <option value="PST">PST</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Maintenance Mode</label>
                            <div class="checkbox">
                                <input type="checkbox" id="maintenanceMode">
                                <label>Enable maintenance mode (only admins can access)</label>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Save Settings
                        </button>
                    </form>
                </div>

                <!-- Other tabs similarly -->
            </div>
        </main>
    </div>

    <script>
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            // Show corresponding tab content
        }
    </script>
</body>
</html>
