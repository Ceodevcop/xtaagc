<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Setup - TAAGC</title>
    
    <!-- Try multiple CDN sources -->
    <script src="https://cdn.jsdelivr.net/npm/firebase@10.7.1/dist/firebase-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/firebase@10.7.1/dist/firebase-auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/firebase@10.7.1/dist/firebase-firestore.js"></script>
    
    <!-- Fallback to local -->
    <script>
        window.onerror = function() {
            document.write('<script src="js/firebase-app.js"><\/script>');
            document.write('<script src="js/firebase-auth.js"><\/script>');
            document.write('<script src="js/firebase-firestore.js"><\/script>');
        };
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0a2540, #1a3a4f);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        h1 {
            color: #0a2540;
            margin-bottom: 10px;
        }
        .success {
            background: #f0fff4;
            border-left: 4px solid #2e7d5e;
            color: #22543d;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .error {
            background: #fff5f5;
            border-left: 4px solid #e53e3e;
            color: #742a2a;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .btn {
            background: #0a2540;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        .btn:hover {
            background: #1a3a4f;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .warning {
            background: #fff3cd;
            color: #856404;
            padding: 12px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .status-box {
            background: #f8fafc;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            font-family: monospace;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Admin Setup</h1>
        <p style="color: #64748b; margin-bottom: 20px;">Create your first administrator account</p>
        
        <div class="warning">
            <strong>⚠️ Default Credentials:</strong><br>
            Email: admin@taagc.com<br>
            Password: Admin123!
        </div>
        
        <div id="status" class="status-box">Initializing Firebase...</div>
        <div id="result"></div>
        
        <button class="btn" id="createBtn" onclick="createAdmin()" disabled>
            Create Admin Account
        </button>
        
        <p style="margin-top: 20px; text-align: center;">
            <a href="index.html" style="color: #0a2540;">Back to Login</a>
        </p>
    </div>

    <script>
        function waitForFirebase() {
            return new Promise((resolve) => {
                if (typeof firebase !== 'undefined') {
                    resolve();
                } else {
                    let attempts = 0;
                    const interval = setInterval(() => {
                        attempts++;
                        if (typeof firebase !== 'undefined') {
                            clearInterval(interval);
                            resolve();
                        } else if (attempts > 100) {
                            clearInterval(interval);
                            resolve();
                        }
                    }, 100);
                }
            });
        }

        window.onload = async function() {
            const statusDiv = document.getElementById('status');
            const createBtn = document.getElementById('createBtn');
            
            statusDiv.innerHTML = '⏳ Loading Firebase...';
            
            await waitForFirebase();
            
            if (typeof firebase === 'undefined') {
                statusDiv.innerHTML = '❌ Firebase failed to load. Please contact administrator.';
                statusDiv.style.color = 'red';
                return;
            }
            
            try {
                const config = {
                    apiKey: "AIzaSyAI1MrcP977UgRLQoePxl64JOSyj9v4WpI",
                    authDomain: "xtaagc.firebaseapp.com",
                    projectId: "xtaagc",
                    storageBucket: "xtaagc.firebasestorage.app",
                    messagingSenderId: "256073982437",
                    appId: "1:256073982437:web:8da63bb7acc86c0ca98f0c"
                };
                
                firebase.initializeApp(config);
                statusDiv.innerHTML = '✅ Firebase initialized successfully!';
                statusDiv.style.color = 'green';
                createBtn.disabled = false;
                
                await checkExistingAdmin();
                
            } catch (e) {
                statusDiv.innerHTML = `❌ Firebase init failed: ${e.message}`;
                statusDiv.style.color = 'red';
            }
        };

        async function checkExistingAdmin() {
            try {
                const auth = firebase.auth();
                await auth.signInWithEmailAndPassword('admin@taagc.com', 'Admin123!');
                
                document.getElementById('result').innerHTML = `
                    <div class="success">
                        ✅ Admin account already exists!<br><br>
                        <a href="index.html" style="display: inline-block; background: #0a2540; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none;">Go to Login</a>
                    </div>
                `;
                document.getElementById('createBtn').style.display = 'none';
                
            } catch (e) {
                // Admin doesn't exist - that's fine
            }
        }

        async function createAdmin() {
            const resultDiv = document.getElementById('result');
            const createBtn = document.getElementById('createBtn');
            
            resultDiv.innerHTML = '<div style="text-align:center"><span class="loading"></span> Creating admin...</div>';
            createBtn.disabled = true;
            
            try {
                const auth = firebase.auth();
                const db = firebase.firestore();
                
                const adminEmail = "admin@taagc.com";
                const adminPassword = "Admin123!";
                
                let user;
                try {
                    const userCredential = await auth.createUserWithEmailAndPassword(adminEmail, adminPassword);
                    user = userCredential.user;
                } catch (createError) {
                    if (createError.code === 'auth/email-already-in-use') {
                        const userCredential = await auth.signInWithEmailAndPassword(adminEmail, adminPassword);
                        user = userCredential.user;
                    } else {
                        throw createError;
                    }
                }
                
                await db.collection('admins').doc(user.uid).set({
                    name: 'Super Admin',
                    email: adminEmail,
                    role: 'super-admin',
                    createdAt: new Date().toISOString()
                }, { merge: true });
                
                localStorage.setItem('taagc_admin', JSON.stringify({
                    uid: user.uid,
                    email: adminEmail,
                    name: 'Super Admin',
                    role: 'super-admin'
                }));
                
                resultDiv.innerHTML = `
                    <div class="success">
                        ✅ Admin created successfully!<br><br>
                        <a href="index.html" style="display: inline-block; background: #0a2540; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none;">Go to Login</a>
                        <br><br>
                        <span style="color: #e53e3e;">⚠️ DELETE THIS FILE AFTER LOGIN</span>
                    </div>
                `;
                
                createBtn.style.display = 'none';
                
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        ❌ Error: ${error.message}<br><br>
                        <button onclick="location.reload()" style="background: #0a2540; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer;">Try Again</button>
                    </div>
                `;
                createBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
