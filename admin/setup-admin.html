<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Admin - TAAGC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0a2540, #1a3a4f);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        h1 {
            color: #0a2540;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .success {
            background: #f0fff4;
            border-left: 4px solid #2e7d5e;
            color: #22543d;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            white-space: pre-line;
        }
        .error {
            background: #fff5f5;
            border-left: 4px solid #e53e3e;
            color: #742a2a;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .btn {
            background: #0a2540;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        .btn:hover {
            background: #1a3a4f;
        }
        .warning {
            color: #856404;
            background: #fff3cd;
            padding: 12px;
            border-radius: 8px;
            margin: 20px 0;
            font-size: 14px;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
</head>
<body>
    <div class="card">
        <h1>Create Admin Account</h1>
        <p style="color: #64748b; margin-bottom: 30px;">Set up your first administrator</p>
        
        <div id="result"></div>
        
        <div class="warning">
            <strong>⚠️ Important:</strong> Run this script ONCE to create your admin account.
            After successful creation, delete this file for security.
        </div>
        
        <button class="btn" onclick="createAdmin()">Create Admin User</button>
        
        <div style="margin-top: 20px; font-size: 13px; color: #64748b; text-align: center;">
            Default credentials will be displayed after creation
        </div>
    </div>

    <script>
        // Initialize Firebase
        firebase.initializeApp({
            apiKey: "AIzaSyAI1MrcP977UgRLQoePxl64JOSyj9v4WpI",
            authDomain: "xtaagc.firebaseapp.com",
            projectId: "xtaagc",
            storageBucket: "xtaagc.firebasestorage.app",
            messagingSenderId: "256073982437",
            appId: "1:256073982437:web:8da63bb7acc86c0ca98f0c"
        });

        const auth = firebase.auth();
        const db = firebase.firestore();

        async function createAdmin() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div style="text-align:center">Creating admin...</div>';
            
            const adminEmail = "admin@taagc.com";
            const adminPassword = "Admin123!";
            
            try {
                // Try to create user
                let user;
                try {
                    const userCredential = await auth.createUserWithEmailAndPassword(adminEmail, adminPassword);
                    user = userCredential.user;
                } catch (createError) {
                    // If user already exists, sign in
                    if (createError.code === 'auth/email-already-in-use') {
                        const userCredential = await auth.signInWithEmailAndPassword(adminEmail, adminPassword);
                        user = userCredential.user;
                    } else {
                        throw createError;
                    }
                }
                
                // Create admin document in Firestore
                await db.collection('admins').doc(user.uid).set({
                    name: 'Super Admin',
                    email: adminEmail,
                    role: 'super-admin',
                    createdAt: new Date().toISOString(),
                    createdBy: 'system'
                }, { merge: true });
                
                // Also create in a backup collection
                await db.collection('admin_users').doc(user.uid).set({
                    email: adminEmail,
                    isAdmin: true,
                    role: 'super-admin'
                }, { merge: true });
                
                // Log the creation
                try {
                    await db.collection('audit_logs').add({
                        action: 'admin.created',
                        adminId: user.uid,
                        adminEmail: adminEmail,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } catch (e) {
                    // Ignore if audit_logs doesn't exist
                }
                
                resultDiv.innerHTML = `
                    <div class="success">
                        ✅ Admin created successfully!<br><br>
                        <strong>Email:</strong> admin@taagc.com<br>
                        <strong>Password:</strong> Admin123!<br><br>
                        <span style="color: #e53e3e; font-weight: bold;">⚠️ DELETE THIS FILE NOW</span>
                    </div>
                `;
                
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        ❌ Error: ${error.message}
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
