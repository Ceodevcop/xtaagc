<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Setup Admin</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0a2540,#1a3a4f);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}.card{background:white;border-radius:24px;padding:40px;max-width:500px;width:100%;box-shadow:0 20px 40px rgba(0,0,0,0.3);}h1{color:#0a2540;margin-bottom:10px;font-size:28px;}.success{background:#f0fff4;border-left:4px solid #2e7d5e;color:#22543d;padding:15px;border-radius:8px;margin:20px 0;}.error{background:#fff5f5;border-left:4px solid #e53e3e;color:#742a2a;padding:15px;border-radius:8px;margin:20px 0;}.btn{background:#c19a6b;color:white;border:none;padding:14px;border-radius:8px;font-weight:600;cursor:pointer;width:100%;margin-top:20px;}</style></head><body><div class="card"><h1>Admin Setup</h1><p style="color:#64748b;margin-bottom:30px;">Create your first administrator account</p><div id="result"></div></div><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script><script src="/js/config.js"></script><script>(async function(){if(typeof window.ENV==='undefined'){document.getElementById('result').innerHTML='<div class="error">Configuration error</div>';return;}
firebase.initializeApp({apiKey:window.ENV.FIREBASE_API_KEY,authDomain:window.ENV.FIREBASE_AUTH_DOMAIN,projectId:window.ENV.FIREBASE_PROJECT_ID,storageBucket:window.ENV.FIREBASE_STORAGE_BUCKET,messagingSenderId:window.ENV.FIREBASE_MESSAGING_SENDER_ID,appId:window.ENV.FIREBASE_APP_ID});const auth=firebase.auth(),db=firebase.firestore();try{const userCredential=await auth.createUserWithEmailAndPassword('admin@taagc.com','Admin123!');const user=userCredential.user;await db.collection('admins').doc(user.uid).set({name:'Super Admin',email:'admin@taagc.com',role:'super-admin',permissions:['manage_users','verify_companies','moderate_listings','manage_admins','view_analytics'],createdAt:new Date().toISOString()});document.getElementById('result').innerHTML=`<div class="success"><i class="fas fa-check-circle"></i> Admin created successfully!<br><br><strong>Email:</strong> admin@taagc.com<br><strong>Password:</strong> Admin123!<br><br>⚠️ DELETE THIS PAGE NOW</div>`;}catch(error){document.getElementById('result').innerHTML='<div class="error"><i class="fas fa-exclamation-circle"></i> '+error.message+'</div>';}})();</script></body></html>
