<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Setup | TAAGC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: #020617;
      padding: 30px;
      width: 100%;
      max-width: 420px;
      border-radius: 10px;
      box-shadow: 0 20px 40px rgba(0,0,0,.4);
    }
    h2 {
      text-align: center;
      margin-bottom: 10px;
    }
    p {
      text-align: center;
      font-size: 14px;
      opacity: .8;
    }
    input {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 6px;
      border: none;
      outline: none;
    }
    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      border-radius: 6px;
      border: none;
      background: #2563eb;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }
    button:disabled {
      background: #334155;
      cursor: not-allowed;
    }
    #status {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Create Super Admin</h2>
  <p>This page works only once</p>

  <input id="email" type="email" placeholder="Admin Email" />
  <input id="password" type="password" placeholder="Password (min 6 chars)" />

  <button id="createBtn" onclick="createAdmin()">Create Admin</button>

  <div id="status"></div>
</div>

<!-- 🔥 Firebase CDN (COMPAT – REQUIRED) -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
/* ==============================
   Firebase Configuration
============================== */
const firebaseConfig = {
  apiKey: "AIzaSyAI1MrcP977UgRLQoePxl64JOSyj9v4WpI",
  authDomain: "xtaagc.firebaseapp.com",
  projectId: "xtaagc",
  storageBucket: "xtaagc.firebasestorage.app",
  messagingSenderId: "256073982437",
  appId: "1:256073982437:web:8da63bb7acc86c0ca98f0c"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* ==============================
   Lock page if admin exists
============================== */
(async () => {
  const snap = await db.collection("settings").doc("system").get();
  if (snap.exists && snap.data().adminInitialized) {
    document.body.innerHTML =
      "<h2 style='color:white;text-align:center'>❌ Admin already created</h2>";
  }
})();

/* ==============================
   Create First Admin
============================== */
async function createAdmin() {
  const email = email.value.trim();
  const password = password.value.trim();
  const status = document.getElementById("status");
  const btn = document.getElementById("createBtn");

  if (!email || !password) {
    status.innerText = "❌ All fields are required";
    return;
  }

  btn.disabled = true;
  status.innerText = "⏳ Creating admin...";

  try {
    const settingsRef = db.collection("settings").doc("system");
    const settingsSnap = await settingsRef.get();

    if (settingsSnap.exists && settingsSnap.data().adminInitialized) {
      status.innerText = "❌ Admin already exists";
      btn.disabled = true;
      return;
    }

    const cred = await auth.createUserWithEmailAndPassword(email, password);
    const uid = cred.user.uid;

    await db.collection("admins").doc(uid).set({
      email,
      role: "super_admin",
      active: true,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    await settingsRef.set({
      adminInitialized: true,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    status.innerText = "✅ Super Admin created successfully";
    btn.disabled = true;

  } catch (err) {
    status.innerText = "❌ " + err.message;
    btn.disabled = false;
  }
}
</script>

</body>
</html>
