<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TAAGC Platform Setup</title>

<style>

body{
font-family:Arial;
background:#f1f5f9;
}

.container{
max-width:500px;
margin:auto;
margin-top:80px;
background:white;
padding:30px;
border-radius:10px;
}

h1{
color:#0a2540;
}

button{
background:#0a2540;
color:white;
padding:10px 20px;
border:none;
cursor:pointer;
}

button:hover{
background:#1a3a4f;
}

</style>

</head>

<body>

<div class="container">

<h1>TAAGC Platform Setup</h1>

<p>Initialize your platform.</p>

<button onclick="runSetup()">Run Setup</button>

</div>

<script>

async function runSetup(){

const user = firebase.auth().currentUser

if(!user){
alert("Login required")
return
}

const db = firebase.firestore()

const setupRef = db.collection("system").doc("setup")

const doc = await setupRef.get()

if(doc.exists){

alert("Setup already completed")
window.location="/admin/dashboard"
return

}

await setupRef.set({

completed:true,
createdBy:user.uid,
completedAt:new Date()

})

alert("Setup completed")

window.location="/admin/dashboard"

}

</script>

</body>
</html>
