<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Staff - TAAGC Admin</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Assets -->
    <link rel="stylesheet" href="/assets/css/admin.css">
    <script src="/assets/js/admin.js" defer></script>
    
    <style>
        .create-form {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .form-section {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: var(--space-xl);
            margin-bottom: var(--space-xl);
            border: 1px solid #e2e8f0;
        }
        
        .section-title {
            color: var(--primary);
            margin-bottom: var(--space-lg);
            padding-bottom: var(--space-sm);
            border-bottom: 2px solid var(--accent);
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }
        
        .photo-upload {
            width: 120px;
            height: 120px;
            background: var(--bg);
            border: 2px dashed #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            margin: 0 auto var(--space-lg);
        }
        
        .photo-upload:hover {
            border-color: var(--accent);
            background: rgba(193,154,107,0.05);
        }
        
        .photo-upload i {
            font-size: 32px;
            color: var(--accent);
        }
        
        .employment-type {
            display: flex;
            gap: var(--space-md);
            flex-wrap: wrap;
        }
        
        .type-option {
            flex: 1;
            min-width: 100px;
            padding: var(--space-md);
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-md);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .type-option:hover {
            border-color: var(--accent);
        }
        
        .type-option.selected {
            border-color: var(--accent);
            background: rgba(193,154,107,0.05);
        }
        
        .type-option i {
            font-size: 24px;
            color: var(--accent);
            margin-bottom: var(--space-xs);
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar">...</aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-user-plus" style="color: var(--accent);"></i> Add New Staff</h1>
                    <p>Create a new employee record</p>
                </div>
                <div class="top-bar-actions">
                    <button class="btn btn-outline" onclick="location.href='/staff/index.html'">
                        <i class="fas fa-arrow-left"></i> Back to Staff
                    </button>
                    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>

            <div class="create-form">
                <form id="createStaffForm" onsubmit="handleSubmit(event)">
                    <!-- Profile Photo -->
                    <div class="photo-upload" onclick="uploadPhoto()">
                        <i class="fas fa-camera"></i>
                    </div>

                    <!-- Personal Information -->
                    <div class="form-section">
                        <h3 class="section-title"><i class="fas fa-user"></i> Personal Information</h3>
                        
                        <div class="grid-2">
                            <div class="form-group">
                                <label class="field-required">First Name</label>
                                <input type="text" id="firstName" class="form-control" required>
                            </div>
                            
                            <div class="form-group">
                                <label class="field-required">Last Name</label>
                                <input type="text" id="lastName" class="form-control" required>
                            </div>
                            
                            <div class="form-group">
                                <label class="field-required">Email</label>
                                <input type="email" id="email" class="form-control" required>
                            </div>
                            
                            <div class="form-group">
                                <label class="field-required">Phone</label>
                                <input type="tel" id="phone" class="form-control" required>
                            </div>
                            
                            <div class="form-group">
                                <label>Date of Birth</label>
                                <input type="date" id="dob" class="form-control">
                            </div>
                            
                            <div class="form-group">
                                <label>Gender</label>
                                <select id="gender" class="form-control">
                                    <option value="">Select</option>
                                    <option value="male">Male</option>
                                    <option value="female">Female</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label>Address</label>
                                <input type="text" id="address" class="form-control" placeholder="Street address">
                            </div>
                            
                            <div class="form-group">
                                <label>City</label>
                                <input type="text" id="city" class="form-control">
                            </div>
                            
                            <div class="form-group">
                                <label>Country</label>
                                <select id="country" class="form-control">
                                    <option value="">Select</option>
                                    <option value="USA">United States</option>
                                    <option value="UK">United Kingdom</option>
                                    <option value="Canada">Canada</option>
                                    <option value="Singapore">Singapore</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label>Postal Code</label>
                                <input type="text" id="postalCode" class="form-control">
                            </div>
                        </div>
                    </div>

                    <!-- Employment Details -->
                    <div class="form-section">
                        <h3 class="section-title"><i class="fas fa-briefcase"></i> Employment Details</h3>
                        
                        <div class="grid-2">
                            <div class="form-group">
                                <label class="field-required">Employee ID</label>
                                <input type="text" id="employeeId" class="form-control" value="EMP" + Math.floor(Math.random() * 10000) required>
                            </div>
                            
                            <div class="form-group">
                                <label class="field-required">Department</label>
                                <select id="department" class="form-control" required>
                                    <option value="">Select Department</option>
                                    <option value="Management">Management</option>
                                    <option value="Operations">Operations</option>
                                    <option value="Finance">Finance</option>
                                    <option value="Marketing">Marketing</option>
                                    <option value="IT">IT</option>
                                    <option value="HR">Human Resources</option>
                                    <option value="Sales">Sales</option>
                                    <option value="Support">Support</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label class="field-required">Position</label>
                                <input type="text" id="position" class="form-control" required>
                            </div>
                            
                            <div class="form-group">
                                <label>Manager</label>
                                <select id="manager" class="form-control">
                                    <option value="">Select Manager</option>
                                    <option value="emp_1001">Sarah Wilson (CEO)</option>
                                    <option value="emp_1002">John Smith (Operations Director)</option>
                                    <option value="emp_1003">Lisa Brown (Finance Director)</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label class="field-required">Join Date</label>
                                <input type="date" id="joinDate" class="form-control" required>
                            </div>
                            
                            <div class="form-group">
                                <label>Contract End Date</label>
                                <input type="date" id="contractEnd" class="form-control">
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label class="field-required">Employment Type</label>
                            <div class="employment-type">
                                <div class="type-option" onclick="selectType('fulltime')">
                                    <i class="fas fa-clock"></i>
                                    <div>Full Time</div>
                                </div>
                                <div class="type-option" onclick="selectType('parttime')">
                                    <i class="fas fa-hourglass-half"></i>
                                    <div>Part Time</div>
                                </div>
                                <div class="type-option" onclick="selectType('contract')">
                                    <i class="fas fa-file-contract"></i>
                                    <div>Contract</div>
                                </div>
                                <div class="type-option" onclick="selectType('intern')">
                                    <i class="fas fa-graduation-cap"></i>
                                    <div>Intern</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Compensation -->
                    <div class="form-section">
                        <h3 class="section-title"><i class="fas fa-money-bill"></i> Compensation</h3>
                        
                        <div class="grid-2">
                            <div class="form-group">
                                <label>Salary</label>
                                <input type="number" id="salary" class="form-control" step="1000">
                            </div>
                            
                            <div class="form-group">
                                <label>Pay Frequency</label>
                                <select id="payFrequency" class="form-control">
                                    <option value="monthly">Monthly</option>
                                    <option value="biweekly">Bi-Weekly</option>
                                    <option value="weekly">Weekly</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label>Hourly Rate</label>
                                <input type="number" id="hourlyRate" class="form-control" step="0.5">
                            </div>
                            
                            <div class="form-group">
                                <label>Overtime Rate</label>
                                <input type="number" id="overtimeRate" class="form-control" step="0.5" value="1.5">
                            </div>
                            
                            <div class="form-group">
                                <label>Bank Name</label>
                                <input type="text" id="bankName" class="form-control">
                            </div>
                            
                            <div class="form-group">
                                <label>Account Number</label>
                                <input type="text" id="accountNumber" class="form-control">
                            </div>
                            
                            <div class="form-group">
                                <label>Routing Number</label>
                                <input type="text" id="routingNumber" class="form-control">
                            </div>
                        </div>
                    </div>

                    <!-- Emergency Contact -->
                    <div class="form-section">
                        <h3 class="section-title"><i class="fas fa-phone-alt"></i> Emergency Contact</h3>
                        
                        <div class="grid-2">
                            <div class="form-group">
                                <label>Contact Name</label>
                                <input type="text" id="emergencyName" class="form-control">
                            </div>
                            
                            <div class="form-group">
                                <label>Relationship</label>
                                <input type="text" id="emergencyRelationship" class="form-control">
                            </div>
                            
                            <div class="form-group">
                                <label>Emergency Phone</label>
                                <input type="tel" id="emergencyPhone" class="form-control">
                            </div>
                            
                            <div class="form-group">
                                <label>Alternative Phone</label>
                                <input type="tel" id="emergencyPhoneAlt" class="form-control">
                            </div>
                        </div>
                    </div>

                    <!-- Form Actions -->
                    <div class="flex gap-2" style="justify-content: flex-end;">
                        <button type="button" class="btn btn-outline" onclick="location.href='/staff/index.html'">
                            Cancel
                        </button>
                        <button type="submit" class="btn btn-primary" id="submitBtn">
                            <i class="fas fa-save"></i> Create Staff
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script>
        let selectedType = 'fulltime';

        function selectType(type) {
            selectedType = type;
            document.querySelectorAll('.type-option').forEach(opt => opt.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
        }

        function uploadPhoto() {
            TAAGC.ui.showToast('Photo upload feature coming soon', 'info');
        }

        async function handleSubmit(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerHTML = '<span class="spinner"></span> Creating...';
            submitBtn.disabled = true;
            
            try {
                // Collect form data
                const staffData = {
                    firstName: document.getElementById('firstName').value,
                    lastName: document.getElementById('lastName').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    dob: document.getElementById('dob').value,
                    gender: document.getElementById('gender').value,
                    address: document.getElementById('address').value,
                    city: document.getElementById('city').value,
                    country: document.getElementById('country').value,
                    postalCode: document.getElementById('postalCode').value,
                    employeeId: document.getElementById('employeeId').value,
                    department: document.getElementById('department').value,
                    position: document.getElementById('position').value,
                    manager: document.getElementById('manager').value,
                    joinDate: document.getElementById('joinDate').value,
                    contractEnd: document.getElementById('contractEnd').value,
                    employmentType: selectedType,
                    salary: parseFloat(document.getElementById('salary').value) || 0,
                    payFrequency: document.getElementById('payFrequency').value,
                    hourlyRate: parseFloat(document.getElementById('hourlyRate').value) || 0,
                    overtimeRate: parseFloat(document.getElementById('overtimeRate').value) || 1.5,
                    bankName: document.getElementById('bankName').value,
                    accountNumber: document.getElementById('accountNumber').value,
                    routingNumber: document.getElementById('routingNumber').value,
                    emergency: {
                        name: document.getElementById('emergencyName').value,
                        relationship: document.getElementById('emergencyRelationship').value,
                        phone: document.getElementById('emergencyPhone').value,
                        altPhone: document.getElementById('emergencyPhoneAlt').value
                    },
                    status: 'active'
                };
                
                // Simulate API call
                await new Promise(resolve => setTimeout(resolve, 1500));
                
                TAAGC.ui.showToast('Staff member created successfully!', 'success');
                
                setTimeout(() => {
                    location.href = '/staff/index.html';
                }, 1500);
                
            } catch (error) {
                TAAGC.ui.showToast('Error creating staff', 'error');
                submitBtn.innerHTML = '<i class="fas fa-save"></i> Create Staff';
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
