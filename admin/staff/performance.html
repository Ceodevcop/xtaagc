<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Reviews - TAAGC Admin</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Assets -->
    <link rel="stylesheet" href="/assets/css/admin.css">
    <script src="/assets/js/admin.js" defer></script>
    
    <style>
        .performance-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-xl);
        }
        
        .review-period {
            display: flex;
            gap: var(--space-xs);
            background: var(--bg);
            padding: 4px;
            border-radius: var(--radius-lg);
        }
        
        .period-btn {
            padding: var(--space-xs) var(--space-lg);
            border-radius: var(--radius-md);
            cursor: pointer;
        }
        
        .period-btn.active {
            background: var(--accent);
            color: white;
        }
        
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--space-lg);
            margin-bottom: var(--space-xl);
        }
        
        .kpi-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            border: 1px solid #e2e8f0;
        }
        
        .kpi-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
        }
        
        .kpi-label {
            color: var(--light);
            font-size: 13px;
            margin-top: var(--space-xs);
        }
        
        .review-filters {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            margin-bottom: var(--space-xl);
            border: 1px solid #e2e8f0;
        }
        
        .filter-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-md);
            margin-bottom: var(--space-md);
        }
        
        .review-table {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            border: 1px solid #e2e8f0;
        }
        
        .rating-stars-small {
            color: #ffd700;
            font-size: 12px;
        }
        
        .progress-tiny {
            width: 80px;
            height: 6px;
            background: #e2e8f0;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .progress-tiny-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
        }
        
        .review-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            border: 1px solid #e2e8f0;
            margin-bottom: var(--space-md);
            transition: all 0.3s;
        }
        
        .review-card:hover {
            border-color: var(--accent);
            box-shadow: var(--shadow-md);
        }
        
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-md);
        }
        
        .reviewer-info {
            display: flex;
            align-items: center;
            gap: var(--space-md);
        }
        
        .review-avatar {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .review-metrics {
            display: flex;
            gap: var(--space-xl);
            margin: var(--space-md) 0;
            padding: var(--space-md);
            background: var(--bg);
            border-radius: var(--radius-md);
        }
        
        .metric-item {
            text-align: center;
        }
        
        .metric-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }
        
        .metric-label {
            font-size: 11px;
            color: var(--light);
        }
        
        .review-actions {
            display: flex;
            gap: var(--space-sm);
            justify-content: flex-end;
            margin-top: var(--space-md);
        }
        
        .goals-list {
            margin-top: var(--space-md);
        }
        
        .goal-item {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            padding: var(--space-xs) 0;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .goal-progress-small {
            width: 100px;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar">...</aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-chart-line" style="color: var(--accent);"></i> Performance Reviews</h1>
                    <p>Track and manage employee performance</p>
                </div>
                <div class="top-bar-actions">
                    <button class="btn btn-primary" onclick="newReview()">
                        <i class="fas fa-plus"></i> New Review
                    </button>
                    <button class="btn btn-outline" onclick="exportReviews()">
                        <i class="fas fa-download"></i> Export
                    </button>
                    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>

            <!-- Review Period -->
            <div class="performance-header">
                <h3>Q1 2024 Performance Reviews</h3>
                <div class="review-period">
                    <span class="period-btn active" onclick="changePeriod('q1')">Q1 2024</span>
                    <span class="period-btn" onclick="changePeriod('q2')">Q2 2024</span>
                    <span class="period-btn" onclick="changePeriod('q3')">Q3 2024</span>
                    <span class="period-btn" onclick="changePeriod('q4')">Q4 2024</span>
                    <span class="period-btn" onclick="changePeriod('annual')">Annual</span>
                </div>
            </div>

            <!-- KPI Cards -->
            <div class="kpi-grid">
                <div class="kpi-card">
                    <div class="kpi-value">87%</div>
                    <div class="kpi-label">Average Performance</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-value">124</div>
                    <div class="kpi-label">Reviews Completed</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-value">18</div>
                    <div class="kpi-label">Pending Reviews</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-value">4.2</div>
                    <div class="kpi-label">Average Rating</div>
                </div>
            </div>

            <!-- Filters -->
            <div class="review-filters">
                <div class="filter-row">
                    <div class="form-group">
                        <label>Department</label>
                        <select class="form-control">
                            <option>All Departments</option>
                            <option>Management</option>
                            <option>Operations</option>
                            <option>Finance</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Review Status</label>
                        <select class="form-control">
                            <option>All Status</option>
                            <option>Completed</option>
                            <option>Pending</option>
                            <option>Scheduled</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Rating</label>
                        <select class="form-control">
                            <option>All Ratings</option>
                            <option>5 Stars</option>
                            <option>4 Stars</option>
                            <option>3 Stars</option>
                        </select>
                    </div>
                </div>
                
                <div class="flex-between">
                    <button class="btn btn-primary">Apply Filters</button>
                    <button class="btn btn-outline">Reset</button>
                </div>
            </div>

            <!-- Reviews List -->
            <div class="review-table">
                <div id="reviewsList">
                    <!-- Review cards will be loaded here -->
                </div>
                
                <!-- Pagination -->
                <div class="flex-center" style="margin-top: var(--space-xl);">
                    <div class="pagination">
                        <button class="page-link"><i class="fas fa-chevron-left"></i></button>
                        <button class="page-link active">1</button>
                        <button class="page-link">2</button>
                        <button class="page-link">3</button>
                        <button class="page-link">4</button>
                        <button class="page-link">5</button>
                        <span class="page-link">...</span>
                        <button class="page-link">8</button>
                        <button class="page-link"><i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function generateMockReviews() {
            const employees = [
                { name: 'John Smith', dept: 'Operations', avatar: 'JS' },
                { name: 'Sarah Johnson', dept: 'Marketing', avatar: 'SJ' },
                { name: 'Michael Chen', dept: 'IT', avatar: 'MC' },
                { name: 'Emma Davis', dept: 'Finance', avatar: 'ED' }
            ];
            
            const reviewers = ['Sarah Wilson', 'Robert Brown', 'Lisa Davis'];
            
            let html = '';
            
            for (let i = 0; i < 4; i++) {
                const emp = employees[i];
                const rating = (4 + Math.random()).toFixed(1);
                const performanceScore = Math.floor(Math.random() * 20) + 80;
                
                html += `
                    <div class="review-card">
                        <div class="review-header">
                            <div class="reviewer-info">
                                <div class="review-avatar">${emp.avatar}</div>
                                <div>
                                    <strong>${emp.name}</strong>
                                    <br>
                                    <small>${emp.dept}</small>
                                </div>
                            </div>
                            <span class="rating-stars-small">
                                ${'★'.repeat(Math.floor(rating))}${rating % 1 >= 0.5 ? '½' : ''}
                                (${rating})
                            </span>
                        </div>
                        
                        <div class="review-metrics">
                            <div class="metric-item">
                                <div class="metric-value">${performanceScore}%</div>
                                <div class="metric-label">Performance</div>
                            </div>
                            <div class="metric-item">
                                <div class="metric-value">12</div>
                                <div class="metric-label">Goals Met</div>
                            </div>
                            <div class="metric-item">
                                <div class="metric-value">3</div>
                                <div class="metric-label">In Progress</div>
                            </div>
                        </div>
                        
                        <div class="goals-list">
                            <div class="goal-item">
                                <div style="flex: 1;">Complete Q1 Projects</div>
                                <div class="goal-progress-small">
                                    <div class="progress-tiny">
                                        <div class="progress-tiny-fill" style="width: 100%;"></div>
                                    </div>
                                </div>
                                <span style="color: var(--success);">Completed</span>
                            </div>
                            <div class="goal-item">
                                <div style="flex: 1;">Client Acquisition Target</div>
                                <div class="goal-progress-small">
                                    <div class="progress-tiny">
                                        <div class="progress-tiny-fill" style="width: 75%;"></div>
                                    </div>
                                </div>
                                <span>75%</span>
                            </div>
                            <div class="goal-item">
                                <div style="flex: 1;">Team Training</div>
                                <div class="goal-progress-small">
                                    <div class="progress-tiny">
                                        <div class="progress-tiny-fill" style="width: 60%;"></div>
                                    </div>
                                </div>
                                <span>60%</span>
                            </div>
                        </div>
                        
                        <div class="flex-between" style="margin-top: var(--space-md);">
                            <small style="color: var(--light);">Reviewer: ${reviewers[i % 3]}</small>
                            <small>Review Date: Mar 10, 2024</small>
                        </div>
                        
                        <div class="review-actions">
                            <button class="btn btn-sm btn-outline-accent" onclick="editReview('${i}')">
                                <i class="fas fa-edit"></i> Edit Review
                            </button>
                            <button class="btn btn-sm btn-outline" onclick="viewDetails('${i}')">
                                <i class="fas fa-eye"></i> View Details
                            </button>
                            <button class="btn btn-sm btn-outline" onclick="printReview('${i}')">
                                <i class="fas fa-print"></i> Print
                            </button>
                        </div>
                    </div>
                `;
            }
            
            return html;
        }

        function loadReviews() {
            document.getElementById('reviewsList').innerHTML = generateMockReviews();
        }

        function changePeriod(period) {
            document.querySelectorAll('.period-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            TAAGC.ui.showToast(`Showing ${period} reviews`, 'info');
        }

        function newReview() {
            TAAGC.ui.showToast('New performance review form', 'info');
        }

        function exportReviews() {
            TAAGC.ui.showToast('Exporting reviews...', 'info');
        }

        function editReview(id) {
            TAAGC.ui.showToast(`Editing review ${id}`, 'info');
        }

        function viewDetails(id) {
            TAAGC.ui.showToast(`Viewing review details ${id}`, 'info');
        }

        function printReview(id) {
            TAAGC.ui.showToast(`Printing review ${id}`, 'info');
        }

        loadReviews();
    </script>
</body>
</html>
