<!DOCTYPE html>
<html>
<head>
    <title>Firebase Diagnostic</title>
</head>
<body>
    <h2>Firebase Diagnostic Tool</h2>
    
    <div id="status" style="padding: 20px; margin: 20px; border: 2px solid #ccc;"></div>
    
    <script>
        const status = document.getElementById('status');
        let html = '<h3>Testing Firebase Loading...</h3>';
        
        // Test 1: Can we load external scripts?
        html += '<p>Test 1: Checking if we can load external scripts...</p>';
        
        // Try to load Firebase
        const script = document.createElement('script');
        script.src = 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        script.onload = () => {
            html += '<p style="color:green;">✅ Test 2: Firebase app loaded successfully!</p>';
            
            // Try to use Firebase
            try {
                const config = {
                    apiKey: "AIzaSyAI1MrcP977UgRLQoePxl64JOSyj9v4WpI",
                    authDomain: "xtaagc.firebaseapp.com",
                    projectId: "xtaagc"
                };
                firebase.initializeApp(config);
                html += '<p style="color:green;">✅ Test 3: Firebase initialized successfully!</p>';
            } catch (e) {
                html += '<p style="color:red;">❌ Test 3: Firebase init failed: ' + e.message + '</p>';
            }
            
            status.innerHTML = html;
        };
        
        script.onerror = () => {
            html += '<p style="color:red;">❌ Test 2: Failed to load Firebase from CDN!</p>';
            html += '<p>Possible causes:</p>';
            html += '<ul>';
            html += '<li>Firebase CDN is blocked in your country</li>';
            html += '<li>Your server is blocking external scripts</li>';
            html += '<li>Network connectivity issues</li>';
            html += '</ul>';
            status.innerHTML = html;
        };
        
        document.head.appendChild(script);
        html += '<p style="color:orange;">⏳ Test 2: Loading Firebase... (check below)</p>';
        status.innerHTML = html;
    </script>
</body>
</html>
