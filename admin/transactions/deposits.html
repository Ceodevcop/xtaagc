<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposits - TAAGC Admin</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Assets -->
    <link rel="stylesheet" href="/assets/css/admin.css">
    <script src="/assets/js/admin.js" defer></script>
    
    <style>
        .deposit-form {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: var(--space-xl);
            border: 1px solid #e2e8f0;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .method-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-md);
            margin-bottom: var(--space-xl);
        }
        
        .method-card {
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .method-card:hover {
            border-color: var(--accent);
        }
        
        .method-card.selected {
            border-color: var(--accent);
            background: rgba(193,154,107,0.05);
        }
        
        .method-icon {
            font-size: 32px;
            color: var(--accent);
            margin-bottom: var(--space-md);
        }
        
        .quick-amounts {
            display: flex;
            gap: var(--space-sm);
            flex-wrap: wrap;
            margin: var(--space-md) 0;
        }
        
        .quick-amount {
            padding: var(--space-sm) var(--space-md);
            background: var(--bg);
            border: 1px solid #e2e8f0;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .quick-amount:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        
        .upload-area {
            border: 2px dashed #e2e8f0;
            border-radius: var(--radius-lg);
            padding: var(--space-xl);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .upload-area:hover {
            border-color: var(--accent);
            background: rgba(193,154,107,0.05);
        }
        
        .upload-area i {
            font-size: 48px;
            color: var(--accent);
            margin-bottom: var(--space-md);
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar">...</aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-arrow-down" style="color: var(--accent);"></i> Process Deposit</h1>
                    <p>Add funds to user account</p>
                </div>
                <div class="top-bar-actions">
                    <button class="btn btn-outline" onclick="location.href='/transactions/index.html'">
                        <i class="fas fa-arrow-left"></i> Back to Transactions
                    </button>
                    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>

            <div class="deposit-form">
                <h3 style="margin-bottom: var(--space-lg);">Deposit Details</h3>
                
                <!-- User Selection -->
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Select User</label>
                    <select id="userSelect" class="form-control">
                        <option value="">Search or select user...</option>
                        <option value="usr_1001">John Doe (john@example.com)</option>
                        <option value="usr_1002">Jane Smith (jane@example.com)</option>
                        <option value="usr_1003">Mike Johnson (mike@example.com)</option>
                    </select>
                </div>

                <!-- Payment Method -->
                <label><i class="fas fa-credit-card"></i> Payment Method</label>
                <div class="method-selector">
                    <div class="method-card" onclick="selectMethod('bank')">
                        <div class="method-icon"><i class="fas fa-university"></i></div>
                        <h4>Bank Transfer</h4>
                        <small style="color: var(--light);">1-3 business days</small>
                    </div>
                    <div class="method-card" onclick="selectMethod('card')">
                        <div class="method-icon"><i class="fas fa-credit-card"></i></div>
                        <h4>Credit Card</h4>
                        <small style="color: var(--light);">Instant</small>
                    </div>
                    <div class="method-card" onclick="selectMethod('crypto')">
                        <div class="method-icon"><i class="fab fa-bitcoin"></i></div>
                        <h4>Crypto</h4>
                        <small style="color: var(--light);">30-60 min</small>
                    </div>
                </div>

                <!-- Amount -->
                <div class="form-group">
                    <label><i class="fas fa-dollar-sign"></i> Deposit Amount</label>
                    <div class="quick-amounts">
                        <span class="quick-amount" onclick="setAmount(100)">$100</span>
                        <span class="quick-amount" onclick="setAmount(500)">$500</span>
                        <span class="quick-amount" onclick="setAmount(1000)">$1,000</span>
                        <span class="quick-amount" onclick="setAmount(5000)">$5,000</span>
                        <span class="quick-amount" onclick="setAmount(10000)">$10,000</span>
                    </div>
                    <input type="number" id="amount" class="form-control" placeholder="Enter amount" min="1" step="0.01">
                </div>

                <!-- Bank Details (shown for bank transfer) -->
                <div id="bankDetails" style="display: none;">
                    <div class="form-group">
                        <label><i class="fas fa-university"></i> Bank Name</label>
                        <input type="text" class="form-control" placeholder="Enter bank name">
                    </div>
                    <div class="grid-2">
                        <div class="form-group">
                            <label>Account Number</label>
                            <input type="text" class="form-control" placeholder="Account number">
                        </div>
                        <div class="form-group">
                            <label>Routing Number</label>
                            <input type="text" class="form-control" placeholder="Routing number">
                        </div>
                    </div>
                </div>

                <!-- Card Details (shown for credit card) -->
                <div id="cardDetails" style="display: none;">
                    <div class="form-group">
                        <label>Card Number</label>
                        <input type="text" class="form-control" placeholder="**** **** **** ****">
                    </div>
                    <div class="grid-2">
                        <div class="form-group">
                            <label>Expiry Date</label>
                            <input type="text" class="form-control" placeholder="MM/YY">
                        </div>
                        <div class="form-group">
                            <label>CVV</label>
                            <input type="text" class="form-control" placeholder="***">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Cardholder Name</label>
                        <input type="text" class="form-control" placeholder="Name on card">
                    </div>
                </div>

                <!-- Crypto Details (shown for crypto) -->
                <div id="cryptoDetails" style="display: none;">
                    <div class="form-group">
                        <label>Select Cryptocurrency</label>
                        <select class="form-control">
                            <option value="btc">Bitcoin (BTC)</option>
                            <option value="eth">Ethereum (ETH)</option>
                            <option value="usdt">USDT (ERC-20)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Wallet Address</label>
                        <input type="text" class="form-control" placeholder="Enter wallet address">
                    </div>
                </div>

                <!-- Proof of Payment -->
                <div class="form-group">
                    <label><i class="fas fa-file"></i> Proof of Payment</label>
                    <div class="upload-area" onclick="uploadProof()">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <h4>Upload Receipt/Proof</h4>
                        <p style="color: var(--light);">Click to upload or drag and drop</p>
                        <small style="color: var(--lighter);">PNG, JPG, PDF up to 5MB</small>
                    </div>
                </div>

                <!-- Notes -->
                <div class="form-group">
                    <label><i class="fas fa-sticky-note"></i> Notes</label>
                    <textarea class="form-control" rows="3" placeholder="Additional notes..."></textarea>
                </div>

                <!-- Submit -->
                <div class="flex gap-2" style="justify-content: flex-end; margin-top: var(--space-xl);">
                    <button class="btn btn-outline" onclick="cancelDeposit()">Cancel</button>
                    <button class="btn btn-success" onclick="processDeposit()">
                        <i class="fas fa-check"></i> Process Deposit
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        let selectedMethod = 'bank';

        function selectMethod(method) {
            selectedMethod = method;
            document.querySelectorAll('.method-card').forEach(card => card.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            
            document.getElementById('bankDetails').style.display = method === 'bank' ? 'block' : 'none';
            document.getElementById('cardDetails').style.display = method === 'card' ? 'block' : 'none';
            document.getElementById('cryptoDetails').style.display = method === 'crypto' ? 'block' : 'none';
        }

        function setAmount(amount) {
            document.getElementById('amount').value = amount;
        }

        function uploadProof() {
            TAAGC.ui.showToast('File upload coming soon', 'info');
        }

        function processDeposit() {
            const amount = document.getElementById('amount').value;
            const user = document.getElementById('userSelect').value;
            
            if (!user) {
                TAAGC.ui.showToast('Please select a user', 'error');
                return;
            }
            
            if (!amount || amount <= 0) {
                TAAGC.ui.showToast('Please enter a valid amount', 'error');
                return;
            }
            
            TAAGC.ui.confirm(`Process deposit of $${amount}?`, () => {
                TAAGC.ui.showToast('Deposit processed successfully', 'success');
                setTimeout(() => location.href = '/transactions/index.html', 1500);
            });
        }

        function cancelDeposit() {
            location.href = '/transactions/index.html';
        }
    </script>
</body>
</html>
