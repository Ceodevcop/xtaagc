<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdrawals - TAAGC Admin</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Assets -->
    <link rel="stylesheet" href="/assets/css/admin.css">
    <script src="/assets/js/admin.js" defer></script>
    
    <style>
        .withdrawal-form {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: var(--space-xl);
            border: 1px solid #e2e8f0;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .balance-info {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: var(--space-lg);
            border-radius: var(--radius-lg);
            margin-bottom: var(--space-xl);
        }
        
        .balance-amount {
            font-size: 36px;
            font-weight: 700;
            color: var(--accent);
        }
        
        .balance-label {
            font-size: 13px;
            opacity: 0.8;
        }
        
        .verification-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(16,185,129,0.1);
            color: var(--success);
            font-size: 12px;
        }
        
        .withdrawal-limit {
            background: var(--bg);
            border-radius: var(--radius-md);
            padding: var(--space-md);
            margin: var(--space-md) 0;
        }
        
        .progress-small {
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
            margin: var(--space-xs) 0;
        }
        
        .progress-fill-small {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar">...</aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-arrow-up" style="color: var(--accent);"></i> Process Withdrawal</h1>
                    <p>Withdraw funds from user account</p>
                </div>
                <div class="top-bar-actions">
                    <button class="btn btn-outline" onclick="location.href='/transactions/index.html'">
                        <i class="fas fa-arrow-left"></i> Back
                    </button>
                    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>

            <div class="withdrawal-form">
                <!-- User Balance -->
                <div class="balance-info">
                    <div class="flex-between">
                        <div>
                            <div class="balance-label">Available Balance</div>
                            <div class="balance-amount">$124,500.00</div>
                        </div>
                        <span class="verification-badge">
                            <i class="fas fa-check-circle"></i> Verified Account
                        </span>
                    </div>
                    <div style="margin-top: var(--space-md);">
                        <div class="flex-between">
                            <span>Daily Withdrawal Limit</span>
                            <span>$45,000 / $50,000</span>
                        </div>
                        <div class="progress-small">
                            <div class="progress-fill-small" style="width: 90%;"></div>
                        </div>
                    </div>
                </div>

                <!-- Withdrawal Details -->
                <h3 style="margin-bottom: var(--space-lg);">Withdrawal Details</h3>

                <!-- User Selection -->
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Select User</label>
                    <select id="userSelect" class="form-control">
                        <option value="">Search or select user...</option>
                        <option value="usr_1001">John Doe (Balance: $124,500)</option>
                        <option value="usr_1002">Jane Smith (Balance: $67,200)</option>
                        <option value="usr_1003">Mike Johnson (Balance: $234,000)</option>
                    </select>
                </div>

                <!-- Withdrawal Amount -->
                <div class="form-group">
                    <label><i class="fas fa-dollar-sign"></i> Withdrawal Amount</label>
                    <div class="quick-amounts">
                        <span class="quick-amount" onclick="setAmount(500)">$500</span>
                        <span class="quick-amount" onclick="setAmount(1000)">$1,000</span>
                        <span class="quick-amount" onclick="setAmount(5000)">$5,000</span>
                        <span class="quick-amount" onclick="setAmount(10000)">$10,000</span>
                        <span class="quick-amount" onclick="setAmount(25000)">$25,000</span>
                    </div>
                    <input type="number" id="amount" class="form-control" placeholder="Enter amount" min="1" step="0.01">
                </div>

                <!-- Withdrawal Method -->
                <div class="form-group">
                    <label><i class="fas fa-university"></i> Withdrawal Method</label>
                    <select id="method" class="form-control">
                        <option value="bank">Bank Transfer (2-3 business days)</option>
                        <option value="wire">Wire Transfer (1 business day) - $25 fee</option>
                        <option value="crypto">Cryptocurrency (30-60 min)</option>
                    </select>
                </div>

                <!-- Bank Account Selection -->
                <div class="form-group">
                    <label><i class="fas fa-credit-card"></i> Destination Account</label>
                    <select id="account" class="form-control">
                        <option value="">Select bank account...</option>
                        <option value="acc_1">Chase Bank •••• 1234</option>
                        <option value="acc_2">Bank of America •••• 5678</option>
                        <option value="acc_3">Wells Fargo •••• 9012</option>
                    </select>
                </div>

                <!-- Withdrawal Summary -->
                <div class="withdrawal-limit">
                    <div class="flex-between">
                        <span>Withdrawal Amount:</span>
                        <span id="summaryAmount">$0.00</span>
                    </div>
                    <div class="flex-between">
                        <span>Fee:</span>
                        <span id="summaryFee">$0.00</span>
                    </div>
                    <div class="flex-between" style="font-weight: 700; margin-top: var(--space-xs);">
                        <span>Total to Receive:</span>
                        <span id="summaryTotal">$0.00</span>
                    </div>
                </div>

                <!-- 2FA Verification -->
                <div class="form-group">
                    <label><i class="fas fa-shield-alt"></i> Security Code</label>
                    <div class="flex gap-2">
                        <input type="text" class="form-control" placeholder="Enter 6-digit code" style="flex: 1;">
                        <button class="btn btn-outline">Send Code</button>
                    </div>
                </div>

                <!-- Notes -->
                <div class="form-group">
                    <label><i class="fas fa-sticky-note"></i> Notes</label>
                    <textarea class="form-control" rows="3" placeholder="Reason for withdrawal..."></textarea>
                </div>

                <!-- Submit -->
                <div class="flex gap-2" style="justify-content: flex-end; margin-top: var(--space-xl);">
                    <button class="btn btn-outline" onclick="cancelWithdrawal()">Cancel</button>
                    <button class="btn btn-warning" onclick="processWithdrawal()">
                        <i class="fas fa-arrow-up"></i> Process Withdrawal
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.getElementById('amount').addEventListener('input', updateSummary);
        document.getElementById('method').addEventListener('change', updateSummary);

        function setAmount(amount) {
            document.getElementById('amount').value = amount;
            updateSummary();
        }

        function updateSummary() {
            const amount = parseFloat(document.getElementById('amount').value) || 0;
            const method = document.getElementById('method').value;
            const fee = method === 'wire' ? 25 : 0;
            
            document.getElementById('summaryAmount').textContent = TAAGC.data.formatCurrency(amount);
            document.getElementById('summaryFee').textContent = TAAGC.data.formatCurrency(fee);
            document.getElementById('summaryTotal').textContent = TAAGC.data.formatCurrency(amount - fee);
        }

        function processWithdrawal() {
            const amount = document.getElementById('amount').value;
            const user = document.getElementById('userSelect').value;
            
            if (!user) {
                TAAGC.ui.showToast('Please select a user', 'error');
                return;
            }
            
            if (!amount || amount <= 0) {
                TAAGC.ui.showToast('Please enter a valid amount', 'error');
                return;
            }
            
            TAAGC.ui.confirm(`Process withdrawal of $${amount}?`, () => {
                TAAGC.ui.showToast('Withdrawal processed successfully', 'success');
                setTimeout(() => location.href = '/transactions/index.html', 1500);
            });
        }

        function cancelWithdrawal() {
            location.href = '/transactions/index.html';
        }
    </script>
</body>
</html>
