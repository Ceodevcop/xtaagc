<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - TAAGC Admin</title>
    
    <!-- CDN Assets -->
    <link href="https://cdn.taagc.website/css/taagc.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar (same as dashboard) -->
        <aside class="admin-sidebar">
            <!-- ... same sidebar code ... -->
        </aside>

        <main class="admin-main">
            <div class="admin-topbar">
                <h2>Manage Users</h2>
                <div class="admin-user">
                    <span id="userName">Loading...</span>
                    <div class="admin-avatar" id="userAvatar">A</div>
                    <button onclick="TAAGC.logout()" class="btn btn-outline"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>

            <!-- Filters -->
            <div class="card" style="margin-bottom: 30px;">
                <div class="flex-between">
                    <div class="flex gap-1">
                        <input type="text" id="searchInput" class="form-control" placeholder="Search users..." style="width: 300px;">
                        <select id="roleFilter" class="form-control" style="width: 150px;">
                            <option value="">All Roles</option>
                            <option value="admin">Admin</option>
                            <option value="investor">Investor</option>
                            <option value="staff">Staff</option>
                            <option value="client">Client</option>
                        </select>
                        <select id="statusFilter" class="form-control" style="width: 150px;">
                            <option value="">All Status</option>
                            <option value="active">Active</option>
                            <option value="pending">Pending</option>
                            <option value="suspended">Suspended</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="exportUsers()">
                        <i class="fas fa-download"></i> Export
                    </button>
                </div>
            </div>

            <!-- Users Table -->
            <div class="card">
                <div class="table-container">
                    <table id="usersTable">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Investments</th>
                                <th>Joined</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <tr>
                                <td colspan="7" class="text-center">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <!-- Pagination -->
                <div class="flex-between mt-2">
                    <div>
                        Showing <span id="showingStart">1</span> to <span id="showingEnd">10</span> of <span id="totalCount">0</span>
                    </div>
                    <div class="flex gap-1">
                        <button class="btn btn-outline" onclick="prevPage()" id="prevBtn">Previous</button>
                        <button class="btn btn-outline" onclick="nextPage()" id="nextBtn">Next</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Firebase & TAAGC JS -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://cdn.taagc.website/js/taagc.js"></script>
    
    <script>
        // Check authentication
        const { authenticated, user } = TAAGC.checkAuth();
        if (!authenticated) {
            window.location.href = '/login.html';
        }

        // Pagination state
        let currentPage = 1;
        let pageSize = 10;
        let totalUsers = 0;
        let currentFilters = {};

        // Load users
        async function loadUsers() {
            TAAGC.showLoading('#usersTableBody');
            
            const params = new URLSearchParams({
                page: currentPage,
                limit: pageSize,
                ...currentFilters
            });
            
            const response = await TAAGC.api(`/admin/users?${params}`);
            
            if (response.success) {
                const tbody = document.getElementById('usersTableBody');
                tbody.innerHTML = response.data.map(user => `
                    <tr>
                        <td>${user.fullName}</td>
                        <td>${user.email}</td>
                        <td><span class="badge badge-info">${user.role}</span></td>
                        <td><span class="badge badge-${user.status === 'active' ? 'success' : 'warning'}">${user.status}</span></td>
                        <td>${user.investmentCount || 0}</td>
                        <td>${TAAGC.formatDate(user.createdAt)}</td>
                        <td>
                            <button class="btn btn-sm btn-outline" onclick="viewUser('${user.id}')"><i class="fas fa-eye"></i></button>
                            <button class="btn btn-sm btn-outline-accent" onclick="editUser('${user.id}')"><i class="fas fa-edit"></i></button>
                        </td>
                    </tr>
                `).join('');
                
                totalUsers = response.total;
                document.getElementById('totalCount').textContent = totalUsers;
                document.getElementById('showingStart').textContent = ((currentPage - 1) * pageSize) + 1;
                document.getElementById('showingEnd').textContent = Math.min(currentPage * pageSize, totalUsers);
            }
        }

        // Filter handlers
        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentFilters.search = e.target.value;
            currentPage = 1;
            loadUsers();
        });

        document.getElementById('roleFilter').addEventListener('change', (e) => {
            currentFilters.role = e.target.value;
            currentPage = 1;
            loadUsers();
        });

        document.getElementById('statusFilter').addEventListener('change', (e) => {
            currentFilters.status = e.target.value;
            currentPage = 1;
            loadUsers();
        });

        // Pagination
        function nextPage() {
            if (currentPage * pageSize < totalUsers) {
                currentPage++;
                loadUsers();
            }
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                loadUsers();
            }
        }

        // Actions
        function viewUser(id) {
            window.location.href = `/user-details.html?id=${id}`;
        }

        function editUser(id) {
            window.location.href = `/user-edit.html?id=${id}`;
        }

        function exportUsers() {
            window.location.href = `/api/admin/users/export?${new URLSearchParams(currentFilters)}`;
        }

        // Initial load
        loadUsers();
    </script>
</body>
</html>
