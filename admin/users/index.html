<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users Management - TAAGC</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/admin/assets/css/admin.css">
    <script src="/admin/assets/js/admin.js"></script>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar (same as dashboard) -->
        <aside class="admin-sidebar">...</aside>

        <main class="admin-main">
            <div class="admin-topbar">
                <div class="admin-page-title">
                    <h1>Users Management</h1>
                    <p>Manage all platform users</p>
                </div>
                
                <div class="flex gap-2">
                    <button class="btn btn-primary" onclick="location.href='/admin/users/create.html'">
                        <i class="fas fa-plus"></i> New User
                    </button>
                    <button class="btn btn-outline" id="toggleSidebar">
                        <i class="fas fa-bars"></i>
                    </button>
                    <button class="btn btn-danger" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>

            <!-- Filters -->
            <div class="card" style="margin-bottom: 20px;">
                <div class="flex-between">
                    <div class="flex gap-2">
                        <input type="text" id="searchInput" class="form-control" placeholder="Search users..." style="width: 300px;">
                        <select id="roleFilter" class="form-control" style="width: 150px;">
                            <option value="">All Roles</option>
                            <option value="client">Client</option>
                            <option value="investor">Investor</option>
                            <option value="admin">Admin</option>
                            <option value="super_admin">Super Admin</option>
                        </select>
                        <select id="statusFilter" class="form-control" style="width: 150px;">
                            <option value="">All Status</option>
                            <option value="active">Active</option>
                            <option value="pending">Pending</option>
                            <option value="suspended">Suspended</option>
                        </select>
                    </div>
                    <button class="btn btn-success" onclick="exportUsers()">
                        <i class="fas fa-download"></i> Export
                    </button>
                </div>
            </div>

            <!-- Users Table -->
            <div class="card">
                <div class="table-container">
                    <table id="usersTable">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Joined</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        let allUsers = [];
        
        async function loadUsers() {
            TAAGC.ui.showLoading('usersTableBody');
            
            try {
                const response = await TAAGC.api.get('/users');
                allUsers = response.users || [];
                renderUsers(allUsers);
                
            } catch (error) {
                document.getElementById('usersTableBody').innerHTML = 
                    '<tr><td colspan="6" class="text-center">Error loading users</td></tr>';
            }
        }
        
        function renderUsers(users) {
            const tbody = document.getElementById('usersTableBody');
            
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center">No users found</td></tr>';
                return;
            }
            
            tbody.innerHTML = users.map(user => {
                const roleClass = {
                    'super_admin': 'badge-danger',
                    'admin': 'badge-warning',
                    'investor': 'badge-success',
                    'client': 'badge-info'
                }[user.role] || 'badge-info';
                
                const statusClass = {
                    'active': 'badge-success',
                    'pending': 'badge-warning',
                    'suspended': 'badge-danger'
                }[user.status] || 'badge-info';
                
                return `
                    <tr>
                        <td>${user.fullName || '-'}</td>
                        <td>${user.email}</td>
                        <td><span class="badge ${roleClass}">${user.role}</span></td>
                        <td><span class="badge ${statusClass}">${user.status}</span></td>
                        <td>${TAAGC.data.formatDate(user.createdAt)}</td>
                        <td>
                            <button class="btn btn-sm btn-outline" onclick="viewUser('${user.id}')">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-accent" onclick="editUser('${user.id}')">
                                <i class="fas fa-edit"></i>
                            </button>
                            ${TAAGC.auth.isSuperAdmin() ? `
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteUser('${user.id}')">
                                    <i class="fas fa-trash"></i>
                                </button>
                            ` : ''}
                        </td>
                    </tr>
                `;
            }).join('');
        }
        
        function viewUser(id) {
            location.href = `/admin/users/view.html?id=${id}`;
        }
        
        function editUser(id) {
            location.href = `/admin/users/edit.html?id=${id}`;
        }
        
        function deleteUser(id) {
            TAAGC.ui.confirm('Are you sure you want to delete this user?', async () => {
                try {
                    await TAAGC.api.delete(`/users/${id}`);
                    TAAGC.ui.showToast('User deleted successfully', 'success');
                    loadUsers();
                } catch (error) {
                    TAAGC.ui.showToast('Error deleting user', 'error');
                }
            });
        }
        
        function exportUsers() {
            TAAGC.data.downloadCSV(allUsers, 'users_export.csv');
        }
        
        // Filters
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allUsers.filter(u => 
                (u.fullName && u.fullName.toLowerCase().includes(term)) ||
                (u.email && u.email.toLowerCase().includes(term))
            );
            renderUsers(filtered);
        });
        
        document.getElementById('roleFilter').addEventListener('change', (e) => {
            const role = e.target.value;
            if (!role) {
                renderUsers(allUsers);
            } else {
                const filtered = allUsers.filter(u => u.role === role);
                renderUsers(filtered);
            }
        });
        
        document.getElementById('statusFilter').addEventListener('change', (e) => {
            const status = e.target.value;
            if (!status) {
                renderUsers(allUsers);
            } else {
                const filtered = allUsers.filter(u => u.status === status);
                renderUsers(filtered);
            }
        });
        
        // Initial load
        loadUsers();
    </script>
</body>
</html>
