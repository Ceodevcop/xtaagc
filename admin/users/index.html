<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users Management - TAAGC Admin</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <!-- SINGLE CSS & JS -->
    <link rel="stylesheet" href="/assets/css/admin.css">
    <script src="/assets/js/admin.js"></script>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar (same as dashboard) -->
        <aside class="admin-sidebar">
            <div class="admin-sidebar-header">
                <div class="admin-logo">TA</div>
                <h2><span>TAAGC</span> ADMIN</h2>
            </div>
            
            <div class="admin-user">
                <div class="admin-avatar" id="userAvatar">A</div>
                <h4 id="userName">Loading...</h4>
                <p id="userEmail">loading...</p>
                <span class="admin-role" id="userRole">Admin</span>
            </div>
            
            <nav class="admin-nav">
                <div class="admin-nav-item" onclick="location.href='/admin/dashboard.html'">
                    <i class="fas fa-tachometer-alt"></i> <span>Dashboard</span>
                </div>
                <div class="admin-nav-item active" onclick="location.href='/admin/users/index.html'">
                    <i class="fas fa-users"></i> <span>Users</span>
                </div>
                <div class="admin-nav-item" onclick="location.href='/admin/investments/index.html'">
                    <i class="fas fa-chart-line"></i> <span>Investments</span>
                </div>
                <div class="admin-nav-item" onclick="location.href='/admin/projects/index.html'">
                    <i class="fas fa-building"></i> <span>Projects</span>
                </div>
                
                <!-- Super Admin Only -->
                <div class="admin-nav-item super-admin-only" onclick="location.href='/admin/admins/index.html'">
                    <i class="fas fa-user-shield"></i> <span>Manage Admins</span>
                </div>
                <div class="admin-nav-item super-admin-only" onclick="location.href='/admin/settings/general.html'">
                    <i class="fas fa-cog"></i> <span>Settings</span>
                </div>
                <div class="admin-nav-item super-admin-only" onclick="location.href='/admin/page-creator/index.html'">
                    <i class="fas fa-plus-circle"></i> <span>Page Creator</span>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <div class="admin-topbar">
                <div class="admin-page-title">
                    <h1>Users Management</h1>
                    <p>Manage all platform users</p>
                </div>
                
                <div class="flex gap-2">
                    <button class="btn btn-primary" onclick="location.href='/admin/users/create.html'">
                        <i class="fas fa-plus"></i> New User
                    </button>
                    <button class="btn btn-outline" id="toggleSidebar">
                        <i class="fas fa-bars"></i>
                    </button>
                    <button class="btn btn-danger" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>

            <!-- Filters -->
            <div class="card" style="margin-bottom: 20px;">
                <div class="flex-between">
                    <div class="flex gap-2">
                        <input type="text" id="searchInput" class="form-control" placeholder="Search users..." style="width: 300px;">
                        <select id="roleFilter" class="form-control" style="width: 150px;">
                            <option value="">All Roles</option>
                            <option value="client">Client</option>
                            <option value="investor">Investor</option>
                            <option value="admin">Admin</option>
                            <option value="super_admin">Super Admin</option>
                        </select>
                        <select id="statusFilter" class="form-control" style="width: 150px;">
                            <option value="">All Status</option>
                            <option value="active">Active</option>
                            <option value="pending">Pending</option>
                            <option value="suspended">Suspended</option>
                        </select>
                    </div>
                    <button class="btn btn-success" onclick="exportUsers()">
                        <i class="fas fa-download"></i> Export
                    </button>
                </div>
            </div>

            <!-- Users Table -->
            <div class="card">
                <div class="table-container">
                    <table id="usersTable">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Joined</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <tr><td colspan="6" class="text-center">Loading users...</td></tr>
                        </tbody>
                    </table>
                </div>
                
                <!-- Pagination -->
                <div id="usersPagination" class="pagination" style="margin-top: 20px;"></div>
            </div>
        </main>
    </div>

    <script>
        let usersTable;
        let allUsers = [];

        document.addEventListener('DOMContentLoaded', function() {
            loadUsers();
            
            // Search
            document.getElementById('searchInput').addEventListener('input', function(e) {
                if (usersTable) {
                    usersTable.filter(e.target.value, ['fullName', 'email']);
                }
            });
            
            // Filters
            document.getElementById('roleFilter').addEventListener('change', filterUsers);
            document.getElementById('statusFilter').addEventListener('change', filterUsers);
        });

        async function loadUsers() {
            try {
                const data = await TAAGC.API.get('/admin/users');
                allUsers = data.users || [];
                
                // Initialize table
                usersTable = new TAAGC.Table('usersTable', {
                    pageSize: 10,
                    paginationId: 'usersPagination',
                    columns: [
                        { field: 'fullName', label: 'Name' },
                        { field: 'email', label: 'Email' },
                        { 
                            field: 'role', 
                            label: 'Role',
                            type: 'badge',
                            formatter: (value) => {
                                const colors = {
                                    'super_admin': 'badge-danger',
                                    'admin': 'badge-warning',
                                    'investor': 'badge-success',
                                    'client': 'badge-info'
                                };
                                return `<span class="badge ${colors[value] || 'badge-info'}">${value}</span>`;
                            }
                        },
                        { 
                            field: 'status', 
                            label: 'Status',
                            type: 'badge',
                            formatter: (value) => {
                                const colors = {
                                    'active': 'badge-success',
                                    'pending': 'badge-warning',
                                    'suspended': 'badge-danger'
                                };
                                return `<span class="badge ${colors[value] || 'badge-info'}">${value}</span>`;
                            }
                        },
                        { field: 'createdAt', label: 'Joined', type: 'date' },
                        {
                            field: 'id',
                            label: 'Actions',
                            formatter: (value, row) => `
                                <div class="flex gap-1">
                                    <button class="btn btn-sm btn-outline" onclick="viewUser('${row.id}')">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                    <button class="btn btn-sm btn-outline-accent" onclick="editUser('${row.id}')">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    ${TAAGC.Auth.isSuperAdmin() ? `
                                        <button class="btn btn-sm btn-outline-danger" onclick="deleteUser('${row.id}')">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    ` : ''}
                                </div>
                            `
                        }
                    ]
                });
                
                usersTable.render(allUsers, usersTable.options.columns);
                
            } catch (error) {
                TAAGC.UI.showToast('Error loading users', 'error');
            }
        }

        function filterUsers() {
            if (!usersTable || !allUsers.length) return;
            
            const role = document.getElementById('roleFilter').value;
            const status = document.getElementById('statusFilter').value;
            
            let filtered = [...allUsers];
            
            if (role) filtered = filtered.filter(u => u.role === role);
            if (status) filtered = filtered.filter(u => u.status === status);
            
            usersTable.filteredData = filtered;
            usersTable.currentPage = 1;
            usersTable.render(filtered, usersTable.options.columns);
        }

        function viewUser(id) {
            location.href = `/users/view.html?id=${id}`;
        }

        function editUser(id) {
            location.href = `/users/edit.html?id=${id}`;
        }

        function deleteUser(id) {
            TAAGC.UI.confirm('Are you sure you want to delete this user?', async () => {
                try {
                    await TAAGC.API.delete(`/admin/users/${id}`);
                    TAAGC.UI.showToast('User deleted successfully', 'success');
                    loadUsers();
                } catch (error) {
                    TAAGC.UI.showToast('Error deleting user', 'error');
                }
            });
        }

        function exportUsers() {
            TAAGC.Data.downloadCSV(allUsers, 'users_export.csv');
        }
    </script>
</body>
</html>
