<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>TAAGC Global | Company & Individual Registration</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a2540 0%, #1a3a4f 100%);
            color: #1a1e24;
            line-height: 1.6;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Brand Header */
        .brand-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ffffff, #f8fafc);
            border-radius: 24px;
            color: #0a2540;
            font-size: 40px;
            font-weight: 800;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 4px solid #c19a6b;
        }

        .brand-title {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            color: white;
            margin-bottom: 10px;
        }

        .brand-title span {
            color: #c19a6b;
        }

        .brand-subtitle {
            color: rgba(255,255,255,0.8);
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Registration Type Selector */
        .registration-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .selector-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 32px;
            background: rgba(255,255,255,0.1);
            border: 2px solid transparent;
            border-radius: 50px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .selector-btn i {
            font-size: 20px;
        }

        .selector-btn.active {
            background: white;
            color: #0a2540;
            border-color: #c19a6b;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .selector-btn.company.active i { color: #0a2540; }
        .selector-btn.individual.active i { color: #c19a6b; }

        /* Auth Card */
        .auth-card {
            display: grid;
            grid-template-columns: 1fr 1px 1fr;
            background: white;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            margin-bottom: 40px;
        }

        .auth-divider {
            background: linear-gradient(to bottom, transparent, #e2e8f0, transparent);
            width: 1px;
            height: 100%;
        }

        .auth-section {
            padding: 48px;
        }

        .auth-header {
            margin-bottom: 32px;
        }

        .auth-badge {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(193, 154, 107, 0.1);
            color: #c19a6b;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        .auth-title {
            font-size: 28px;
            color: #0a2540;
            font-family: 'Playfair Display', serif;
            margin-bottom: 8px;
        }

        .auth-description {
            color: #4a5568;
            font-size: 14px;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 13px;
            color: #0a2540;
        }

        label i {
            color: #c19a6b;
            margin-right: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
            font-size: 16px;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
            background: white;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #c19a6b;
            box-shadow: 0 0 0 4px rgba(193, 154, 107, 0.1);
        }

        .input-note {
            font-size: 12px;
            color: #718096;
            margin-top: 6px;
        }

        /* Verification Badge */
        .verification-badge {
            background: linear-gradient(135deg, #fef9e7, #fff8e7);
            border-left: 4px solid #c19a6b;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .verification-icon {
            width: 48px;
            height: 48px;
            background: #c19a6b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            flex-shrink: 0;
        }

        .verification-text h4 {
            font-size: 16px;
            margin-bottom: 4px;
            color: #0a2540;
        }

        .verification-text p {
            font-size: 13px;
            color: #4a5568;
            margin-bottom: 0;
        }

        /* Company Domain Verification */
        .domain-verification {
            background: #f0f9ff;
            border: 2px dashed #3182ce;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .domain-icon {
            width: 48px;
            height: 48px;
            background: #3182ce;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        .domain-badge {
            background: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 700;
            color: #3182ce;
            border: 2px solid #3182ce;
        }

        /* Individual Verification */
        .individual-verification {
            background: #f0f9ff;
            border: 2px dashed #3182ce;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .individual-icon {
            width: 48px;
            height: 48px;
            background: #3182ce;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        /* Registration Type Cards */
        .registration-type {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .type-card {
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 16px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .type-card:hover {
            border-color: #c19a6b;
            background: rgba(193, 154, 107, 0.05);
        }

        .type-card.active {
            border-color: #c19a6b;
            background: rgba(193, 154, 107, 0.1);
        }

        .type-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #0a2540, #3a5a78);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            margin: 0 auto 12px;
        }

        .type-title {
            font-weight: 700;
            color: #0a2540;
            margin-bottom: 4px;
            font-size: 15px;
        }

        .type-desc {
            font-size: 11px;
            color: #4a5568;
        }

        /* Investment Range */
        .investment-range {
            margin: 20px 0;
        }

        .range-value {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 14px;
            color: #0a2540;
            font-weight: 600;
        }

        input[type="range"] {
            width: 100%;
            margin: 10px 0;
            padding: 0;
            background: transparent;
        }

        /* Social Login */
        .social-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #e2e8f0;
        }

        .social-title {
            font-size: 14px;
            color: #4a5568;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .social-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: #1a1e24;
        }

        .social-btn i {
            font-size: 20px;
        }

        .social-btn.tiktok i { color: #000000; }
        .social-btn.github i { color: #333; }
        .social-btn.google i { color: #DB4437; }
        .social-btn.microsoft i { color: #00A4EF; }

        .social-btn:hover {
            background: #0a2540;
            border-color: #0a2540;
            color: white;
        }

        .social-btn:hover i { color: white; }

        /* Buttons */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0a2540, #3a5a78);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
        }

        .btn-accent {
            background: #c19a6b;
            color: white;
        }

        .btn-accent:hover {
            background: #b38b5e;
            transform: translateY(-2px);
        }

        .btn-individual {
            background: linear-gradient(135deg, #c19a6b, #b38b5e);
            color: white;
        }

        /* Login Options */
        .login-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #4a5568;
        }

        .forgot-link {
            color: #c19a6b;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        /* Alerts */
        .alert {
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }

        .alert-success {
            background: #f0fff4;
            border-left: 4px solid #2e7d5e;
            color: #22543d;
        }

        .alert-error {
            background: #fff5f5;
            border-left: 4px solid #e53e3e;
            color: #742a2a;
        }

        .alert-warning {
            background: #fffaf0;
            border-left: 4px solid #dd6b20;
            color: #744210;
        }

        .alert-info {
            background: #ebf8ff;
            border-left: 4px solid #3182ce;
            color: #2c5282;
        }

        /* Loading Spinner */
        .loading-spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Trust Badges */
        .trust-badges {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 40px;
            color: rgba(255,255,255,0.6);
            font-size: 13px;
        }

        .trust-badges span i {
            margin-right: 8px;
        }

        /* Responsive */
        @media (max-width: 992px) {
            .auth-card {
                grid-template-columns: 1fr;
            }
            .auth-divider {
                display: none;
            }
            .registration-type {
                grid-template-columns: 1fr;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
            .social-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .auth-section {
                padding: 32px 24px;
            }
            .brand-title {
                font-size: 28px;
            }
            .auth-title {
                font-size: 24px;
            }
            .registration-selector {
                flex-direction: column;
                align-items: center;
            }
            .selector-btn {
                width: 100%;
                justify-content: center;
            }
            .trust-badges {
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Brand Header -->
        <div class="brand-header">

            <div class="auth-section" id="registrationSection">

                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="loginPassword" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="login-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="rememberMe"> Remember me
                        </label>
                        <a href="#" class="forgot-link" onclick="forgotPassword(event)">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-accent" id="loginBtn">
                        <span id="loginText">Login to Dashboard</span>
                        <span id="loginSpinner" class="loading-spinner"></span>
                    </button>
                </form>

                        Login with social account
                    </div>
