  <!-- Tailwind CSS via CDN (for static HTML) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#eff6ff',
              100: '#dbeafe',
              200: '#bfdbfe',
              300: '#93c5fd',
              400: '#60a5fa',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
              800: '#1e40af',
              900: '#1e3a8a',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
  
  <!-- Custom CSS -->
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .btn-primary {
      @apply bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors duration-200 font-medium;
    }
    .btn-secondary {
      @apply bg-gray-200 text-gray-800 px-4 py-2 rounded-lg hover:bg-gray-300 transition-colors duration-200 font-medium;
    }
    .btn-outline {
      @apply border-2 border-blue-600 text-blue-600 px-4 py-2 rounded-lg hover:bg-blue-50 transition-colors duration-200 font-medium;
    }
    .input-field {
      @apply w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none;
    }
    .card {
      @apply bg-white p-6 rounded-xl shadow-lg;
    }
    .dashboard-card {
      @apply bg-gradient-to-r from-blue-600 to-blue-700 text-white p-6 rounded-xl shadow-lg;
    }
    .animate-spin {
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .toast {
      @apply fixed bottom-4 right-4 bg-gray-900 text-white px-4 py-3 rounded-lg shadow-lg transform transition-transform duration-300 z-50;
    }
    .toast.success { @apply bg-green-600; }
    .toast.error { @apply bg-red-600; }
    .toast.info { @apply bg-blue-600; }
  </style>
</head>
<body class="bg-gray-50">

  <div id="root"></div>
