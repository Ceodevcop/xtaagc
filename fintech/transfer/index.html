<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Money - TRIPLE A AHAL GLOBAL CONCEPT</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/transfer.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <!-- Same sidebar -->
        </aside>

        <main class="main-content">
            <header class="dashboard-header">
                <h1>Send Money</h1>
            </header>

            <div class="transfer-container">
                <!-- Transfer Tabs -->
                <div class="transfer-tabs">
                    <button class="tab-btn active" onclick="switchTransferTab('internal')">Internal Transfer</button>
                    <button class="tab-btn" onclick="switchTransferTab('international')">International</button>
                    <button class="tab-btn" onclick="switchTransferTab('beneficiaries')">Beneficiaries</button>
                </div>

                <!-- Internal Transfer Form -->
                <div class="tab-pane active" id="internalTransfer">
                    <form id="transferForm" onsubmit="handleTransfer(event)">
                        <div class="form-section">
                            <h3>From</h3>
                            <div class="form-group">
                                <label>Select Card/Account</label>
                                <select id="fromCard" class="form-select" required>
                                    <option value="">Choose card to transfer from</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Available Balance</label>
                                <div class="balance-display" id="availableBalance">$0.00</div>
                            </div>
                        </div>

                        <div class="form-section">
                            <h3>To</h3>
                            <div class="form-group">
                                <label>Recipient</label>
                                <select id="recipientType" onchange="toggleRecipientInput()">
                                    <option value="existing">Existing Beneficiary</option>
                                    <option value="new">New Recipient</option>
                                </select>
                            </div>

                            <div id="existingRecipient">
                                <div class="form-group">
                                    <label>Select Beneficiary</label>
                                    <select id="beneficiarySelect" class="form-select">
                                        <option value="">Choose beneficiary</option>
                                    </select>
                                </div>
                            </div>

                            <div id="newRecipient" style="display: none;">
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Full Name</label>
                                        <input type="text" id="recipientName" class="form-input">
                                    </div>
                                    <div class="form-group">
                                        <label>Email/Phone</label>
                                        <input type="text" id="recipientEmail" class="form-input">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="form-section">
                            <h3>Transfer Details</h3>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Amount</label>
                                    <input type="number" id="amount" class="form-input" min="0.01" step="0.01" required>
                                </div>
                                <div class="form-group">
                                    <label>Currency</label>
                                    <select id="currency" class="form-select">
                                        <option value="USD">USD</option>
                                        <option value="EUR">EUR</option>
                                        <option value="GBP">GBP</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Description (Optional)</label>
                                <input type="text" id="description" class="form-input" placeholder="What's this for?">
                            </div>
                        </div>

                        <!-- Transfer Summary -->
                        <div class="transfer-summary">
                            <h4>Transfer Summary</h4>
                            <div class="summary-row">
                                <span>Amount:</span>
                                <span id="summaryAmount">$0.00</span>
                            </div>
                            <div class="summary-row">
                                <span>Fee:</span>
                                <span id="summaryFee">$0.00</span>
                            </div>
                            <div class="summary-row total">
                                <span>Total:</span>
                                <span id="summaryTotal">$0.00</span>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-block" id="transferBtn">
                            Send Money
                        </button>
                    </form>
                </div>

                <!-- International Transfer Tab -->
                <div class="tab-pane" id="internationalTransfer">
                    <div class="exchange-rate-card">
                        <h3>Live Exchange Rates</h3>
                        <div id="exchangeRates">
                            <!-- Rates loaded via JS -->
                        </div>
                    </div>

                    <form id="internationalForm" onsubmit="handleInternationalTransfer(event)">
                        <div class="form-section">
                            <h3>Send From</h3>
                            <select id="fromCurrency" class="form-select">
                                <option value="USD">USD - US Dollar</option>
                                <option value="EUR">EUR - Euro</option>
                                <option value="GBP">GBP - British Pound</option>
                            </select>
                            <input type="number" id="sendAmount" class="form-input" placeholder="Amount">
                        </div>

                        <div class="form-section">
                            <h3>Recipient Gets</h3>
                            <select id="toCurrency" class="form-select">
                                <option value="EUR">EUR - Euro</option>
                                <option value="USD">USD - US Dollar</option>
                                <option value="GBP">GBP - British Pound</option>
                            </select>
                            <div class="recipient-amount" id="recipientAmount">€0.00</div>
                        </div>

                        <div class="form-section">
                            <h3>Recipient Details</h3>
                            <input type="text" placeholder="Full Name" class="form-input">
                            <input type="text" placeholder="IBAN/Account Number" class="form-input">
                            <input type="text" placeholder="SWIFT/BIC Code" class="form-input">
                            <select class="form-select">
                                <option>Select Country</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary btn-block">Send International Transfer</button>
                    </form>
                </div>

                <!-- Beneficiaries Tab -->
                <div class="tab-pane" id="beneficiariesTab">
                    <div class="beneficiaries-header">
                        <h3>Saved Beneficiaries</h3>
                        <button class="btn btn-primary" onclick="showAddBeneficiary()">+ Add New</button>
                    </div>

                    <div class="beneficiaries-list" id="beneficiariesList">
                        <!-- Beneficiaries loaded via JS -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Beneficiary Modal -->
    <div class="modal" id="beneficiaryModal">
        <div class="modal-content">
            <h3>Add Beneficiary</h3>
            <form id="beneficiaryForm">
                <input type="text" placeholder="Full Name" class="form-input" required>
                <input type="email" placeholder="Email" class="form-input" required>
                <input type="text" placeholder="Bank Name" class="form-input">
                <input type="text" placeholder="Account Number" class="form-input">
                <button type="submit" class="btn btn-primary">Save Beneficiary</button>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="/js/firebase-config.js"></script>
    <script src="/js/firebase-init.js"></script>
    <script src="/js/transfer.js"></script>
</body>
</html>
