<!DOCTYPE html>
<html>
<head>
    <title>Game Test - CrazyGames</title>
    <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
    <script>
        window.addEventListener('load', function() {
            // Check environment
            const env = window.CrazyGames.SDK.environment;
            console.log('Running in environment:', env);
            
            if (env === 'local') {
                document.getElementById('status').innerHTML = 
                    '✅ Local mode - ads will show as overlay';
            } else if (env === 'crazygames') {
                document.getElementById('status').innerHTML = 
                    '✅ CrazyGames mode - real ads will show';
            } else {
                document.getElementById('status').innerHTML = 
                    '❌ Disabled mode - SDK will throw errors';
            }
        });
        
        function testAd() {
            window.CrazyGames.SDK.ad.requestAd('midgame', {
                beforeAd: () => console.log('Ad starting'),
                afterAd: () => console.log('Ad finished')
            });
        }
    </script>
</head>
<body>
    <h2>CrazyGames SDK Test</h2>
    <div id="status">Checking environment...</div>
    <button onclick="testAd()">Test Ad</button>
</body>
</html>
