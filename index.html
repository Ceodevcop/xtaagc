<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    
    <!-- Primary Meta Tags -->
    <title id="dynamicTitle">TAAGC Global | Triple A AHAL Global Concept</title>
    <meta name="description" id="dynamicDescription" content="TAAGC delivers institutional-grade solutions in Agriculture, Grain Processing, ICT, General Contracts, and General Merchandise. Partner with us for sustainable growth across 50+ countries.">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://taagc.website">
    <meta property="og:title" id="ogTitle" content="TAAGC Global | Triple A AHAL Global Concept">
    <meta property="og:description" id="ogDescription" content="Institutional-grade solutions across five core sectors. Global excellence, delivered.">
    <meta property="og:image" content="https://taagc.website/images/og-image.jpg">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Critical inline CSS for immediate rendering -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; max-width: 100%; overflow-x: hidden; }
        body { font-family: 'Inter', sans-serif; opacity: 1; transition: opacity 0.2s; }
        #app { width: 100%; min-height: 100vh; display: flex; flex-direction: column; }
        #content { flex: 1; }
        .loading-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(135deg, #0a2540, #1a3a4f); 
            display: flex; align-items: center; justify-content: center; 
            z-index: 9999; transition: opacity 0.5s;
        }
        .loader {
            width: 60px; height: 60px; border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #c19a6b; border-radius: 50%;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loader"></div>
    </div>

    <!-- Firebase Config (load first) -->
    <script type="module" src="firebase-config.js"></script>
    
    <!-- App Container -->
    <div id="app">
        <!-- Navbar will be injected here by components/navbar.js -->
        <div id="navbar-container"></div>
        
        <!-- Main content area - pages are injected here -->
        <main id="content"></main>
        
        <!-- Footer will be injected here by components/footer.js -->
        <div id="footer-container"></div>
    </div>
    
    <!-- Back to Top Button Component -->
    <div id="back-to-top-container"></div>

    <!-- Core Modules -->
    <script type="module" src="components/navbar.js"></script>
    <script type="module" src="components/footer.js"></script>
    <script type="module" src="components/back-to-top.js"></script>
    
    <!-- Page Modules -->
    <script type="module" src="pages/home.js"></script>
    <script type="module" src="pages/sectors.js"></script>
    <script type="module" src="pages/approach.js"></script>
    <script type="module" src="pages/testimonials.js"></script>
    <script type="module" src="pages/contact.js"></script>
    <script type="module" src="pages/ceo.js"></script>
    
    <!-- Main Application Controller -->
    <script type="module" src="app.js"></script>
</body>
</html>
