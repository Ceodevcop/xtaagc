<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TAAGC</title>
    
    <!-- Firebase 8.10.1 SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0a2540 0%, #1a3a4f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 450px;
            padding: 40px;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-icon {
            width: 80px;
            height: 80px;
            background: #0a2540;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            color: white;
            font-size: 36px;
            font-weight: 700;
        }
        .logo h1 {
            color: #0a2540;
            font-size: 28px;
        }
        .logo span {
            color: #c19a6b;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus {
            border-color: #c19a6b;
            outline: none;
            box-shadow: 0 0 0 3px rgba(193, 154, 107, 0.1);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #0a2540;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-login:hover {
            background: #1a3a4f;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(10, 37, 64, 0.2);
        }
        .links {
            text-align: center;
            margin-top: 25px;
        }
        .links a {
            color: #c19a6b;
            text-decoration: none;
            font-weight: 600;
            margin: 0 10px;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .alert-error {
            background: #fee2e2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }
        .alert-success {
            background: #dcfce7;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }
        .loading-spinner {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        .loading-spinner i {
            color: #0a2540;
            font-size: 24px;
        }
        .role-indicator {
            margin-top: 20px;
            padding: 15px;
            background: #f8fafc;
            border-radius: 12px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">TA</div>
            <h1><span>TAAGC</span> Login</h1>
        </div>

        <div id="alertMessage" class="alert"></div>
        
        <div class="loading-spinner" id="loadingSpinner">
            <i class="fas fa-spinner fa-spin"></i> Authenticating...
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">
                    <i class="fas fa-envelope" style="color: #c19a6b; margin-right: 5px;"></i>
                    Email Address
                </label>
                <input type="email" id="email" placeholder="Enter your email" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock" style="color: #c19a6b; margin-right: 5px;"></i>
                    Password
                </label>
                <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <div class="links">
            <a href="register.html"><i class="fas fa-user-plus"></i> Create Account</a>
            <a href="#" id="forgotPassword"><i class="fas fa-key"></i> Forgot Password?</a>
        </div>

        <div class="role-indicator" id="roleIndicator">
            <i class="fas fa-user-circle" style="color: #c19a6b; font-size: 24px; margin-bottom: 10px;"></i>
            <div id="roleText"></div>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAI1MrcP977UgRLQoePxl64JOSyj9v4WpI",
            authDomain: "xtaagc.firebaseapp.com",
            projectId: "xtaagc",
            storageBucket: "xtaagc.appspot.com",
            messagingSenderId: "256073982437",
            appId: "1:256073982437:web:8da63bb7acc86c0ca98f0c"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Enable offline persistence
        db.enablePersistence()
            .catch((err) => {
                console.log('Persistence error:', err);
            });

        // Login Form Handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const alertDiv = document.getElementById('alertMessage');
            const loginBtn = document.getElementById('loginBtn');
            const spinner = document.getElementById('loadingSpinner');

            // Hide any previous alerts
            alertDiv.style.display = 'none';
            
            // Basic validation
            if (!email || !password) {
                alertDiv.className = 'alert alert-error';
                alertDiv.style.display = 'block';
                alertDiv.textContent = 'Please enter both email and password.';
                return;
            }

            try {
                // Show loading state
                loginBtn.style.display = 'none';
                spinner.style.display = 'block';
                alertDiv.style.display = 'none';

                // Attempt login
                const userCred = await auth.signInWithEmailAndPassword(email, password);
                const user = userCred.user;

                // Update last login timestamp
                try {
                    await db.collection('users').doc(user.uid).update({
                        lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
                        lastLoginIP: await getUserIP()
                    });
                } catch (updateError) {
                    console.log('Last login update skipped:', updateError);
                }

                // Get user role from Firestore with retry logic
                let userData = null;
                let retries = 3;
                
                while (retries > 0 && !userData) {
                    try {
                        const userDoc = await db.collection('users').doc(user.uid).get();
                        if (userDoc.exists) {
                            userData = userDoc.data();
                        }
                    } catch (docError) {
                        console.log(`Retry ${4-retries}:`, docError);
                    }
                    retries--;
                    if (retries > 0) await new Promise(resolve => setTimeout(resolve, 500));
                }

                if (!userData) {
                    // If no Firestore document, create one from auth data
                    userData = {
                        uid: user.uid,
                        email: user.email,
                        fullName: user.displayName || email.split('@')[0],
                        role: detectRoleFromEmail(email), // Simple role detection
                        generatedId: await generateFallbackId(email),
                        status: 'active',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    
                    await db.collection('users').doc(user.uid).set(userData);
                }

                // Show success message with role
                alertDiv.className = 'alert alert-success';
                alertDiv.style.display = 'block';
                alertDiv.innerHTML = `
                    <i class="fas fa-check-circle"></i> 
                    Login successful! <br>
                    Welcome back, <strong>${userData.fullName || user.email}</strong><br>
                    Role: <strong>${userData.role || 'user'}</strong><br>
                    Redirecting...
                `;

                // Show role indicator
                const roleIndicator = document.getElementById('roleIndicator');
                const roleText = document.getElementById('roleText');
                roleIndicator.style.display = 'block';
                
                // Style based on role
                if (userData.role === 'admin') {
                    roleText.innerHTML = '<span style="color: #e53e3e; font-weight: bold;">🔑 Admin Access</span>';
                } else if (userData.role === 'investor') {
                    roleText.innerHTML = '<span style="color: #0a2540; font-weight: bold;">💰 Investor Dashboard</span>';
                } else {
                    roleText.innerHTML = '<span style="color: #c19a6b; font-weight: bold;">👤 Client Portal</span>';
                }

                // Redirect based on role
                setTimeout(() => {
                    if (userData.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'profile.html';
                    }
                }, 2000);

            } catch (error) {
                console.error('Login error:', error);
                
                // Hide loading, show button
                loginBtn.style.display = 'block';
                spinner.style.display = 'none';
                
                // Show error message
                alertDiv.className = 'alert alert-error';
                alertDiv.style.display = 'block';
                
                // User-friendly error messages
                switch (error.code) {
                    case 'auth/user-not-found':
                        alertDiv.textContent = 'No account found with this email. Please register first.';
                        break;
                    case 'auth/wrong-password':
                        alertDiv.textContent = 'Incorrect password. Please try again.';
                        break;
                    case 'auth/invalid-email':
                        alertDiv.textContent = 'Invalid email format. Please check and try again.';
                        break;
                    case 'auth/user-disabled':
                        alertDiv.textContent = 'This account has been disabled. Please contact support.';
                        break;
                    case 'auth/too-many-requests':
                        alertDiv.textContent = 'Too many failed attempts. Please try again later.';
                        break;
                    case 'auth/network-request-failed':
                        alertDiv.textContent = 'Network error. Please check your internet connection.';
                        break;
                    default:
                        alertDiv.textContent = 'Login failed: ' + error.message;
                }
            }
        });

        // Helper function to detect role from email (fallback)
        function detectRoleFromEmail(email) {
            email = email.toLowerCase();
            if (email.includes('admin') || email.includes('manager')) {
                return 'admin';
            } else if (email.includes('investor') || email.includes('inv')) {
                return 'investor';
            } else {
                return 'client';
            }
        }

        // Generate fallback ID
        async function generateFallbackId(email) {
            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const year = now.getFullYear();
            const role = detectRoleFromEmail(email);
            const prefix = role === 'investor' ? 'Ti' : role === 'admin' ? 'Ad' : 'Tc';
            const random = Math.floor(Math.random() * 900 + 100);
            
            return `${prefix}${random}/${month}/${year}`;
        }

        // Get user IP (optional)
        async function getUserIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (error) {
                return 'unknown';
            }
        }

        // Forgot password handler
        document.getElementById('forgotPassword').addEventListener('click', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const alertDiv = document.getElementById('alertMessage');
            
            if (!email) {
                alertDiv.className = 'alert alert-error';
                alertDiv.style.display = 'block';
                alertDiv.textContent = 'Please enter your email address first.';
                return;
            }
            
            try {
                await auth.sendPasswordResetEmail(email);
                alertDiv.className = 'alert alert-success';
                alertDiv.style.display = 'block';
                alertDiv.innerHTML = '<i class="fas fa-check-circle"></i> Password reset email sent! Check your inbox.';
            } catch (error) {
                alertDiv.className = 'alert alert-error';
                alertDiv.style.display = 'block';
                alertDiv.textContent = 'Error: ' + error.message;
            }
        });

        // Check if already logged in
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                try {
                    const userDoc = await db.collection('users').doc(user.uid).get();
                    if (userDoc.exists) {
                        const userData = userDoc.data();
                        // Auto-redirect if already logged in
                        if (userData.role === 'admin') {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'profile.html';
                        }
                    }
                } catch (error) {
                    console.error('Auto-login check failed:', error);
                }
            }
        });

        // Add keyboard support (Enter key already works with form submit)
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });

        // Clear alert when typing
        document.getElementById('email').addEventListener('input', () => {
            document.getElementById('alertMessage').style.display = 'none';
        });
        
        document.getElementById('password').addEventListener('input', () => {
            document.getElementById('alertMessage').style.display = 'none';
        });
    </script>
</body>
</html>
