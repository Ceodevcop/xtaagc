<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAAGC | Login</title>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<style>
body{font-family:Inter;background:#0a2540}
.box{max-width:380px;margin:80px auto;background:#fff;padding:25px;border-radius:12px}
input,button{width:100%;padding:10px;margin-top:10px}
button{background:#2563eb;color:#fff;border:none;border-radius:6px}
</style>
</head>

<body>
<div class="box">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="msg"></p>
</div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyAI1MrcP977UgRLQoePxl64JOSyj9v4WpI",
  authDomain: "xtaagc.firebaseapp.com",
  projectId: "xtaagc",
  storageBucket: "xtaagc.firebasestorage.app",
  messagingSenderId: "256073982437",
  appId: "1:256073982437:web:8da63bb7acc86c0ca98f0c"
});

const auth=firebase.auth();
const db=firebase.firestore();

async function login(){
 try{
  const cred=await auth.signInWithEmailAndPassword(email.value,password.value);
  const uid=cred.user.uid;

  const admin=await db.collection('admins').doc(uid).get();
  if(admin.exists){
    location.href="/admin/dashboard.html";
  }else{
    location.href="/dashboard.html";
  }
 }catch(e){
  msg.innerText=e.message;
 }
}
</script>
</body>
</html>
