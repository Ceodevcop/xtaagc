<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TAAGC</title>
    
    <!-- Firebase 8.10.1 SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0a2540 0%, #1a3a4f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 450px;
            padding: 40px;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-icon {
            width: 80px;
            height: 80px;
            background: #0a2540;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            color: white;
            font-size: 36px;
            font-weight: 700;
        }
        .logo h1 {
            color: #0a2540;
            font-size: 28px;
        }
        .logo span {
            color: #c19a6b;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus {
            border-color: #c19a6b;
            outline: none;
            box-shadow: 0 0 0 3px rgba(193, 154, 107, 0.1);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #0a2540;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-login:hover {
            background: #1a3a4f;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(10, 37, 64, 0.2);
        }
        .links {
            text-align: center;
            margin-top: 25px;
        }
        .links a {
            color: #c19a6b;
            text-decoration: none;
            font-weight: 600;
            margin: 0 10px;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .alert-error {
            background: #fee2e2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }
        .alert-success {
            background: #dcfce7;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }
        .role-badge {
            margin-top: 20px;
            padding: 15px;
            background: #f8fafc;
            border-radius: 12px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">TA</div>
            <h1><span>TAAGC</span> Login</h1>
        </div>

        <div id="alertMessage" class="alert"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <div class="links">
            <a href="register.html">Create Account</a>
            <a href="#" id="forgotPassword">Forgot Password?</a>
        </div>

        <div class="role-badge" id="roleBadge">
            <i class="fas fa-user-circle" style="color: #c19a6b; font-size: 24px;"></i>
            <div id="roleText"></div>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAI1MrcP977UgRLQoePxl64JOSyj9v4WpI",
            authDomain: "xtaagc.firebaseapp.com",
            projectId: "xtaagc",
            storageBucket: "xtaagc.appspot.com",
            messagingSenderId: "256073982437",
            appId: "1:256073982437:web:8da63bb7acc86c0ca98f0c"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Login Form Handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertDiv = document.getElementById('alertMessage');
            const loginBtn = document.getElementById('loginBtn');

            // Hide previous alerts
            alertDiv.style.display = 'none';

            try {
                // Show loading state
                loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
                loginBtn.disabled = true;

                // Attempt login
                const userCred = await auth.signInWithEmailAndPassword(email, password);
                const user = userCred.user;

                // Get user role from Firestore
                const userDoc = await db.collection('users').doc(user.uid).get();
                
                if (!userDoc.exists) {
                    throw new Error('User profile not found. Please register again.');
                }

                const userData = userDoc.data();

                // Check if user is admin - prevent access to user portal
                if (userData.role === 'admin') {
                    await auth.signOut();
                    alertDiv.className = 'alert alert-error';
                    alertDiv.style.display = 'block';
                    alertDiv.textContent = 'Admins must use the admin portal. Redirecting to admin login...';
                    
                    setTimeout(() => {
                        window.location.href = 'admin';
                    }, 2000);
                    return;
                }

                // Update last login
                await db.collection('users').doc(user.uid).update({
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                });

                // Show success message with role
                alertDiv.className = 'alert alert-success';
                alertDiv.style.display = 'block';
                alertDiv.innerHTML = `
                    <i class="fas fa-check-circle"></i> 
                    Login successful! Welcome, ${userData.fullName || user.email}<br>
                    Redirecting to your ${userData.role} dashboard...
                `;

                // Show role badge
                const roleBadge = document.getElementById('roleBadge');
                const roleText = document.getElementById('roleText');
                roleBadge.style.display = 'block';
                
                if (userData.role === 'investor') {
                    roleText.innerHTML = '<span style="color: #0a2540; font-weight: bold;">💰 Investor Account</span>';
                } else {
                    roleText.innerHTML = '<span style="color: #c19a6b; font-weight: bold;">👤 Client Account</span>';
                }

                // Redirect based on role (investor or client only)
                setTimeout(() => {
                    if (userData.role === 'investor') {
                        window.location.href = 'profile/investor';
                    } else if (userData.role === 'client') {
                        window.location.href = 'profile/client';
                    }
                }, 2000);

            } catch (error) {
                // Show error message
                alertDiv.className = 'alert alert-error';
                alertDiv.style.display = 'block';
                
                // User-friendly error messages
                switch (error.code) {
                    case 'auth/user-not-found':
                        alertDiv.textContent = 'No account found with this email. Please register.';
                        break;
                    case 'auth/wrong-password':
                        alertDiv.textContent = 'Incorrect password. Please try again.';
                        break;
                    case 'auth/invalid-email':
                        alertDiv.textContent = 'Invalid email format.';
                        break;
                    default:
                        alertDiv.textContent = error.message;
                }

                // Reset button
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                loginBtn.disabled = false;
            }
        });

        // Forgot password handler
        document.getElementById('forgotPassword').addEventListener('click', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const alertDiv = document.getElementById('alertMessage');
            
            if (!email) {
                alertDiv.className = 'alert alert-error';
                alertDiv.style.display = 'block';
                alertDiv.textContent = 'Please enter your email address.';
                return;
            }
            
            try {
                await auth.sendPasswordResetEmail(email);
                alertDiv.className = 'alert alert-success';
                alertDiv.style.display = 'block';
                alertDiv.textContent = 'Password reset email sent! Check your inbox.';
            } catch (error) {
                alertDiv.className = 'alert alert-error';
                alertDiv.style.display = 'block';
                alertDiv.textContent = error.message;
            }
        });

        // Check if already logged in
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                try {
                    const userDoc = await db.collection('users').doc(user.uid).get();
                    if (userDoc.exists) {
                        const userData = userDoc.data();
                        
                        // Don't auto-redirect admins
                        if (userData.role === 'admin') {
                            await auth.signOut();
                            return;
                        }
                        
                        // Auto-redirect investors and clients
                        if (userData.role === 'investor') {
                            window.location.href = 'profile/investor';
                        } else if (userData.role === 'client') {
                            window.location.href = 'profile/client';
                        }
                    }
                } catch (error) {
                    console.error('Auto-login check failed:', error);
                }
            }
        });
    </script>
</body>
</html>
