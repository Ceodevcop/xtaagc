<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAAGC | Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="assets/css/style.css">

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>

<body>
<div class="container">
    <div class="card" style="max-width:480px;margin:100px auto;">
        <div class="section-header">
            <span class="section-subtitle">TAAGC GLOBAL</span>
            <h2 class="section-title">Login</h2>
        </div>

        <div id="msg"></div>

        <form onsubmit="login(event)">
            <div class="form-group">
                <label>Email</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input class="form-control" id="email" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input class="form-control" id="password" type="password" required>
                </div>
            </div>

            <button class="btn btn-primary btn-block btn-lg">
                Login
            </button>
        </form>

        <p class="text-center" style="margin-top:20px;">
            Don’t have an account?
            <a href="register.html" class="text-gold">Register</a>
        </p>
    </div>
</div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyAI1MrcP977UgRLQoePxl64JOSyj9v4WpI",
  authDomain: "xtaagc.firebaseapp.com",
  projectId: "xtaagc",
  storageBucket: "xtaagc.firebasestorage.app",
  messagingSenderId: "256073982437",
  appId: "1:256073982437:web:8da63bb7acc86c0ca98f0c"
});

async function login(e){
 e.preventDefault();
 try{
  const cred = await firebase.auth()
    .signInWithEmailAndPassword(email.value,password.value);

  const admin = await firebase.firestore()
    .collection("admins").doc(cred.user.uid).get();

  location.href = admin.exists ? "/admin/dashboard.html" : "/dashboard.html";
 }catch(err){
  msg.innerHTML=`<div class="alert alert-error">${err.message}</div>`;
 }
}
</script>
</body>
</html>
