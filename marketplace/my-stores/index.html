
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAAGC · my stores</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        body {
            background: #f5faff;
        }
        .navbar {
            background: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 20px #0000000c;
        }
        .logo h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(145deg, #0a1f30, #1e4f7a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }
        .nav-links a {
            color: #1f4970;
            text-decoration: none;
            margin: 0 15px;
        }
        .nav-links a.active {
            color: #e09f2c;
        }
        .user-menu {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f0f6fd;
            padding: 8px 20px;
            border-radius: 60px;
        }
        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #e09f2c;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0a1f30;
            font-weight: 600;
        }
        .logout-btn {
            background: transparent;
            border: 2px solid #dc3545;
            color: #dc3545;
            padding: 8px 20px;
            border-radius: 60px;
            cursor: pointer;
        }
        .page-header {
            background: linear-gradient(145deg, #0a2b40, #1a4b6e);
            color: white;
            padding: 40px;
        }
        .page-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .page-header p {
            color: #e09f2c;
        }
        .create-store-btn {
            background: #e09f2c;
            color: #0a1f30;
            border: none;
            padding: 12px 30px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 20px;
            cursor: pointer;
            border: 2px solid white;
        }
        .stores-container {
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .stores-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }
        .store-card {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            border: 2px solid #e0ebf5;
            transition: 0.2s;
        }
        .store-card:hover {
            border-color: #e09f2c;
            transform: translateY(-5px);
        }
        .store-header {
            background: linear-gradient(145deg, #f9f1e0, #f5e5cc);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid #e09f2c;
        }
        .store-logo {
            width: 60px;
            height: 60px;
            border-radius: 20px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #e09f2c;
            border: 2px solid #e09f2c;
        }
        .store-info h3 {
            font-size: 1.3rem;
            margin-bottom: 5px;
        }
        .store-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .status-active {
            background: #d4edda;
            color: #155724;
        }
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
        .store-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 20px;
            background: #f8fcff;
        }
        .stat-item {
            text-align: center;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #e09f2c;
        }
        .stat-label {
            font-size: 0.8rem;
            color: #6b8ca8;
        }
        .store-actions {
            padding: 20px;
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 60px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
            text-align: center;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .btn-primary {
            background: #e09f2c;
            color: #0a1f30;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #e09f2c;
            color: #e09f2c;
        }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        .products-section {
            margin-top: 40px;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .product-card {
            background: white;
            border-radius: 20px;
            padding: 15px;
            border: 2px solid #e0ebf5;
            cursor: pointer;
        }
        .product-card:hover {
            border-color: #e09f2c;
        }
        .product-image {
            width: 100%;
            height: 150px;
            background: #f0f6fd;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6b8ca8;
            margin-bottom: 10px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 40px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content h2 {
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px 15px;
            border-radius: 60px;
            border: 2px solid #d0e2f2;
            font-size: 1rem;
        }
        .form-group textarea {
            border-radius: 20px;
            resize: vertical;
        }
        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        .empty-state {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 30px;
        }
        .empty-state i {
            font-size: 4rem;
            color: #e09f2c;
            margin-bottom: 20px;
        }
        .fb-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #0a1f30;
            color: #e09f2c;
            padding: 8px 16px;
            border-radius: 60px;
            font-size: 0.8rem;
            z-index: 1000;
        }
        .error-message {
            color: #dc3545;
            padding: 10px;
            background: #f8d7da;
            border-radius: 60px;
            margin: 10px 0;
            display: none;
        }
        .success-message {
            color: #155724;
            background: #d4edda;
            padding: 10px;
            border-radius: 60px;
            margin: 10px 0;
            display: none;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo" onclick="window.location.href='/'">
            <h1>TAAGC Marketplace</h1>
        </div>
        <div class="nav-links">
            <a href="/marketplace">browse</a>
            <a href="/my-stores" class="active">my stores</a>
            <a href="/orders">orders</a>
        </div>
        <div class="user-menu" id="userMenu">
            <!-- populated by JS -->
        </div>
    </div>

    <div class="page-header">
        <h1><i class="fas fa-store"></i> my stores</h1>
        <p>manage your stores, products, and sales</p>
        <button class="create-store-btn" id="createStoreBtn">
            <i class="fas fa-plus"></i> create new store
        </button>
    </div>

    <div class="stores-container">
        <div id="storesGrid" class="stores-grid">
            <!-- stores loaded here -->
        </div>
    </div>

    <!-- CREATE STORE MODAL -->
    <div class="modal" id="createStoreModal">
        <div class="modal-content">
            <h2><i class="fas fa-store"></i> create new store</h2>
            <div id="createStoreError" class="error-message"></div>
            <div class="form-group">
                <label>store name *</label>
                <input type="text" id="storeName" placeholder="e.g., John's Electronics" maxlength="50">
            </div>
            <div class="form-group">
                <label>description</label>
                <textarea id="storeDesc" rows="3" placeholder="describe your store..."></textarea>
            </div>
            <div class="form-group">
                <label>category</label>
                <select id="storeCategory">
                    <option value="electronics">📱 electronics</option>
                    <option value="fashion">👕 fashion</option>
                    <option value="home">🏠 home & garden</option>
                    <option value="sports">⚽ sports</option>
                    <option value="collectibles">💎 collectibles</option>
                    <option value="art">🎨 art</option>
                    <option value="vehicles">🚗 vehicles</option>
                    <option value="other">📦 other</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-outline" onclick="closeModal('createStoreModal')">cancel</button>
                <button class="btn btn-primary" id="saveStoreBtn">create store</button>
            </div>
        </div>
    </div>

    <!-- ADD PRODUCT MODAL -->
    <div class="modal" id="addProductModal">
        <div class="modal-content">
            <h2><i class="fas fa-box"></i> add product</h2>
            <div id="addProductError" class="error-message"></div>
            <input type="hidden" id="currentStoreId">
            <div class="form-group">
                <label>product title *</label>
                <input type="text" id="productTitle" placeholder="e.g., iPhone 13" maxlength="100">
            </div>
            <div class="form-group">
                <label>description</label>
                <textarea id="productDesc" rows="3" placeholder="product details..."></textarea>
            </div>
            <div class="form-group">
                <label>price ($) *</label>
                <input type="number" id="productPrice" step="0.01" min="0" placeholder="0.00">
            </div>
            <div class="form-group">
                <label>quantity</label>
                <input type="number" id="productQuantity" min="0" value="1">
            </div>
            <div class="form-group">
                <label>category</label>
                <select id="productCategory">
                    <option value="electronics">📱 electronics</option>
                    <option value="fashion">👕 fashion</option>
                    <option value="home">🏠 home</option>
                    <option value="sports">⚽ sports</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-outline" onclick="closeModal('addProductModal')">cancel</button>
                <button class="btn btn-primary" id="saveProductBtn">add product</button>
            </div>
        </div>
    </div>

    <!-- EDIT STORE MODAL -->
    <div class="modal" id="editStoreModal">
        <div class="modal-content">
            <h2><i class="fas fa-edit"></i> edit store</h2>
            <div id="editStoreError" class="error-message"></div>
            <input type="hidden" id="editStoreId">
            <div class="form-group">
                <label>store name</label>
                <input type="text" id="editStoreName" maxlength="50">
            </div>
            <div class="form-group">
                <label>description</label>
                <textarea id="editStoreDesc" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>category</label>
                <select id="editStoreCategory">
                    <option value="electronics">📱 electronics</option>
                    <option value="fashion">👕 fashion</option>
                    <option value="home">🏠 home</option>
                    <option value="sports">⚽ sports</option>
                    <option value="collectibles">💎 collectibles</option>
                    <option value="art">🎨 art</option>
                    <option value="vehicles">🚗 vehicles</option>
                    <option value="other">📦 other</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-outline" onclick="closeModal('editStoreModal')">cancel</button>
                <button class="btn btn-primary" id="updateStoreBtn">update store</button>
            </div>
        </div>
    </div>

    <div class="fb-status" id="firebaseStatus">⏳ loading...</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAI1MrcP977UgRLQoePxl64JOSyj9v4WpI",
            authDomain: "xtaagc.firebaseapp.com",
            projectId: "xtaagc",
            storageBucket: "xtaagc.firebasestorage.app",
            messagingSenderId: "256073982437",
            appId: "1:256073982437:web:8da63bb7acc86c0ca98f0c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        
        document.getElementById('firebaseStatus').innerHTML = '✅ my stores ready';

        let currentUser = null;
        let userStores = [];

        // Auth state
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                updateUserMenu(user);
                loadUserStores();
            } else {
                window.location.href = '/marketplace?login=required';
            }
        });

        function updateUserMenu(user) {
            const menu = document.getElementById('userMenu');
            menu.innerHTML = `
                <div class="user-info">
                    <div class="user-avatar">${user.email?.charAt(0).toUpperCase() || 'U'}</div>
                    <span>${user.email?.split('@')[0] || 'user'}</span>
                </div>
                <button class="logout-btn" onclick="logout()">logout</button>
            `;
        }

        window.logout = () => auth.signOut();

        // Load user stores
        async function loadUserStores() {
            if (!currentUser) return;
            
            try {
                const snapshot = await db.collection('stores')
                    .where('ownerId', '==', currentUser.uid)
                    .orderBy('createdAt', 'desc')
                    .get();

                userStores = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));

                renderStores();

            } catch (error) {
                console.error('Error loading stores:', error);
                document.getElementById('storesGrid').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle"></i>
                        <h3>error loading stores</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        // Render stores
        async function renderStores() {
            const grid = document.getElementById('storesGrid');
            
            if (userStores.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-store"></i>
                        <h3>no stores yet</h3>
                        <p>create your first store to start selling</p>
                        <button class="create-store-btn" onclick="document.getElementById('createStoreBtn').click()">
                            create store
                        </button>
                    </div>
                `;
                return;
            }

            let html = '';
            for (const store of userStores) {
                // Get product count
                const productsSnap = await db.collection('stores')
                    .doc(store.id)
                    .collection('products')
                    .where('status', '==', 'active')
                    .count()
                    .get();
                
                const productCount = productsSnap.data().count || 0;
                
                // Get order count
                const ordersSnap = await db.collection('orders')
                    .where('storeId', '==', store.id)
                    .count()
                    .get();
                
                const orderCount = ordersSnap.data().count || 0;

                html += `
                    <div class="store-card">
                        <div class="store-header">
                            <div class="store-logo">
                                <i class="fas fa-${store.category === 'electronics' ? 'laptop' : 
                                               store.category === 'fashion' ? 'tshirt' : 
                                               store.category === 'home' ? 'home' : 'store'}"></i>
                            </div>
                            <div class="store-info">
                                <h3>${store.name}</h3>
                                <span class="store-status status-${store.status || 'active'}">
                                    ${store.status || 'active'}
                                </span>
                            </div>
                        </div>
                        
                        <div class="store-stats">
                            <div class="stat-item">
                                <div class="stat-value">${productCount}</div>
                                <div class="stat-label">products</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value">${orderCount}</div>
                                <div class="stat-label">orders</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value">$${store.totalSales || 0}</div>
                                <div class="stat-label">sales</div>
                            </div>
                        </div>

                        <div class="store-actions">
                            <button class="btn btn-primary" onclick="showAddProduct('${store.id}')">
                                <i class="fas fa-plus"></i> add
                            </button>
                            <button class="btn btn-outline" onclick="editStore('${store.id}')">
                                <i class="fas fa-edit"></i> edit
                            </button>
                            <button class="btn btn-outline" onclick="viewStore('${store.id}')">
                                <i class="fas fa-eye"></i> view
                            </button>
                        </div>

                        <!-- Products preview -->
                        <div style="padding: 0 20px 20px;" id="preview-${store.id}">
                            <small>loading products...</small>
                        </div>
                    </div>
                `;
            }
            
            grid.innerHTML = html;
            
            // Load product previews
            userStores.forEach(store => loadProductPreview(store.id));
        }

        // Load product preview for a store
        async function loadProductPreview(storeId) {
            try {
                const snapshot = await db.collection('stores')
                    .doc(storeId)
                    .collection('products')
                    .where('status', '==', 'active')
                    .limit(3)
                    .get();

                const previewDiv = document.getElementById(`preview-${storeId}`);
                
                if (snapshot.empty) {
                    previewDiv.innerHTML = '<small>no products yet</small>';
                    return;
                }

                let html = '<div class="products-grid" style="grid-template-columns:repeat(3,1fr); gap:10px;">';
                snapshot.forEach(doc => {
                    const p = doc.data();
                    html += `
                        <div class="product-card" onclick="viewProduct('${storeId}', '${doc.id}')">
                            <div class="product-image">
                                <i class="fas fa-box"></i>
                            </div>
                            <div style="font-size:0.9rem; font-weight:600;">${p.title}</div>
                            <div style="color:#e09f2c;">$${p.price}</div>
                        </div>
                    `;
                });
                html += '</div>';
                previewDiv.innerHTML = html;

            } catch (error) {
                console.error('Error loading preview:', error);
            }
        }

        // Show create store modal
        document.getElementById('createStoreBtn').addEventListener('click', () => {
            document.getElementById('createStoreModal').classList.add('active');
        });

        // Save new store
        document.getElementById('saveStoreBtn').addEventListener('click', async () => {
            const name = document.getElementById('storeName').value.trim();
            
            if (!name) {
                showError('createStoreError', 'store name is required');
                return;
            }

            const btn = document.getElementById('saveStoreBtn');
            btn.disabled = true;
            btn.innerHTML = 'creating...';

            try {
                const storeData = {
                    name: name,
                    description: document.getElementById('storeDesc').value.trim(),
                    category: document.getElementById('storeCategory').value,
                    ownerId: currentUser.uid,
                    ownerEmail: currentUser.email,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    status: 'active',
                    totalSales: 0
                };

                await db.collection('stores').add(storeData);
                
                closeModal('createStoreModal');
                document.getElementById('storeName').value = '';
                document.getElementById('storeDesc').value = '';
                loadUserStores();

            } catch (error) {
                showError('createStoreError', error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'create store';
            }
        });

        // Show add product modal
        window.showAddProduct = (storeId) => {
            document.getElementById('currentStoreId').value = storeId;
            document.getElementById('addProductModal').classList.add('active');
        };

        // Save product
        document.getElementById('saveProductBtn').addEventListener('click', async () => {
            const storeId = document.getElementById('currentStoreId').value;
            const title = document.getElementById('productTitle').value.trim();
            const price = document.getElementById('productPrice').value;

            if (!title || !price) {
                showError('addProductError', 'title and price are required');
                return;
            }

            const btn = document.getElementById('saveProductBtn');
            btn.disabled = true;
            btn.innerHTML = 'adding...';

            try {
                const productData = {
                    title: title,
                    description: document.getElementById('productDesc').value.trim(),
                    price: parseFloat(price),
                    quantity: parseInt(document.getElementById('productQuantity').value) || 1,
                    category: document.getElementById('productCategory').value,
                    status: 'active',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                await db.collection('stores')
                    .doc(storeId)
                    .collection('products')
                    .add(productData);

                closeModal('addProductModal');
                document.getElementById('productTitle').value = '';
                document.getElementById('productDesc').value = '';
                document.getElementById('productPrice').value = '';
                loadUserStores();

            } catch (error) {
                showError('addProductError', error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'add product';
            }
        });

        // Edit store
        window.editStore = (storeId) => {
            const store = userStores.find(s => s.id === storeId);
            if (store) {
                document.getElementById('editStoreId').value = storeId;
                document.getElementById('editStoreName').value = store.name || '';
                document.getElementById('editStoreDesc').value = store.description || '';
                document.getElementById('editStoreCategory').value = store.category || 'other';
                document.getElementById('editStoreModal').classList.add('active');
            }
        };

        // Update store
        document.getElementById('updateStoreBtn').addEventListener('click', async () => {
            const storeId = document.getElementById('editStoreId').value;
            const name = document.getElementById('editStoreName').value.trim();

            if (!name) {
                showError('editStoreError', 'store name is required');
                return;
            }

            const btn = document.getElementById('updateStoreBtn');
            btn.disabled = true;
            btn.innerHTML = 'updating...';

            try {
                await db.collection('stores').doc(storeId).update({
                    name: name,
                    description: document.getElementById('editStoreDesc').value.trim(),
                    category: document.getElementById('editStoreCategory').value,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                closeModal('editStoreModal');
                loadUserStores();

            } catch (error) {
                showError('editStoreError', error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'update store';
            }
        });

        // View store
        window.viewStore = (storeId) => {
            window.location.href = `/store/${storeId}`;
        };

        // View product
        window.viewProduct = (storeId, productId) => {
            window.location.href = `/store/${storeId}/product/${productId}`;
        };

        // Modal helpers
        window.closeModal = (modalId) => {
            document.getElementById(modalId).classList.remove('active');
            document.getElementById(modalId + 'Error').style.display = 'none';
        };

        function showError(elementId, message) {
            const el = document.getElementById(elementId);
            el.innerHTML = message;
            el.style.display = 'block';
        }

        // Close modals on outside click
        window.onclick = (event) => {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('active');
            }
        };
    </script>
</body>
</html>
