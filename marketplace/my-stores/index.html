<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAAGC · my stores</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        body {
            background: #f5faff;
        }
        .navbar {
            background: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 20px #0000000c;
        }
        .logo h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(145deg, #0a1f30, #1e4f7a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }
        .nav-links a {
            color: #1f4970;
            text-decoration: none;
            margin: 0 15px;
        }
        .nav-links a.active {
            color: #e09f2c;
        }
        .user-menu {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f0f6fd;
            padding: 8px 20px;
            border-radius: 60px;
        }
        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #e09f2c;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0a1f30;
            font-weight: 600;
        }
        .logout-btn {
            background: transparent;
            border: 2px solid #dc3545;
            color: #dc3545;
            padding: 8px 20px;
            border-radius: 60px;
            cursor: pointer;
        }
        .page-header {
            background: linear-gradient(145deg, #0a2b40, #1a4b6e);
            color: white;
            padding: 40px;
        }
        .page-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .page-header p {
            color: #e09f2c;
        }
        .create-store-btn {
            background: #e09f2c;
            color: #0a1f30;
            border: none;
            padding: 12px 30px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 20px;
            cursor: pointer;
            border: 2px solid white;
        }
        .stores-container {
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .stores-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }
        .store-card {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            border: 2px solid #e0ebf5;
            transition: 0.2s;
        }
        .store-card:hover {
            border-color: #e09f2c;
            transform: translateY(-5px);
        }
        .store-header {
            background: linear-gradient(145deg, #f9f1e0, #f5e5cc);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid #e09f2c;
        }
        .store-logo {
            width: 60px;
            height: 60px;
            border-radius: 20px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #e09f2c;
            border: 2px solid #e09f2c;
        }
        .store-info h3 {
            font-size: 1.3rem;
            margin-bottom: 5px;
        }
        .store-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .status-active {
            background: #d4edda;
            color: #155724;
        }
        .store-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 20px;
            background: #f8fcff;
        }
        .stat-item {
            text-align: center;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #e09f2c;
        }
        .stat-label {
            font-size: 0.8rem;
            color: #6b8ca8;
        }
        .store-actions {
            padding: 20px;
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 60px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
            text-align: center;
            font-size: 0.9rem;
        }
        .btn-primary {
            background: #e09f2c;
            color: #0a1f30;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #e09f2c;
            color: #e09f2c;
        }
        .error-container {
            background: #f8d7da;
            border: 2px solid #dc3545;
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            margin: 40px;
        }
        .error-container i {
            font-size: 4rem;
            color: #dc3545;
            margin-bottom: 20px;
        }
        .error-container h2 {
            color: #721c24;
            margin-bottom: 15px;
        }
        .error-container p {
            color: #721c24;
            margin-bottom: 20px;
        }
        .index-link {
            background: #e09f2c;
            color: #0a1f30;
            padding: 15px 30px;
            border-radius: 60px;
            text-decoration: none;
            display: inline-block;
            font-weight: 600;
            margin-top: 20px;
        }
        .loading-spinner {
            text-align: center;
            padding: 60px;
        }
        .loading-spinner i {
            font-size: 3rem;
            color: #e09f2c;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 40px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px 15px;
            border-radius: 60px;
            border: 2px solid #d0e2f2;
            font-size: 1rem;
        }
        .form-group textarea {
            border-radius: 20px;
        }
        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        .empty-state {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 30px;
        }
        .empty-state i {
            font-size: 4rem;
            color: #e09f2c;
            margin-bottom: 20px;
        }
        .fb-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #0a1f30;
            color: #e09f2c;
            padding: 8px 16px;
            border-radius: 60px;
            font-size: 0.8rem;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo" onclick="window.location.href='/'">
            <h1>TAAGC Marketplace</h1>
        </div>
        <div class="nav-links">
            <a href="/marketplace">browse</a>
            <a href="/my-stores" class="active">my stores</a>
            <a href="/orders">orders</a>
        </div>
        <div class="user-menu" id="userMenu">
            <!-- populated by JS -->
        </div>
    </div>

    <div class="page-header">
        <h1><i class="fas fa-store"></i> my stores</h1>
        <p>manage your stores, products, and sales</p>
        <button class="create-store-btn" id="createStoreBtn">
            <i class="fas fa-plus"></i> create new store
        </button>
    </div>

    <div id="storesContainer" class="stores-container">
        <!-- stores loaded here -->
    </div>

    <!-- CREATE STORE MODAL -->
    <div class="modal" id="createStoreModal">
        <div class="modal-content">
            <h2><i class="fas fa-store"></i> create new store</h2>
            <div id="createStoreError" style="color:#dc3545; margin-bottom:15px; display:none;"></div>
            <div class="form-group">
                <label>store name *</label>
                <input type="text" id="storeName" placeholder="e.g., John's Electronics" maxlength="50">
            </div>
            <div class="form-group">
                <label>description</label>
                <textarea id="storeDesc" rows="3" placeholder="describe your store..."></textarea>
            </div>
            <div class="form-group">
                <label>category</label>
                <select id="storeCategory">
                    <option value="electronics">📱 electronics</option>
                    <option value="fashion">👕 fashion</option>
                    <option value="home">🏠 home & garden</option>
                    <option value="sports">⚽ sports</option>
                    <option value="collectibles">💎 collectibles</option>
                    <option value="art">🎨 art</option>
                    <option value="vehicles">🚗 vehicles</option>
                    <option value="other">📦 other</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-outline" onclick="closeModal('createStoreModal')">cancel</button>
                <button class="btn btn-primary" id="saveStoreBtn">create store</button>
            </div>
        </div>
    </div>

    <div class="fb-status" id="firebaseStatus">⏳ loading...</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAI1MrcP977UgRLQoePxl64JOSyj9v4WpI",
            authDomain: "xtaagc.firebaseapp.com",
            projectId: "xtaagc",
            storageBucket: "xtaagc.firebasestorage.app",
            messagingSenderId: "256073982437",
            appId: "1:256073982437:web:8da63bb7acc86c0ca98f0c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        
        document.getElementById('firebaseStatus').innerHTML = '✅ my stores ready';

        let currentUser = null;

        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                updateUserMenu(user);
                loadUserStores();
            } else {
                window.location.href = '/marketplace?login=required';
            }
        });

        function updateUserMenu(user) {
            const menu = document.getElementById('userMenu');
            menu.innerHTML = `
                <div class="user-info">
                    <div class="user-avatar">${user.email?.charAt(0).toUpperCase() || 'U'}</div>
                    <span>${user.email?.split('@')[0] || 'user'}</span>
                </div>
                <button class="logout-btn" onclick="logout()">logout</button>
            `;
        }

        window.logout = () => auth.signOut();

        // Load user stores with error handling
        async function loadUserStores() {
            const container = document.getElementById('storesContainer');
            
            if (!currentUser) return;

            // Show loading
            container.innerHTML = `
                <div class="loading-spinner">
                    <i class="fas fa-spinner"></i>
                    <p style="margin-top:20px;">loading your stores...</p>
                </div>
            `;

            try {
                // Try without orderBy first (doesn't need index)
                const snapshot = await db.collection('stores')
                    .where('ownerId', '==', currentUser.uid)
                    .get();

                const stores = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));

                // Sort manually (since we can't use orderBy without index)
                stores.sort((a, b) => {
                    const dateA = a.createdAt?.toDate?.() || new Date(0);
                    const dateB = b.createdAt?.toDate?.() || new Date(0);
                    return dateB - dateA;
                });

                renderStores(stores);

            } catch (error) {
                console.error('Error loading stores:', error);
                
                // Check if it's an index error
                if (error.message?.includes('index') || error.code === 'failed-precondition') {
                    // Extract the index creation link from error
                    const match = error.message?.match(/https:\/\/console\.firebase\.google\.com[^\s]*/);
                    const indexLink = match ? match[0] : 'https://console.firebase.google.com/project/xtaagc/firestore/indexes';
                    
                    container.innerHTML = `
                        <div class="error-container">
                            <i class="fas fa-database"></i>
                            <h2>Firestore Index Required</h2>
                            <p>To sort stores by date, we need to create an index.</p>
                            <p style="font-size:0.9rem; background:#f8d7da; padding:10px; border-radius:60px;">
                                Click the button below, then click "Create Index"
                            </p>
                            <a href="${indexLink}" target="_blank" class="index-link">
                                <i class="fas fa-plus-circle"></i> create index
                            </a>
                            <p style="margin-top:20px; font-size:0.8rem;">
                                After creating the index, refresh this page in 2-3 minutes.
                            </p>
                        </div>
                    `;
                } else {
                    container.innerHTML = `
                        <div class="error-container">
                            <i class="fas fa-exclamation-triangle"></i>
                            <h2>Error Loading Stores</h2>
                            <p>${error.message}</p>
                            <button class="index-link" onclick="location.reload()">
                                try again
                            </button>
                        </div>
                    `;
                }
            }
        }

        function renderStores(stores) {
            const container = document.getElementById('storesContainer');
            
            if (stores.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-store"></i>
                        <h3>no stores yet</h3>
                        <p>create your first store to start selling</p>
                        <button class="create-store-btn" onclick="document.getElementById('createStoreBtn').click()">
                            create store
                        </button>
                    </div>
                `;
                return;
            }

            let html = '<div class="stores-grid">';
            
            stores.forEach(store => {
                const createdDate = store.createdAt?.toDate?.() || new Date();
                const dateStr = createdDate.toLocaleDateString();
                
                html += `
                    <div class="store-card">
                        <div class="store-header">
                            <div class="store-logo">
                                <i class="fas fa-${store.category === 'electronics' ? 'laptop' : 
                                               store.category === 'fashion' ? 'tshirt' : 
                                               store.category === 'home' ? 'home' : 'store'}"></i>
                            </div>
                            <div class="store-info">
                                <h3>${store.name}</h3>
                                <span class="store-status status-${store.status || 'active'}">
                                    ${store.status || 'active'}
                                </span>
                                <div style="font-size:0.8rem; color:#6b8ca8; margin-top:5px;">
                                    created: ${dateStr}
                                </div>
                            </div>
                        </div>
                        
                        <div class="store-stats">
                            <div class="stat-item">
                                <div class="stat-value">0</div>
                                <div class="stat-label">products</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value">0</div>
                                <div class="stat-label">orders</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value">$0</div>
                                <div class="stat-label">sales</div>
                            </div>
                        </div>

                        <div class="store-actions">
                            <button class="btn btn-primary" onclick="addProduct('${store.id}')">
                                <i class="fas fa-plus"></i> add
                            </button>
                            <button class="btn btn-outline" onclick="editStore('${store.id}')">
                                <i class="fas fa-edit"></i> edit
                            </button>
                            <button class="btn btn-outline" onclick="viewStore('${store.id}')">
                                <i class="fas fa-eye"></i> view
                            </button>
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            container.innerHTML = html;
        }

        // Create store
        document.getElementById('createStoreBtn').addEventListener('click', () => {
            document.getElementById('createStoreModal').classList.add('active');
        });

        document.getElementById('saveStoreBtn').addEventListener('click', async () => {
            const name = document.getElementById('storeName').value.trim();
            
            if (!name) {
                document.getElementById('createStoreError').style.display = 'block';
                document.getElementById('createStoreError').innerHTML = 'store name is required';
                return;
            }

            const btn = document.getElementById('saveStoreBtn');
            btn.disabled = true;
            btn.innerHTML = 'creating...';

            try {
                const storeData = {
                    name: name,
                    description: document.getElementById('storeDesc').value.trim(),
                    category: document.getElementById('storeCategory').value,
                    ownerId: currentUser.uid,
                    ownerEmail: currentUser.email,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    status: 'active'
                };

                await db.collection('stores').add(storeData);
                
                closeModal('createStoreModal');
                document.getElementById('storeName').value = '';
                document.getElementById('storeDesc').value = '';
                loadUserStores();

            } catch (error) {
                document.getElementById('createStoreError').style.display = 'block';
                document.getElementById('createStoreError').innerHTML = error.message;
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'create store';
            }
        });

        // Placeholder functions
        window.addProduct = (storeId) => {
            alert('Add product feature coming soon! Store ID: ' + storeId);
        };

        window.editStore = (storeId) => {
            alert('Edit store feature coming soon! Store ID: ' + storeId);
        };

        window.viewStore = (storeId) => {
            window.location.href = `/store/${storeId}`;
        };

        window.closeModal = (modalId) => {
            document.getElementById(modalId).classList.remove('active');
            document.getElementById('createStoreError').style.display = 'none';
        };

        // Close modal on outside click
        window.onclick = (event) => {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('active');
            }
        };
    </script>
</body>
</html>
