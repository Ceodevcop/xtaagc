<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | TAAGC Global</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:#f8fafc;color:#1e293b;}
        .container{max-width:1400px;margin:0 auto;padding:0 20px;}
        
        .navbar{background:white;padding:16px 0;box-shadow:0 4px 20px rgba(0,0,0,0.08);}
        .navbar-content{display:flex;align-items:center;justify-content:space-between;}
        .navbar-brand{display:flex;align-items:center;gap:12px;text-decoration:none;}
        .navbar-logo{width:48px;height:48px;background:linear-gradient(135deg,#0a2540,#3a5a78);border-radius:12px;display:flex;align-items:center;justify-content:center;color:white;font-size:24px;font-weight:700;}
        .navbar-brand-text{font-size:24px;font-weight:700;color:#0a2540;font-family:'Playfair Display',serif;}
        .navbar-brand-text span{color:#c19a6b;}
        
        .back-link{display:flex;align-items:center;gap:8px;color:#c19a6b;text-decoration:none;font-weight:600;margin:30px 0;}
        
        .orders-table{background:white;border-radius:20px;padding:30px;box-shadow:0 10px 30px rgba(0,0,0,0.05);margin-bottom:30px;}
        table{width:100%;border-collapse:collapse;}
        th{text-align:left;padding:16px;background:#f8fafc;color:#0a2540;font-weight:600;}
        td{padding:16px;border-bottom:1px solid #e2e8f0;}
        .status{padding:6px 14px;border-radius:40px;font-size:13px;font-weight:600;}
        .status-delivered{background:#d4edda;color:#155724;}
        .status-shipped{background:#cce5ff;color:#004085;}
        .status-processing{background:#fff3cd;color:#856404;}
        
        .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:#c19a6b;color:white;border-radius:8px;text-decoration:none;font-weight:600;border:none;cursor:pointer;}
        .btn-primary{background:#0a2540;}
        
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:9999;}
        .modal.active{display:flex;}
        .modal-content{background:white;border-radius:20px;padding:40px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto;}
        
        .form-group{margin-bottom:20px;}
        .form-group label{display:block;margin-bottom:8px;font-weight:600;color:#0a2540;}
        .form-group input,.form-group select{width:100%;padding:12px;border:2px solid #e2e8f0;border-radius:8px;}
        
        @media (max-width:768px){table{display:block;overflow-x:auto;}}
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-content">
                <a href="index.html" class="navbar-brand">
                    <div class="navbar-logo">A</div>
                    <div class="navbar-brand-text"><span>TAAGC</span> GLOBAL</div>
                </a>
                <span id="userEmail" style="color:#64748b;">Loading...</span>
            </div>
        </div>
    </nav>

    <div class="container">
        <a href="shopper-dashboard.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
        
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h1 style="font-size:32px; color:#0a2540;">My Orders</h1>
            <button class="btn" onclick="showNewOrderModal()">
                <i class="fas fa-plus"></i> New Order
            </button>
        </div>
        
        <div class="orders-table" id="ordersContainer">
            <div style="text-align:center; padding:40px;">
                <i class="fas fa-spinner fa-spin" style="font-size:40px; color:#c19a6b;"></i>
                <p style="margin-top:20px; color:#64748b;">Loading orders...</p>
            </div>
        </div>
    </div>

    <!-- New Order Modal -->
    <div id="newOrderModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom:20px; color:#0a2540;">Create New Order</h2>
            
            <form id="orderForm">
                <div class="form-group">
                    <label>Product URL</label>
                    <input type="url" id="productUrl" placeholder="https://amazon.com/product..." required>
                </div>
                
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="productName" placeholder="e.g. MacBook Pro" required>
                </div>
                
                <div class="form-row" style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                    <div class="form-group">
                        <label>Price ($)</label>
                        <input type="number" id="productPrice" placeholder="0.00" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>Quantity</label>
                        <input type="number" id="productQuantity" value="1" min="1" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Shipping Address</label>
                    <textarea id="shippingAddress" rows="3" placeholder="Enter your full shipping address" required></textarea>
                </div>
                
                <div style="display:flex; gap:20px; margin-top:30px;">
                    <button type="submit" class="btn btn-primary" style="flex:1;" id="submitOrderBtn">
                        <i class="fas fa-check"></i> Submit Order
                    </button>
                    <button type="button" class="btn" style="background:#e2e8f0; color:#1e293b;" onclick="closeModal()">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { authService, shopperService, sharedService } from './firebase-config.js';
        
        // ===== CHECK AUTH =====
        async function init() {
            const user = authService.getCurrentUser();
            if(!user) {
                window.location.href = 'register.html#login';
                return;
            }
            
            document.getElementById('userEmail').innerHTML = user.email;
            await loadOrders(user.uid);
            
            // Check for new order param
            if(window.location.search.includes('new=true')) {
                showNewOrderModal();
            }
        }
        
        // ===== LOAD ORDERS =====
        async function loadOrders(userId) {
            const result = await shopperService.getUserOrders(userId);
            
            if(result.success) {
                if(result.orders.length === 0) {
                    document.getElementById('ordersContainer').innerHTML = `
                        <div style="text-align:center; padding:60px 40px;">
                            <i class="fas fa-shopping-cart" style="font-size:60px; color:#c19a6b; opacity:0.5;"></i>
                            <h3 style="margin:20px 0; color:#0a2540;">No Orders Yet</h3>
                            <p style="color:#64748b; margin-bottom:30px;">Start shopping from global retailers!</p>
                            <button class="btn" onclick="showNewOrderModal()">
                                <i class="fas fa-plus"></i> Create Your First Order
                            </button>
                        </div>
                    `;
                } else {
                    let ordersHtml = `
                        <table>
                            <thead>
                                <tr>
                                    <th>Order #</th>
                                    <th>Date</th>
                                    <th>Items</th>
                                    <th>Total</th>
                                    <th>Status</th>
                                    <th>Tracking</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                    `;
                    
                    result.orders.forEach(order => {
                        ordersHtml += `
                            <tr>
                                <td><strong>${order.orderNumber}</strong></td>
                                <td>${order.createdAt?.toDate().toLocaleDateString() || 'N/A'}</td>
                                <td>${order.items?.[0]?.name || 'Item'} ${order.items?.length > 1 ? `+${order.items.length-1} more` : ''}</td>
                                <td>$${order.total?.toLocaleString() || '0.00'}</td>
                                <td><span class="status status-${order.status}">${order.status}</span></td>
                                <td>
                                    ${order.trackingNumber ? 
                                        `<a href="tracking.html?order=${order.orderNumber}" style="color:#c19a6b;">Track</a>` : 
                                        '—'}
                                </td>
                                <td><a href="orders.html?view=${order.id}" class="btn" style="padding:6px 16px;">View</a></td>
                            </tr>
                        `;
                    });
                    
                    ordersHtml += `</tbody></table>`;
                    document.getElementById('ordersContainer').innerHTML = ordersHtml;
                }
            }
        }
        
        // ===== NEW ORDER MODAL =====
        window.showNewOrderModal = function() {
            document.getElementById('newOrderModal').classList.add('active');
        };
        
        window.closeModal = function() {
            document.getElementById('newOrderModal').classList.remove('active');
        };
        
        // ===== SUBMIT ORDER =====
        document.getElementById('orderForm')?.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitOrderBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';
            btn.disabled = true;
            
            const user = authService.getCurrentUser();
            if(!user) return;
            
            const quantity = parseInt(document.getElementById('productQuantity').value);
            const price = parseFloat(document.getElementById('productPrice').value);
            const total = quantity * price + 45 + (price * 0.15); // Shipping + customs
            
            const result = await shopperService.createOrder({
                items: [{
                    name: document.getElementById('productName').value,
                    url: document.getElementById('productUrl').value,
                    price: price,
                    quantity: quantity
                }],
                total: total,
                shippingAddress: document.getElementById('shippingAddress').value,
                status: 'processing'
            }, user.uid);
            
            if(result.success) {
                alert('Order created successfully!');
                closeModal();
                this.reset();
                await loadOrders(user.uid);
            } else {
                alert('Error: ' + result.error);
            }
            
            btn.innerHTML = '<i class="fas fa-check"></i> Submit Order';
            btn.disabled = false;
        });
        
        // ===== LOGOUT =====
        window.logout = async function() {
            const result = await authService.logout();
            if(result.success) window.location.href = 'index.html';
        };
        
        init();
    </script>
</body>
</html>
