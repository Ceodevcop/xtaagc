<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAAGC Admin · Currency Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="/assets/js/taagc-auth.js"></script>
    <script src="/assets/js/currency-rates.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: #f0f6fd;
        }
        .admin-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }
        .sidebar {
            background: #0a1f30;
            color: white;
            padding: 30px 20px;
        }
        .sidebar-logo {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 40px;
            color: #e09f2c;
        }
        .sidebar-menu {
            list-style: none;
        }
        .sidebar-menu li {
            padding: 15px;
            margin: 5px 0;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
        }
        .sidebar-menu li:hover, .sidebar-menu li.active {
            background: #e09f2c;
            color: #0a1f30;
        }
        .sidebar-menu li i {
            margin-right: 10px;
            width: 20px;
        }
        .main-content {
            padding: 30px;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 20px 30px;
            border-radius: 60px;
            border: 2px solid #e09f2c;
        }
        .page-title {
            font-size: 1.8rem;
            font-weight: 700;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 30px;
            padding: 25px;
            border: 2px solid #e0ebf5;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #e09f2c;
        }
        .stat-label {
            color: #6b8ca8;
            margin-top: 5px;
        }
        .rates-board {
            background: white;
            border-radius: 30px;
            padding: 30px;
            border: 2px solid #e0ebf5;
        }
        .rates-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .last-update {
            background: #f0f6fd;
            padding: 8px 20px;
            border-radius: 60px;
            font-size: 0.9rem;
        }
        .rates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .rate-card {
            background: #f8fcff;
            border-radius: 20px;
            padding: 20px;
            border: 2px solid #e0ebf5;
            transition: 0.2s;
        }
        .rate-card:hover {
            border-color: #e09f2c;
        }
        .rate-currency {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .rate-value {
            font-size: 1.5rem;
            color: #e09f2c;
            font-weight: 700;
        }
        .rate-change {
            font-size: 0.8rem;
            margin-top: 5px;
        }
        .rate-change.positive {
            color: #198754;
        }
        .rate-change.negative {
            color: #dc3545;
        }
        .edit-btn {
            background: #e09f2c;
            color: #0a1f30;
            border: none;
            padding: 8px 15px;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 10px;
        }
        .recent-payments {
            background: white;
            border-radius: 30px;
            padding: 30px;
            margin-top: 30px;
            border: 2px solid #e0ebf5;
        }
        .payment-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #e0ebf5;
        }
        .payment-item:last-child {
            border-bottom: none;
        }
        .payment-amount {
            font-weight: 700;
            color: #e09f2c;
        }
        .payment-status {
            padding: 4px 12px;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .status-completed {
            background: #d4edda;
            color: #155724;
        }
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 40px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 60px;
            border: 2px solid #d0e2f2;
        }
        .save-btn {
            background: #e09f2c;
            color: #0a1f30;
            border: none;
            padding: 12px 25px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .auth-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #0a1f30;
            color: #e09f2c;
            padding: 8px 16px;
            border-radius: 60px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-crown"></i> TAAGC Admin
            </div>
            <ul class="sidebar-menu">
                <li class="active" onclick="location.href='/admin/'">
                    <i class="fas fa-chart-line"></i> Dashboard
                </li>
                <li onclick="location.href='/admin/rates'">
                    <i class="fas fa-coins"></i> Currency Rates
                </li>
                <li onclick="location.href='/admin/users'">
                    <i class="fas fa-users"></i> Users
                </li>
                <li onclick="location.href='/admin/payments'">
                    <i class="fas fa-credit-card"></i> Payments
                </li>
                <li onclick="location.href='/admin/wallets'">
                    <i class="fas fa-wallet"></i> Wallets
                </li>
                <li onclick="location.href='/admin/settings'">
                    <i class="fas fa-cog"></i> Settings
                </li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <i class="fas fa-chart-line"></i> Currency Dashboard
                </div>
                <div class="user-info">
                    <div id="admin-info">Loading...</div>
                    <button class="edit-btn" onclick="taagcLogout()">Logout</button>
                </div>
            </div>

            <!-- Stats Grid -->
            <div class="stats-grid" id="stats-grid">
                <div class="stat-card">
                    <i class="fas fa-users fa-2x" style="color:#e09f2c;"></i>
                    <div class="stat-value" id="total-users">-</div>
                    <div class="stat-label">Total Users</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-exchange-alt fa-2x" style="color:#e09f2c;"></i>
                    <div class="stat-value" id="total-transactions">-</div>
                    <div class="stat-label">Transactions</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-dollar-sign fa-2x" style="color:#e09f2c;"></i>
                    <div class="stat-value" id="total-volume">-</div>
                    <div class="stat-label">Volume (USD)</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-clock fa-2x" style="color:#e09f2c;"></i>
                    <div class="stat-value" id="update-time">-</div>
                    <div class="stat-label">Last Update</div>
                </div>
            </div>

            <!-- Live Rates Board -->
            <div class="rates-board">
                <div class="rates-header">
                    <h2><i class="fas fa-chart-line"></i> Live Exchange Rates</h2>
                    <div class="last-update" id="last-update">
                        <i class="fas fa-sync-alt fa-spin"></i> Updating...
                    </div>
                </div>

                <div class="rates-grid" id="rates-grid">
                    <!-- Rates loaded here -->
                </div>

                <div style="margin-top: 30px;">
                    <button class="edit-btn" onclick="refreshRates()">
                        <i class="fas fa-sync-alt"></i> Refresh Now
                    </button>
                    <button class="edit-btn" onclick="showEditModal()" style="margin-left:10px;">
                        <i class="fas fa-edit"></i> Edit Rate
                    </button>
                </div>
            </div>

            <!-- Recent Payments -->
            <div class="recent-payments">
                <h2><i class="fas fa-history"></i> Recent Transactions</h2>
                <div id="recent-payments">
                    <!-- Payments loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Rate Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <h2 style="margin-bottom:20px;">Edit Exchange Rate</h2>
            <div class="form-group">
                <label>Currency</label>
                <select id="edit-currency">
                    <option value="USD">USD - US Dollar</option>
                    <option value="NGN">NGN - Nigerian Naira</option>
                    <option value="EUR">EUR - Euro</option>
                    <option value="GBP">GBP - British Pound</option>
                    <option value="CAD">CAD - Canadian Dollar</option>
                    <option value="JPY">JPY - Japanese Yen</option>
                </select>
            </div>
            <div class="form-group">
                <label>Rate (per USD)</label>
                <input type="number" id="edit-rate" step="0.0001" min="0">
            </div>
            <button class="save-btn" onclick="saveRate()">Update Rate</button>
            <button class="save-btn" onclick="closeModal()" style="margin-top:10px; background:#6c757d;">Cancel</button>
        </div>
    </div>

    <div class="auth-status" id="auth-status">loading...</div>

    <script>
        // Check admin access
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = '/login?redirect=/admin/';
                return;
            }

            // Check if admin
            const adminDoc = await db.collection('admins').doc(user.uid).get();
            if (!adminDoc.exists) {
                window.location.href = '/';
                return;
            }

            document.getElementById('auth-status').innerHTML = `🔑 Admin: ${user.email}`;
            document.getElementById('admin-info').innerHTML = `
                <i class="fas fa-user-cog"></i> ${user.email}
            `;

            // Load dashboard data
            loadDashboard();
        });

        // Load dashboard data
        async function loadDashboard() {
            try {
                // Get total users
                const usersSnap = await db.collection('users').count().get();
                document.getElementById('total-users').textContent = usersSnap.data().count || 0;

                // Get transaction volume
                const paymentsSnap = await db.collection('payments').get();
                let totalVolume = 0;
                paymentsSnap.forEach(doc => {
                    totalVolume += doc.data().amount || 0;
                });
                document.getElementById('total-volume').textContent = `$${totalVolume.toFixed(2)}`;
                document.getElementById('total-transactions').textContent = paymentsSnap.size;

                // Get recent payments
                const recentSnap = await db.collection('payments')
                    .orderBy('timestamp', 'desc')
                    .limit(5)
                    .get();

                let paymentsHtml = '';
                recentSnap.forEach(doc => {
                    const p = doc.data();
                    const date = p.timestamp?.toDate?.() || new Date();
                    paymentsHtml += `
                        <div class="payment-item">
                            <div>
                                <strong>${p.userEmail || 'Guest'}</strong>
                                <div style="font-size:0.8rem; color:#6b8ca8;">${date.toLocaleString()}</div>
                            </div>
                            <div>
                                <span class="payment-amount">$${p.amount}</span>
                                <span class="payment-status status-${p.status}">${p.status}</span>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('recent-payments').innerHTML = paymentsHtml || '<p>No recent payments</p>';

            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }

        // Currency rates handling
        currencyRates.subscribe((rates) => {
            displayRates(rates);
            
            const lastUpdate = window.lastUpdate || new Date();
            document.getElementById('last-update').innerHTML = `
                <i class="fas fa-clock"></i> Last: ${lastUpdate.toLocaleTimeString()}
            `;
            document.getElementById('update-time').textContent = lastUpdate.toLocaleTimeString();
        });

        function displayRates(rates) {
            const grid = document.getElementById('rates-grid');
            let html = '';

            const currencies = [
                { code: 'USD', name: 'US Dollar', flag: '🇺🇸' },
                { code: 'NGN', name: 'Nigerian Naira', flag: '🇳🇬' },
                { code: 'EUR', name: 'Euro', flag: '🇪🇺' },
                { code: 'GBP', name: 'British Pound', flag: '🇬🇧' },
                { code: 'CAD', name: 'Canadian Dollar', flag: '🇨🇦' },
                { code: 'AUD', name: 'Australian Dollar', flag: '🇦🇺' },
                { code: 'JPY', name: 'Japanese Yen', flag: '🇯🇵' },
                { code: 'CNY', name: 'Chinese Yuan', flag: '🇨🇳' },
                { code: 'INR', name: 'Indian Rupee', flag: '🇮🇳' },
                { code: 'BTC', name: 'Bitcoin', flag: '₿' },
                { code: 'ETH', name: 'Ethereum', flag: 'Ξ' },
                { code: 'USDT', name: 'Tether', flag: '₮' }
            ];

            currencies.forEach(c => {
                if (rates[c.code]) {
                    const change = (Math.random() * 2 - 1).toFixed(2); // Simulated change
                    html += `
                        <div class="rate-card">
                            <div class="rate-currency">${c.flag} ${c.code} - ${c.name}</div>
                            <div class="rate-value">${rates[c.code].toFixed(4)}</div>
                            <div class="rate-change ${change >= 0 ? 'positive' : 'negative'}">
                                ${change >= 0 ? '▲' : '▼'} ${Math.abs(change)}%
                            </div>
                            <button class="edit-btn" onclick="openEditRate('${c.code}', ${rates[c.code]})">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                        </div>
                    `;
                }
            });

            grid.innerHTML = html;
        }

        // Rate editing
        window.showEditModal = () => {
            document.getElementById('editModal').classList.add('active');
        };

        window.closeModal = () => {
            document.getElementById('editModal').classList.remove('active');
        };

        window.openEditRate = (currency, rate) => {
            document.getElementById('edit-currency').value = currency;
            document.getElementById('edit-rate').value = rate;
            document.getElementById('editModal').classList.add('active');
        };

        window.saveRate = async () => {
            const currency = document.getElementById('edit-currency').value;
            const rate = parseFloat(document.getElementById('edit-rate').value);
            
            if (!rate || rate <= 0) {
                alert('Please enter a valid rate');
                return;
            }

            try {
                // Update in memory
                window.currentRates[currency] = rate;
                
                // Save to Firebase
                await currencyRates.saveToFirebase(window.currentRates);
                
                // Refresh display
                displayRates(window.currentRates);
                closeModal();
                
                alert('Rate updated successfully!');
            } catch (error) {
                alert('Error updating rate: ' + error.message);
            }
        };

        window.refreshRates = async () => {
            await currencyRates.fetchAllRates();
        };

        // Real-time listener for system changes
        db.collection('system').doc('currency_rates')
            .onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    window.currentRates = data.rates;
                    window.lastUpdate = data.lastUpdate?.toDate?.() || new Date();
                    displayRates(window.currentRates);
                }
            });
    </script>
</body>
</html>
