<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAAGC · wallet & payments</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #0a1f30, #1b4b6e);
            min-height: 100vh;
            padding: 20px;
        }
        .wallet-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        /* Header */
        .wallet-header {
            background: white;
            border-radius: 40px 40px 0 0;
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 4px solid #e09f2c;
        }
        .logo h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(145deg, #0a1f30, #1e4f7a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .user-badge {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #f0f6fd;
            padding: 10px 25px;
            border-radius: 60px;
        }
        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #e09f2c;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 600;
            color: #0a1f30;
        }
        .user-info {
            line-height: 1.4;
        }
        .user-name {
            font-weight: 700;
            color: #0a1f30;
        }
        .user-email {
            font-size: 0.85rem;
            color: #6b8ca8;
        }
        /* Main Content */
        .wallet-content {
            background: #f5faff;
            border-radius: 0 0 40px 40px;
            padding: 40px;
        }
        /* Wallet Cards */
        .wallet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        .wallet-card {
            background: white;
            border-radius: 30px;
            padding: 25px;
            border: 2px solid #e0ebf5;
            transition: 0.2s;
        }
        .wallet-card:hover {
            border-color: #e09f2c;
        }
        .card-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            color: #0a1f30;
            font-size: 1.2rem;
        }
        .card-title i {
            color: #e09f2c;
            font-size: 1.5rem;
        }
        .wallet-address {
            background: #f0f6fd;
            border-radius: 60px;
            padding: 15px 20px;
            font-family: monospace;
            font-size: 0.9rem;
            word-break: break-all;
            border: 2px solid #d0e2f2;
            margin: 15px 0;
        }
        .balance {
            font-size: 2rem;
            font-weight: 700;
            color: #e09f2c;
            margin: 15px 0;
        }
        .balance small {
            font-size: 1rem;
            color: #6b8ca8;
        }
        /* Buttons */
        .btn {
            padding: 12px 25px;
            border-radius: 60px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
            transition: 0.2s;
        }
        .btn-primary {
            background: #e09f2c;
            color: #0a1f30;
            width: 100%;
        }
        .btn-primary:hover {
            background: #cf8f1f;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #e09f2c;
            color: #e09f2c;
            width: 100%;
        }
        .btn-outline:hover {
            background: #e09f2c;
            color: #0a1f30;
        }
        /* Transactions */
        .transactions-card {
            background: white;
            border-radius: 30px;
            padding: 25px;
            border: 2px solid #e0ebf5;
            margin-top: 30px;
        }
        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #e0ebf5;
        }
        .transaction-item:last-child {
            border-bottom: none;
        }
        .tx-type {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .tx-type i {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #f0f6fd;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e09f2c;
        }
        .tx-amount {
            font-weight: 700;
        }
        .tx-amount.positive {
            color: #198754;
        }
        .tx-amount.negative {
            color: #dc3545;
        }
        .tx-date {
            font-size: 0.8rem;
            color: #6b8ca8;
        }
        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
        }
        .spinner {
            border: 4px solid #f0f6fd;
            border-top: 4px solid #e09f2c;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* Notifications */
        .alert {
            padding: 15px 25px;
            border-radius: 60px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #198754;
        }
        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border: 2px solid #e09f2c;
        }
        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #dc3545;
        }
        /* Firebase Status */
        .fb-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #0a1f30;
            color: #e09f2c;
            padding: 8px 16px;
            border-radius: 60px;
            font-size: 0.8rem;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="wallet-container">
        <!-- Header -->
        <div class="wallet-header">
            <div class="logo">
                <h1><i class="fas fa-wallet"></i> TAAGC Pay</h1>
            </div>
            <div id="userBadge" class="user-badge">
                <div class="spinner-small"></div>
                <span>loading user...</span>
            </div>
        </div>

        <!-- Main Content -->
        <div class="wallet-content" id="walletContent">
            <div class="loading">
                <div class="spinner"></div>
                <p style="color:#6b8ca8; margin-top:20px;">detecting your wallet from Firebase...</p>
            </div>
        </div>
    </div>

    <div class="fb-status" id="firebaseStatus">⏳ connecting...</div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAI1MrcP977UgRLQoePxl64JOSyj9v4WpI",
            authDomain: "xtaagc.firebaseapp.com",
            projectId: "xtaagc",
            storageBucket: "xtaagc.firebasestorage.app",
            messagingSenderId: "256073982437",
            appId: "1:256073982437:web:8da63bb7acc86c0ca98f0c"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        document.getElementById('firebaseStatus').innerHTML = '✅ wallet service active';

        // Auth State Observer
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                console.log('User detected:', user.uid);
                await loadUserWallet(user);
            } else {
                // Not logged in - redirect to login
                window.location.href = '/login?redirect=wallet';
            }
        });

        // Load User Wallet Data
        async function loadUserWallet(user) {
            try {
                // Get user data from Firestore
                const userDoc = await db.collection('users').doc(user.uid).get();
                
                if (!userDoc.exists) {
                    // Create user profile if doesn't exist
                    await createUserProfile(user);
                }
                
                const userData = userDoc.exists ? userDoc.data() : {};
                
                // Get or create wallet data
                let walletData = userData.wallet || {
                    addresses: {},
                    balances: {},
                    transactions: []
                };
                
                // Update UI with user data
                updateUI(user, userData, walletData);
                
            } catch (error) {
                console.error('Error loading wallet:', error);
                showError('Failed to load wallet data: ' + error.message);
            }
        }

        // Create user profile if missing
        async function createUserProfile(user) {
            const userData = {
                uid: user.uid,
                email: user.email,
                displayName: user.displayName || user.email.split('@')[0],
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                wallet: {
                    addresses: {
                        btc: generateCryptoAddress('btc'),
                        eth: generateCryptoAddress('eth'),
                        usdt: generateCryptoAddress('usdt')
                    },
                    balances: {
                        btc: 0,
                        eth: 0,
                        usdt: 0,
                        usd: 0
                    },
                    transactions: []
                }
            };
            
            await db.collection('users').doc(user.uid).set(userData);
            return userData;
        }

        // Generate mock crypto addresses (in production, these come from API)
        function generateCryptoAddress(type) {
            const prefixes = {
                btc: 'bc1',
                eth: '0x',
                usdt: 'T'
            };
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let address = prefixes[type];
            for (let i = 0; i < 32; i++) {
                address += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return address;
        }

        // Update UI with user data
        function updateUI(user, userData, walletData) {
            const content = document.getElementById('walletContent');
            
            // Update user badge
            const badge = document.getElementById('userBadge');
            const displayName = userData.displayName || user.email.split('@')[0];
            const initial = displayName.charAt(0).toUpperCase();
            
            badge.innerHTML = `
                <div class="user-avatar">${initial}</div>
                <div class="user-info">
                    <div class="user-name">${displayName}</div>
                    <div class="user-email">${user.email}</div>
                </div>
            `;

            // Render wallet content
            content.innerHTML = `
                <!-- Wallet Grid -->
                <div class="wallet-grid">
                    <!-- Bitcoin Wallet -->
                    <div class="wallet-card">
                        <div class="card-title">
                            <i class="fab fa-bitcoin"></i>
                            <h3>Bitcoin Wallet</h3>
                        </div>
                        <div class="wallet-address" id="btcAddress">
                            ${walletData.addresses?.btc || 'Not configured'}
                        </div>
                        <div class="balance">
                            $${walletData.balances?.btc || '0.00'} <small>BTC</small>
                        </div>
                        <button class="btn btn-primary" onclick="copyAddress('btc')">
                            <i class="fas fa-copy"></i> Copy Address
                        </button>
                    </div>

                    <!-- Ethereum Wallet -->
                    <div class="wallet-card">
                        <div class="card-title">
                            <i class="fab fa-ethereum"></i>
                            <h3>Ethereum Wallet</h3>
                        </div>
                        <div class="wallet-address" id="ethAddress">
                            ${walletData.addresses?.eth || 'Not configured'}
                        </div>
                        <div class="balance">
                            $${walletData.balances?.eth || '0.00'} <small>ETH</small>
                        </div>
                        <button class="btn btn-primary" onclick="copyAddress('eth')">
                            <i class="fas fa-copy"></i> Copy Address
                        </button>
                    </div>

                    <!-- USDT Wallet -->
                    <div class="wallet-card">
                        <div class="card-title">
                            <i class="fas fa-dollar-sign"></i>
                            <h3>USDT Wallet</h3>
                        </div>
                        <div class="wallet-address" id="usdtAddress">
                            ${walletData.addresses?.usdt || 'Not configured'}
                        </div>
                        <div class="balance">
                            $${walletData.balances?.usdt || '0.00'} <small>USDT</small>
                        </div>
                        <button class="btn btn-primary" onclick="copyAddress('usdt')">
                            <i class="fas fa-copy"></i> Copy Address
                        </button>
                    </div>
                </div>

                <!-- Actions -->
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0;">
                    <button class="btn btn-outline" onclick="depositFunds()">
                        <i class="fas fa-arrow-down"></i> Deposit
                    </button>
                    <button class="btn btn-outline" onclick="withdrawFunds()">
                        <i class="fas fa-arrow-up"></i> Withdraw
                    </button>
                </div>

                <!-- Recent Transactions -->
                <div class="transactions-card">
                    <h3 style="margin-bottom: 20px;">Recent Transactions</h3>
                    <div id="transactionsList">
                        ${renderTransactions(walletData.transactions || [])}
                    </div>
                </div>
            `;
        }

        // Render transactions
        function renderTransactions(transactions) {
            if (transactions.length === 0) {
                return '<p style="text-align:center; color:#6b8ca8;">No transactions yet</p>';
            }
            
            return transactions.slice(0, 5).map(tx => `
                <div class="transaction-item">
                    <div class="tx-type">
                        <i class="fas fa-${tx.type === 'deposit' ? 'arrow-down' : 'arrow-up'}"></i>
                        <div>
                            <div>${tx.description || tx.type}</div>
                            <div class="tx-date">${new Date(tx.date).toLocaleDateString()}</div>
                        </div>
                    </div>
                    <div class="tx-amount ${tx.type === 'deposit' ? 'positive' : 'negative'}">
                        ${tx.type === 'deposit' ? '+' : '-'}$${tx.amount}
                    </div>
                </div>
            `).join('');
        }

        // Copy address to clipboard
        window.copyAddress = async (type) => {
            const addressEl = document.getElementById(`${type}Address`);
            if (addressEl) {
                try {
                    await navigator.clipboard.writeText(addressEl.innerText);
                    showNotification('Address copied!', 'success');
                } catch (err) {
                    showNotification('Failed to copy', 'error');
                }
            }
        };

        // Deposit funds
        window.depositFunds = () => {
            showNotification('Deposit feature coming soon!', 'warning');
        };

        // Withdraw funds
        window.withdrawFunds = () => {
            showNotification('Withdrawal feature coming soon!', 'warning');
        };

        // Show notification
        function showNotification(message, type) {
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'warning' ? 'exclamation-triangle' : 'exclamation-circle'}"></i> ${message}`;
            
            const content = document.getElementById('walletContent');
            content.insertBefore(alert, content.firstChild);
            
            setTimeout(() => alert.remove(), 3000);
        }

        // Show error
        function showError(message) {
            const content = document.getElementById('walletContent');
            content.innerHTML = `
                <div class="alert alert-danger">
                    <i class="fas fa-exclamation-circle"></i> ${message}
                </div>
                <button class="btn btn-primary" onclick="location.reload()">
                    Try Again
                </button>
            `;
        }

        // Listen for auth errors
        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = '/login?redirect=wallet';
            }
        });
    </script>
</body>
</html>
