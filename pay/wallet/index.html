<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAAGC · Wallet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="/assets/js/taagc-auth.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #0a1f30, #1b4b6e);
            min-height: 100vh;
            padding: 20px;
        }
        .wallet-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 30px 60px -20px #000;
        }
        .wallet-header {
            background: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #e09f2c;
        }
        .logo h1 {
            font-size: 2rem;
            background: linear-gradient(145deg, #0a1f30, #1e4f7a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .domain-badge {
            background: #f0f6fd;
            padding: 8px 16px;
            border-radius: 60px;
            font-size: 0.9rem;
            border: 2px solid #e09f2c;
        }
        .user-menu {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .user-badge {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #f0f6fd;
            padding: 10px 20px;
            border-radius: 60px;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e09f2c;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #0a1f30;
        }
        .logout-btn {
            background: transparent;
            border: 2px solid #dc3545;
            color: #dc3545;
            padding: 8px 20px;
            border-radius: 60px;
            cursor: pointer;
        }
        .wallet-content {
            background: #f5faff;
            padding: 40px;
        }
        .welcome-banner {
            background: linear-gradient(145deg, #e09f2c, #f5b84c);
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            color: #0a1f30;
        }
        .wallet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        .wallet-card {
            background: white;
            border-radius: 30px;
            padding: 25px;
            border: 2px solid #e0ebf5;
            transition: 0.2s;
        }
        .wallet-card:hover {
            border-color: #e09f2c;
        }
        .wallet-address {
            background: #f0f6fd;
            border-radius: 60px;
            padding: 15px;
            font-family: monospace;
            font-size: 0.9rem;
            word-break: break-all;
            border: 2px solid #d0e2f2;
            margin: 15px 0;
        }
        .balance {
            font-size: 2rem;
            font-weight: 700;
            color: #e09f2c;
            margin: 15px 0;
        }
        .btn {
            padding: 12px 20px;
            border-radius: 60px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .btn-primary {
            background: #e09f2c;
            color: #0a1f30;
        }
        .btn-copy {
            background: #0a1f30;
            color: white;
            border: 2px solid #e09f2c;
        }
        .spinner {
            border: 4px solid #f0f6fd;
            border-top: 4px solid #e09f2c;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } }
        .auth-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #0a1f30;
            color: #e09f2c;
            padding: 8px 16px;
            border-radius: 60px;
            font-size: 0.8rem;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="wallet-container">
        <div class="wallet-header">
            <div class="logo">
                <h1><i class="fas fa-wallet"></i> TAAGC Pay</h1>
            </div>
            <div class="domain-badge">
                <i class="fas fa-globe"></i> <span id="current-domain"></span>
            </div>
            <div class="user-menu" id="user-menu">
                <div class="spinner" style="width:30px; height:30px;"></div>
            </div>
        </div>

        <div class="wallet-content" id="walletContent">
            <div style="text-align:center; padding:60px;">
                <div class="spinner"></div>
                <p style="color:#6b8ca8; margin-top:20px;">loading your wallet...</p>
            </div>
        </div>
    </div>

    <div class="auth-status" id="auth-badge">loading...</div>

    <script>
        document.getElementById('current-domain').textContent = window.location.hostname;

        // Require authentication - redirects to login if not authenticated
        if (!requireAuth('/login')) {
            // Will redirect, so stop execution
            throw new Error('Redirecting to login');
        }

        // Load wallet data
        async function loadWallet() {
            const user = auth.currentUser;
            if (!user) return;

            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                
                if (!userDoc.exists) {
                    window.location.href = '/register?complete=wallet';
                    return;
                }

                const userData = userDoc.data();
                const walletData = userData.wallet || {
                    addresses: {
                        btc: 'Not configured',
                        eth: 'Not configured',
                        usdt: 'Not configured'
                    },
                    balances: { btc: 0, eth: 0, usdt: 0, usd: 0 }
                };

                displayWallet(userData, walletData);

            } catch (error) {
                console.error('Error loading wallet:', error);
                document.getElementById('walletContent').innerHTML = `
                    <div style="text-align:center; padding:60px; background:#f8d7da; border-radius:30px;">
                        <i class="fas fa-exclamation-circle fa-3x" style="color:#dc3545;"></i>
                        <p style="margin-top:20px;">Error loading wallet: ${error.message}</p>
                        <button class="btn btn-primary" onclick="location.reload()" style="width:auto; margin-top:20px;">
                            try again
                        </button>
                    </div>
                `;
            }
        }

        function displayWallet(userData, walletData) {
            const content = document.getElementById('walletContent');
            
            content.innerHTML = `
                <div class="welcome-banner">
                    <h2>Welcome back, ${userData.firstName || userData.fullName || 'User'}!</h2>
                    <p style="margin-top:10px;">Your universal wallet works across all TAAGC platforms.</p>
                </div>

                <div class="wallet-grid">
                    <div class="wallet-card">
                        <h3><i class="fab fa-bitcoin" style="color:#e09f2c;"></i> Bitcoin</h3>
                        <div class="wallet-address" id="btc-address">${walletData.addresses.btc}</div>
                        <div class="balance">$${walletData.balances.btc || '0.00'}</div>
                        <button class="btn btn-copy" onclick="copyAddress('btc-address')">
                            <i class="fas fa-copy"></i> copy address
                        </button>
                    </div>

                    <div class="wallet-card">
                        <h3><i class="fab fa-ethereum" style="color:#e09f2c;"></i> Ethereum</h3>
                        <div class="wallet-address" id="eth-address">${walletData.addresses.eth}</div>
                        <div class="balance">$${walletData.balances.eth || '0.00'}</div>
                        <button class="btn btn-copy" onclick="copyAddress('eth-address')">
                            <i class="fas fa-copy"></i> copy address
                        </button>
                    </div>

                    <div class="wallet-card">
                        <h3><i class="fas fa-dollar-sign" style="color:#e09f2c;"></i> USDT</h3>
                        <div class="wallet-address" id="usdt-address">${walletData.addresses.usdt}</div>
                        <div class="balance">$${walletData.balances.usdt || '0.00'}</div>
                        <button class="btn btn-copy" onclick="copyAddress('usdt-address')">
                            <i class="fas fa-copy"></i> copy address
                        </button>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px;">
                    <button class="btn btn-primary" onclick="alert('Deposit feature coming soon!')">
                        <i class="fas fa-arrow-down"></i> deposit
                    </button>
                    <button class="btn btn-primary" onclick="alert('Withdraw feature coming soon!')">
                        <i class="fas fa-arrow-up"></i> withdraw
                    </button>
                </div>
            `;
        }

        window.copyAddress = function(elementId) {
            const address = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(address);
            alert('Address copied to clipboard!');
        };

        // Load wallet when ready
        auth.onAuthStateChanged((user) => {
            if (user) {
                loadWallet();
            }
        });
    </script>
</body>
</html>
