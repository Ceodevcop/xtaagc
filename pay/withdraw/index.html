<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAAGC · Withdraw Funds</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <!-- Universal Auth -->
    <script src="/assets/js/taagc-auth.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #0a1f30, #1b4b6e);
            min-height: 100vh;
            padding: 20px;
        }
        .withdraw-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 30px 60px -20px #000;
        }
        .withdraw-header {
            background: white;
            padding: 30px 40px;
            border-bottom: 4px solid #e09f2c;
        }
        .logo {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo h1 {
            font-size: 2rem;
            background: linear-gradient(145deg, #0a1f30, #1e4f7a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .domain-badge {
            background: #f0f6fd;
            padding: 8px 16px;
            border-radius: 60px;
            font-size: 0.9rem;
            border: 2px solid #e09f2c;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dashed #e0ebf5;
        }
        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #e09f2c;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 600;
            color: #0a1f30;
        }
        .user-details {
            flex: 1;
        }
        .user-name {
            font-weight: 700;
            font-size: 1.2rem;
        }
        .user-email {
            color: #6b8ca8;
        }
        .withdraw-content {
            background: #f5faff;
            padding: 40px;
        }
        .balance-card {
            background: linear-gradient(145deg, #e09f2c, #f5b84c);
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            color: #0a1f30;
        }
        .balance-label {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
        }
        .balance-amount {
            font-size: 3rem;
            font-weight: 800;
            margin: 10px 0;
        }
        .balance-note {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        .withdraw-form {
            background: white;
            border-radius: 30px;
            padding: 30px;
            border: 2px solid #e0ebf5;
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #0a1f30;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 15px 20px;
            border-radius: 60px;
            border: 2px solid #d0e2f2;
            font-size: 1rem;
            transition: 0.2s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #e09f2c;
        }
        .currency-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        .currency-option {
            background: white;
            border: 2px solid #d0e2f2;
            border-radius: 60px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .currency-option:hover {
            border-color: #e09f2c;
        }
        .currency-option.selected {
            background: #e09f2c;
            border-color: #e09f2c;
            color: #0a1f30;
            font-weight: 600;
        }
        .fee-info {
            background: #f0f6fd;
            border-radius: 60px;
            padding: 15px 20px;
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95rem;
        }
        .fee-amount {
            font-weight: 700;
            color: #e09f2c;
        }
        .withdraw-btn {
            background: #e09f2c;
            color: #0a1f30;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            margin: 20px 0;
            border: 2px solid white;
        }
        .withdraw-btn:hover {
            background: #cf8f1f;
        }
        .withdraw-btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        .alert {
            padding: 15px 25px;
            border-radius: 60px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #198754;
        }
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #dc3545;
        }
        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border: 2px solid #e09f2c;
        }
        .transaction-history {
            margin-top: 30px;
            background: white;
            border-radius: 30px;
            padding: 30px;
            border: 2px solid #e0ebf5;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #e0ebf5;
        }
        .history-item:last-child {
            border-bottom: none;
        }
        .history-status {
            padding: 4px 12px;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
        .status-completed {
            background: #d4edda;
            color: #155724;
        }
        .status-failed {
            background: #f8d7da;
            color: #721c24;
        }
        .loading-spinner {
            text-align: center;
            padding: 40px;
        }
        .spinner {
            border: 4px solid #f0f6fd;
            border-top: 4px solid #e09f2c;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } }
        .auth-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #0a1f30;
            color: #e09f2c;
            padding: 8px 16px;
            border-radius: 60px;
            font-size: 0.8rem;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="withdraw-container">
        <div class="withdraw-header">
            <div class="logo">
                <h1><i class="fas fa-wallet"></i> Withdraw Funds</h1>
                <div class="domain-badge" id="current-domain"></div>
            </div>
            <div class="user-info" id="user-info">
                <div class="spinner" style="width:30px; height:30px;"></div>
            </div>
        </div>

        <div class="withdraw-content" id="withdraw-content">
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p style="color:#6b8ca8; margin-top:20px;">Loading your wallet...</p>
            </div>
        </div>
    </div>

    <div class="auth-status" id="auth-status">checking...</div>

    <script>
        // Show current domain
        document.getElementById('current-domain').textContent = window.location.hostname;

        // Require authentication
        if (!requireAuth('/login')) {
            throw new Error('Redirecting to login');
        }

        // State
        let userBalance = 0;
        let selectedCurrency = 'usdt';
        const withdrawalFee = 0.01; // 1% fee
        const minWithdrawal = 10;

        // Load user data and wallet
        async function loadWithdrawPage() {
            const user = auth.currentUser;
            if (!user) return;

            try {
                // Get user data
                const userDoc = await db.collection('users').doc(user.uid).get();
                
                if (!userDoc.exists) {
                    window.location.href = '/wallet';
                    return;
                }

                const userData = userDoc.data();
                const walletData = userData.wallet || {
                    balances: { btc: 0, eth: 0, usdt: 0, usd: 0 }
                };

                // Calculate total balance in USD
                userBalance = walletData.balances.usd || 0;
                
                // Update UI
                updateUserInfo(user, userData);
                updateWithdrawForm(walletData);
                loadTransactionHistory(user.uid);

            } catch (error) {
                console.error('Error loading page:', error);
                showError('Failed to load wallet data');
            }
        }

        function updateUserInfo(user, userData) {
            const displayName = userData.firstName || userData.fullName || user.email.split('@')[0];
            const initial = displayName.charAt(0).toUpperCase();
            
            document.getElementById('user-info').innerHTML = `
                <div class="user-avatar">${initial}</div>
                <div class="user-details">
                    <div class="user-name">${displayName}</div>
                    <div class="user-email">${user.email}</div>
                </div>
            `;
        }

        function updateWithdrawForm(walletData) {
            const content = document.getElementById('withdraw-content');
            
            content.innerHTML = `
                <div class="balance-card">
                    <div class="balance-label">Available Balance</div>
                    <div class="balance-amount">$${walletData.balances.usd?.toFixed(2) || '0.00'}</div>
                    <div class="balance-note">Minimum withdrawal: $${minWithdrawal}</div>
                </div>

                <div class="withdraw-form">
                    <h3 style="margin-bottom:20px;">Withdrawal Details</h3>
                    
                    <div class="form-group">
                        <label>Select Currency</label>
                        <div class="currency-selector" id="currency-selector">
                            <div class="currency-option selected" data-currency="usdt">USDT</div>
                            <div class="currency-option" data-currency="btc">BTC</div>
                            <div class="currency-option" data-currency="eth">ETH</div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Amount (USD)</label>
                        <input type="number" id="withdraw-amount" placeholder="Enter amount" min="${minWithdrawal}" step="0.01">
                    </div>

                    <div class="form-group">
                        <label>Destination Address</label>
                        <input type="text" id="destination-address" placeholder="Enter wallet address">
                    </div>

                    <div class="fee-info">
                        <span><i class="fas fa-info-circle"></i> Withdrawal Fee (1%)</span>
                        <span class="fee-amount" id="fee-amount">$0.00</span>
                    </div>

                    <div class="form-group">
                        <label>You'll Receive</label>
                        <input type="text" id="receive-amount" readonly disabled style="background:#f0f6fd;">
                    </div>

                    <button class="withdraw-btn" id="withdraw-btn" onclick="processWithdrawal()">
                        <i class="fas fa-arrow-up"></i> Withdraw Funds
                    </button>

                    <div id="withdraw-alert" style="display: none;"></div>
                </div>

                <div class="transaction-history" id="transaction-history">
                    <h3 style="margin-bottom:20px;">Recent Withdrawals</h3>
                    <div id="history-list">Loading...</div>
                </div>
            `;

            // Add currency selector listeners
            document.querySelectorAll('.currency-option').forEach(opt => {
                opt.addEventListener('click', function() {
                    document.querySelectorAll('.currency-option').forEach(o => o.classList.remove('selected'));
                    this.classList.add('selected');
                    selectedCurrency = this.dataset.currency;
                    calculateFees();
                });
            });

            // Add amount input listener
            document.getElementById('withdraw-amount').addEventListener('input', calculateFees);
        }

        function calculateFees() {
            const amount = parseFloat(document.getElementById('withdraw-amount').value) || 0;
            const fee = amount * withdrawalFee;
            const receive = amount - fee;
            
            document.getElementById('fee-amount').textContent = `$${fee.toFixed(2)}`;
            document.getElementById('receive-amount').value = `$${receive.toFixed(2)} (${selectedCurrency.toUpperCase()})`;
        }

        async function loadTransactionHistory(userId) {
            try {
                const historyList = document.getElementById('history-list');
                
                // Get withdrawals from Firestore
                const snapshot = await db.collection('withdrawals')
                    .where('userId', '==', userId)
                    .orderBy('timestamp', 'desc')
                    .limit(5)
                    .get();

                if (snapshot.empty) {
                    historyList.innerHTML = '<p style="text-align:center; color:#6b8ca8;">No withdrawal history</p>';
                    return;
                }

                let html = '';
                snapshot.forEach(doc => {
                    const w = doc.data();
                    const date = w.timestamp?.toDate?.() || new Date();
                    
                    html += `
                        <div class="history-item">
                            <div>
                                <div><strong>${w.currency.toUpperCase()}</strong> - $${w.amount}</div>
                                <div style="font-size:0.8rem; color:#6b8ca8;">${date.toLocaleDateString()}</div>
                            </div>
                            <div>
                                <span class="history-status status-${w.status}">${w.status}</span>
                            </div>
                        </div>
                    `;
                });
                
                historyList.innerHTML = html;

            } catch (error) {
                console.error('Error loading history:', error);
                document.getElementById('history-list').innerHTML = '<p style="color:#dc3545;">Error loading history</p>';
            }
        }

        async function processWithdrawal() {
            const amount = parseFloat(document.getElementById('withdraw-amount').value);
            const address = document.getElementById('destination-address').value.trim();
            
            // Validation
            if (!amount || amount < minWithdrawal) {
                showAlert(`Minimum withdrawal is $${minWithdrawal}`, 'error');
                return;
            }

            if (amount > userBalance) {
                showAlert('Insufficient balance', 'error');
                return;
            }

            if (!address) {
                showAlert('Please enter destination address', 'error');
                return;
            }

            // Confirm withdrawal
            if (!confirm(`Confirm withdrawal of $${amount} to ${address}?`)) {
                return;
            }

            const btn = document.getElementById('withdraw-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';

            try {
                const user = auth.currentUser;
                const withdrawalId = 'WD_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);

                // Create withdrawal record
                await db.collection('withdrawals').doc(withdrawalId).set({
                    withdrawalId: withdrawalId,
                    userId: user.uid,
                    userEmail: user.email,
                    amount: amount,
                    currency: selectedCurrency,
                    destinationAddress: address,
                    fee: amount * withdrawalFee,
                    netAmount: amount - (amount * withdrawalFee),
                    status: 'pending',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                // Update user balance (temporary hold)
                const userRef = db.collection('users').doc(user.uid);
                await userRef.update({
                    'wallet.balances.usd': firebase.firestore.FieldValue.increment(-amount)
                });

                // Show success
                showAlert('Withdrawal request submitted successfully!', 'success');
                
                // Reload page after 2 seconds
                setTimeout(() => {
                    window.location.reload();
                }, 2000);

            } catch (error) {
                console.error('Withdrawal error:', error);
                showAlert(error.message, 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-arrow-up"></i> Withdraw Funds';
            }
        }

        function showAlert(message, type) {
            const alertDiv = document.getElementById('withdraw-alert');
            alertDiv.style.display = 'block';
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
            
            if (type === 'success') {
                setTimeout(() => {
                    alertDiv.style.display = 'none';
                }, 3000);
            }
        }

        function showError(message) {
            const content = document.getElementById('withdraw-content');
            content.innerHTML = `
                <div class="alert alert-error">
                    <i class="fas fa-exclamation-circle"></i> ${message}
                    <button onclick="location.reload()" style="margin-left:20px; padding:5px 15px; border-radius:60px; border:none; background:#e09f2c;">Try Again</button>
                </div>
            `;
        }

        // Initialize
        auth.onAuthStateChanged((user) => {
            if (user) {
                loadWithdrawPage();
            }
        });

        // Update auth status
        auth.onAuthStateChanged((user) => {
            const statusEl = document.getElementById('auth-status');
            if (user) {
                statusEl.innerHTML = `🔓 ${window.location.hostname} · ${user.email}`;
            } else {
                statusEl.innerHTML = `🔒 ${window.location.hostname} · not logged in`;
            }
        });
    </script>
</body>
</html>
