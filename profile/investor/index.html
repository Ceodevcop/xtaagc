<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investor Dashboard - TAAGC</title>
    
    <!-- Firebase 8.10.1 SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <!-- Chart.js for performance charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #f3f4f6;
        }

        /* Dashboard Layout */
        .dashboard {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0a2540 0%, #1e3a5f 100%);
            color: white;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
        }

        .sidebar-header {
            padding: 30px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: #c19a6b;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
        }

        .logo-text span {
            color: #c19a6b;
        }

        .investor-badge {
            background: rgba(193, 154, 107, 0.2);
            border: 1px solid #c19a6b;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 12px;
            margin-top: 10px;
            display: inline-block;
        }

        .nav-menu {
            padding: 20px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 10px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 15px;
        }

        .nav-item i {
            width: 20px;
            color: #c19a6b;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .nav-item.active {
            background: #c19a6b;
            color: white;
        }

        .nav-item.active i {
            color: white;
        }

        .nav-divider {
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 20px 0;
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
        }

        /* Top Header */
        .top-header {
            background: white;
            border-radius: 16px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .header-title h1 {
            color: #0a2540;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .notification-badge {
            position: relative;
            cursor: pointer;
        }

        .notification-badge i {
            font-size: 20px;
            color: #64748b;
        }

        .badge-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #e53e3e;
            color: white;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 10px;
        }

        .investor-profile-mini {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: #f8fafc;
            border-radius: 40px;
            cursor: pointer;
        }

        .investor-avatar {
            width: 40px;
            height: 40px;
            background: #c19a6b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        /* Account Summary Cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .summary-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }

        .summary-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        .summary-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #0a2540, #1e3a5f);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin-bottom: 16px;
        }

        .summary-label {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .summary-value {
            font-size: 28px;
            font-weight: 700;
            color: #0a2540;
            margin-bottom: 5px;
        }

        .summary-change {
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .positive { color: #10b981; }
        .negative { color: #e53e3e; }

        /* Key Investment Metrics */
        .metrics-section {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .metrics-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-header h2 {
            color: #0a2540;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .metric-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .metric-item {
            padding: 15px;
            background: #f8fafc;
            border-radius: 12px;
        }

        .metric-label {
            color: #64748b;
            font-size: 13px;
            margin-bottom: 5px;
        }

        .metric-value {
            font-size: 24px;
            font-weight: 700;
            color: #0a2540;
        }

        .metric-sub {
            font-size: 13px;
            color: #64748b;
            margin-top: 5px;
        }

        /* Performance Chart */
        .chart-container {
            height: 300px;
            margin-top: 20px;
        }

        /* Portfolio Table */
        .portfolio-section {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .portfolio-table {
            width: 100%;
            border-collapse: collapse;
        }

        .portfolio-table th {
            text-align: left;
            padding: 15px;
            background: #f8fafc;
            color: #0a2540;
            font-weight: 600;
            font-size: 14px;
        }

        .portfolio-table td {
            padding: 15px;
            border-bottom: 1px solid #e2e8f0;
        }

        .company-name {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .company-logo {
            width: 32px;
            height: 32px;
            background: #0a2540;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-active { background: #10b98120; color: #10b981; }
        .status-pending { background: #f59e0b20; color: #f59e0b; }

        /* Wallet Section */
        .wallet-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .wallet-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .balance-card {
            background: linear-gradient(135deg, #0a2540, #1e3a5f);
            color: white;
        }

        .balance-amount {
            font-size: 36px;
            font-weight: 700;
            margin: 20px 0;
        }

        .wallet-actions {
            display: flex;
            gap: 10px;
        }

        .wallet-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: #c19a6b;
            color: white;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        /* Transactions List */
        .transactions-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .transaction-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        .transaction-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .transaction-icon {
            width: 36px;
            height: 36px;
            background: #f8fafc;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .transaction-details h4 {
            font-size: 14px;
            margin-bottom: 4px;
        }

        .transaction-details p {
            font-size: 12px;
            color: #64748b;
        }

        .transaction-amount {
            font-weight: 600;
        }

        /* Documents Grid */
        .documents-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .document-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .document-card:hover {
            border-color: #c19a6b;
            transform: translateY(-5px);
        }

        .document-icon {
            width: 48px;
            height: 48px;
            background: #f8fafc;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            color: #c19a6b;
            font-size: 24px;
        }

        /* Notifications Panel */
        .notifications-panel {
            background: white;
            border-radius: 16px;
            padding: 20px;
        }

        .notification-item {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid #e2e8f0;
        }

        .notification-item:last-child {
            border-bottom: none;
        }

        .notification-icon {
            width: 40px;
            height: 40px;
            background: #f8fafc;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .notification-content h4 {
            font-size: 14px;
            margin-bottom: 5px;
        }

        .notification-content p {
            font-size: 13px;
            color: #64748b;
        }

        .notification-time {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 5px;
        }

        /* Settings Panel */
        .settings-section {
            background: white;
            border-radius: 16px;
            padding: 30px;
        }

        .settings-tabs {
            display: flex;
            gap: 10px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .settings-tab {
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
        }

        .settings-tab.active {
            background: #0a2540;
            color: white;
        }

        .settings-form {
            max-width: 600px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #0a2540;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
        }

        .form-control:focus {
            border-color: #c19a6b;
            outline: none;
        }

        .security-option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f8fafc;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .summary-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .metrics-section {
                grid-template-columns: 1fr;
            }
        }

        /* Loading States */
        .loading {
            opacity: 0.5;
            pointer-events: none;
        }

        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">I</div>
                    <div class="logo-text"><span>TAAGC</span> Investor</div>
                </div>
                <div class="investor-badge" id="investorId">Ti001/03/2025</div>
            </div>

            <div class="nav-menu">
                <div class="nav-item active" data-section="account-summary">
                    <i class="fas fa-chart-pie"></i>
                    <span>Account Summary</span>
                </div>
                <div class="nav-item" data-section="key-metrics">
                    <i class="fas fa-chart-line"></i>
                    <span>Key Investment Metrics</span>
                </div>
                <div class="nav-item" data-section="performance">
                    <i class="fas fa-chart-bar"></i>
                    <span>Performance Overview</span>
                </div>
                <div class="nav-item" data-section="portfolio">
                    <i class="fas fa-briefcase"></i>
                    <span>Investment Portfolio</span>
                </div>
                <div class="nav-item" data-section="wallet">
                    <i class="fas fa-wallet"></i>
                    <span>Wallet & Transactions</span>
                </div>
                
                <div class="nav-divider"></div>
                
                <div class="nav-item" data-section="documents">
                    <i class="fas fa-file-alt"></i>
                    <span>Documents & Reports</span>
                </div>
                <div class="nav-item" data-section="notifications">
                    <i class="fas fa-bell"></i>
                    <span>Notifications</span>
                </div>
                <div class="nav-item" data-section="settings">
                    <i class="fas fa-cog"></i>
                    <span>Profile & Security</span>
                </div>
                
                <div class="nav-divider"></div>
                
                <div class="nav-item" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Header -->
            <div class="top-header">
                <div class="header-title">
                    <h1>
                        <i class="fas fa-chart-pie" style="color: #c19a6b;"></i>
                        <span id="pageTitle">Account Summary</span>
                    </h1>
                </div>
                <div class="header-actions">
                    <div class="notification-badge" onclick="showNotifications()">
                        <i class="far fa-bell"></i>
                        <span class="badge-count" id="notificationCount">3</span>
                    </div>
                    <div class="investor-profile-mini" onclick="showSettings()">
                        <div class="investor-avatar" id="investorAvatar">J</div>
                        <div>
                            <div id="investorName" style="font-weight: 600;">John Doe</div>
                            <div style="font-size: 12px; color: #64748b;" id="investorType">Investor</div>
                        </div>
                        <i class="fas fa-chevron-down" style="color: #64748b; font-size: 12px;"></i>
                    </div>
                </div>
            </div>

            <!-- Dynamic Content Sections -->
            <div id="content-area"></div>
        </main>
    </div>

    <!-- Templates for each section -->
    <template id="account-summary-template">
        <div class="summary-grid">
            <div class="summary-card">
                <div class="summary-icon"><i class="fas fa-dollar-sign"></i></div>
                <div class="summary-label">Total Investment</div>
                <div class="summary-value" id="totalInvestment">$0</div>
                <div class="summary-change positive">
                    <i class="fas fa-arrow-up"></i> +12.5%
                </div>
            </div>
            <div class="summary-card">
                <div class="summary-icon"><i class="fas fa-chart-line"></i></div>
                <div class="summary-label">Current Value</div>
                <div class="summary-value" id="currentValue">$0</div>
                <div class="summary-change positive">
                    <i class="fas fa-arrow-up"></i> +8.3%
                </div>
            </div>
            <div class="summary-card">
                <div class="summary-icon"><i class="fas fa-percent"></i></div>
                <div class="summary-label">Total Return</div>
                <div class="summary-value" id="totalReturn">$0</div>
                <div class="summary-change positive">
                    <i class="fas fa-arrow-up"></i> +15.2%
                </div>
            </div>
            <div class="summary-card">
                <div class="summary-icon"><i class="fas fa-calendar"></i></div>
                <div class="summary-label">Invested Since</div>
                <div class="summary-value" id="investedSince">2025</div>
                <div class="summary-change">3 months</div>
            </div>
        </div>
    </template>

    <template id="key-metrics-template">
        <div class="metrics-section">
            <div class="metrics-card">
                <div class="section-header">
                    <h2><i class="fas fa-chart-pie"></i> Investment Distribution</h2>
                    <select id="metricPeriod" style="padding: 8px; border-radius: 6px;">
                        <option>This Month</option>
                        <option>This Quarter</option>
                        <option>This Year</option>
                    </select>
                </div>
                <div class="metric-grid">
                    <div class="metric-item">
                        <div class="metric-label">Stocks</div>
                        <div class="metric-value">45%</div>
                        <div class="metric-sub">$45,000</div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-label">Bonds</div>
                        <div class="metric-value">25%</div>
                        <div class="metric-sub">$25,000</div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-label">Real Estate</div>
                        <div class="metric-value">20%</div>
                        <div class="metric-sub">$20,000</div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-label">Cash</div>
                        <div class="metric-value">10%</div>
                        <div class="metric-sub">$10,000</div>
                    </div>
                </div>
            </div>
            <div class="metrics-card">
                <div class="section-header">
                    <h2><i class="fas fa-chart-simple"></i> Key Ratios</h2>
                </div>
                <div class="metric-item">
                    <div class="metric-label">Sharpe Ratio</div>
                    <div class="metric-value">1.8</div>
                    <div class="metric-sub">Good</div>
                </div>
                <div class="metric-item">
                    <div class="metric-label">Alpha</div>
                    <div class="metric-value">2.4%</div>
                    <div class="metric-sub">Above Market</div>
                </div>
                <div class="metric-item">
                    <div class="metric-label">Beta</div>
                    <div class="metric-value">1.1</div>
                    <div class="metric-sub">Moderate Risk</div>
                </div>
            </div>
        </div>
    </template>

    <template id="performance-template">
        <div class="metrics-card">
            <div class="section-header">
                <h2><i class="fas fa-chart-line"></i> Performance Over Time</h2>
                <div>
                    <button class="wallet-btn" style="background: #0a2540; color: white; padding: 8px 16px; width: auto;">1M</button>
                    <button class="wallet-btn" style="background: #f8fafc; color: #0a2540; padding: 8px 16px; width: auto;">3M</button>
                    <button class="wallet-btn" style="background: #f8fafc; color: #0a2540; padding: 8px 16px; width: auto;">1Y</button>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="performanceChart"></canvas>
            </div>
        </div>
    </template>

    <template id="portfolio-template">
        <div class="portfolio-section">
            <div class="section-header">
                <h2><i class="fas fa-briefcase"></i> Investment Portfolio</h2>
                <button class="wallet-btn" style="background: #0a2540; color: white; padding: 10px 20px; width: auto;">
                    <i class="fas fa-download"></i> Export
                </button>
            </div>
            <table class="portfolio-table">
                <thead>
                    <tr>
                        <th>Company</th>
                        <th>Shares</th>
                        <th>Avg Price</th>
                        <th>Current Price</th>
                        <th>Total Value</th>
                        <th>Return</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="portfolioBody">
                    <!-- Filled by JavaScript -->
                </tbody>
            </table>
        </div>
    </template>

    <template id="wallet-template">
        <div class="wallet-section">
            <div class="wallet-card balance-card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3><i class="fas fa-wallet"></i> Available Balance</h3>
                    <i class="fas fa-ellipsis-h"></i>
                </div>
                <div class="balance-amount" id="walletBalance">$25,000.00</div>
                <div class="wallet-actions">
                    <button class="wallet-btn btn-primary">
                        <i class="fas fa-plus"></i> Add Funds
                    </button>
                    <button class="wallet-btn btn-secondary">
                        <i class="fas fa-exchange-alt"></i> Transfer
                    </button>
                </div>
            </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAI1MrcP977UgRLQoePxl64JOSyj9v4WpI",
            authDomain: "xtaagc.firebaseapp.com",
            projectId: "xtaagc",
            storageBucket: "xtaagc.appspot.com",
            messagingSenderId: "256073982437",
            appId: "1:256073982437:web:8da63bb7acc86c0ca98f0c"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Current user data
        let currentUser = null;
        let userData = null;

        // Check authentication
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            try {
                // Get user data
                const userDoc = await db.collection('users').doc(user.uid).get();
                
                if (!userDoc.exists) {
                    // If no profile, redirect to register
                    window.location.href = 'register.html';
                    return;
                }

                userData = userDoc.data();
                
                // Verify this is an investor
                if (userData.role !== 'investor' && userData.role !== 'admin') {
                    alert('Access denied. Investor portal only.');
                    window.location.href = 'profile.html';
                    return;
                }

                // Update UI with user data
                document.getElementById('investorName').textContent = userData.fullName || user.email;
                document.getElementById('investorAvatar').textContent = (userData.fullName || 'I').charAt(0).toUpperCase();
                document.getElementById('investorId').textContent = userData.generatedId || 'Ti001/03/2025';
                document.getElementById('investorType').textContent = userData.role || 'Investor';

                // Load initial section
                showSection('account-summary');

            } catch (error) {
                console.error('Auth error:', error);
                window.location.href = 'index.html';
            }
        });

        // Navigation
        document.querySelectorAll('.nav-item[data-section]').forEach(item => {
            item.addEventListener('click', function() {
                const section = this.dataset.section;
                showSection(section);
            });
        });

        // Show selected section
        function showSection(sectionId) {
            // Update active nav
            document.querySelectorAll('.nav-item').forEach(nav => {
                nav.classList.remove('active');
            });
            document.querySelector(`[data-section="${sectionId}"]`).classList.add('active');

            // Update page title
            const titles = {
                'account-summary': 'Account Summary',
                'key-metrics': 'Key Investment Metrics',
                'performance': 'Performance Overview',
                'portfolio': 'Investment Portfolio',
                'wallet': 'Wallet & Transactions',
                'documents': 'Documents & Reports',
                'notifications': 'Notifications',
                'settings': 'Profile & Security'
            };
            document.getElementById('pageTitle').textContent = titles[sectionId];

            // Load section content
            loadSection(sectionId);
        }

        // Load section content
        function loadSection(sectionId) {
            const template = document.getElementById(`${sectionId}-template`);
            const contentArea = document.getElementById('content-area');
            
            if (template) {
                contentArea.innerHTML = '';
                contentArea.appendChild(template.content.cloneNode(true));
                
                // Load section-specific data
                switch(sectionId) {
                    case 'account-summary':
                        loadAccountSummary();
                        break;
                    case 'portfolio':
                        loadPortfolio();
                        break;
                    case 'wallet':
                        loadWallet();
                        break;
                    case 'performance':
                        setTimeout(initPerformanceChart, 100);
                        break;
                }
            }
        }

        // Load account summary
        function loadAccountSummary() {
            // Mock data - replace with Firestore queries
            document.getElementById('totalInvestment').textContent = '$125,000';
            document.getElementById('currentValue').textContent = '$143,750';
            document.getElementById('totalReturn').textContent = '$18,750';
            document.getElementById('investedSince').textContent = '2025';
        }

        // Load portfolio
        function loadPortfolio() {
            const portfolioBody = document.getElementById('portfolioBody');
            const investments = [
                { company: 'Tech Corp', shares: 100, avgPrice: 150, currentPrice: 175, total: 17500, return: '+16.7%', status: 'active' },
                { company: 'Green Energy', shares: 250, avgPrice: 45, currentPrice: 52, total: 13000, return: '+15.6%', status: 'active' },
                { company: 'Real Estate Fund', shares: 50, avgPrice: 200, currentPrice: 215, total: 10750, return: '+7.5%', status: 'pending' },
            ];

            let html = '';
            investments.forEach(inv => {
                html += `
                    <tr>
                        <td>
                            <div class="company-name">
                                <div class="company-logo">${inv.company.charAt(0)}</div>
                                ${inv.company}
                            </div>
                        </td>
                        <td>${inv.shares}</td>
                        <td>$${inv.avgPrice}</td>
                        <td>$${inv.currentPrice}</td>
                        <td>$${inv.total.toLocaleString()}</td>
                        <td class="positive">${inv.return}</td>
                        <td><span class="status-badge status-${inv.status}">${inv.status}</span></td>
                    </tr>
                `;
            });
            portfolioBody.innerHTML = html;
        }

        // Load wallet
        function loadWallet() {
            document.getElementById('walletBalance').textContent = '$25,000.00';
            
            const transactionsList = document.getElementById('transactionsList');
            const transactions = [
                { type: 'deposit', desc: 'Deposit from Bank', date: 'Mar 15, 2025', amount: '+$10,000' },
                { type: 'investment', desc: 'Investment in Tech Corp', date: 'Mar 14, 2025', amount: '-$5,000' },
                { type: 'dividend', desc: 'Dividend Payment', date: 'Mar 10, 2025', amount: '+$1,250' },
            ];

            let html = '';
            transactions.forEach(t => {
                html += `
                    <div class="transaction-item">
                        <div class="transaction-info">
                            <div class="transaction-icon">
                                <i class="fas ${t.type === 'deposit' ? 'fa-arrow-down' : t.type === 'investment' ? 'fa-chart-line' : 'fa-coins'}"></i>
                            </div>
                            <div class="transaction-details">
                                <h4>${t.desc}</h4>
                                <p>${t.date}</p>
                            </div>
                        </div>
                        <div class="transaction-amount ${t.amount.startsWith('+') ? 'positive' : 'negative'}">
                            ${t.amount}
                        </div>
                    </div>
                `;
            });
            transactionsList.innerHTML = html;
        }

        // Initialize performance chart
        function initPerformanceChart() {
            const ctx = document.getElementById('performanceChart')?.getContext('2d');
            if (!ctx) return;

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                    datasets: [{
                        label: 'Portfolio Value',
                        data: [125000, 132000, 138000, 141000, 143750, 148000],
                        borderColor: '#c19a6b',
                        backgroundColor: 'rgba(193, 154, 107, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            grid: {
                                display: true,
                                color: 'rgba(0,0,0,0.05)'
                            }
                        }
                    }
                }
            });
        }

        // Settings tabs
        window.switchSettingsTab = function(tab) {
            document.querySelectorAll('.settings-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('profile-settings').style.display = tab === 'profile' ? 'block' : 'none';
            document.getElementById('security-settings').style.display = tab === 'security' ? 'block' : 'none';
        };

        // Show notifications
        window.showNotifications = function() {
            showSection('notifications');
        };

        // Show settings
        window.showSettings = function() {
            showSection('settings');
        };

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            try {
                await auth.signOut();
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Logout error:', error);
            }
        });
    </script>
