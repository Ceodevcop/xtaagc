<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investor Dashboard - TAAGC</title>
    
    <!-- Firebase 8.10.1 SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <!-- Chart.js for performance charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #f3f4f6;
        }

        /* Dashboard Layout */
        .dashboard {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0a2540 0%, #1e3a5f 100%);
            color: white;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .sidebar-header {
            padding: 30px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: #c19a6b;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
        }

        .logo-text span {
            color: #c19a6b;
        }

        .investor-badge {
            background: rgba(193, 154, 107, 0.2);
            border: 1px solid #c19a6b;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 14px;
            margin-top: 15px;
            display: inline-block;
            font-weight: 500;
        }

        .nav-menu {
            padding: 20px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 10px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 15px;
            font-weight: 500;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }

        .nav-item i {
            width: 20px;
            color: #c19a6b;
            font-size: 16px;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .nav-item.active {
            background: #c19a6b;
            color: white;
        }

        .nav-item.active i {
            color: white;
        }

        .nav-divider {
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 20px 0;
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
        }

        /* Top Header */
        .top-header {
            background: white;
            border-radius: 16px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .header-title h1 {
            color: #0a2540;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .notification-badge {
            position: relative;
            cursor: pointer;
        }

        .notification-badge i {
            font-size: 20px;
            color: #64748b;
        }

        .badge-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #e53e3e;
            color: white;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 600;
        }

        .investor-profile-mini {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: #f8fafc;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .investor-profile-mini:hover {
            background: #e2e8f0;
        }

        .investor-avatar {
            width: 40px;
            height: 40px;
            background: #c19a6b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 16px;
        }

        /* Account Summary Cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .summary-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }

        .summary-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        .summary-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #0a2540, #1e3a5f);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin-bottom: 16px;
        }

        .summary-label {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .summary-value {
            font-size: 28px;
            font-weight: 700;
            color: #0a2540;
            margin-bottom: 5px;
        }

        .summary-change {
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .positive { color: #10b981; }
        .negative { color: #e53e3e; }

        /* Key Investment Metrics */
        .metrics-section {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .metrics-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-header h2 {
            color: #0a2540;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }

        .section-header select {
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            color: #0a2540;
            font-size: 14px;
            cursor: pointer;
        }

        .metric-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .metric-item {
            padding: 15px;
            background: #f8fafc;
            border-radius: 12px;
        }

        .metric-label {
            color: #64748b;
            font-size: 13px;
            margin-bottom: 5px;
        }

        .metric-value {
            font-size: 24px;
            font-weight: 700;
            color: #0a2540;
        }

        .metric-sub {
            font-size: 13px;
            color: #64748b;
            margin-top: 5px;
        }

        /* Performance Chart */
        .chart-container {
            height: 300px;
            margin-top: 20px;
            position: relative;
        }

        .chart-controls {
            display: flex;
            gap: 8px;
        }

        .chart-btn {
            padding: 6px 12px;
            border: 1px solid #e2e8f0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .chart-btn:hover,
        .chart-btn.active {
            background: #0a2540;
            color: white;
            border-color: #0a2540;
        }

        /* Portfolio Table */
        .portfolio-section {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .portfolio-table {
            width: 100%;
            border-collapse: collapse;
        }

        .portfolio-table th {
            text-align: left;
            padding: 15px;
            background: #f8fafc;
            color: #0a2540;
            font-weight: 600;
            font-size: 14px;
        }

        .portfolio-table td {
            padding: 15px;
            border-bottom: 1px solid #e2e8f0;
        }

        .company-name {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .company-logo {
            width: 32px;
            height: 32px;
            background: #0a2540;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 600;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status-active { 
            background: #10b98120; 
            color: #10b981; 
        }
        
        .status-pending { 
            background: #f59e0b20; 
            color: #f59e0b; 
        }

        /* Wallet Section */
        .wallet-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .wallet-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .balance-card {
            background: linear-gradient(135deg, #0a2540, #1e3a5f);
            color: white;
        }

        .balance-card .section-header h2 {
            color: white;
        }

        .balance-amount {
            font-size: 36px;
            font-weight: 700;
            margin: 20px 0;
        }

        .wallet-actions {
            display: flex;
            gap: 10px;
        }

        .wallet-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #c19a6b;
            color: white;
        }

        .btn-primary:hover {
            background: #b38b5f;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.3);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #c19a6b;
            color: #c19a6b;
        }

        .btn-outline:hover {
            background: #c19a6b;
            color: white;
        }

        /* Transactions List */
        .transactions-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .transaction-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            border-bottom: 1px solid #e2e8f0;
            transition: background 0.3s;
        }

        .transaction-item:hover {
            background: #f8fafc;
        }

        .transaction-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .transaction-icon {
            width: 40px;
            height: 40px;
            background: #f8fafc;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c19a6b;
            font-size: 16px;
        }

        .transaction-details h4 {
            font-size: 14px;
            margin-bottom: 4px;
            color: #0a2540;
        }

        .transaction-details p {
            font-size: 12px;
            color: #64748b;
        }

        .transaction-amount {
            font-weight: 600;
            font-size: 16px;
        }

        .transaction-amount.positive { color: #10b981; }
        .transaction-amount.negative { color: #e53e3e; }

        /* Documents Grid */
        .documents-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .document-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .document-card:hover {
            border-color: #c19a6b;
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        .document-icon {
            width: 56px;
            height: 56px;
            background: #f8fafc;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            color: #c19a6b;
            font-size: 28px;
        }

        .document-card h4 {
            color: #0a2540;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .document-card p {
            color: #64748b;
            font-size: 13px;
            margin-bottom: 5px;
        }

        .document-size {
            color: #c19a6b;
            font-size: 12px;
            font-weight: 600;
        }

        /* Notifications Panel */
        .notifications-panel {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .notification-item {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
            transition: background 0.3s;
        }

        .notification-item:hover {
            background: #f8fafc;
        }

        .notification-item:last-child {
            border-bottom: none;
        }

        .notification-icon {
            width: 48px;
            height: 48px;
            background: #f8fafc;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .notification-content {
            flex: 1;
        }

        .notification-content h4 {
            font-size: 16px;
            margin-bottom: 5px;
            color: #0a2540;
        }

        .notification-content p {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 8px;
        }

        .notification-time {
            font-size: 12px;
            color: #94a3b8;
        }

        /* Settings Panel */
        .settings-section {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .settings-tabs {
            display: flex;
            gap: 10px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .settings-tab {
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }

        .settings-tab:hover {
            background: #f8fafc;
        }

        .settings-tab.active {
            background: #0a2540;
            color: white;
        }

        .settings-form {
            max-width: 600px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #0a2540;
            font-size: 14px;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: #c19a6b;
            outline: none;
            box-shadow: 0 0 0 3px rgba(193, 154, 107, 0.1);
        }

        .security-option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: #f8fafc;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .security-option h4 {
            color: #0a2540;
            margin-bottom: 5px;
            font-size: 16px;
        }

        .security-option p {
            color: #64748b;
            font-size: 13px;
        }

        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #c19a6b;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        /* Loading States */
        .loading {
            text-align: center;
            padding: 50px;
            color: #64748b;
        }

        .loading i {
            font-size: 40px;
            color: #c19a6b;
            margin-bottom: 20px;
        }

        /* Error Message */
        .error-message {
            text-align: center;
            padding: 50px;
            color: #e53e3e;
            background: white;
            border-radius: 16px;
            margin-bottom: 30px;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .summary-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .metrics-section {
                grid-template-columns: 1fr;
            }
            .wallet-section {
                grid-template-columns: 1fr;
            }
            .documents-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 80px;
            }
            .sidebar .logo-text,
            .sidebar .nav-item span,
            .sidebar .investor-badge {
                display: none;
            }
            .main-content {
                margin-left: 80px;
            }
            .nav-item {
                justify-content: center;
                padding: 14px;
            }
            .nav-item i {
                margin: 0;
            }
            .summary-grid {
                grid-template-columns: 1fr;
            }
            .documents-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">I</div>
                    <div class="logo-text"><span>TAAGC</span> Investor</div>
                </div>
                <div class="investor-badge" id="investorId">Loading...</div>
            </div>

            <div class="nav-menu">
                <!-- Main Navigation -->
                <button class="nav-item active" data-section="account-summary">
                    <i class="fas fa-chart-pie"></i>
                    <span>Account Summary</span>
                </button>
                <button class="nav-item" data-section="key-metrics">
                    <i class="fas fa-chart-line"></i>
                    <span>Key Investment Metrics</span>
                </button>
                <button class="nav-item" data-section="performance">
                    <i class="fas fa-chart-bar"></i>
                    <span>Performance Overview</span>
                </button>
                <button class="nav-item" data-section="portfolio">
                    <i class="fas fa-briefcase"></i>
                    <span>Investment Portfolio</span>
                </button>
                <button class="nav-item" data-section="wallet">
                    <i class="fas fa-wallet"></i>
                    <span>Wallet & Transactions</span>
                </button>
                
                <div class="nav-divider"></div>
                
                <!-- Documents & Reports -->
                <button class="nav-item" data-section="documents">
                    <i class="fas fa-file-alt"></i>
                    <span>Documents & Reports</span>
                </button>
                <button class="nav-item" data-section="notifications">
                    <i class="fas fa-bell"></i>
                    <span>Notifications</span>
                </button>
                <button class="nav-item" data-section="settings">
                    <i class="fas fa-cog"></i>
                    <span>Profile & Security</span>
                </button>
                
                <div class="nav-divider"></div>
                
                <!-- Logout -->
                <button class="nav-item" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Header -->
            <div class="top-header">
                <div class="header-title">
                    <h1>
                        <i class="fas fa-chart-pie" style="color: #c19a6b;"></i>
                        <span id="pageTitle">Account Summary</span>
                    </h1>
                </div>
                <div class="header-actions">
                    <div class="notification-badge" id="notificationBell">
                        <i class="far fa-bell"></i>
                        <span class="badge-count" id="notificationCount">0</span>
                    </div>
                    <div class="investor-profile-mini" id="profileMenu">
                        <div class="investor-avatar" id="investorAvatar">I</div>
                        <div>
                            <div id="investorName" style="font-weight: 600;">Loading...</div>
                            <div style="font-size: 12px; color: #64748b;" id="investorType">Investor</div>
                        </div>
                        <i class="fas fa-chevron-down" style="color: #64748b; font-size: 12px;"></i>
                    </div>
                </div>
            </div>

            <!-- Dynamic Content Sections -->
            <div id="content-area">
                <!-- Content will be loaded here -->
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading dashboard...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Templates for each section -->
    <template id="account-summary-template">
        <div class="summary-grid">
            <div class="summary-card">
                <div class="summary-icon"><i class="fas fa-dollar-sign"></i></div>
                <div class="summary-label">Total Investment</div>
                <div class="summary-value" id="totalInvestment">$0</div>
                <div class="summary-change positive" id="investmentChange">
                    <i class="fas fa-arrow-up"></i> +0%
                </div>

        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = '../index.html';
                return;

            try {
                // Get user data
                const userDoc = await db.collection('users').doc(user.uid).get();
                
                if (!userDoc.exists) {
                    showError('User profile not found. Please contact support.');
                    return;
                }

                userData = userDoc.data();

                // Verify this is an investor
                if (userData.role !== 'investor') {
                    showError('This portal is for investors only.');
                    setTimeout(() => {
                        auth.signOut();
                        window.location.href = '../index.html';
                    }, 3000);
                    return;
                }

                currentUser = user;

                // Update header with user info
                document.getElementById('investorId').textContent = userData.generatedId || 'Ti001/03/2025';
                document.getElementById('investorAvatar').textContent = (userData.fullName || 'I').charAt(0).toUpperCase();
                document.getElementById('investorName').textContent = userData.fullName || 'Investor';
                document.getElementById('investorType').textContent = 'Investor';

                // Load initial section
                showSection('account-summary');

            } catch (error) {
                console.error('Auth error:', error);
                showError('Error loading profile. Please try again.');

                'documents': 'Documents & Reports',
                'notifications': 'Notifications & Updates',
                'settings': 'Profile & Security Settings'
            };
            document.getElementById('pageTitle').textContent = titles[sectionId];

            // Load section content
            loadSection(sectionId);

            const template = document.getElementById(`${sectionId}-template`);

                document.getElementById('profileEmail').value = userData.email || '';
                document.getElementById('profilePhone').value = userData.phone || '';
                document.getElementById('profileAddress').value = userData.address || '';
            }

            // Settings tabs
            document.querySelectorAll('.settings-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.settings-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    
                    const tabName = this.dataset.tab;
                    document.querySelectorAll('.settings-tab-content').forEach(content => {
                        content.style.display = 'none';
                    });
                    document.getElementById(`${tabName}-tab`).style.display = 'block';
                });
            });

            // Profile form submit
            document.getElementById('profileForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const updates = {
                    fullName: document.getElementById('profileName').value,
                    phone: document.getElementById('profilePhone').value,
                    address: document.getElementById('profileAddress').value
                };

                try {
                    await db.collection('users').doc(currentUser.uid).update(updates);
                    alert('Profile updated successfully!');
                    
                    // Update header
                    document.getElementById('investorName').textContent = updates.fullName || 'Investor';
                    document.getElementById('investorAvatar').textContent = (updates.fullName || 'I').charAt(0).toUpperCase();
                } catch (error) {
                    alert('Error updating profile: ' + error.message);
                }
            });

            // Security buttons
            document.getElementById('changePasswordBtn')?.addEventListener('click', () => {
                alert('Change password functionality will be implemented here');
            });

            document.getElementById('viewLoginHistory')?.addEventListener('click', () => {
                alert('Login history will be displayed here');
            });

            document.getElementById('manageSessions')?.addEventListener('click', () => {
                alert('Session management will be displayed here');
            });
        }

        // Show error message
        function showError(message) {
            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = `
                <div class="error-message">
                    <i class="fas fa-exclamation-circle" style="font-size: 48px; margin-bottom: 20px;"></i>
                    <p>${message}</p>
                </div>
            `;
        }

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            try {
                await auth.signOut();
                window.location.href = '../index.html';
            } catch (error) {
                console.error('Logout error:', error);
            }
        });
    </script>
</body>
</html>
