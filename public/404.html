<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - TAAGC Global</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/platform.css">
    
    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, var(--bg), white);
        }
        
        .error-content {
            text-align: center;
            max-width: 600px;
        }
        
        .error-code {
            font-size: 180px;
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 10px 10px 20px rgba(0,0,0,0.1);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .error-title {
            font-size: 32px;
            color: var(--dark);
            margin-bottom: 20px;
        }
        
        .error-message {
            color: var(--light);
            font-size: 18px;
            margin-bottom: 40px;
            line-height: 1.8;
        }
        
        .error-actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .search-box {
            max-width: 400px;
            margin: 40px auto;
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 50px;
            font-size: 16px;
            transition: var(--transition);
        }
        
        .search-box input:focus {
            border-color: var(--accent);
            outline: none;
        }
        
        .search-box i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--light);
        }
        
        .helpful-links {
            margin-top: 40px;
            padding-top: 40px;
            border-top: 1px solid #e2e8f0;
        }
        
        .helpful-links h3 {
            color: var(--primary);
            margin-bottom: 20px;
        }
        
        .links-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        .links-grid a {
            color: var(--light);
            text-decoration: none;
            padding: 10px;
            border-radius: var(--radius-md);
            transition: var(--transition);
        }
        
        .links-grid a:hover {
            background: var(--accent);
            color: white;
        }
        
        @media (max-width: 768px) {
            .error-code {
                font-size: 120px;
            }
            
            .error-title {
                font-size: 24px;
            }
            
            .links-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 480px) {
            .links-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-content">
            <div class="error-code">404</div>
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-message">
                The page you're looking for doesn't exist or has been moved.<br>
                Let's get you back on track.
            </p>
            
            <div class="error-actions">
                <a href="/" class="btn btn-primary btn-lg">
                    <i class="fas fa-home"></i> Go Home
                </a>
                <a href="/contact" class="btn btn-outline btn-lg">
                    <i class="fas fa-headset"></i> Contact Support
                </a>
            </div>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search our site...">
                <i class="fas fa-search"></i>
            </div>
            
            <div class="helpful-links">
                <h3>Helpful Links</h3>
                <div class="links-grid">
                    <a href="/investors">Investors Hub</a>
                    <a href="/projects">Projects</a>
                    <a href="/education">Education</a>
                    <a href="/about">About Us</a>
                    <a href="/faq">FAQ</a>
                    <a href="/contact">Contact</a>
                </div>
            </div>
        </div>
    </div>

    <script src="/assets/js/platform.js"></script>
    
    <script>
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = e.target.value;
                if (query) {
                    window.location.href = `/search?q=${encodeURIComponent(query)}`;
                }
            }
        });
    </script>
</body>
</html>
