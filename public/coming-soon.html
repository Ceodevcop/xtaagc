<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - TAAGC Global</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/platform.css">
    
    <style>
        .coming-soon {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            position: relative;
            overflow: hidden;
        }
        
        .coming-soon::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 70%;
            height: 200%;
            background: radial-gradient(circle, rgba(193,154,107,0.15) 0%, transparent 70%);
            animation: float 20s ease-in-out infinite;
        }
        
        .coming-soon::after {
            content: '';
            position: absolute;
            bottom: -50%;
            left: -10%;
            width: 70%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            animation: float 25s ease-in-out infinite reverse;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, 2%) rotate(1deg); }
            66% { transform: translate(-2%, -2%) rotate(-1deg); }
        }
        
        .coming-soon-content {
            text-align: center;
            color: white;
            position: relative;
            z-index: 10;
            max-width: 800px;
            padding: 40px 20px;
            animation: fadeInUp 0.8s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .coming-soon-icon {
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 48px;
            color: var(--accent);
            border: 2px solid var(--accent);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(193,154,107,0.7); }
            50% { transform: scale(1.05); box-shadow: 0 0 20px 10px rgba(193,154,107,0.3); }
        }
        
        .coming-soon-title {
            font-size: 72px;
            font-weight: 800;
            margin-bottom: 20px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .coming-soon-title span {
            color: var(--accent);
        }
        
        .coming-soon-description {
            font-size: 20px;
            margin-bottom: 40px;
            opacity: 0.9;
            line-height: 1.8;
        }
        
        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            max-width: 600px;
            margin: 50px auto;
        }
        
        .countdown-item {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-lg);
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: var(--transition);
        }
        
        .countdown-item:hover {
            transform: translateY(-10px);
            background: rgba(255,255,255,0.15);
        }
        
        .countdown-number {
            font-size: 48px;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 5px;
        }
        
        .countdown-label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
        }
        
        .notification-form {
            max-width: 500px;
            margin: 40px auto;
            display: flex;
            gap: 10px;
        }
        
        .notification-form input {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            background: rgba(255,255,255,0.9);
        }
        
        .notification-form input:focus {
            outline: 2px solid var(--accent);
        }
        
        .notification-form button {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            background: var(--accent);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .notification-form button:hover {
            background: var(--accent-dark);
            transform: translateY(-2px);
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }
        
        .social-link {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            transition: var(--transition);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .social-link:hover {
            background: var(--accent);
            transform: translateY(-5px);
        }
        
        .back-link {
            margin-top: 40px;
        }
        
        .back-link a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }
        
        .back-link a:hover {
            color: var(--accent);
        }
        
        @media (max-width: 768px) {
            .coming-soon-title {
                font-size: 48px;
            }
            
            .countdown-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            
            .notification-form {
                flex-direction: column;
            }
            
            .coming-soon-description {
                font-size: 16px;
            }
        }
        
        @media (max-width: 480px) {
            .coming-soon-title {
                font-size: 36px;
            }
            
            .countdown-number {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="coming-soon">
        <div class="coming-soon-content">
            <div class="coming-soon-icon">
                <i class="fas fa-rocket"></i>
            </div>
            
            <h1 class="coming-soon-title">
                <span>Coming</span> Soon
            </h1>
            
            <p class="coming-soon-description">
                We're working hard to bring you something amazing.<br>
                Stay tuned for updates!
            </p>
            
            <div class="countdown-grid" id="countdown">
                <div class="countdown-item">
                    <div class="countdown-number" id="days">00</div>
                    <div class="countdown-label">Days</div>
                </div>
                <div class="countdown-item">
                    <div class="countdown-number" id="hours">00</div>
                    <div class="countdown-label">Hours</div>
                </div>
                <div class="countdown-item">
                    <div class="countdown-number" id="minutes">00</div>
                    <div class="countdown-label">Minutes</div>
                </div>
                <div class="countdown-item">
                    <div class="countdown-number" id">seconds">00</div>
                    <div class="countdown-label">Seconds</div>
                </div>
            </div>
            
            <form class="notification-form" onsubmit="notifyMe(event)">
                <input type="email" placeholder="Enter your email" required>
                <button type="submit">Notify Me</button>
            </form>
            
            <div class="social-links">
                <a href="#" class="social-link"><i class="fab fa-twitter"></i></a>
                <a href="#" class="social-link"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="social-link"><i class="fab fa-linkedin-in"></i></a>
                <a href="#" class="social-link"><i class="fab fa-instagram"></i></a>
            </div>
            
            <div class="back-link">
                <a href="/">
                    <i class="fas fa-arrow-left"></i>
                    Back to Home
                </a>
            </div>
        </div>
    </div>

    <script src="/assets/js/platform.js"></script>
    
    <script>
        // Set launch date (e.g., 30 days from now)
        const launchDate = new Date();
        launchDate.setDate(launchDate.getDate() + 30);
        launchDate.setHours(0, 0, 0, 0);
        
        function updateCountdown() {
            const now = new Date();
            const diff = launchDate - now;
            
            if (diff <= 0) {
                document.getElementById('days').textContent = '00';
                document.getElementById('hours').textContent = '00';
                document.getElementById('minutes').textContent = '00';
                document.getElementById('seconds').textContent = '00';
                return;
            }
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            document.getElementById('days').textContent = days.toString().padStart(2, '0');
            document.getElementById('hours').textContent = hours.toString().padStart(2, '0');
            document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
            document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');
        }
        
        setInterval(updateCountdown, 1000);
        updateCountdown();
        
        function notifyMe(e) {
            e.preventDefault();
            const email = e.target.querySelector('input').value;
            TAAGC.Utils.showToast(`Thanks! We'll notify ${email} when we launch.`, 'success');
            e.target.reset();
        }
    </script>
</body>
</html>
