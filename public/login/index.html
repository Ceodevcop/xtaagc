<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAAGC · login</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #0a1f30, #1b4b6e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 40px;
            padding: 50px 40px;
            box-shadow: 0 30px 60px -20px #000;
            border: 3px solid #e09f2c;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(145deg, #0a1f30, #1e4f7a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo p {
            color: #e09f2c;
            font-weight: 600;
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #0a1f30;
        }
        .form-group input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 60px;
            border: 2px solid #d0e2f2;
            font-size: 1rem;
            transition: 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #e09f2c;
        }
        .login-btn {
            background: #e09f2c;
            color: #0a1f30;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin: 10px 0;
            border: 2px solid white;
        }
        .login-btn:hover {
            background: #cf8f1f;
        }
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 60px;
            text-align: center;
            margin: 15px 0;
            display: none;
        }
        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 60px;
            text-align: center;
            margin: 15px 0;
            display: none;
        }
        .register-link {
            text-align: center;
            margin-top: 25px;
            color: #6b8ca8;
        }
        .register-link a {
            color: #e09f2c;
            font-weight: 600;
            text-decoration: none;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
        .back-to-home {
            text-align: center;
            margin-top: 15px;
        }
        .back-to-home a {
            color: #6b8ca8;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-to-home a:hover {
            color: #e09f2c;
        }
        .fb-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #0a1f30;
            color: #e09f2c;
            padding: 8px 16px;
            border-radius: 60px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>TAAGC</h1>
            <p>welcome back</p>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="loginForm" onsubmit="event.preventDefault();">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> email</label>
                <input type="email" id="email" placeholder="your@email.com" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-lock"></i> password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> log in
            </button>
        </form>

        <div class="register-link">
            don't have an account? <a href="/register">sign up here</a>
        </div>

        <div class="back-to-home">
            <a href="/"><i class="fas fa-arrow-left"></i> back to home</a>
        </div>
    </div>

    <div class="fb-status" id="firebaseStatus">⏳ connecting...</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAI1MrcP977UgRLQoePxl64JOSyj9v4WpI",
            authDomain: "xtaagc.firebaseapp.com",
            projectId: "xtaagc",
            storageBucket: "xtaagc.firebasestorage.app",
            messagingSenderId: "256073982437",
            appId: "1:256073982437:web:8da63bb7acc86c0ca98f0c"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        
        document.getElementById('firebaseStatus').innerHTML = '✅ login ready';

        // Check if already logged in
        auth.onAuthStateChanged((user) => {
            if (user) {
                // Redirect to marketplace or previous page
                window.location.href = '/dashboard';
            }
        });

        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');

            // Hide previous messages
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            // Validate
            if (!email || !password) {
                showError('email and password are required');
                return;
            }

            // Show loading
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> logging in...';

            try {
                // Attempt login
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                
                // Show success
                successDiv.style.display = 'block';
                successDiv.innerHTML = '✅ login successful! redirecting...';
                
                // Redirect after short delay
                setTimeout(() => {
                    window.location.href = '/marketplace';
                }, 1500);

            } catch (error) {
                console.error('Login error:', error);
                
                // Handle specific error messages
                let message = 'login failed';
                if (error.code === 'auth/user-not-found') {
                    message = 'no account found with this email';
                } else if (error.code === 'auth/wrong-password') {
                    message = 'incorrect password';
                } else if (error.code === 'auth/invalid-email') {
                    message = 'invalid email format';
                } else if (error.code === 'auth/too-many-requests') {
                    message = 'too many attempts. try again later';
                } else {
                    message = error.message;
                }
                
                showError(message);
                
                // Re-enable button
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> log in';
            }
        });

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.innerHTML = `❌ ${message}`;
            errorDiv.style.display = 'block';
        }

        // Auto-focus email field
        document.getElementById('email').focus();

        // Handle "Enter" key
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
