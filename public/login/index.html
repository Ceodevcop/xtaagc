<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TAAGC Global</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a2540, #1a3a4f);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            max-width: 450px;
            width: 100%;
        }

        .login-card {
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #0a2540, #2a4a6a);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            color: white;
            font-size: 32px;
        }

        .logo h1 {
            color: #0a2540;
            font-size: 28px;
        }

        .logo h1 span {
            color: #c19a6b;
        }

        .alert {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-error {
            background: #fee2e2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .alert-success {
            background: #dcfce7;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }

        .alert-info {
            background: #cff4fc;
            color: #0891b2;
            border: 1px solid #b6effb;
        }

        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #1e293b;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group label i {
            color: #c19a6b;
            margin-right: 8px;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
        }

        .form-control {
            width: 100%;
            padding: 14px 20px 14px 50px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: #c19a6b;
            outline: none;
            box-shadow: 0 0 0 3px rgba(193, 154, 107, 0.1);
        }

        .form-control:disabled {
            background: #f1f5f9;
            cursor: not-allowed;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #c19a6b;
        }

        .remember-me label {
            color: #1e293b;
            cursor: pointer;
        }

        .forgot-password {
            color: #c19a6b;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #0a2540, #1a3a4f);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            font-size: 16px;
        }

        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(10,37,64,0.2);
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-google {
            width: 100%;
            padding: 16px;
            background: white;
            color: #1e293b;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-google:hover {
            background: #f8fafc;
            border-color: #c19a6b;
        }

        .btn-google i {
            color: #c19a6b;
            font-size: 18px;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }

        .divider span {
            padding: 0 15px;
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
        }

        .register-link {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }

        .register-link p {
            color: #1e293b;
        }

        .register-link a {
            color: #c19a6b;
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .verification-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .badge-warning {
            background: #fff3cd;
            color: #856404;
        }

        .badge-success {
            background: #d4edda;
            color: #155724;
        }

        .two-factor-section {
            margin-top: 20px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 12px;
            display: none;
        }

        .two-factor-section.active {
            display: block;
        }

        .two-factor-section h4 {
            margin-bottom: 15px;
            color: #0a2540;
        }

        .otp-input {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .otp-input input {
            width: 45px;
            height: 45px;
            text-align: center;
            font-size: 20px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
        }

        .otp-input input:focus {
            border-color: #c19a6b;
            outline: none;
        }

        .btn-verify {
            width: 100%;
            padding: 14px;
            background: #c19a6b;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-verify:hover {
            background: #a87c4f;
        }

        .status-message {
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-chart-line"></i>
                </div>
                <h1><span>TAAGC</span> Global</h1>
            </div>

            <div id="loginAlert" class="alert"></div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                    </div>
                </div>

                <div class="remember-forgot">
                    <div class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <label for="rememberMe">Remember me</label>
                    </div>
                    <a href="#" class="forgot-password" onclick="showForgotPassword()">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <!-- Forgot Password Form (Hidden by default) -->
            <form id="forgotPasswordForm" style="display: none;">
                <div class="alert-info" style="margin-bottom: 20px;">
                    <i class="fas fa-info-circle"></i> Enter your email to receive a password reset link.
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" class="form-control" id="resetEmail" placeholder="Enter your email" required>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="resetBtn">
                    <i class="fas fa-paper-plane"></i> Send Reset Link
                </button>

                <div style="text-align: center; margin-top: 15px;">
                    <a href="#" onclick="showLoginForm()" style="color: #c19a6b; text-decoration: none;">Back to Login</a>
                </div>
            </form>

            <!-- Two-Factor Authentication Section (if enabled) -->
            <div id="twoFactorSection" class="two-factor-section">
                <h4><i class="fas fa-shield-alt"></i> Two-Factor Authentication</h4>
                <p style="color: #64748b; margin-bottom: 15px;">Enter the verification code sent to your phone</p>
                
                <div class="otp-input" id="otpInput">
                    <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric">
                    <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric">
                    <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric">
                    <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric">
                    <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric">
                    <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric">
                </div>
                
                <button class="btn-verify" id="verify2FABtn">Verify Code</button>
                <div class="status-message" id="twoFAStatus"></div>
            </div>

            <!-- Google Sign In -->
            <div class="divider">
                <span>OR</span>
            </div>

            <button class="btn-google" id="googleSignInBtn">
                <i class="fab fa-google"></i> Continue with Google
            </button>

            <div class="register-link">
                <p>Don't have an account? <a href="/register">Create Account</a></p>
            </div>
        </div>
    </div>

    <script>
        // Your Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCOcCDPqRSlAMJJBEeNchTA1qO9tl9Nldw",
            authDomain: "xtaagc.firebaseapp.com",
            projectId: "xtaagc",
            storageBucket: "xtaagc.firebasestorage.app",
            messagingSenderId: "256073982437",
            appId: "1:256073982437:android:0c54368d54e260cba98f0c"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Use device language
        auth.useDeviceLanguage();

        // State management
        let isTwoFactorRequired = false;
        let pendingUser = null;
        let twoFactorResolver = null;

        // Check URL parameters for messages
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('registered') === 'true') {
            showAlert('Registration successful! Please check your email to verify your account.', 'success');
        }
        if (urlParams.get('verified') === 'true') {
            showAlert('Email verified successfully! You can now login.', 'success');
        }
        if (urlParams.get('reset') === 'true') {
            showAlert('Password reset email sent. Check your inbox.', 'success');
        }

        // DOM Ready
        document.addEventListener('DOMContentLoaded', function() {
            // Check if user is already logged in
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    // User is signed in, check if email is verified
                    if (user.emailVerified) {
                        // Check user role and redirect accordingly
                        await redirectBasedOnRole(user);
                    } else {
                        // Email not verified
                        showAlert('Please verify your email before logging in. <a href="#" onclick="resendVerification()" style="color: #c19a6b;">Resend verification email</a>', 'warning');
                        // Sign out
                        await auth.signOut();
                    }
                }
            });

            // Login form submission
            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                await handleEmailLogin();
            });

            // Forgot password form submission
            document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                await handleForgotPassword();
            });

            // Google Sign In
            document.getElementById('googleSignInBtn').addEventListener('click', async (e) => {
                e.preventDefault();
                await handleGoogleSignIn();
            });

            // Two-factor verification
            document.getElementById('verify2FABtn').addEventListener('click', async () => {
                await verifyTwoFactor();
            });

            // OTP input handling
            setupOtpInput();
        });

        // Setup OTP input auto-tabbing
        function setupOtpInput() {
            const inputs = document.querySelectorAll('#otpInput input');
            inputs.forEach((input, index) => {
                input.addEventListener('keyup', (e) => {
                    if (e.key >= '0' && e.key <= '9') {
                        if (index < inputs.length - 1) {
                            inputs[index + 1].focus();
                        }
                    } else if (e.key === 'Backspace') {
                        if (index > 0) {
                            inputs[index - 1].focus();
                        }
                    }
                });

                input.addEventListener('paste', (e) => {
                    e.preventDefault();
                    const paste = e.clipboardData.getData('text');
                    if (paste.length === 6 && /^\d+$/.test(paste)) {
                        paste.split('').forEach((char, i) => {
                            if (inputs[i]) inputs[i].value = char;
                        });
                        inputs[5].focus();
                    }
                });
            });
        }

        // Handle Email/Password Login
        async function handleEmailLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            const loginBtn = document.getElementById('loginBtn');
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing In...';

            try {
                // Set persistence based on remember me
                const persistence = rememberMe 
                    ? firebase.auth.Auth.Persistence.LOCAL 
                    : firebase.auth.Auth.Persistence.SESSION;
                await auth.setPersistence(persistence);

                // Sign in
                const userCred = await auth.signInWithEmailAndPassword(email, password);
                const user = userCred.user;

                // Check if email is verified
                if (!user.emailVerified) {
                    await auth.signOut();
                    showAlert('Please verify your email before logging in. <a href="#" onclick="resendVerification()" style="color: #c19a6b;">Resend verification email</a>', 'warning');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                    return;
                }

                // Check for two-factor requirement (you can implement this based on user data)
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (userDoc.exists && userDoc.data().twoFactorEnabled) {
                    // Show two-factor authentication
                    showTwoFactorAuth(user);
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                    return;
                }

                // Redirect based on role
                await redirectBasedOnRole(user);

            } catch (error) {
                console.error('Login error:', error);
                
                let errorMessage = '';
                switch (error.code) {
                    case 'auth/user-not-found':
                    case 'auth/wrong-password':
                        errorMessage = 'Invalid email or password';
                        break;
                    case 'auth/too-many-requests':
                        errorMessage = 'Too many failed attempts. Try again later.';
                        break;
                    case 'auth/user-disabled':
                        errorMessage = 'This account has been disabled.';
                        break;
                    default:
                        errorMessage = error.message;
                }
                
                showAlert(errorMessage, 'error');
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
            }
        }

        // Handle Google Sign In
        async function handleGoogleSignIn() {
            const googleBtn = document.getElementById('googleSignInBtn');
            googleBtn.disabled = true;
            googleBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connecting...';

            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                provider.addScope('profile');
                provider.addScope('email');
                
                const result = await auth.signInWithPopup(provider);
                const user = result.user;

                // Check if user exists in Firestore, if not create basic profile
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (!userDoc.exists) {
                    await db.collection('users').doc(user.uid).set({
                        fullName: user.displayName,
                        email: user.email,
                        role: 'client',
                        status: 'active',
                        emailVerified: user.emailVerified,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }

                // Redirect based on role
                await redirectBasedOnRole(user);

            } catch (error) {
                console.error('Google sign-in error:', error);
                
                let errorMessage = '';
                switch (error.code) {
                    case 'auth/popup-closed-by-user':
                        errorMessage = 'Sign-in cancelled. Please try again.';
                        break;
                    case 'auth/account-exists-with-different-credential':
                        errorMessage = 'An account already exists with the same email address.';
                        break;
                    default:
                        errorMessage = error.message;
                }
                
                showAlert(errorMessage, 'error');
                googleBtn.disabled = false;
                googleBtn.innerHTML = '<i class="fab fa-google"></i> Continue with Google';
            }
        }

        // Handle Forgot Password
        async function handleForgotPassword() {
            const email = document.getElementById('resetEmail').value;
            const resetBtn = document.getElementById('resetBtn');
            
            resetBtn.disabled = true;
            resetBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

            try {
                await auth.sendPasswordResetEmail(email, {
                    url: window.location.origin + '/login',
                    handleCodeInApp: false
                });
                
                showAlert('Password reset email sent! Check your inbox.', 'success');
                
                setTimeout(() => {
                    showLoginForm();
                }, 3000);

            } catch (error) {
                console.error('Reset error:', error);
                
                let errorMessage = '';
                switch (error.code) {
                    case 'auth/user-not-found':
                        errorMessage = 'No account found with this email.';
                        break;
                    case 'auth/invalid-email':
                        errorMessage = 'Invalid email address.';
                        break;
                    default:
                        errorMessage = error.message;
                }
                
                showAlert(errorMessage, 'error');
                resetBtn.disabled = false;
                resetBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link';
            }
        }

        // Show two-factor authentication
        function showTwoFactorAuth(user) {
            pendingUser = user;
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('forgotPasswordForm').style.display = 'none';
            document.getElementById('twoFactorSection').classList.add('active');
            
            // In a real implementation, you would send a code via SMS here
            // For demo, we'll simulate
            showAlert('Verification code sent to your phone', 'info');
        }

        // Verify two-factor code
        async function verifyTwoFactor() {
            const inputs = document.querySelectorAll('#otpInput input');
            const code = Array.from(inputs).map(input => input.value).join('');
            
            if (code.length !== 6) {
                document.getElementById('twoFAStatus').textContent = 'Please enter 6-digit code';
                document.getElementById('twoFAStatus').style.color = '#dc2626';
                return;
            }

            document.getElementById('verify2FABtn').disabled = true;
            document.getElementById('verify2FABtn').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';

            try {
                // Here you would verify the code with your backend
                // For demo, we'll simulate successful verification
                
                setTimeout(async () => {
                    if (pendingUser) {
                        await redirectBasedOnRole(pendingUser);
                    }
                }, 1500);

            } catch (error) {
                console.error('2FA error:', error);
                document.getElementById('twoFAStatus').textContent = 'Invalid code. Please try again.';
                document.getElementById('twoFAStatus').style.color = '#dc2626';
                document.getElementById('verify2FABtn').disabled = false;
                document.getElementById('verify2FABtn').innerHTML = 'Verify Code';
            }
        }

        // Resend verification email
        window.resendVerification = async function() {
            try {
                const user = auth.currentUser;
                if (user) {
                    await user.sendEmailVerification({
                        url: window.location.origin + '/login',
                        handleCodeInApp: true
                    });
                    showAlert('Verification email resent!', 'success');
                }
            } catch (error) {
                console.error('Resend error:', error);
                showAlert('Error sending verification email', 'error');
            }
        };

        // Redirect based on user role
        async function redirectBasedOnRole(user) {
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                
                if (!userDoc.exists) {
                    // New user, redirect to complete profile
                    window.location.href = '/complete-profile';
                    return;
                }

                const userData = userDoc.data();
                
                // Check KYC status
                if (userData.kycStatus === 'pending_review') {
                    window.location.href = '/dashboard?kyc=pending';
                } else if (userData.kycStatus === 'rejected') {
                    window.location.href = '/dashboard?kyc=rejected';
                } else {
                    // Redirect based on role
                    switch (userData.role) {
                        case 'admin':
                            window.location.href = '/admin/dashboard';
                            break;
                        case 'client':
                            window.location.href = '/dashboard';
                            break;
                        default:
                            window.location.href = '/dashboard';
                    }
                }
            } catch (error) {
                console.error('Redirect error:', error);
                window.location.href = '/dashboard';
            }
        }

        // Show forgot password form
        window.showForgotPassword = function() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('forgotPasswordForm').style.display = 'block';
            document.getElementById('twoFactorSection').classList.remove('active');
        };

        // Show login form
        window.showLoginForm = function() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('forgotPasswordForm').style.display = 'none';
            document.getElementById('twoFactorSection').classList.remove('active');
            
            // Clear inputs
            document.getElementById('resetEmail').value = '';
        };

        // Alert function
        function showAlert(message, type) {
            const alertDiv = document.getElementById('loginAlert');
            
            // Check if message contains HTML
            if (message.includes('<a')) {
                alertDiv.innerHTML = message;
            } else {
                alertDiv.textContent = message;
            }
            
            alertDiv.className = `alert alert-${type}`;
            alertDiv.style.display = 'block';

            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 10000); // Longer timeout for messages with links
        }

        // Check if there's a pending email verification
        if (window.location.hash.includes('emailVerified')) {
            showAlert('Email verified successfully! You can now login.', 'success');
        }
    </script>
</body>
</html>
