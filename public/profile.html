<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - TAAGC Global</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/platform.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><span>TAAGC</span> Global</h2>
            </div>
            
            <nav class="sidebar-nav" id="profileNav"></nav>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <h1>My Profile</h1>
                <div class="user-menu">
                    <div class="user-profile">
                        <div class="user-avatar" id="profileAvatar">U</div>
                        <div>
                            <div id="profileName">Loading...</div>
                            <div style="font-size: 12px; color: var(--light);" id="profileEmail">user@example.com</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid-2" style="gap: 30px;">
                <!-- Profile Information -->
                <div class="card">
                    <h3>Profile Information</h3>
                    
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" class="form-control" id="profileFullName">
                    </div>
                    
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" class="form-control" id="profileEmail" readonly>
                    </div>
                    
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" class="form-control" id="profilePhone">
                    </div>
                    
                    <div class="form-group">
                        <label>Role</label>
                        <input type="text" class="form-control" id="profileRole" readonly>
                    </div>
                    
                    <div class="form-group">
                        <label>Account Status</label>
                        <input type="text" class="form-control" id="profileStatus" readonly>
                    </div>
                    
                    <button class="btn btn-primary" onclick="updateProfile()">
                        <i class="fas fa-save"></i> Save Changes
                    </button>
                </div>

                <!-- Account Summary -->
                <div class="card">
                    <h3>Account Summary</h3>
                    
                    <div class="stat-card" style="margin-bottom: 20px;">
                        <div class="stat-label">Member Since</div>
                        <div class="stat-value" id="memberSince">-</div>
                    </div>
                    
                    <div class="stat-card" style="margin-bottom: 20px;">
                        <div class="stat-label">Last Login</div>
                        <div class="stat-value" id="lastLogin">-</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-label">Account ID</div>
                        <div class="stat-value" id="accountId">-</div>
                    </div>
                    
                    <hr style="margin: 20px 0;">
                    
                    <h4 style="margin-bottom: 15px;">Security</h4>
                    
                    <button class="btn btn-outline btn-block" onclick="showChangePassword()">
                        <i class="fas fa-key"></i> Change Password
                    </button>
                    
                    <button class="btn btn-outline btn-block" style="margin-top: 10px;" onclick="show2FA()">
                        <i class="fas fa-shield-alt"></i> Two-Factor Authentication
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Change Password Modal -->
    <div class="modal" id="passwordModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Change Password</h2>
                <span class="modal-close" onclick="closeModal('passwordModal')">&times;</span>
            </div>
            
            <div class="form-group">
                <label>Current Password</label>
                <input type="password" class="form-control" id="currentPassword">
            </div>
            
            <div class="form-group">
                <label>New Password</label>
                <input type="password" class="form-control" id="newPassword">
            </div>
            
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" class="form-control" id="confirmNewPassword">
            </div>
            
            <button class="btn btn-primary" onclick="changePassword()">
                Update Password
            </button>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="/assets/js/platform.js"></script>
    
    <script>
        let currentUser = null;
        let userProfile = null;

        TAAGC.auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = '/login';
                return;
            }
            
            currentUser = user;
            
            // Get user profile
            const response = await fetch('/api/auth/me', {
                headers: {
                    'Authorization': `Bearer ${await user.getIdToken()}`
                }
            });
            
            const data = await response.json();
            if (data.success) {
                userProfile = data.user;
                updateUI();
            }
        });

        function updateUI() {
            document.getElementById('profileAvatar').textContent = (userProfile.fullName || 'U').charAt(0).toUpperCase();
            document.getElementById('profileName').textContent = userProfile.fullName || 'User';
            document.getElementById('profileEmail').textContent = userProfile.email || '';
            
            document.getElementById('profileFullName').value = userProfile.fullName || '';
            document.getElementById('profileEmail').value = userProfile.email || '';
            document.getElementById('profilePhone').value = userProfile.phone || '';
            document.getElementById('profileRole').value = userProfile.role || 'client';
            document.getElementById('profileStatus').value = userProfile.status || 'active';
            
            if (userProfile.createdAt) {
                const date = new Date(userProfile.createdAt.seconds * 1000);
                document.getElementById('memberSince').textContent = date.toLocaleDateString();
            }
            
            if (userProfile.lastLogin) {
                const date = new Date(userProfile.lastLogin.seconds * 1000);
                document.getElementById('lastLogin').textContent = date.toLocaleString();
            }
            
            document.getElementById('accountId').textContent = userProfile.generatedId || userProfile.uid || '-';
            
            // Build nav
            const nav = document.getElementById('profileNav');
            const links = TAAGC.Utils.getNavLinksByRole(userProfile.role);
            
            let html = '';
            links.forEach(link => {
                html += `<a href="${link.href}" class="nav-item"><i class="fas ${link.icon}"></i><span>${link.label}</span></a>`;
            });
            
            html += `
                <div class="nav-section">ACCOUNT</div>
                <a href="/profile" class="nav-item active"><i class="fas fa-user"></i><span>Profile</span></a>
                <a href="/settings" class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
                <a href="#" class="nav-item" onclick="TAAGC.Auth.logout()"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
            `;
            
            nav.innerHTML = html;
        }

        async function updateProfile() {
            const updates = {
                fullName: document.getElementById('profileFullName').value,
                phone: document.getElementById('profilePhone').value
            };
            
            const response = await fetch(`/api/users/${currentUser.uid}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${await currentUser.getIdToken()}`
                },
                body: JSON.stringify(updates)
            });
            
            const data = await response.json();
            
            if (data.success) {
                TAAGC.Utils.showToast('Profile updated successfully', 'success');
                setTimeout(() => location.reload(), 1500);
            } else {
                TAAGC.Utils.showToast('Error updating profile', 'error');
            }
        }

        function showChangePassword() {
            document.getElementById('passwordModal').classList.add('active');
        }

        async function changePassword() {
            const current = document.getElementById('currentPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmNewPassword').value;
            
            if (newPass !== confirm) {
                TAAGC.Utils.showToast('Passwords do not match', 'error');
                return;
            }
            
            if (newPass.length < 6) {
                TAAGC.Utils.showToast('Password must be at least 6 characters', 'error');
                return;
            }
            
            // Reauthenticate first
            const credential = firebase.auth.EmailAuthProvider.credential(currentUser.email, current);
            
            try {
                await currentUser.reauthenticateWithCredential(credential);
                await currentUser.updatePassword(newPass);
                
                TAAGC.Utils.showToast('Password updated successfully', 'success');
                closeModal('passwordModal');
                
                document.getElementById('currentPassword').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmNewPassword').value = '';
            } catch (error) {
                TAAGC.Utils.showToast(error.message, 'error');
            }
        }

        function show2FA() {
            TAAGC.Utils.showToast('2FA setup coming soon', 'info');
        }

        window.closeModal = (modalId) => {
            document.getElementById(modalId).classList.remove('active');
        };
    </script>
</body>
</html>
