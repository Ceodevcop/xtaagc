<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - TAAGC Global</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a2540, #1a3a4f);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            max-width: 420px;
            width: 100%;
        }

        .login-card {
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #0a2540, #2a4a6a);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            color: white;
            font-size: 32px;
            font-weight: 800;
        }

        .logo h2 {
            color: #0a2540;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .logo h2 span {
            color: #c19a6b;
        }

        .logo p {
            color: #64748b;
            font-size: 14px;
        }

        .alert {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            display: none;
        }

        .alert-error {
            background: #fee2e2;
            border: 1px solid #e53e3e;
            color: #e53e3e;
        }

        .alert-success {
            background: #dcfce7;
            border: 1px solid #10b981;
            color: #10b981;
        }

        .alert-warning {
            background: #fff3cd;
            border: 1px solid #f59e0b;
            color: #856404;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #1e293b;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group label i {
            color: #c19a6b;
            margin-right: 8px;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 16px;
        }

        .form-control {
            width: 100%;
            padding: 16px 20px 16px 50px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: #c19a6b;
            outline: none;
            box-shadow: 0 0 0 3px rgba(193,154,107,0.1);
        }

        .password-field {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            cursor: pointer;
            font-size: 18px;
            z-index: 2;
        }

        .toggle-password:hover {
            color: #c19a6b;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #64748b;
            font-size: 14px;
            cursor: pointer;
        }

        .checkbox input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #c19a6b;
        }

        .forgot-link {
            color: #c19a6b;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #0a2540, #1a3a4f);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(10,37,64,0.2);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .demo-credentials {
            background: #f8fafc;
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            border: 1px solid #e2e8f0;
        }

        .demo-credentials p {
            color: #64748b;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .demo-credentials .cred {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: #0a2540;
            background: white;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .demo-credentials i {
            color: #c19a6b;
        }

        .login-footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-crown"></i>
                </div>
                <h2><span>TAAGC</span> ADMIN</h2>
                <p>Enter your credentials to access admin panel</p>
            </div>

            <div id="loginAlert" class="alert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" class="form-control" id="email" placeholder="admin@taagc.website" value="ceo@taagc.website" required>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <div class="password-field">
                        <div class="input-group">
                            <i class="fas fa-key"></i>
                            <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                        </div>
                        <i class="fas fa-eye toggle-password" id="togglePassword" onclick="togglePassword()"></i>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox" id="rememberMe" checked>
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link" onclick="handleForgotPassword(event)">
                        <i class="fas fa-question-circle"></i> Forgot Password?
                    </a>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Login to Dashboard
                </button>
            </form>

            <!-- Demo Credentials (remove in production) -->
            <div class="demo-credentials">
                <p><i class="fas fa-info-circle"></i> Super Admin Access:</p>
                <div class="cred">
                    <i class="fas fa-envelope"></i> ceo@taagc.website
                </div>
                <div class="cred" style="margin-top: 5px;">
                    <i class="fas fa-key"></i> [Your Password]
                </div>
            </div>
        </div>

        <div class="login-footer">
            <p>&copy; 2026 TAAGC Global. All rights reserved.</p>
        </div>
    </div>

    <script>
        // ============================================
        // FIREBASE CONFIGURATION
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyCOcCDPqRSlAMJJBEeNchTA1qO9tl9Nldw",
            authDomain: "xtaagc.firebaseapp.com",
            projectId: "xtaagc",
            storageBucket: "xtaagc.firebasestorage.app",
            messagingSenderId: "256073982437",
            appId: "1:256073982437:android:0c54368d54e260cba98f0c"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Enable offline persistence
        db.settings({ cacheSizeBytes: firebase.firestore.CACHE_SIZE_UNLIMITED });

        // ============================================
        // TOGGLE PASSWORD VISIBILITY
        // ============================================
        window.togglePassword = function() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('togglePassword');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        };

        // ============================================
        // SHOW ALERT FUNCTION
        // ============================================
        function showAlert(message, type) {
            const alert = document.getElementById('loginAlert');
            alert.className = `alert alert-${type}`;
            
            let icon = 'info-circle';
            if (type === 'success') icon = 'check-circle';
            else if (type === 'error') icon = 'exclamation-circle';
            else if (type === 'warning') icon = 'exclamation-triangle';
            
            alert.innerHTML = `<i class="fas fa-${icon}"></i> ${message}`;
            alert.style.display = 'flex';
            
            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }

        // ============================================
        // FORGOT PASSWORD HANDLER
        // ============================================
        window.handleForgotPassword = async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            
            if (!email) {
                showAlert('Please enter your email address first', 'warning');
                return;
            }

            try {
                await auth.sendPasswordResetEmail(email);
                showAlert('Password reset email sent! Check your inbox.', 'success');
            } catch (error) {
                console.error('Password reset error:', error);
                showAlert('Error sending reset email. Please try again.', 'error');
            }
        };

        // ============================================
        // MAIN LOGIN HANDLER - UPDATED FOR YOUR USER DATA
        // ============================================
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const loginBtn = document.getElementById('loginBtn');
            
            // Hide previous alerts
            document.getElementById('loginAlert').style.display = 'none';

            // Basic validation
            if (!email || !password) {
                showAlert('Please enter both email and password', 'warning');
                return;
            }

            try {
                // Show loading state
                loginBtn.innerHTML = '<span class="spinner"></span> Authenticating...';
                loginBtn.disabled = true;

                // Set persistence based on "Remember me"
                await auth.setPersistence(
                    rememberMe ? 
                    firebase.auth.Auth.Persistence.LOCAL : 
                    firebase.auth.Auth.Persistence.SESSION
                );

                // Sign in the user
                const userCred = await auth.signInWithEmailAndPassword(email, password);
                const user = userCred.user;

                console.log('✅ User authenticated:', user.uid);

                // Get user data from Firestore using the UID
                const userDoc = await db.collection('users').doc(user.uid).get();

                if (!userDoc.exists) {
                    await auth.signOut();
                    showAlert('User profile not found in database.', 'error');
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Dashboard';
                    loginBtn.disabled = false;
                    return;
                }

                const userData = userDoc.data();
                console.log('📊 User data from Firestore:', userData);

                // CHECK ROLE - Your user has role: "super_admin"
                const userRole = userData.role || '';
                
                // Allow both super_admin and admin roles
                if (userRole !== 'super_admin' && userRole !== 'admin') {
                    await auth.signOut();
                    showAlert('⛔ Access Denied. Super Admin privileges required.', 'error');
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Dashboard';
                    loginBtn.disabled = false;
                    return;
                }

                // Check if account is active
                if (userData.status !== 'active') {
                    await auth.signOut();
                    showAlert('Your account is not active. Please contact administrator.', 'error');
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Dashboard';
                    loginBtn.disabled = false;
                    return;
                }

                // Update last login timestamp
                await db.collection('users').doc(user.uid).update({
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
                    lastActive: firebase.firestore.FieldValue.serverTimestamp(),
                    lastLoginIp: 'admin-portal'
                });

                // Show welcome message with user's name
                const displayName = userData.fullName || user.email.split('@')[0];
                showAlert(`✅ Welcome back, ${displayName}! Redirecting to dashboard...`, 'success');

                // Redirect to admin dashboard
                setTimeout(() => {
                    window.location.href = '/admin/dashboard';
                }, 1500);

            } catch (error) {
                console.error('❌ Login error:', error);
                
                let errorMessage = 'Login failed. Please check your credentials.';
                
                // Handle specific Firebase errors
                switch (error.code) {
                    case 'auth/user-not-found':
                        errorMessage = 'No account found with this email.';
                        break;
                    case 'auth/wrong-password':
                        errorMessage = 'Incorrect password.';
                        break;
                    case 'auth/too-many-requests':
                        errorMessage = 'Too many failed attempts. Account temporarily locked.';
                        break;
                    case 'auth/network-request-failed':
                        errorMessage = 'Network error. Please check your connection.';
                        break;
                    case 'auth/invalid-email':
                        errorMessage = 'Invalid email format.';
                        break;
                    case 'auth/user-disabled':
                        errorMessage = 'This account has been disabled.';
                        break;
                }
                
                showAlert(errorMessage, 'error');
                
                // Reset button
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Dashboard';
                loginBtn.disabled = false;
            }
        });

        // ============================================
        // CHECK SESSION ON PAGE LOAD
        // ============================================
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                // Check if user is still authorized
                try {
                    const userDoc = await db.collection('users').doc(user.uid).get();
                    if (userDoc.exists) {
                        const userData = userDoc.data();
                        if (userData.role === 'super_admin' || userData.role === 'admin') {
                            console.log('✅ Already logged in as:', user.email);
                            // Optional: Show message but don't auto-redirect
                            // showAlert(`Already logged in as ${userData.fullName || user.email}`, 'info');
                        }
                    }
                } catch (error) {
                    console.error('Error checking session:', error);
                }
            }
        });

        // ============================================
        // ENTER KEY SUBMISSION
        // ============================================
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').requestSubmit();
            }
        });

        // ============================================
        // PREVENT FORM RESUBMISSION
        // ============================================
        if (window.history.replaceState) {
            window.history.replaceState(null, null, window.location.href);
        }

        // ============================================
        // FOCUS ON EMAIL FIELD
        // ============================================
        document.getElementById('email').focus();
    </script>
</body>
</html>
