<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body {
            background: #0f172a;
            color: #c19a6b;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .loading {
            text-align: center;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #1e293b;
            border-top-color: #c19a6b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading">
        <div class="spinner"></div>
        <h2>Redirecting to Super Admin Panel...</h2>
        <p id="message">Verifying your session</p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAI1MrcP977UgRLQoePxl64JOSyj9v4WpI",
            authDomain: "xtaagc.firebaseapp.com",
            projectId: "xtaagc",
            storageBucket: "xtaagc.appspot.com",
            messagingSenderId: "256073982437",
            appId: "1:256073982437:web:8da63bb7acc86c0ca98f0c"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged(async (user) => {
            const messageEl = document.getElementById('message');
            
            if (!user) {
                messageEl.textContent = 'No active session. Redirecting to login...';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
                return;
            }

            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                
                if (!userDoc.exists) {
                    messageEl.textContent = 'User profile not found. Redirecting...';
                    await auth.signOut();
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                    return;
                }

                const userData = userDoc.data();
                
                if (!['super_admin', 'admin'].includes(userData.role)) {
                    messageEl.textContent = 'Access denied. Redirecting...';
                    await auth.signOut();
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                    return;
                }

                if (userData.status !== 'active') {
                    messageEl.textContent = 'Account not active. Redirecting...';
                    await auth.signOut();
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                    return;
                }

                // Valid admin - redirect to super admin panel
                messageEl.textContent = 'Access granted. Loading Super Admin Panel...';
                setTimeout(() => {
                    window.location.href = 'xtaagc'; // This should be your super admin panel
                }, 1000);

            } catch (error) {
                console.error('Auth error:', error);
                messageEl.textContent = 'Error verifying session. Redirecting...';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            }
        });
    </script>
</body>
</html>
