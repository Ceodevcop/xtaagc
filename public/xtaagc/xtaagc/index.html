    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAI1MrcP977UgRLQoePxl64JOSyj9v4WpI",
            authDomain: "xtaagc.firebaseapp.com",
            projectId: "xtaagc",
            storageBucket: "xtaagc.appspot.com",
            messagingSenderId: "256073982437",
            appId: "1:256073982437:web:8da63bb7acc86c0ca98f0c"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        // ============================================
        // API KEY MANAGEMENT
        // ============================================
        const apiKeys = new Map();

        class APIManager {
            constructor() {
                this.keys = new Map();
                this.loadKeys();
            }

            async loadKeys() {
                try {
                    const snapshot = await db.collection('api_keys').get();
                    snapshot.forEach(doc => {
                        this.keys.set(doc.id, doc.data());
                    });
                } catch (error) {
                    console.error('Error loading API keys:', error);
                }
            }

            generateKey(name, permissions, expiry) {
                const keyId = 'taagc_' + Array.from(crypto.getRandomValues(new Uint8Array(24)))
                    .map(b => b.toString(36)).join('').substring(0, 32);
                
                const secret = Array.from(crypto.getRandomValues(new Uint8Array(32)))
                    .map(b => b.toString(16).padStart(2, '0')).join('');
                
                const key = {
                    id: keyId,
                    name: name,
                    secret: secret,
                    permissions: permissions,
                    createdAt: new Date().toISOString(),
                    expiresAt: expiry === 'never' ? null : new Date(Date.now() + expiry * 24 * 60 * 60 * 1000).toISOString(),
                    lastUsed: null,
                    createdBy: currentGod?.email
                };
                
                this.keys.set(keyId, key);
                return key;
            }

            validateKey(keyId, secret) {
                const key = this.keys.get(keyId);
                if (!key) return false;
                if (key.secret !== secret) return false;
                if (key.expiresAt && new Date(key.expiresAt) < new Date()) return false;
                return key;
            }

            hasPermission(keyId, permission) {
                const key = this.keys.get(keyId);
                if (!key) return false;
                return key.permissions.includes(permission) || key.permissions.includes('admin:all');
            }
        }

        const apiManager = new APIManager();

        // ============================================
        // API HANDLER FUNCTIONS
        // ============================================
        async function handleAPIRequest(endpoint, method, data = null, apiKey = null) {
            const response = { success: false, data: null, error: null };
            
            try {
                // Validate API key if required
                if (endpoint.startsWith('/api/')) {
                    if (!apiKey) {
                        response.error = 'API key required';
                        return response;
                    }
                    
                    const [keyId, secret] = apiKey.split(':');
                    const key = apiManager.validateKey(keyId, secret);
                    
                    if (!key) {
                        response.error = 'Invalid API key';
                        return response;
                    }
                    
                    // Check permission based on endpoint
                    const requiredPerm = getRequiredPermission(endpoint, method);
                    if (!apiManager.hasPermission(keyId, requiredPerm)) {
                        response.error = 'Insufficient permissions';
                        return response;
                    }
                }

                // Route to appropriate handler
                switch(endpoint) {
                    case '/api/users':
                        response.data = await handleUsersAPI(method, data);
                        break;
                    case '/api/wallets':
                        response.data = await handleWalletsAPI(method, data);
                        break;
                    case '/api/transactions':
                        response.data = await handleTransactionsAPI(method, data);
                        break;
                    case '/api/banks':
                        response.data = await handleBanksAPI(method, data);
                        break;
                    case '/api/webhook':
                        response.data = await handleWebhook(data);
                        break;
                    default:
                        response.error = 'Endpoint not found';
                }
                
                response.success = true;
                
            } catch (error) {
                response.error = error.message;
            }
            
            return response;
        }

        function getRequiredPermission(endpoint, method) {
            const perms = {
                'GET:/api/users': 'read:users',
                'POST:/api/users': 'write:users',
                'PUT:/api/users': 'write:users',
                'DELETE:/api/users': 'write:users',
                'GET:/api/wallets': 'read:wallets',
                'POST:/api/wallets': 'write:wallets',
                'GET:/api/transactions': 'read:transactions',
                'POST:/api/transactions': 'write:transactions',
                'GET:/api/banks': 'read:banks',
                'POST:/api/banks': 'admin:all'
            };
            
            return perms[`${method}:${endpoint}`] || 'admin:all';
        }

        // ============================================
        // API HANDLERS
        // ============================================
        async function handleUsersAPI(method, data) {
            switch(method) {
                case 'GET':
                    if (data?.userId) {
                        const doc = await db.collection('users').doc(data.userId).get();
                        return doc.exists ? { id: doc.id, ...doc.data() } : null;
                    } else {
                        const snapshot = await db.collection('users').get();
                        return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    }
                    
                case 'POST':
                    const newUser = await db.collection('users').add({
                        ...data,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    return { id: newUser.id, ...data };
                    
                case 'PUT':
                    await db.collection('users').doc(data.userId).update(data.updates);
                    return { updated: true, userId: data.userId };
                    
                case 'DELETE':
                    await db.collection('users').doc(data.userId).delete();
                    return { deleted: true, userId: data.userId };
                    
                default:
                    throw new Error('Method not supported');
            }
        }

        async function handleWalletsAPI(method, data) {
            switch(method) {
                case 'GET':
                    if (data?.walletId) {
                        const doc = await db.collection('wallets').doc(data.walletId).get();
                        return doc.exists ? { id: doc.id, ...doc.data() } : null;
                    } else if (data?.userId) {
                        const snapshot = await db.collection('wallets').where('userId', '==', data.userId).get();
                        return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    }
                    break;
                    
                case 'POST':
                    const newWallet = await db.collection('wallets').add({
                        userId: data.userId,
                        bankId: data.bankId,
                        balance: data.balance || 0,
                        currency: data.currency || 'USD',
                        status: 'active',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    return { id: newWallet.id, ...data };
                    
                case 'PUT':
                    await db.collection('wallets').doc(data.walletId).update(data.updates);
                    return { updated: true, walletId: data.walletId };
            }
        }

        async function handleTransactionsAPI(method, data) {
            switch(method) {
                case 'GET':
                    if (data?.transactionId) {
                        const doc = await db.collection('transactions').doc(data.transactionId).get();
                        return doc.exists ? { id: doc.id, ...doc.data() } : null;
                    } else if (data?.userId) {
                        const snapshot = await db.collection('transactions')
                            .where('userId', '==', data.userId)
                            .orderBy('timestamp', 'desc')
                            .limit(data.limit || 50)
                            .get();
                        return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    }
                    break;
                    
                case 'POST':
                    const newTransaction = await db.collection('transactions').add({
                        userId: data.userId,
                        type: data.type,
                        amount: data.amount,
                        status: 'pending',
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        metadata: data.metadata || {}
                    });
                    return { id: newTransaction.id, ...data };
            }
        }

        async function handleBanksAPI(method, data) {
            switch(method) {
                case 'GET':
                    const snapshot = await db.collection('banks').get();
                    return snapshot.docs.map(doc => ({
                        id: doc.id,
                        name: doc.data().name,
                        country: doc.data().country,
                        currencies: doc.data().currencies,
                        status: doc.data().status
                        // Don't return API keys in public responses
                    }));
                    
                case 'POST':
                    const newBank = await db.collection('banks').add({
                        ...data,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    return { id: newBank.id, ...data };
            }
        }

        async function handleWebhook(data) {
            // Process incoming webhook
            console.log('Webhook received:', data);
            
            // Store webhook log
            await db.collection('webhook_logs').add({
                ...data,
                receivedAt: firebase.firestore.FieldValue.serverTimestamp(),
                processed: true
            });
            
            return { received: true, timestamp: new Date().toISOString() };
        }

        // ============================================
        // GOD AUTHENTICATION (Keep all previous auth code)
        // ============================================
        let currentGod = null;

        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                
                if (!userDoc.exists) {
                    alert('No profile found');
                    await auth.signOut();
                    return;
                }

                const userData = userDoc.data();
                
                if (userData.role !== 'super_admin') {
                    alert('Only Super Admins can access God Mode');
                    await auth.signOut();
                    window.location.href = 'login.html';
                    return;
                }

                currentGod = userData;
                
                document.getElementById('adminName').textContent = userData.fullName || 'God';
                document.getElementById('godName').textContent = userData.fullName || 'God';
                const avatar = (userData.fullName || 'G').charAt(0).toUpperCase();
                document.getElementById('adminAvatar').textContent = avatar;
                document.getElementById('godAvatar').textContent = avatar;

                loadSection('dashboard');

            } catch (error) {
                console.error('God auth error:', error);
            }
        });

        // ============================================
        // API TESTER SECTION
        // ============================================
        function loadAPITester() {
            const content = document.getElementById('content-area');
            content.innerHTML = `
                <div class="api-tester">
                    <h3><i class="fas fa-vial"></i> API Tester</h3>
                    
                    <div style="margin-top: 20px;">
                        <label>API Key</label>
                        <input type="text" id="apiKeyInput" placeholder="key:secret">
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 3fr; gap: 10px;">
                        <select id="apiMethod" class="form-control">
                            <option value="GET">GET</option>
                            <option value="POST">POST</option>
                            <option value="PUT">PUT</option>
                            <option value="DELETE">DELETE</option>
                        </select>
                        
                        <input type="text" id="apiEndpoint" class="form-control" placeholder="/api/users">
                    </div>
                    
                    <div>
                        <label>Request Body (JSON)</label>
                        <textarea id="apiBody" class="form-control" rows="5">{
    "userId": "test",
    "data": {}
}</textarea>
                    </div>
                    
                    <div style="margin-top: 10px;">
                        <button onclick="testAPI()">Send Request</button>
                        <button onclick="clearAPIResponse()">Clear</button>
                    </div>
                    
                    <div class="api-response" id="apiResponse">
                        Response will appear here...
                    </div>
                </div>
                
                <div class="section">
                    <h3><i class="fas fa-key"></i> Your API Keys</h3>
                    <button class="btn btn-success" onclick="openModal('apiKeyModal')">Generate New Key</button>
                    
                    <div id="apiKeysList" style="margin-top: 20px;">
                        ${renderAPIKeys()}
                    </div>
                </div>
            `;
        }

        function renderAPIKeys() {
            let html = '<table><tr><th>Name</th><th>Key ID</th><th>Secret</th><th>Created</th><th>Actions</th></tr>';
            apiManager.keys.forEach((key, id) => {
                html += `
                    <tr>
                        <td>${key.name}</td>
                        <td><code>${id}</code></td>
                        <td><code>${key.secret.substring(0, 8)}...</code></td>
                        <td>${new Date(key.createdAt).toLocaleDateString()}</td>
                        <td>
                            <button class="btn btn-sm" onclick="copyAPIKey('${id}:${key.secret}')">Copy</button>
                            <button class="btn btn-danger btn-sm" onclick="revokeAPIKey('${id}')">Revoke</button>
                        </td>
                    </tr>
                `;
            });
            html += '</table>';
            return html;
        }

        window.testAPI = async function() {
            const method = document.getElementById('apiMethod').value;
            const endpoint = document.getElementById('apiEndpoint').value;
            const apiKey = document.getElementById('apiKeyInput').value;
            const body = document.getElementById('apiBody').value;
            
            const responseDiv = document.getElementById('apiResponse');
            responseDiv.innerHTML = 'Sending request...';
            
            try {
                const data = body ? JSON.parse(body) : null;
                const result = await handleAPIRequest(endpoint, method, data, apiKey);
                responseDiv.innerHTML = `<pre>${JSON.stringify(result, null, 2)}</pre>`;
            } catch (error) {
                responseDiv.innerHTML = `<pre style="color: red;">Error: ${error.message}</pre>`;
            }
        };

        window.generateAPIKey = function() {
            const name = document.getElementById('apiKeyName').value;
            const permissions = Array.from(document.getElementById('apiKeyPermissions').selectedOptions)
                .map(opt => opt.value);
            const expiry = document.getElementById('apiKeyExpiry').value;
            
            const key = apiManager.generateKey(name, permissions, expiry);
            
            // Save to Firestore
            db.collection('api_keys').doc(key.id).set(key);
            
            alert(`API Key generated!\n\nKey: ${key.id}\nSecret: ${key.secret}\n\nSave this secret - it won't be shown again!`);
            
            closeModal('apiKeyModal');
            loadAPITester();
        };

        window.copyAPIKey = function(key) {
            navigator.clipboard.writeText(key);
            alert('API Key copied to clipboard!');
        };

        window.revokeAPIKey = async function(keyId) {
            if (confirm('Revoke this API key?')) {
                await db.collection('api_keys').doc(keyId).delete();
                apiManager.keys.delete(keyId);
                loadAPITester();
            }
        };

        // ============================================
        // NAVIGATION (Add API tester to switch)
        // ============================================
        document.querySelectorAll('.nav-item[data-section]').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                this.classList.add('active');
                loadSection(this.dataset.section);
            });
        });

        function loadSection(section) {
            const titles = {
                'dashboard': '⚡ GOD DASHBOARD',
                'create-page': '📄 CREATE PAGES',
                'create-collection': '🗄️ CREATE COLLECTIONS',
                'create-api': '🔌 CREATE APIS',
                'banks': '🏦 BANK MANAGEMENT',
                'bank-apis': '🔑 BANK API KEYS',
                'wallets': '💰 WALLET SYSTEM',
                'transactions': '💸 TRANSACTIONS',
                'users': '👥 USER CONTROL',
                'registration': '📝 REGISTRATION RULES',
                'wallet-assign': '🎯 WALLET ASSIGNMENT',
                'api-keys': '🔐 API KEYS',
                'api-tester': '🧪 API TESTER',
                'webhooks': '🪝 WEBHOOKS',
                'settings': '⚙️ SYSTEM SETTINGS',
                'logs': '📜 GOD LOGS'
            };
            
            document.getElementById('pageTitle').textContent = titles[section] || '⚡ GOD MODE';

            switch(section) {
                case 'dashboard':
                    loadGodDashboard();
                    break;
                case 'create-page':
                    loadCreatePage();
                    break;
                case 'api-tester':
                    loadAPITester();
                    break;
                case 'api-keys':
                    loadAPITester(); // Same as tester for now
                    break;
                // ... keep all other cases from previous code ...
                default:
                    loadComingSoon(section);
            }
        }

        // Keep all previous functions (loadGodDashboard, loadCreatePage, etc.)
        // ... (include all previous functions here) ...

        // ============================================
        // LOGOUT
        // ============================================
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await auth.signOut();
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
