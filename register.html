<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TAAGC | Authentication</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0a2540,#1a3a4f);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
        #app{width:100%;max-width:500px;}
        .loading{text-align:center;color:white;font-size:18px;}
        .loading i{animation:spin 1s linear infinite;display:inline-block;}
        @keyframes spin{to{transform:rotate(360deg);}}
    </style>
</head>
<body>
    <div id="app">
        <div class="loading">
            <i class="fas fa-spinner"></i> Loading...
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
    
    <!-- Main App Script -->
    <script src="js/register-app.js"></script>
</body>
</html>
