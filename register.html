<!-- Add this script at the bottom, replace existing script -->
<script type="module">
    import { authService } from './firebase-config.js';
    
    // ===== NAVBAR TOGGLE =====
    document.getElementById('menuBtn')?.addEventListener('click', function(){
        document.getElementById('navbarMenu').classList.toggle('active');
    });

    // ===== FORM STATE =====
    let currentForm = 'company';
    let individualType = 'shopper';

    // ===== SHOW FORM =====
    window.showForm = function(type) {
        currentForm = type;
        document.querySelectorAll('.selector-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.selector-btn.${type}`).classList.add('active');
        document.getElementById('registerSection').innerHTML = type === 'company' ? getCompanyForm() : getIndividualForm();
    };

    // ===== COMPANY REGISTRATION =====
    window.registerCompany = async function() {
        const btn = document.getElementById('compBtn');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Registering...';
        btn.disabled = true;
        
        const email = document.getElementById('compEmail')?.value;
        
        // Check personal email
        if(email.includes('@gmail') || email.includes('@yahoo') || email.includes('@hotmail') || email.includes('@outlook')) {
            showAlert('Company email required. Personal emails not accepted.', 'error');
            btn.innerHTML = '<i class="fas fa-building"></i> Register Company';
            btn.disabled = false;
            return;
        }
        
        // Check passwords
        const pass = document.getElementById('compPass')?.value;
        const pass2 = document.getElementById('compPass2')?.value;
        if(pass !== pass2) {
            showAlert('Passwords do not match', 'error');
            btn.innerHTML = '<i class="fas fa-building"></i> Register Company';
            btn.disabled = false;
            return;
        }
        
        const result = await authService.registerCompany({
            companyName: document.getElementById('compName').value,
            registrationNumber: document.getElementById('compReg').value,
            email: email,
            phone: document.getElementById('compPhone').value,
            country: document.getElementById('compCountry').value,
            sector: document.getElementById('compSector').value,
            contactPerson: document.getElementById('compContact').value,
            jobTitle: document.getElementById('compTitle').value,
            companySize: document.getElementById('compSize').value,
            registrationType: 'company',
            password: pass
        });
        
        if(result.success) {
            showAlert('Registration successful! Please verify your email.', 'success');
            setTimeout(() => window.location.href = 'company-dashboard.html', 3000);
        } else {
            showAlert(result.error, 'error');
            btn.innerHTML = '<i class="fas fa-building"></i> Register Company';
            btn.disabled = false;
        }
    };

    // ===== INDIVIDUAL REGISTRATION =====
    window.registerIndividual = async function() {
        const btn = document.getElementById('indBtn');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';
        btn.disabled = true;
        
        const pass = document.getElementById('indPass')?.value;
        const pass2 = document.getElementById('indPass2')?.value;
        
        if(pass !== pass2) {
            showAlert('Passwords do not match', 'error');
            btn.innerHTML = `<i class="fas ${getTypeIcon()}"></i> Create ${getTypeLabel()} Account`;
            btn.disabled = false;
            return;
        }
        
        const result = await authService.registerIndividual({
            fullName: document.getElementById('indName').value,
            email: document.getElementById('indEmail').value,
            phone: document.getElementById('indPhone').value,
            country: document.getElementById('indCountry').value,
            accountType: individualType,
            idType: document.getElementById('indIdType').value,
            idNumber: document.getElementById('indIdNumber').value,
            dob: document.getElementById('indDob').value,
            password: pass
        });
        
        if(result.success) {
            showAlert('Registration successful! Redirecting...', 'success');
            
            // Redirect to correct dashboard
            setTimeout(() => {
                if(individualType === 'shopper') window.location.href = 'shopper-dashboard.html';
                else if(individualType === 'investor') window.location.href = 'investor-dashboard.html';
                else if(individualType === 'professional') window.location.href = 'professional-dashboard.html';
            }, 2000);
        } else {
            showAlert(result.error, 'error');
            btn.innerHTML = `<i class="fas ${getTypeIcon()}"></i> Create ${getTypeLabel()} Account`;
            btn.disabled = false;
        }
    };

    // ===== LOGIN =====
    window.loginUser = async function() {
        const btn = document.getElementById('loginBtn');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
        btn.disabled = true;
        
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        
        const result = await authService.login(email, password);
        
        if(result.success) {
            showAlert('Login successful! Redirecting...', 'success');
            
            // Get user profile to determine dashboard
            const { sharedService } = await import('./firebase-config.js');
            const profile = await sharedService.getUserProfile(result.user.uid);
            
            setTimeout(() => {
                if(profile.success) {
                    if(profile.type === 'individual') {
                        if(profile.user.accountType === 'shopper') window.location.href = 'shopper-dashboard.html';
                        else if(profile.user.accountType === 'investor') window.location.href = 'investor-dashboard.html';
                        else if(profile.user.accountType === 'professional') window.location.href = 'professional-dashboard.html';
                    } else {
                        window.location.href = 'company-dashboard.html';
                    }
                } else {
                    window.location.href = 'shopper-dashboard.html';
                }
            }, 2000);
        } else {
            showAlert(result.error, 'error');
            btn.innerHTML = '<span>Login to Dashboard</span>';
            btn.disabled = false;
        }
    };

    // ===== FORGOT PASSWORD =====
    window.forgotPassword = async function(e) {
        e.preventDefault();
        const email = prompt('Enter your email address:');
        if(email) {
            const result = await authService.resetPassword(email);
            showAlert(result.message || result.error, result.success ? 'success' : 'error');
        }
    };

    // ===== LOGOUT =====
    window.logout = async function() {
        const result = await authService.logout();
        if(result.success) window.location.href = 'index.html';
    };

    // ===== ALERT SYSTEM =====
    function showAlert(message, type) {
        const alertBox = document.getElementById('loginAlert');
        alertBox.className = `alert alert-${type}`;
        alertBox.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
        alertBox.style.display = 'flex';
        setTimeout(() => alertBox.style.display = 'none', 4000);
    }

    // ===== HELPER FUNCTIONS =====
    window.setIndividualType = function(type) {
        individualType = type;
        document.querySelectorAll('#individualTypeGrid .type-card').forEach(card => card.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.getElementById('registerSection').innerHTML = getIndividualForm();
    };

    function getTypeLabel() {
        const types = {'shopper':'Shopper','investor':'Investor','professional':'Professional'};
        return types[individualType] || 'Shopper';
    }
    function getTypeIcon() {
        const icons = {'shopper':'fa-shopping-cart','investor':'fa-chart-line','professional':'fa-briefcase'};
        return icons[individualType] || 'fa-shopping-cart';
    }
    function getTypeButtonClass() {
        const classes = {'shopper':'btn-shopper','investor':'btn-investor','professional':'btn-professional'};
        return classes[individualType] || 'btn-shopper';
    }
    function getTypeColor() {
        const colors = {'shopper':'#2d5a4a','investor':'#5a3a5a','professional':'#3a5a6b'};
        return colors[individualType] || '#2d5a4a';
    }
    function getTypeDescription() {
        const desc = {
            'shopper':'Shop from global retailers, track orders, get instant quotes.',
            'investor':'Access vetted investment opportunities, track portfolio performance.',
            'professional':'Find consulting projects, submit bids, manage contracts.'
        };
        return desc[individualType] || desc.shopper;
    }
    function getTypePreview() {
        const preview = {
            'shopper':'Track orders, get quotes, shop from Amazon, eBay, and more.',
            'investor':'Monitor investments, view ROI, explore new opportunities.',
            'professional':'Manage projects, track bids, grow your consulting business.'
        };
        return preview[individualType] || preview.shopper;
    }

    // ===== FORM TEMPLATES =====
    function getCompanyForm() { /* ... your existing company form HTML ... */ }
    function getIndividualForm() { /* ... your existing individual form HTML ... */ }

    // ===== INIT =====
    document.getElementById('registerSection').innerHTML = getCompanyForm();
    if(window.location.hash === '#login') setTimeout(() => document.querySelector('.auth-card').scrollIntoView({behavior:'smooth'}), 100);
</script>
