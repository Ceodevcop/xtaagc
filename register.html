<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/Register | TAAGC Global</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/footer.css">
    <style>
        .auth-card{max-width:500px;margin:60px auto;background:white;border-radius:32px;padding:48px;box-shadow:0 25px 50px rgba(0,0,0,0.3);}
        .tab-buttons{display:flex;gap:10px;margin-bottom:30px;}
        .tab-btn{flex:1;padding:14px;border:2px solid var(--border);border-radius:12px;background:white;cursor:pointer;font-weight:600;}
        .tab-btn.active{border-color:var(--accent);background:#fef9e7;}
        .register-link{text-align:center;margin-top:25px;padding-top:25px;border-top:1px solid var(--border);}
        .register-link a{color:var(--accent);font-weight:600;text-decoration:none;}
        .remember-row{display:flex;justify-content:space-between;margin:15px 0;}
        .forgot-link{color:var(--accent);text-decoration:none;}
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">[same navbar as index.html]</nav>

    <div class="container">
        <div class="auth-card">
            <div class="logo" style="display:flex;align-items:center;gap:12px;margin-bottom:30px;">
                <div class="navbar-logo">A</div>
                <div class="navbar-brand-text"><span>TAAGC</span> GLOBAL</div>
            </div>

            <div class="tab-buttons">
                <button class="tab-btn active" onclick="showTab('login')">Login</button>
                <button class="tab-btn" onclick="showTab('register')">Register</button>
            </div>

            <div id="alertMessage" class="alert"></div>

            <!-- LOGIN FORM -->
            <div id="loginForm">
                <form id="loginFormElement">
                    <div class="form-group">
                        <label>Email</label>
                        <div class="input-wrapper"><i class="fas fa-envelope"></i><input type="email" id="loginEmail" class="form-control" required></div>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-wrapper"><i class="fas fa-lock"></i><input type="password" id="loginPassword" class="form-control" required></div>
                    </div>
                    <div class="remember-row">
                        <label><input type="checkbox" id="rememberMe"> Remember me</label>
                        <a href="#" class="forgot-link" onclick="forgotPassword(event)">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn btn-accent btn-block" id="loginBtn">Login</button>
                </form>
            </div>

            <!-- REGISTER FORM (simplified) -->
            <div id="registerForm" style="display:none;">
                <!-- Company/Individual tabs here -->
                <button type="submit" class="btn btn-primary btn-block">Register</button>
            </div>

            <div class="register-link">
                <span id="loginLinkText">Don't have an account? <a href="#" onclick="showTab('register')">Register</a></span>
                <span id="registerLinkText" style="display:none;">Already have an account? <a href="#" onclick="showTab('login')">Login</a></span>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">[same footer as index.html]</footer>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script src="js/cookie-consent.js"></script>
    
    <!-- Registration logic -->
    <script>
        document.getElementById('loginFormElement').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = '<span class="loading"></span> Logging in...';
            btn.disabled = true;

            try {
                const user = await auth.signInWithEmailAndPassword(
                    document.getElementById('loginEmail').value,
                    document.getElementById('loginPassword').value
                );
                
                // Check user type
                let userData = { uid: user.user.uid, email: user.user.email };
                const company = await db.collection('companies').doc(user.user.uid).get();
                if(company.exists) {
                    userData.userType = 'company';
                    userData.accountType = company.data().accountType || 'client';
                } else {
                    const ind = await db.collection('individuals').doc(user.user.uid).get();
                    userData.userType = 'individual';
                    userData.accountType = ind.exists ? ind.data().accountType || 'shopper' : 'shopper';
                }

                const storage = document.getElementById('rememberMe').checked ? localStorage : sessionStorage;
                storage.setItem('taagc_user', JSON.stringify(userData));

                showAlert('Login successful!', 'success');
                setTimeout(() => {
                    if(userData.userType === 'company') window.location.href = '/dashboards/company.html';
                    else window.location.href = userData.accountType === 'shopper' ? '/dashboards/shopper.html' :
                                               userData.accountType === 'investor' ? '/dashboards/investor.html' :
                                               '/dashboards/professional.html';
                }, 1500);
            } catch(e) {
                showAlert(e.message, 'error');
                btn.innerHTML = 'Login';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
