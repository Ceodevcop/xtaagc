<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Register | TAAGC Global - Company & Individual Registration</title>
    
    <!-- SEO Meta -->
    <meta name="description" content="Register with TAAGC Global as a company or individual. Access global trade, investment opportunities, and partnership programs.">
    <meta name="keywords" content="TAAGC registration, company registration, individual registration, global trade, investment">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Master Stylesheets -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="register-style.css">
    
    <!-- Firebase -->
    <script type="module" src="firebase-config.js"></script>
</head>
<body>
    <!-- NAVBAR CONTAINER (reuse from home) -->
    <div id="navbar-container"></div>

    <!-- PAGE HEADER -->
    <section class="register-header">
        <div class="container">
            <span class="page-badge"><i class="fas fa-building"></i> JOIN TAAGC GLOBAL</span>
            <h1 class="page-title">Create Your <span class="text-gold">Account</span></h1>
            <p class="page-subtitle">Choose your account type to get started with global opportunities</p>
        </div>
    </section>

    <!-- REGISTRATION TYPE SELECTOR -->
    <section class="register-type-section">
        <div class="container">
            <div class="type-selector" id="typeSelector">
                <button class="type-selector-btn active" data-type="company">
                    <i class="fas fa-building"></i>
                    <div>
                        <h3>Company Registration</h3>
                        <p>For registered businesses and organizations</p>
                    </div>
                </button>
                <button class="type-selector-btn" data-type="individual">
                    <i class="fas fa-user"></i>
                    <div>
                        <h3>Individual Registration</h3>
                        <p>For shoppers, investors, and professionals</p>
                    </div>
                </button>
            </div>
        </div>
    </section>

    <!-- REGISTRATION FORM CONTAINER -->
    <section class="register-form-section">
        <div class="container">
            <div class="form-container" id="formContainer">
                <!-- Forms will be dynamically injected here -->
                <div class="loading-state">
                    <div class="loader"></div>
                    <p>Loading registration form...</p>
                </div>
            </div>
        </div>
    </section>

    <!-- BENEFITS SECTION -->
    <section class="benefits-section">
        <div class="container">
            <div class="section-header">
                <span class="section-subtitle">WHY REGISTER</span>
                <h2 class="section-title">Benefits of <span class="text-gold">Membership</span></h2>
            </div>
            
            <div class="benefits-grid" id="benefitsGrid">
                <!-- Benefits loaded dynamically -->
            </div>
        </div>
    </section>

    <!-- FAQ SECTION -->
    <section class="faq-section">
        <div class="container">
            <div class="section-header">
                <span class="section-subtitle">QUESTIONS?</span>
                <h2 class="section-title">Frequently Asked <span class="text-gold">Questions</span></h2>
            </div>
            
            <div class="faq-grid" id="faqGrid"></div>
        </div>
    </section>

    <!-- FOOTER CONTAINER -->
    <div id="footer-container"></div>

    <!-- BACK TO TOP BUTTON -->
    <button id="backToTop" class="back-to-top" aria-label="Back to top">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- SCRIPTS -->
    <script type="module" src="components/notifications.js"></script>
    <script type="module" src="components/modal.js"></script>
    <script type="module" src="components/navbar.js"></script>
    <script type="module" src="sections/footer.js"></script>
    
    <!-- Register Modules -->
    <script type="module" src="register/register-validation.js"></script>
    <script type="module" src="register/register-ui.js"></script>
    <script type="module" src="register/register-company.js"></script>
    <script type="module" src="register/register-individual.js"></script>
    <script type="module" src="register/register-success.js"></script>
    <script type="module" src="register/register-core.js"></script>
</body>
</html>
