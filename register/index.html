<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - TAAGC</title>
    
    <!-- Firebase 8.10.1 SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0a2540 0%, #1a3a4f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 500px;
            padding: 40px;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-icon {
            width: 80px;
            height: 80px;
            background: #0a2540;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            color: white;
            font-size: 36px;
            font-weight: 700;
        }
        .logo h1 {
            color: #0a2540;
            font-size: 28px;
        }
        .logo span {
            color: #c19a6b;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus, select:focus {
            border-color: #c19a6b;
            outline: none;
            box-shadow: 0 0 0 3px rgba(193, 154, 107, 0.1);
        }
        .btn-register {
            width: 100%;
            padding: 14px;
            background: #0a2540;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-register:hover {
            background: #1a3a4f;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(10, 37, 64, 0.2);
        }
        .links {
            text-align: center;
            margin-top: 25px;
        }
        .links a {
            color: #c19a6b;
            text-decoration: none;
            font-weight: 600;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .alert-error {
            background: #fee2e2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }
        .alert-success {
            background: #dcfce7;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }
        .info-box {
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            border-radius: 12px;
            padding: 15px;
            margin: 20px 0;
            font-size: 14px;
        }
        .info-box i {
            color: #0284c7;
            margin-right: 8px;
        }
        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
        }
        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
        }
        .strength-weak { background: #dc2626; width: 33.33%; }
        .strength-medium { background: #f59e0b; width: 66.66%; }
        .strength-strong { background: #10b981; width: 100%; }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <div class="logo-icon">TA</div>
            <h1><span>TAAGC</span> Registration</h1>
        </div>

        <div id="alertMessage" class="alert"></div>

        <div class="info-box">
            <i class="fas fa-info-circle"></i>
            <strong>ID Format:</strong> Investors get Ti001/MM/YYYY, Clients get Tc001/MM/YYYY
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" placeholder="Enter your phone number">
            </div>

            <div class="form-group">
                <label for="role">Register As</label>
                <select id="role" required>
                    <option value="">Select Role</option>
                    <option value="investor">Investor</option>
                    <option value="client">Client</option>
                </select>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Create a password" required onkeyup="checkPasswordStrength()">
                <div class="password-strength">
                    <div id="strengthBar" class="password-strength-bar"></div>
                </div>
                <small id="strengthText" style="color: #64748b;">Enter a password</small>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
            </div>

            <div class="form-group">
                <label style="display: flex; align-items: center;">
                    <input type="checkbox" id="terms" required style="width: auto; margin-right: 10px;">
                    I agree to the <a href="#" style="color: #c19a6b;">Terms of Service</a> and <a href="#" style="color: #c19a6b;">Privacy Policy</a>
                </label>
            </div>

            <button type="submit" class="btn-register">
                <i class="fas fa-user-plus"></i> Register
            </button>
        </form>

        <div class="links">
            <a href="index.html">Already have an account? Login</a>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAI1MrcP977UgRLQoePxl64JOSyj9v4WpI",
            authDomain: "xtaagc.firebaseapp.com",
            projectId: "xtaagc",
            storageBucket: "xtaagc.appspot.com",
            messagingSenderId: "256073982437",
            appId: "1:256073982437:web:8da63bb7acc86c0ca98f0c"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Password strength checker
        window.checkPasswordStrength = function() {
            const password = document.getElementById('password').value;
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('strengthText');
            
            // Remove all classes
            strengthBar.className = 'password-strength-bar';
            
            if (password.length === 0) {
                strengthText.textContent = 'Enter a password';
                return;
            }
            
            // Check strength
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]+/)) strength++;
            if (password.match(/[A-Z]+/)) strength++;
            if (password.match(/[0-9]+/)) strength++;
            if (password.match(/[$@#&!]+/)) strength++;
            
            if (strength <= 2) {
                strengthBar.classList.add('strength-weak');
                strengthText.textContent = 'Weak password';
                strengthText.style.color = '#dc2626';
            } else if (strength <= 4) {
                strengthBar.classList.add('strength-medium');
                strengthText.textContent = 'Medium password';
                strengthText.style.color = '#f59e0b';
            } else {
                strengthBar.classList.add('strength-strong');
                strengthText.textContent = 'Strong password';
                strengthText.style.color = '#10b981';
            }
        };

        // Initialize counters if they don't exist
        async function initializeCounters() {
            const counters = ['investorCounter', 'clientCounter'];
            for (const counter of counters) {
                const docRef = db.collection('counters').doc(counter);
                const doc = await docRef.get();
                if (!doc.exists) {
                    await docRef.set({ current: 0 });
                }
            }
        }

        // Register Form Handler
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const role = document.getElementById('role').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const alertDiv = document.getElementById('alertMessage');

            // Validation
            if (password !== confirmPassword) {
                alertDiv.className = 'alert alert-error';
                alertDiv.style.display = 'block';
                alertDiv.textContent = 'Passwords do not match!';
                return;
            }

            if (password.length < 6) {
                alertDiv.className = 'alert alert-error';
                alertDiv.style.display = 'block';
                alertDiv.textContent = 'Password must be at least 6 characters long!';
                return;
            }

            try {
                // Show loading state
                const submitBtn = e.target.querySelector('button[type="submit"]');
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Registering...';
                submitBtn.disabled = true;

                // Initialize counters
                await initializeCounters();

                // Create auth user
                const userCred = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCred.user;

                // Update profile with name
                await user.updateProfile({
                    displayName: fullName
                });

                // Generate custom ID based on role
                const now = new Date();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const year = now.getFullYear();
                const prefix = role === 'investor' ? 'Ti' : 'Tc';
                const counterDocId = role === 'investor' ? 'investorCounter' : 'clientCounter';

                // Use transaction to safely increment counter
                const generatedId = await db.runTransaction(async (transaction) => {
                    const counterRef = db.collection('counters').doc(counterDocId);
                    const counterDoc = await transaction.get(counterRef);
                    
                    let newNumber = 1;
                    if (counterDoc.exists) {
                        newNumber = (counterDoc.data().current || 0) + 1;
                    }
                    
                    transaction.set(counterRef, { current: newNumber }, { merge: true });
                    
                    const seq = String(newNumber).padStart(3, '0');
                    return `${prefix}${seq}/${month}/${year}`;
                });

                // Create user profile in Firestore
                await db.collection('users').doc(user.uid).set({
                    uid: user.uid,
                    fullName: fullName,
                    email: email,
                    phone: phone || '',
                    role: role,
                    generatedId: generatedId,
                    status: 'active',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                });

                // Log the registration
                await db.collection('logs').add({
                    action: 'User Registered',
                    userId: user.uid,
                    userEmail: email,
                    role: role,
                    generatedId: generatedId,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                // Show success message
                alertDiv.className = 'alert alert-success';
                alertDiv.style.display = 'block';
                alertDiv.innerHTML = `<i class="fas fa-check-circle"></i> Registration successful! Your ID: <strong>${generatedId}</strong><br>Redirecting to login...`;

                // Redirect to login after 3 seconds
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 3000);

            } catch (error) {
                // Show error message
                alertDiv.className = 'alert alert-error';
                alertDiv.style.display = 'block';
                
                if (error.code === 'auth/email-already-in-use') {
                    alertDiv.textContent = 'Email already registered. Please login.';
                } else if (error.code === 'auth/invalid-email') {
                    alertDiv.textContent = 'Invalid email format.';
                } else if (error.code === 'auth/weak-password') {
                    alertDiv.textContent = 'Password is too weak. Use at least 6 characters.';
                } else {
                    alertDiv.textContent = 'Registration failed: ' + error.message;
                }

                // Reset button
                const submitBtn = e.target.querySelector('button[type="submit"]');
                submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> Register';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
