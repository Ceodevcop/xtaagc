<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAAGC | Register</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- MASTER CSS -->
<link rel="stylesheet" href="assets/css/style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>

<body>
<div class="container">
    <div class="card" style="max-width:520px;margin:80px auto;">
        <div class="section-header">
            <span class="section-subtitle">TAAGC GLOBAL</span>
            <h2 class="section-title">Create Account</h2>
        </div>

        <!-- Toggle -->
        <div class="form-row" style="margin-bottom:20px;">
            <button class="btn btn-primary btn-block" id="companyBtn">Company</button>
            <button class="btn btn-outline btn-block" id="individualBtn">Individual</button>
        </div>

        <div id="alertBox"></div>

        <!-- FORM -->
        <form id="registerForm">
            <div class="form-group">
                <label>Name</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input class="form-control" id="name" required>
                </div>
            </div>

            <div class="form-group">
                <label>Email</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input class="form-control" id="email" type="email" required>
                </div>
            </div>

            <div class="form-group">
                <label>Phone</label>
                <div class="input-wrapper">
                    <i class="fas fa-phone"></i>
                    <input class="form-control" id="phone">
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input class="form-control" id="password" type="password" required>
                </div>
            </div>

            <button class="btn btn-accent btn-block btn-lg" type="submit">
                Create Account
            </button>
        </form>

        <p class="text-center" style="margin-top:20px;">
            Already have an account?
            <a href="login.html" class="text-gold">Login</a>
        </p>
    </div>
</div>

<script>
/* Firebase */
firebase.initializeApp({
  apiKey: "AIzaSyAI1MrcP977UgRLQoePxl64JOSyj9v4WpI",
  authDomain: "xtaagc.firebaseapp.com",
  projectId: "xtaagc",
  storageBucket: "xtaagc.firebasestorage.app",
  messagingSenderId: "256073982437",
  appId: "1:256073982437:web:8da63bb7acc86c0ca98f0c"
});
const auth = firebase.auth();
const db = firebase.firestore();

let type = "company";
companyBtn.onclick=()=>{type="company";companyBtn.className="btn btn-primary btn-block";individualBtn.className="btn btn-outline btn-block";}
individualBtn.onclick=()=>{type="individual";individualBtn.className="btn btn-primary btn-block";companyBtn.className="btn btn-outline btn-block";}

registerForm.onsubmit = async e => {
 e.preventDefault();
 try{
  const cred = await auth.createUserWithEmailAndPassword(email.value,password.value);
  const ref = type==="company" ? "companies" : "users";
  await db.collection(ref).doc(cred.user.uid).set({
    name:name.value,email:email.value,phone:phone.value,
    status:type==="company"?"pending":"active",
    createdAt:new Date()
  });
  alertBox.innerHTML=`<div class="alert alert-success">Registration successful</div>`;
 }catch(err){
  alertBox.innerHTML=`<div class="alert alert-error">${err.message}</div>`;
 }
};
</script>
</body>
</html>
