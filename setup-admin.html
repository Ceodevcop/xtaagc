<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Setup | TAAGC Global</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:'Inter',sans-serif;
            background:linear-gradient(135deg,#0a2540,#1a3a4f);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }
        .setup-card{
            background:white;
            border-radius:32px;
            padding:48px;
            max-width:600px;
            width:100%;
            box-shadow:0 25px 50px rgba(0,0,0,0.3);
        }
        .logo{
            display:flex;
            align-items:center;
            gap:12px;
            margin-bottom:30px;
        }
        .logo-icon{
            width:48px;
            height:48px;
            background:linear-gradient(135deg,#0a2540,#3a5a78);
            border-radius:12px;
            display:flex;
            align-items:center;
            justify-content:center;
            color:white;
            font-size:24px;
            font-weight:700;
        }
        .logo-text{
            font-size:24px;
            font-weight:700;
            color:#0a2540;
            font-family:'Playfair Display',serif;
        }
        .logo-text span{color:#c19a6b;}
        
        h1{font-size:28px;margin-bottom:8px;color:#0a2540;}
        .admin-badge{
            display:inline-block;
            background:#c19a6b20;
            color:#c19a6b;
            padding:6px 16px;
            border-radius:40px;
            font-size:13px;
            font-weight:600;
            margin-bottom:24px;
        }
        
        .form-section{
            background:#f8fafc;
            border-radius:16px;
            padding:24px;
            margin:30px 0;
            border-left:4px solid #c19a6b;
        }
        
        .form-group{
            margin-bottom:20px;
        }
        .form-group label{
            display:block;
            margin-bottom:8px;
            font-weight:600;
            color:#0a2540;
        }
        .form-group label i{
            color:#c19a6b;
            margin-right:8px;
        }
        .input-wrapper{
            position:relative;
        }
        .input-icon{
            position:absolute;
            left:16px;
            top:50%;
            transform:translateY(-50%);
            color:#a0aec0;
        }
        input, select{
            width:100%;
            padding:14px 16px 14px 48px;
            border:2px solid #e2e8f0;
            border-radius:12px;
            font-size:15px;
            transition:0.3s;
        }
        input:focus, select:focus{
            border-color:#c19a6b;
            outline:none;
            box-shadow:0 0 0 4px rgba(193,154,107,0.1);
        }
        
        .btn{
            display:flex;
            align-items:center;
            justify-content:center;
            gap:10px;
            width:100%;
            padding:16px;
            background:#c19a6b;
            color:white;
            border:none;
            border-radius:12px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
            font-size:16px;
        }
        .btn:hover{
            background:#b38b5e;
            transform:translateY(-2px);
        }
        .btn-primary{
            background:#0a2540;
        }
        .btn-primary:hover{
            background:#1a3a4f;
        }
        
        .alert{
            padding:16px 20px;
            border-radius:12px;
            margin:20px 0;
            display:flex;
            align-items:center;
            gap:12px;
        }
        .alert-success{
            background:#f0fff4;
            border-left:4px solid #2e7d5e;
            color:#22543d;
        }
        .alert-error{
            background:#fff5f5;
            border-left:4px solid #e53e3e;
            color:#742a2a;
        }
        .alert-info{
            background:#ebf8ff;
            border-left:4px solid #3182ce;
            color:#2c5282;
        }
        
        .hidden{display:none;}
        
        .credentials-box{
            background:#0a2540;
            color:white;
            padding:24px;
            border-radius:16px;
            margin:20px 0;
        }
        .credential-row{
            display:flex;
            justify-content:space-between;
            padding:10px 0;
            border-bottom:1px solid rgba(255,255,255,0.1);
        }
        .credential-row:last-child{border-bottom:none;}
        
        .loading{
            display:inline-block;
            width:20px;
            height:20px;
            border:3px solid rgba(255,255,255,0.3);
            border-top-color:white;
            border-radius:50%;
            animation:spin 1s linear infinite;
        }
        @keyframes spin{to{transform:rotate(360deg);}}
        
        .password-strength{
            margin-top:8px;
            font-size:12px;
        }
        .strength-weak{color:#e53e3e;}
        .strength-medium{color:#dd6b20;}
        .strength-strong{color:#2e7d5e;}
    </style>
</head>
<body>
    <div class="setup-card">
        <div class="logo">
            <div class="logo-icon">A</div>
            <div class="logo-text"><span>TAAGC</span> GLOBAL</div>
        </div>

        <span class="admin-badge">
            <i class="fas fa-crown"></i> ADMIN SETUP
        </span>

        <h1>Create Administrator</h1>
        <p style="color:#64748b; margin-bottom:20px;">Enter the credentials for the new administrator account.</p>

        <!-- Admin Setup Form -->
        <div class="form-section">
            <div style="display:flex; align-items:center; gap:12px; margin-bottom:20px;">
                <i class="fas fa-user-shield" style="font-size:24px; color:#c19a6b;"></i>
                <h2 style="font-size:20px; color:#0a2540; margin:0;">Administrator Details</h2>
            </div>
            
            <form id="adminSetupForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="adminName" placeholder="e.g. Ahmad Hamza" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="adminEmail" placeholder="admin@taagc.com" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="adminPassword" placeholder="••••••••" minlength="6" required>
                    </div>
                    <div id="passwordStrength" class="password-strength"></div>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-check-circle"></i> Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-check input-icon"></i>
                        <input type="password" id="adminConfirmPassword" placeholder="••••••••" required>
                    </div>
                    <div id="passwordMatch" class="password-strength"></div>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-tag"></i> Admin Role</label>
                    <div class="input-wrapper">
                        <i class="fas fa-shield-alt input-icon"></i>
                        <select id="adminRole">
                            <option value="super-admin">Super Administrator (Full Access)</option>
                            <option value="admin">Administrator (Page Management)</option>
                            <option value="editor">Editor (Create/Edit Pages)</option>
                        </select>
                    </div>
                </div>
            </form>
        </div>

        <!-- Alert Container -->
        <div id="alertContainer"></div>

        <!-- Action Buttons -->
        <div id="setupActions">
            <button onclick="createAdmin()" class="btn" id="setupBtn">
                <i class="fas fa-shield-alt"></i> Create Administrator
            </button>
        </div>

        <!-- Success View -->
        <div id="successView" class="hidden">
            <div style="text-align:center; padding:20px;">
                <div style="width:80px; height:80px; background:#2e7d5e; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 20px; color:white; font-size:40px;">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h2 style="color:#2e7d5e; margin-bottom:16px;">Administrator Created!</h2>
                
                <div class="credentials-box" id="successCredentials">
                    <!-- Dynamically filled -->
                </div>
                
                <button onclick="window.location.href='/admin/login.html'" class="btn" style="background:#0a2540; margin-top:20px;">
                    <i class="fas fa-sign-in-alt"></i> Go to Admin Login
                </button>
                
                <button onclick="resetForm()" class="btn" style="background:#64748b; margin-top:10px;">
                    <i class="fas fa-plus"></i> Create Another Admin
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getAuth, 
            createUserWithEmailAndPassword,
            signInWithEmailAndPassword 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { 
            getFirestore, 
            doc, 
            setDoc 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAI1MrcP977UgRLQoePxl64JOSyj9v4WpI",
            authDomain: "xtaagc.firebaseapp.com",
            projectId: "xtaagc",
            storageBucket: "xtaagc.firebasestorage.app",
            messagingSenderId: "256073982437",
            appId: "1:256073982437:web:8da63bb7acc86c0ca98f0c"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ===== PASSWORD STRENGTH CHECKER =====
        function checkPasswordStrength(password) {
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]+/)) strength++;
            if (password.match(/[A-Z]+/)) strength++;
            if (password.match(/[0-9]+/)) strength++;
            if (password.match(/[$@#&!]+/)) strength++;
            
            if (strength <= 2) return { level: 'Weak', color: '#e53e3e' };
            if (strength <= 4) return { level: 'Medium', color: '#dd6b20' };
            return { level: 'Strong', color: '#2e7d5e' };
        }

        // ===== PASSWORD STRENGTH EVENT LISTENER =====
        document.getElementById('adminPassword')?.addEventListener('input', function() {
            const password = this.value;
            const strength = checkPasswordStrength(password);
            const strengthDiv = document.getElementById('passwordStrength');
            
            if (password.length === 0) {
                strengthDiv.innerHTML = '';
            } else {
                strengthDiv.innerHTML = `Password strength: <span style="color:${strength.color}; font-weight:600;">${strength.level}</span>`;
                strengthDiv.className = `password-strength strength-${strength.level.toLowerCase()}`;
            }
        });

        // ===== PASSWORD MATCH CHECKER =====
        document.getElementById('adminConfirmPassword')?.addEventListener('input', function() {
            const password = document.getElementById('adminPassword').value;
            const confirm = this.value;
            const matchDiv = document.getElementById('passwordMatch');
            
            if (confirm.length === 0) {
                matchDiv.innerHTML = '';
            } else if (password === confirm) {
                matchDiv.innerHTML = '<span style="color:#2e7d5e;"><i class="fas fa-check-circle"></i> Passwords match</span>';
            } else {
                matchDiv.innerHTML = '<span style="color:#e53e3e;"><i class="fas fa-exclamation-circle"></i> Passwords do not match</span>';
            }
        });

        // ===== SHOW ALERT =====
        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `
                <div class="alert alert-${type}">
                    <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i>
                    <span>${message}</span>
                </div>
            `;
        }

        // ===== CLEAR ALERT =====
        function clearAlert() {
            document.getElementById('alertContainer').innerHTML = '';
        }

        // ===== VALIDATE FORM =====
        function validateForm() {
            const name = document.getElementById('adminName').value.trim();
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            const confirm = document.getElementById('adminConfirmPassword').value;
            
            if (!name || !email || !password || !confirm) {
                showAlert('Please fill in all fields', 'error');
                return false;
            }
            
            if (password.length < 6) {
                showAlert('Password must be at least 6 characters', 'error');
                return false;
            }
            
            if (password !== confirm) {
                showAlert('Passwords do not match', 'error');
                return false;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showAlert('Please enter a valid email address', 'error');
                return false;
            }
            
            return true;
        }

        // ===== CREATE ADMIN ACCOUNT =====
        window.createAdmin = async function() {
            clearAlert();
            
            if (!validateForm()) {
                return;
            }
            
            const btn = document.getElementById('setupBtn');
            btn.innerHTML = '<span class="loading"></span> Creating Administrator...';
            btn.disabled = true;
            
            const adminName = document.getElementById('adminName').value.trim();
            const adminEmail = document.getElementById('adminEmail').value.trim();
            const adminPassword = document.getElementById('adminPassword').value;
            const adminRole = document.getElementById('adminRole').value;

            try {
                // STEP 1: Try to create user
                let user;
                try {
                    const userCredential = await createUserWithEmailAndPassword(auth, adminEmail, adminPassword);
                    user = userCredential.user;
                    console.log('✅ Admin user created:', user.uid);
                } catch (createError) {
                    if (createError.code === 'auth/email-already-in-use') {
                        // User exists - try to sign in
                        try {
                            const userCredential = await signInWithEmailAndPassword(auth, adminEmail, adminPassword);
                            user = userCredential.user;
                            console.log('✅ Admin user exists, signed in:', user.uid);
                        } catch (signInError) {
                            showAlert('This email is already registered but the password is incorrect.', 'error');
                            btn.innerHTML = '<i class="fas fa-shield-alt"></i> Create Administrator';
                            btn.disabled = false;
                            return;
                        }
                    } else {
                        throw createError;
                    }
                }

                // STEP 2: Determine role permissions
                let permissions = [];
                let roleName = '';
                
                switch(adminRole) {
                    case 'super-admin':
                        roleName = 'Super Administrator';
                        permissions = ['create_pages', 'edit_pages', 'delete_pages', 'manage_users', 'manage_admins', 'view_analytics', 'settings'];
                        break;
                    case 'admin':
                        roleName = 'Administrator';
                        permissions = ['create_pages', 'edit_pages', 'delete_pages', 'view_analytics'];
                        break;
                    case 'editor':
                        roleName = 'Editor';
                        permissions = ['create_pages', 'edit_pages'];
                        break;
                }

                // STEP 3: Create admin document in Firestore
                await setDoc(doc(db, "admins", user.uid), {
                    uid: user.uid,
                    name: adminName,
                    email: adminEmail,
                    role: adminRole,
                    roleName: roleName,
                    permissions: permissions,
                    isAdmin: true,
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString(),
                    createdBy: 'setup',
                    status: 'active'
                });

                // STEP 4: Create user document
                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    name: adminName,
                    email: adminEmail,
                    role: 'admin',
                    userType: 'admin',
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                });

                // STEP 5: Force token refresh
                await user.getIdToken(true);
                
                // SUCCESS!
                showAlert(`✅ ${roleName} created successfully!`, 'success');
                
                // Show success credentials
                document.getElementById('successCredentials').innerHTML = `
                    <h3 style="color:white; margin-bottom:16px;">Administrator Credentials</h3>
                    <div class="credential-row">
                        <span>Name:</span>
                        <strong>${adminName}</strong>
                    </div>
                    <div class="credential-row">
                        <span>Email:</span>
                        <strong>${adminEmail}</strong>
                    <
