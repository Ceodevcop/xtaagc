<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Setup</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:'Inter',sans-serif;
            background:linear-gradient(135deg,#0a2540,#1a3a4f);
            display:flex;
            align-items:center;
            justify-content:center;
            min-height:100vh;
            padding:20px;
        }
        .card{
            background:white;
            border-radius:24px;
            padding:40px;
            width:100%;
            max-width:500px;
            box-shadow:0 20px 40px rgba(0,0,0,0.2);
        }
        h2{
            color:#0a2540;
            margin-bottom:8px;
            font-size:24px;
        }
        .badge{
            background:#c19a6b20;
            color:#c19a6b;
            padding:6px 16px;
            border-radius:40px;
            font-size:12px;
            font-weight:600;
            display:inline-block;
            margin-bottom:20px;
        }
        .form-group{
            margin-bottom:16px;
        }
        label{
            display:block;
            margin-bottom:6px;
            font-weight:600;
            font-size:14px;
            color:#0a2540;
        }
        .input-wrapper{
            position:relative;
        }
        .input-wrapper i{
            position:absolute;
            left:14px;
            top:50%;
            transform:translateY(-50%);
            color:#a0aec0;
        }
        input, select{
            width:100%;
            padding:12px 12px 12px 42px;
            border:2px solid #e2e8f0;
            border-radius:12px;
            font-size:15px;
        }
        input:focus{
            border-color:#c19a6b;
            outline:none;
        }
        .btn{
            width:100%;
            padding:14px;
            background:#c19a6b;
            color:white;
            border:none;
            border-radius:12px;
            font-weight:600;
            cursor:pointer;
            margin-top:10px;
        }
        .btn:hover{
            background:#b38b5e;
        }
        .alert{
            padding:12px;
            border-radius:8px;
            margin-top:15px;
            font-size:14px;
            display:none;
        }
        .alert-success{
            background:#f0fff4;
            border-left:4px solid #2e7d5e;
            color:#22543d;
            display:flex;
        }
        .alert-error{
            background:#fff5f5;
            border-left:4px solid #e53e3e;
            color:#742a2a;
            display:flex;
        }
        .hidden{display:none;}
    </style>
</head>
<body>
    <div class="card">
        <span class="badge"><i class="fas fa-shield-alt"></i> ADMIN SETUP</span>
        <h2>Create Administrator</h2>
        <p style="color:#64748b; margin-bottom:25px; font-size:14px;">Enter credentials for new admin</p>

        <div id="alertBox" class="alert"></div>

        <div class="form-group">
            <label><i class="fas fa-user"></i> Full Name</label>
            <div class="input-wrapper">
                <i class="fas fa-user"></i>
                <input type="text" id="adminName" placeholder="e.g. Ahmad Hamza">
            </div>
        </div>

        <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email</label>
            <div class="input-wrapper">
                <i class="fas fa-envelope"></i>
                <input type="email" id="adminEmail" placeholder="admin@taagc.com">
            </div>
        </div>

        <div class="form-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <div class="input-wrapper">
                <i class="fas fa-lock"></i>
                <input type="password" id="adminPass" placeholder="••••••••">
            </div>
        </div>

        <div class="form-group">
            <label><i class="fas fa-check"></i> Confirm Password</label>
            <div class="input-wrapper">
                <i class="fas fa-check"></i>
                <input type="password" id="adminPass2" placeholder="••••••••">
            </div>
        </div>

        <div class="form-group">
            <label><i class="fas fa-tag"></i> Role</label>
            <div class="input-wrapper">
                <i class="fas fa-shield-alt"></i>
                <select id="adminRole">
                    <option value="super-admin">Super Administrator</option>
                    <option value="admin">Administrator</option>
                    <option value="editor">Editor</option>
                </select>
            </div>
        </div>

        <button class="btn" id="setupBtn" onclick="createAdmin()">
            <i class="fas fa-shield-alt"></i> Create Admin
        </button>

        <div id="successBox" class="hidden" style="margin-top:25px; padding:20px; background:#0a2540; color:white; border-radius:12px;">
            <p style="color:#c19a6b; margin-bottom:10px;"><i class="fas fa-check-circle"></i> ADMIN CREATED</p>
            <p id="successName" style="margin-bottom:5px;"></p>
            <p id="successEmail" style="margin-bottom:5px;"></p>
            <p id="successRole" style="margin-bottom:0;"></p>
            <a href="/admin/login.html" style="display:block; text-align:center; margin-top:20px; padding:10px; background:#c19a6b; color:white; text-decoration:none; border-radius:8px;">Go to Login</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAI1MrcP977UgRLQoePxl64JOSyj9v4WpI",
            authDomain: "xtaagc.firebaseapp.com",
            projectId: "xtaagc",
            storageBucket: "xtaagc.firebasestorage.app",
            messagingSenderId: "256073982437",
            appId: "1:256073982437:web:8da63bb7acc86c0ca98f0c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.createAdmin = async function() {
            const btn = document.getElementById('setupBtn');
            const name = document.getElementById('adminName').value;
            const email = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPass').value;
            const pass2 = document.getElementById('adminPass2').value;
            const role = document.getElementById('adminRole').value;
            const alertBox = document.getElementById('alertBox');

            if(!name || !email || !pass || !pass2) {
                alertBox.className = 'alert alert-error';
                alertBox.innerHTML = '<i class="fas fa-exclamation-circle"></i> All fields required';
                return;
            }

            if(pass !== pass2) {
                alertBox.className = 'alert alert-error';
                alertBox.innerHTML = '<i class="fas fa-exclamation-circle"></i> Passwords do not match';
                return;
            }

            if(pass.length < 6) {
                alertBox.className = 'alert alert-error';
                alertBox.innerHTML = '<i class="fas fa-exclamation-circle"></i> Password must be at least 6 characters';
                return;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';
            btn.disabled = true;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                const roleNames = {
                    'super-admin': 'Super Administrator',
                    'admin': 'Administrator',
                    'editor': 'Editor'
                };

                await setDoc(doc(db, "admins", user.uid), {
                    name: name,
                    email: email,
                    role: role,
                    roleName: roleNames[role],
                    isAdmin: true,
                    createdAt: new Date().toISOString(),
                    uid: user.uid
                });

                document.getElementById('successName').innerHTML = '<strong>Name:</strong> ' + name;
                document.getElementById('successEmail').innerHTML = '<strong>Email:</strong> ' + email;
                document.getElementById('successRole').innerHTML = '<strong>Role:</strong> ' + roleNames[role];
                document.getElementById('successBox').classList.remove('hidden');
                
                alertBox.style.display = 'none';
                btn.disabled = true;
                btn.style.opacity = '0.5';

            } catch(error) {
                let msg = error.message;
                if(error.code === 'auth/email-already-in-use') msg = 'Email already registered';
                if(error.code === 'auth/weak-password') msg = 'Password too weak';
                
                alertBox.className = 'alert alert-error';
                alertBox.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + msg;
                btn.innerHTML = '<i class="fas fa-shield-alt"></i> Create Admin';
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
