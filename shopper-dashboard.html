<!-- Add this script at the bottom -->
<script type="module">
    import { authService, shopperService, sharedService } from './firebase-config.js';
    
    // ===== CHECK AUTH =====
    async function initDashboard() {
        const user = authService.getCurrentUser();
        if(!user) {
            window.location.href = 'register.html#login';
            return;
        }
        
        // Load user profile
        const profile = await sharedService.getUserProfile(user.uid);
        if(profile.success) {
            document.querySelector('.user-avatar').innerHTML = profile.user.fullName?.charAt(0) || 'U';
            document.querySelector('.user-info h4').innerHTML = profile.user.fullName || 'User';
            document.querySelector('.welcome-content h2 span').innerHTML = profile.user.fullName?.split(' ')[0] || 'User';
        }
        
        // Load orders
        await loadOrders(user.uid);
        
        // Load quotes
        await loadQuotes(user.uid);
    }
    
    // ===== LOAD ORDERS =====
    async function loadOrders(userId) {
        const result = await shopperService.getUserOrders(userId);
        if(result.success && result.orders.length > 0) {
            const ordersHtml = result.orders.slice(0, 3).map(order => `
                <div class="cart-item">
                    <div class="item-image"><i class="fas fa-box"></i></div>
                    <div class="item-details">
                        <h4>${order.items?.[0]?.name || 'Order'} ${order.items?.length > 1 ? `+${order.items.length-1} more` : ''}</h4>
                        <p>Order #${order.orderNumber} • ${order.items?.length || 0} items</p>
                        <span class="item-price">$${order.total?.toLocaleString() || '0.00'}</span>
                    </div>
                    <div>
                        <span class="item-status status-${order.status}">${order.status}</span>
                        <div style="font-size:12px; margin-top:8px; color:#64748b;">
                            <i class="fas fa-calendar"></i> ${new Date(order.createdAt?.toDate()).toLocaleDateString()}
                        </div>
                    </div>
                </div>
            `).join('');
            document.querySelector('.cart-items').innerHTML = `
                <div class="section-header">
                    <h2><i class="fas fa-shopping-cart"></i> Recent Orders</h2>
                    <a href="orders.html" class="view-all">View All <i class="fas fa-arrow-right"></i></a>
                </div>
                ${ordersHtml}
            `;
        }
    }
    
    // ===== LOAD QUOTES =====
    async function loadQuotes(userId) {
        const result = await shopperService.getUserQuotes(userId);
        if(result.success && result.quotes.length > 0) {
            const quotesHtml = result.quotes.slice(0, 2).map(quote => `
                <div class="activity-item">
                    <div class="activity-icon"><i class="fas fa-${quote.category === 'electronics' ? 'laptop' : 'box'}"></i></div>
                    <div class="activity-details">
                        <h4>${quote.productName || 'Quote Request'}</h4>
                        <div class="activity-time"><i class="far fa-clock"></i> ${new Date(quote.createdAt?.toDate()).toLocaleDateString()}</div>
                    </div>
                    <div>
                        <span class="activity-status" style="background:${quote.status === 'pending' ? '#fff3cd' : '#d4edda'}; color:${quote.status === 'pending' ? '#856404' : '#155724'};">
                            ${quote.status === 'pending' ? 'Quote Pending' : 'Quote Received'}
                        </span>
                        ${quote.amount ? `<div style="font-weight:700; margin-top:4px;">$${quote.amount.toLocaleString()}</div>` : ''}
                    </div>
                </div>
            `).join('');
            document.querySelector('.activity-list').innerHTML = quotesHtml;
        }
    }
    
    // ===== CREATE NEW ORDER =====
    window.createOrder = async function() {
        const user = authService.getCurrentUser();
        if(!user) return;
        
        // Open order modal or redirect
        window.location.href = 'orders.html?new=true';
    };
    
    // ===== REQUEST QUOTE =====
    window.requestQuote = async function() {
        window.location.href = 'quotes.html?new=true';
    };
    
    // ===== LOGOUT =====
    window.logout = async function() {
        const result = await authService.logout();
        if(result.success) window.location.href = 'index.html';
    };
    
    // Initialize
    initDashboard();
</script>

<!-- Update all buttons with onclick handlers -->
<button class="welcome-btn" onclick="createOrder()">
    <i class="fas fa-shopping-cart"></i> New Order
</button>

</div>

    <div class="action-icon"><i class="fas fa-calculator"></i></div>
    <h4>Quote Requests</h4>
