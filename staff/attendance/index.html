<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Attendance - TAAGC Staff</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <link rel="stylesheet" href="/assets/css/staff.css">
    
    <style>
        .attendance-summary {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .summary-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }
        
        .summary-value {
            font-size: 36px;
            font-weight: 700;
            color: #0a2540;
        }
        
        .summary-label {
            color: #64748b;
            font-size: 13px;
            margin-top: 5px;
        }
        
        .clock-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0a2540, #1a3a4f);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            font-size: 24px;
        }
        
        .clock-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(10,37,64,0.3);
        }
        
        .clock-btn.clocked-in {
            background: #10b981;
        }
        
        .clock-time {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .history-table {
            margin-top: 30px;
        }
        
        .status-present { color: #10b981; }
        .status-late { color: #f59e0b; }
        .status-absent { color: #ef4444; }
    </style>
</head>
<body>
    <div class="staff-container">
        <aside class="sidebar">
            <!-- ... sidebar content ... -->
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <h1>Attendance Tracking</h1>
                <div class="service-info">
                    <i class="fas fa-id-card"></i>
                    <span id="headerServiceNumber"></span>
                </div>
            </div>

            <!-- Current Time -->
            <div style="text-align: center; margin-bottom: 20px;">
                <div class="clock-time" id="currentTime"></div>
                <p id="currentDate"></p>
            </div>

            <!-- Clock In/Out Button -->
            <button class="clock-btn" id="clockBtn" onclick="toggleClock()">
                <i class="fas fa-clock" style="font-size: 48px; margin-bottom: 15px;"></i>
                <span id="clockText">Clock In</span>
            </button>

            <!-- Today's Status -->
            <div style="text-align: center; margin-bottom: 30px;">
                <p id="todayStatus">Not clocked in yet</p>
            </div>

            <!-- Attendance Summary -->
            <div class="attendance-summary">
                <div class="summary-card">
                    <div class="summary-value" id="presentDays">0</div>
                    <div class="summary-label">Present</div>
                </div>
                <div class="summary-card">
                    <div class="summary-value" id="lateDays">0</div>
                    <div class="summary-label">Late</div>
                </div>
                <div class="summary-card">
                    <div class="summary-value" id="absentDays">0</div>
                    <div class="summary-label">Absent</div>
                </div>
                <div class="summary-card">
                    <div class="summary-value" id="totalHours">0</div>
                    <div class="summary-label">Total Hours</div>
                </div>
            </div>

            <!-- Attendance Chart -->
            <div style="background: white; padding: 20px; border-radius: 16px; margin-bottom: 30px;">
                <h3>Monthly Attendance</h3>
                <canvas id="attendanceChart" style="height: 300px;"></canvas>
            </div>

            <!-- Attendance History -->
            <div class="history-table">
                <h2>Attendance History</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Clock In</th>
                                <th>Clock Out</th>
                                <th>Hours</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="attendanceHistory">
                            <!-- Loaded via JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="/assets/js/staff.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCOcCDPqRSlAMJJBEeNchTA1qO9tl9Nldw",
            authDomain: "xtaagc.firebaseapp.com",
            projectId: "xtaagc"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentStaff = null;
        let currentAttendance = null;
        let clockInterval;

        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = '/';
                return;
            }
            
            await loadStaffData(user.uid);
            loadAttendanceData();
            updateClock();
            
            clockInterval = setInterval(updateClock, 1000);
        });

        function updateClock() {
            const now = new Date();
            document.getElementById('currentTime').textContent = now.toLocaleTimeString();
            document.getElementById('currentDate').textContent = now.toLocaleDateString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        async function loadStaffData(uid) {
            const doc = await db.collection('staff').doc(uid).get();
            currentStaff = { id: doc.id, ...doc.data() };
            document.getElementById('headerServiceNumber').textContent = currentStaff.serviceNumber;
        }

        async function loadAttendanceData() {
            const today = new Date().toISOString().split('T')[0];
            
            // Check if already clocked in today
            const attendanceSnapshot = await db.collection('attendance')
                .where('staffId', '==', currentStaff.id)
                .where('date', '==', today)
                .limit(1)
                .get();
            
            if (!attendanceSnapshot.empty) {
                currentAttendance = { id: attendanceSnapshot.docs[0].id, ...attendanceSnapshot.docs[0].data() };
                
                if (currentAttendance.clockOut) {
                    document.getElementById('clockBtn').classList.add('clocked-in');
                    document.getElementById('clockText').textContent = 'Clocked Out';
                    document.getElementById('clockBtn').disabled = true;
                    document.getElementById('todayStatus').innerHTML = `Clocked in at ${currentAttendance.clockIn} and out at ${currentAttendance.clockOut}`;
                } else {
                    document.getElementById('clockBtn').classList.add('clocked-in');
                    document.getElementById('clockText').textContent = 'Clock Out';
                    document.getElementById('todayStatus').innerHTML = `Clocked in at ${currentAttendance.clockIn}`;
                }
            }
            
            // Load attendance history
            const historySnapshot = await db.collection('attendance')
                .where('staffId', '==', currentStaff.id)
                .orderBy('date', 'desc')
                .limit(30)
                .get();
            
            let present = 0, late = 0, absent = 0, totalHours = 0;
            let historyHtml = '';
            
            historySnapshot.forEach(doc => {
                const record = doc.data();
                const hours = record.hours || 0;
                totalHours += hours;
                
                let status = 'present';
                let statusClass = 'status-present';
                
                if (record.status === 'late') {
                    late++;
                    status = 'late';
                    statusClass = 'status-late';
                } else if (record.clockIn) {
                    present++;
                }
                
                historyHtml += `
                    <tr>
                        <td>${record.date}</td>
                        <td>${record.clockIn || '-'}</td>
                        <td>${record.clockOut || '-'}</td>
                        <td>${hours ? hours.toFixed(1) : '-'}</td>
                        <td><span class="${statusClass}">${status}</span></td>
                    </tr>
                `;
            });
            
            // Calculate absent days (month days - present)
            const daysInMonth = new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).getDate();
            absent = daysInMonth - present - late;
            
            document.getElementById('presentDays').textContent = present;
            document.getElementById('lateDays').textContent = late;
            document.getElementById('absentDays').textContent = absent;
            document.getElementById('totalHours').textContent = totalHours.toFixed(1);
            document.getElementById('attendanceHistory').innerHTML = historyHtml || '<tr><td colspan="5">No attendance records found</td></tr>';
            
            // Initialize chart
            initChart([present, late, absent]);
        }

        function initChart(data) {
            const ctx = document.getElementById('attendanceChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Present', 'Late', 'Absent'],
                    datasets: [{
                        data: data,
                        backgroundColor: ['#10b981', '#f59e0b', '#ef4444'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        }

        async function toggleClock() {
            const btn = document.getElementById('clockBtn');
            const now = new Date();
            const timeStr = now.toLocaleTimeString();
            const today = now.toISOString().split('T')[0];
            
            if (!currentAttendance) {
                // Clock In
                const attendanceData = {
                    staffId: currentStaff.id,
                    staffName: currentStaff.fullName,
                    serviceNumber: currentStaff.serviceNumber,
                    department: currentStaff.departmentCode,
                    date: today,
                    clockIn: timeStr,
                    clockOut: null,
                    hours: null,
                    status: now.getHours() >= 9 ? 'late' : 'present',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                
                const docRef = await db.collection('attendance').add(attendanceData);
                currentAttendance = { id: docRef.id, ...attendanceData };
                
                btn.classList.add('clocked-in');
                document.getElementById('clockText').textContent = 'Clock Out';
                document.getElementById('todayStatus').innerHTML = `Clocked in at ${timeStr}`;
                STAFF.showToast('Clocked in successfully!', 'success');
                
            } else if (!currentAttendance.clockOut) {
                // Clock Out
                const clockInTime = new Date(`${today} ${currentAttendance.clockIn}`);
                const clockOutTime = now;
                const hoursWorked = (clockOutTime - clockInTime) / (1000 * 60 * 60);
                
                await db.collection('attendance').doc(currentAttendance.id).update({
                    clockOut: timeStr,
                    hours: hoursWorked
                });
                
                btn.disabled = true;
                document.getElementById('clockText').textContent = 'Completed';
                document.getElementById('todayStatus').innerHTML = `Clocked out at ${timeStr} (${hoursWorked.toFixed(1)} hours)`;
                STAFF.showToast('Clocked out successfully!', 'success');
            }
        }
    </script>
</body>
</html>
