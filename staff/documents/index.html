<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Documents - TAAGC Staff</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
    
    <link rel="stylesheet" href="/assets/css/staff.css">
    
    <style>
        .documents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .document-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #e2e8f0;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .document-card:hover {
            transform: translateY(-5px);
            border-color: #c19a6b;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .document-icon {
            font-size: 40px;
            color: #c19a6b;
            margin-bottom: 15px;
        }
        
        .document-name {
            font-weight: 600;
            color: #0a2540;
            margin-bottom: 5px;
        }
        
        .document-meta {
            color: #64748b;
            font-size: 12px;
            display: flex;
            gap: 15px;
        }
        
        .upload-area {
            border: 2px dashed #c19a6b;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8fafc;
        }
        
        .upload-area:hover {
            background: rgba(193,154,107,0.05);
        }
        
        .upload-area i {
            font-size: 48px;
            color: #c19a6b;
            margin-bottom: 15px;
        }
        
        .category-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .category-tab {
            padding: 8px 20px;
            border: 1px solid #e2e8f0;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .category-tab:hover,
        .category-tab.active {
            background: #c19a6b;
            color: white;
            border-color: #c19a6b;
        }
    </style>
</head>
<body>
    <div class="staff-container">
        <aside class="sidebar">
            <!-- ... sidebar content ... -->
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <h1>My Documents</h1>
                <div class="service-info">
                    <i class="fas fa-id-card"></i>
                    <span id="headerServiceNumber"></span>
                </div>
            </div>

            <!-- Upload Area -->
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" style="display: none;" multiple onchange="uploadFiles()">
                <i class="fas fa-cloud-upload-alt"></i>
                <h3>Upload Documents</h3>
                <p>Click to upload or drag and drop files</p>
                <small style="color: #64748b;">Supported: PDF, DOC, DOCX, XLS, XLSX, JPG, PNG (Max 10MB)</small>
            </div>

            <!-- Categories -->
            <div class="category-tabs">
                <button class="category-tab active" onclick="filterDocuments('all')">All</button>
                <button class="category-tab" onclick="filterDocuments('contract')">Contracts</button>
                <button class="category-tab" onclick="filterDocuments('id')">ID Documents</button>
                <button class="category-tab" onclick="filterDocuments('payroll')">Payroll</button>
                <button class="category-tab" onclick="filterDocuments('training')">Training</button>
                <button class="category-tab" onclick="filterDocuments('other')">Other</button>
            </div>

            <!-- Documents Grid -->
            <div class="documents-grid" id="documentsGrid">
                <!-- Loaded via JavaScript -->
            </div>
        </main>
    </div>

    <script src="/assets/js/staff.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCOcCDPqRSlAMJJBEeNchTA1qO9tl9Nldw",
            authDomain: "xtaagc.firebaseapp.com",
            projectId: "xtaagc",
            storageBucket: "xtaagc.appspot.com"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        let currentStaff = null;
        let allDocuments = [];

        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = '/';
                return;
            }
            
            await loadStaffData(user.uid);
            loadDocuments();
        });

        async function loadStaffData(uid) {
            const doc = await db.collection('staff').doc(uid).get();
            currentStaff = { id: doc.id, ...doc.data() };
            document.getElementById('headerServiceNumber').textContent = currentStaff.serviceNumber;
        }

        async function loadDocuments() {
            const snapshot = await db.collection('staff_documents')
                .where('staffId', '==', currentStaff.id)
                .orderBy('uploadedAt', 'desc')
                .get();
            
            allDocuments = [];
            snapshot.forEach(doc => allDocuments.push({ id: doc.id, ...doc.data() }));
            
            renderDocuments(allDocuments);
        }

        function renderDocuments(documents) {
            const grid = document.getElementById('documentsGrid');
            
            if (documents.length === 0) {
                grid.innerHTML = '<div style="text-align: center; padding: 40px; grid-column: 1/-1;">No documents uploaded yet</div>';
                return;
            }
            
            grid.innerHTML = documents.map(doc => {
                const icon = getFileIcon(doc.fileType);
                const date = doc.uploadedAt?.toDate?.() || new Date();
                
                return `
                    <div class="document-card" onclick="downloadDocument('${doc.id}')">
                        <div class="document-icon"><i class="fas ${icon}"></i></div>
                        <div class="document-name">${doc.fileName}</div>
                        <div class="document-meta">
                            <span><i class="fas fa-folder"></i> ${doc.category}</span>
                            <span><i class="fas fa-calendar"></i> ${date.toLocaleDateString()}</span>
                        </div>
                        <div style="font-size: 11px; color: #94a3b8; margin-top: 10px;">
                            ${(doc.fileSize / 1024).toFixed(2)} KB
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getFileIcon(fileType) {
            if (fileType.includes('pdf')) return 'fa-file-pdf';
            if (fileType.includes('word') || fileType.includes('doc')) return 'fa-file-word';
            if (fileType.includes('excel') || fileType.includes('sheet')) return 'fa-file-excel';
            if (fileType.includes('image')) return 'fa-file-image';
            return 'fa-file';
        }

        async function uploadFiles() {
            const files = document.getElementById('fileInput').files;
            
            for (let file of files) {
                const category = prompt(`Select category for ${file.name}:\ncontract, id, payroll, training, other`, 'other');
                
                if (!category) continue;
                
                const storageRef = storage.ref(`staff/${currentStaff.id}/${Date.now()}_${file.name}`);
                const uploadTask = storageRef.put(file);
                
                uploadTask.on('state_changed', 
                    (snapshot) => {
                        const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                        console.log(`Uploading ${file.name}: ${progress}%`);
                    },
                    (error) => {
                        STAFF.showToast(`Error uploading ${file.name}`, 'error');
                    },
                    async () => {
                        const downloadURL = await storageRef.getDownloadURL();
                        
                        await db.collection('staff_documents').add({
                            staffId: currentStaff.id,
                            staffName: currentStaff.fullName,
                            fileName: file.name,
                            fileType: file.type,
                            fileSize: file.size,
                            downloadURL: downloadURL,
                            category: category,
                            uploadedAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        
                        STAFF.showToast(`${file.name} uploaded successfully!`, 'success');
                        loadDocuments();
                    }
                );
            }
        }

        async function downloadDocument(docId) {
            const doc = allDocuments.find(d => d.id === docId);
            if (doc) {
                window.open(doc.downloadURL, '_blank');
            }
        }

        function filterDocuments(category) {
            document.querySelectorAll('.category-tab').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (category === 'all') {
                renderDocuments(allDocuments);
            } else {
                const filtered = allDocuments.filter(d => d.category === category);
                renderDocuments(filtered);
            }
        }
    </script>
</body>
</html>
