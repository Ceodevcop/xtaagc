<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login - TAAGC</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="/css/staff.css">
    
    <style>
        .service-note {
            background: #f8fafc;
            border-radius: 12px;
            padding: 15px;
            margin: 20px 0;
            font-size: 13px;
            color: #64748b;
            border: 1px solid #e2e8f0;
        }
        .service-note i {
            color: #c19a6b;
            margin-right: 8px;
        }
        .example {
            font-family: monospace;
            background: #0a2540;
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <h1><span>TAAGC</span> STAFF</h1>
                <p>Login with your service number</p>
            </div>

            <div id="alertMessage" class="alert" style="display: none;"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-id-card"></i> Service Number</label>
                    <input type="text" class="form-control" id="serviceNumber" required 
                           placeholder="e.g., IT001/03/2026" pattern="[A-Z]+[0-9]{3}/[0-9]{2}/[0-9]{4}">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" class="form-control" id="password" required placeholder="Enter your password">
                </div>

                <div class="service-note">
                    <i class="fas fa-info-circle"></i>
                    <strong>Service Number Format:</strong> DepartmentCode + 3-digit ID / Month / Year<br>
                    <span class="example">IT001/03/2026</span> - IT Department, Employee 001, March 2026
                </div>

                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Login to Dashboard
                </button>
            </form>

            <div style="text-align: center; margin-top: 20px;">
                <p style="color: #64748b; font-size: 14px;">
                    First time? 
                    <a href="/register.html" style="color: #c19a6b; text-decoration: none; font-weight: 600;">
                        Register here
                    </a>
                </p>
            </div>
        </div>
    </div>

    <script src="/assets/js/staff.js"></script>
    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCOcCDPqRSlAMJJBEeNchTA1qO9tl9Nldw",
            authDomain: "xtaagc.firebaseapp.com",
            projectId: "xtaagc"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function showAlert(message, type) {
            const alert = document.getElementById('alertMessage');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
            alert.style.display = 'flex';
            
            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }

        // Handle login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const serviceNumber = document.getElementById('serviceNumber').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            
            loginBtn.innerHTML = '<span class="spinner"></span> Logging in...';
            loginBtn.disabled = true;
            
            try {
                // Find staff by service number
                const snapshot = await db.collection('staff')
                    .where('serviceNumber', '==', serviceNumber)
                    .limit(1)
                    .get();
                
                if (snapshot.empty) {
                    throw new Error('Service number not found');
                }
                
                const staffDoc = snapshot.docs[0];
                const staffData = staffDoc.data();
                
                // Login with email
                const userCred = await auth.signInWithEmailAndPassword(staffData.email, password);
                
                // Update last login
                await db.collection('staff').doc(staffDoc.id).update({
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                // Store session data
                sessionStorage.setItem('staffId', staffDoc.id);
                sessionStorage.setItem('staffData', JSON.stringify(staffData));
                
                showAlert('Login successful!', 'success');
                
                setTimeout(() => {
                    window.location.href = '/dashboard.html';
                }, 1500);
                
            } catch (error) {
                console.error('Login error:', error);
                showAlert(error.message, 'error');
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Dashboard';
                loginBtn.disabled = false;
            }
        });

        // Check if already logged in
        auth.onAuthStateChanged(user => {
            if (user && sessionStorage.getItem('staffData')) {
                window.location.href = '/dashboard.html';
            }
        });
    </script>
</body>
</html>
