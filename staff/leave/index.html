<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Management - TAAGC Staff</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="/assets/css/staff.css">
    
    <style>
        .leave-balance {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .balance-card {
            background: linear-gradient(135deg, #0a2540, #1a3a4f);
            color: white;
            padding: 25px;
            border-radius: 16px;
            text-align: center;
        }
        
        .balance-days {
            font-size: 48px;
            font-weight: 700;
            color: #c19a6b;
        }
        
        .balance-type {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .used-days {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 5px;
        }
        
        .request-form {
            background: white;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid #e2e8f0;
        }
        
        .status-badge-pending {
            background: #f59e0b20;
            color: #f59e0b;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .status-badge-approved {
            background: #10b98120;
            color: #10b981;
        }
        
        .status-badge-rejected {
            background: #ef444420;
            color: #ef4444;
        }
    </style>
</head>
<body>
    <div class="staff-container">
        <aside class="sidebar">
            <!-- ... sidebar content ... -->
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <h1>Leave Management</h1>
                <div class="service-info">
                    <i class="fas fa-id-card"></i>
                    <span id="headerServiceNumber"></span>
                </div>
            </div>

            <!-- Leave Balance -->
            <div class="leave-balance">
                <div class="balance-card">
                    <div class="balance-days" id="annualLeave">20</div>
                    <div class="balance-type">Annual Leave</div>
                    <div class="used-days" id="annualUsed">5 used</div>
                </div>
                <div class="balance-card">
                    <div class="balance-days" id="sickLeave">12</div>
                    <div class="balance-type">Sick Leave</div>
                    <div class="used-days" id="sickUsed">2 used</div>
                </div>
                <div class="balance-card">
                    <div class="balance-days" id="personalLeave">5</div>
                    <div class="balance-type">Personal Leave</div>
                    <div class="used-days" id="personalUsed">0 used</div>
                </div>
                <div class="balance-card">
                    <div class="balance-days" id="unpaidLeave">30</div>
                    <div class="balance-type">Unpaid Leave</div>
                    <div class="used-days">Available</div>
                </div>
            </div>

            <!-- Request Leave Form -->
            <div class="request-form">
                <h2 style="margin-bottom: 20px;">Request Leave</h2>
                <form id="leaveForm">
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;">
                        <div class="form-group">
                            <label>Leave Type</label>
                            <select class="form-control" id="leaveType" required>
                                <option value="annual">Annual Leave</option>
                                <option value="sick">Sick Leave</option>
                                <option value="personal">Personal Leave</option>
                                <option value="unpaid">Unpaid Leave</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Number of Days</label>
                            <input type="number" class="form-control" id="leaveDays" min="1" max="30" required>
                        </div>
                        <div class="form-group">
                            <label>Start Date</label>
                            <input type="date" class="form-control" id="startDate" required>
                        </div>
                        <div class="form-group">
                            <label>End Date</label>
                            <input type="date" class="form-control" id="endDate" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Reason</label>
                        <textarea class="form-control" id="reason" rows="3" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Submit Request</button>
                </form>
            </div>

            <!-- Leave History -->
            <h2>Leave History</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Request ID</th>
                            <th>Type</th>
                            <th>Dates</th>
                            <th>Days</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="leaveHistory">
                        <!-- Loaded via JavaScript -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="/assets/js/staff.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCOcCDPqRSlAMJJBEeNchTA1qO9tl9Nldw",
            authDomain: "xtaagc.firebaseapp.com",
            projectId: "xtaagc"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentStaff = null;

        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = '/';
                return;
            }
            
            await loadStaffData(user.uid);
            loadLeaveData();
        });

        async function loadStaffData(uid) {
            const doc = await db.collection('staff').doc(uid).get();
            currentStaff = { id: doc.id, ...doc.data() };
            document.getElementById('headerServiceNumber').textContent = currentStaff.serviceNumber;
        }

        async function loadLeaveData() {
            const leaveSnapshot = await db.collection('leave')
                .where('staffId', '==', currentStaff.id)
                .orderBy('createdAt', 'desc')
                .get();
            
            let annualUsed = 0, sickUsed = 0, personalUsed = 0;
            let historyHtml = '';
            
            leaveSnapshot.forEach(doc => {
                const leave = doc.data();
                
                if (leave.status === 'approved') {
                    if (leave.type === 'annual') annualUsed += leave.days;
                    if (leave.type === 'sick') sickUsed += leave.days;
                    if (leave.type === 'personal') personalUsed += leave.days;
                }
                
                const statusClass = `status-badge-${leave.status}`;
                
                historyHtml += `
                    <tr>
                        <td>#${doc.id.slice(-6)}</td>
                        <td>${leave.type}</td>
                        <td>${leave.startDate} to ${leave.endDate}</td>
                        <td>${leave.days}</td>
                        <td><span class="status-badge ${statusClass}">${leave.status}</span></td>
                        <td>
                            ${leave.status === 'pending' ? 
                                `<button onclick="cancelLeave('${doc.id}')" class="btn btn-sm">Cancel</button>` : 
                                '-'}
                        </td>
                    </tr>
                `;
            });
            
            document.getElementById('annualUsed').textContent = `${annualUsed} used`;
            document.getElementById('sickUsed').textContent = `${sickUsed} used`;
            document.getElementById('personalUsed').textContent = `${personalUsed} used`;
            document.getElementById('leaveHistory').innerHTML = historyHtml || '<tr><td colspan="6">No leave requests found</td></tr>';
        }

        document.getElementById('leaveForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const leaveData = {
                staffId: currentStaff.id,
                staffName: currentStaff.fullName,
                serviceNumber: currentStaff.serviceNumber,
                department: currentStaff.departmentCode,
                type: document.getElementById('leaveType').value,
                days: parseInt(document.getElementById('leaveDays').value),
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                reason: document.getElementById('reason').value,
                status: 'pending',
                hodApproval: null,
                hrApproval: null,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            await db.collection('leave').add(leaveData);
            STAFF.showToast('Leave request submitted successfully!', 'success');
            document.getElementById('leaveForm').reset();
            loadLeaveData();
        });

        async function cancelLeave(id) {
            if (confirm('Cancel this leave request?')) {
                await db.collection('leave').doc(id).update({ status: 'cancelled' });
                STAFF.showToast('Request cancelled', 'info');
                loadLeaveData();
            }
        }
    </script>
</body>
</html>
