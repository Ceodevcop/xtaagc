<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Reviews - TAAGC Staff</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <link rel="stylesheet" href="/assets/css/staff.css">
    
    <style>
        .performance-summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .score-card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }
        
        .score-value {
            font-size: 48px;
            font-weight: 700;
            color: #c19a6b;
        }
        
        .score-label {
            color: #64748b;
            margin-top: 5px;
        }
        
        .review-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }
        
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .review-period {
            font-size: 18px;
            font-weight: 700;
            color: #0a2540;
        }
        
        .review-rating {
            background: #c19a6b;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 600;
        }
        
        .criteria-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        
        .criteria-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #f8fafc;
            border-radius: 8px;
        }
        
        .criteria-name {
            font-weight: 500;
        }
        
        .criteria-score {
            font-weight: 700;
            color: #c19a6b;
        }
        
        .reviewer-note {
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-style: italic;
        }
        
        .goals-list {
            margin-top: 15px;
        }
        
        .goal-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .goal-status {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: inline-block;
        }
        
        .goal-completed { background: #10b981; }
        .goal-progress { background: #f59e0b; }
        .goal-pending { background: #e2e8f0; }
    </style>
</head>
<body>
    <div class="staff-container">
        <aside class="sidebar">
            <!-- ... sidebar content ... -->
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <h1>Performance Reviews</h1>
                <div class="service-info">
                    <i class="fas fa-id-card"></i>
                    <span id="headerServiceNumber"></span>
                </div>
            </div>

            <!-- Performance Summary -->
            <div class="performance-summary">
                <div class="score-card">
                    <div class="score-value" id="overallScore">4.5</div>
                    <div class="score-label">Overall Rating</div>
                    <div style="color: #ffd700; margin-top: 5px;">★★★★★</div>
                </div>
                <div class="score-card">
                    <div class="score-value" id="reviewsCount">3</div>
                    <div class="score-label">Reviews Completed</div>
                </div>
                <div class="score-card">
                    <div class="score-value" id="goalsAchieved">8</div>
                    <div class="score-label">Goals Achieved</div>
                </div>
            </div>

            <!-- Performance Chart -->
            <div style="background: white; padding: 20px; border-radius: 16px; margin-bottom: 30px;">
                <h3>Performance Trend</h3>
                <canvas id="performanceChart" style="height: 300px;"></canvas>
            </div>

            <!-- Current Goals -->
            <h2>Current Goals</h2>
            <div class="goals-list" id="goalsList">
                <!-- Loaded via JavaScript -->
            </div>

            <!-- Past Reviews -->
            <h2 style="margin-top: 30px;">Review History</h2>
            <div id="reviewsList">
                <!-- Loaded via JavaScript -->
            </div>
        </main>
    </div>

    <script src="/assets/js/staff.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCOcCDPqRSlAMJJBEeNchTA1qO9tl9Nldw",
            authDomain: "xtaagc.firebaseapp.com",
            projectId: "xtaagc"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentStaff = null;
        let performanceChart;

        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = '/';
                return;
            }
            
            await loadStaffData(user.uid);
            loadPerformanceData();
        });

        async function loadStaffData(uid) {
            const doc = await db.collection('staff').doc(uid).get();
            currentStaff = { id: doc.id, ...doc.data() };
            document.getElementById('headerServiceNumber').textContent = currentStaff.serviceNumber;
        }

        async function loadPerformanceData() {
            // Load reviews
            const reviewsSnapshot = await db.collection('performance_reviews')
                .where('staffId', '==', currentStaff.id)
                .orderBy('reviewDate', 'desc')
                .get();
            
            let totalScore = 0;
            let reviewsHtml = '';
            const scores = [];
            const dates = [];
            
            reviewsSnapshot.forEach(doc => {
                const review = doc.data();
                totalScore += review.overallScore || 0;
                scores.push(review.overallScore || 0);
                dates.push(review.period);
                
                reviewsHtml += `
                    <div class="review-card">
                        <div class="review-header">
                            <span class="review-period">${review.period}</span>
                            <span class="review-rating">${review.overallScore}/5.0</span>
                        </div>
                        <div class="criteria-grid">
                            ${Object.entries(review.criteria || {}).map(([key, value]) => `
                                <div class="criteria-item">
                                    <span class="criteria-name">${key}</span>
                                    <span class="criteria-score">${value}/5</span>
                                </div>
                            `).join('')}
                        </div>
                        <div class="reviewer-note">
                            <i class="fas fa-quote-left" style="color: #c19a6b;"></i>
                            ${review.reviewerNotes || 'No notes provided'}
                        </div>
                        <div style="font-size: 13px; color: #64748b;">
                            Reviewed by: ${review.reviewerName} on ${new Date(review.reviewDate?.toDate?.()).toLocaleDateString()}
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('reviewsCount').textContent = reviewsSnapshot.size;
            document.getElementById('overallScore').textContent = (totalScore / reviewsSnapshot.size || 0).toFixed(1);
            document.getElementById('reviewsList').innerHTML = reviewsHtml || '<p>No reviews found</p>';
            
            // Initialize chart
            initChart(dates, scores);
            
            // Load goals
            const goalsSnapshot = await db.collection('goals')
                .where('staffId', '==', currentStaff.id)
                .orderBy('createdAt', 'desc')
                .limit(5)
                .get();
            
            let goalsHtml = '';
            let achieved = 0;
            
            goalsSnapshot.forEach(doc => {
                const goal = doc.data();
                if (goal.status === 'completed') achieved++;
                
                const statusClass = goal.status === 'completed' ? 'goal-completed' : 
                                   goal.status === 'in-progress' ? 'goal-progress' : 'goal-pending';
                
                goalsHtml += `
                    <div class="goal-item">
                        <span class="goal-status ${statusClass}"></span>
                        <div style="flex: 1;">
                            <strong>${goal.title}</strong>
                            <div style="color: #64748b; font-size: 12px;">${goal.description}</div>
                        </div>
                        <div style="text-align: right;">
                            <div style="font-weight: 600;">${goal.progress || 0}%</div>
                            <div style="font-size: 11px; color: #64748b;">Due: ${goal.dueDate}</div>
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('goalsAchieved').textContent = achieved;
            document.getElementById('goalsList').innerHTML = goalsHtml || '<p>No goals set</p>';
        }

        function initChart(dates, scores) {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            
            if (performanceChart) {
                performanceChart.destroy();
            }
            
            performanceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [{
                        label: 'Performance Score',
                        data: scores,
                        borderColor: '#c19a6b',
                        backgroundColor: 'rgba(193,154,107,0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            min: 0,
                            max: 5
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
