<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Registration - TAAGC</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="/assets/css/staff.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <h1><span>TAAGC</span> STAFF</h1>
                <p>Register as a staff member</p>
            </div>

            <div id="alertMessage" class="alert" style="display: none;"></div>

            <form id="registerForm">
                <!-- Personal Information -->
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" class="form-control" id="fullName" required placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" class="form-control" id="email" required placeholder="staff@taagc.com">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Phone Number</label>
                    <input type="tel" class="form-control" id="phone" required placeholder="+1234567890">
                </div>

                <!-- Department Selection -->
                <div class="form-group">
                    <label><i class="fas fa-building"></i> Department</label>
                    <select class="form-control" id="department" required>
                        <option value="">Select Department</option>
                        <option value="ADM">Administration (ADM)</option>
                        <option value="HR">Human Resources (HR)</option>
                        <option value="FIN">Finance (FIN)</option>
                        <option value="IT">Information Technology (IT)</option>
                        <option value="MKT">Marketing (MKT)</option>
                        <option value="OPS">Operations (OPS)</option>
                        <option value="SAL">Sales (SAL)</option>
                        <option value="SUP">Support (SUP)</option>
                        <option value="DEV">Development (DEV)</option>
                        <option value="ACC">Accounting (ACC)</option>
                        <option value="LEG">Legal (LEG)</option>
                        <option value="CS">Customer Service (CS)</option>
                    </select>
                </div>

                <!-- Head of Department Checkbox -->
                <div class="form-group">
                    <label class="checkbox">
                        <input type="checkbox" id="isHeadOfDepartment">
                        <span>I am the Head of this Department</span>
                    </label>
                </div>

                <!-- Service Number Preview (Auto-generated) -->
                <div class="service-number-box" id="serviceNumberBox" style="display: none;">
                    <div class="service-number-label">Your Service Number</div>
                    <div class="service-number" id="serviceNumberPreview"></div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" class="form-control" id="password" required placeholder="Create password (min 8 characters)">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Confirm Password</label>
                    <input type="password" class="form-control" id="confirmPassword" required placeholder="Confirm password">
                </div>

                <button type="submit" class="btn btn-primary" id="registerBtn">
                    <i class="fas fa-user-plus"></i> Register Staff
                </button>
            </form>

            <div style="text-align: center; margin-top: 20px;">
                <a href="/" style="color: #c19a6b; text-decoration: none;">
                    <i class="fas fa-arrow-left"></i> Back to Login
                </a>
            </div>
        </div>
    </div>

    <script src="/assets/js/staff.js"></script>
    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCOcCDPqRSlAMJJBEeNchTA1qO9tl9Nldw",
            authDomain: "xtaagc.firebaseapp.com",
            projectId: "xtaagc"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Show alert function
        function showAlert(message, type) {
            const alert = document.getElementById('alertMessage');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
            alert.style.display = 'flex';
            
            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }

        // Generate service number when department changes
        document.getElementById('department').addEventListener('change', async function() {
            const dept = this.value;
            if (!dept) return;
            
            const isHOD = document.getElementById('isHeadOfDepartment').checked;
            const employeeId = isHOD ? '001' : await STAFF.getNextEmployeeId(dept);
            
            const serviceNumber = STAFF.generateServiceNumber(dept, employeeId);
            
            document.getElementById('serviceNumberPreview').textContent = serviceNumber;
            document.getElementById('serviceNumberBox').style.display = 'block';
        });

        // Update service number when HOD checkbox changes
        document.getElementById('isHeadOfDepartment').addEventListener('change', async function() {
            const dept = document.getElementById('department').value;
            if (!dept) return;
            
            const employeeId = this.checked ? '001' : await STAFF.getNextEmployeeId(dept);
            const serviceNumber = STAFF.generateServiceNumber(dept, employeeId);
            
            document.getElementById('serviceNumberPreview').textContent = serviceNumber;
        });

        // Handle form submission
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const department = document.getElementById('department').value;
            const isHOD = document.getElementById('isHeadOfDepartment').checked;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Validate passwords
            if (password !== confirmPassword) {
                showAlert('Passwords do not match', 'error');
                return;
            }
            
            if (password.length < 8) {
                showAlert('Password must be at least 8 characters', 'error');
                return;
            }
            
            const registerBtn = document.getElementById('registerBtn');
            registerBtn.innerHTML = '<span class="spinner"></span> Registering...';
            registerBtn.disabled = true;
            
            try {
                // Get next employee ID
                const employeeId = isHOD ? '001' : await STAFF.getNextEmployeeId(department);
                const serviceNumber = STAFF.generateServiceNumber(department, employeeId);
                
                // Create auth user
                const userCred = await auth.createUserWithEmailAndPassword(email, password);
                
                // Update profile
                await userCred.user.updateProfile({
                    displayName: fullName
                });
                
                // Create staff record
                const staffData = {
                    uid: userCred.user.uid,
                    fullName: fullName,
                    email: email,
                    phone: phone,
                    departmentCode: department,
                    departmentName: STAFF.getDepartmentName(department),
                    serviceNumber: serviceNumber,
                    employeeId: employeeId,
                    isHeadOfDepartment: isHOD,
                    role: isHOD ? 'hod' : 'staff',
                    status: 'active',
                    joinDate: firebase.firestore.FieldValue.serverTimestamp(),
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    lastLogin: null
                };
                
                await db.collection('staff').doc(userCred.user.uid).set(staffData);
                
                // Also add to users collection for compatibility
                await db.collection('users').doc(userCred.user.uid).set({
                    uid: userCred.user.uid,
                    fullName: fullName,
                    email: email,
                    role: 'staff',
                    department: department,
                    serviceNumber: serviceNumber,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                showAlert('Registration successful! Your service number is: ' + serviceNumber, 'success');
                
                setTimeout(() => {
                    window.location.href = '/';
                }, 3000);
                
            } catch (error) {
                console.error('Registration error:', error);
                showAlert(error.message, 'error');
                registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> Register Staff';
                registerBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
