<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tasks - TAAGC Staff</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="/assets/css/staff.css">
    
    <style>
        .task-filters {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 8px 20px;
            border: 1px solid #e2e8f0;
            border-radius: 30px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .filter-btn:hover,
        .filter-btn.active {
            background: #c19a6b;
            color: white;
            border-color: #c19a6b;
        }
        
        .task-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #c19a6b;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .task-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .task-priority-high { border-left-color: #ef4444; }
        .task-priority-medium { border-left-color: #f59e0b; }
        .task-priority-low { border-left-color: #10b981; }
        
        .task-title {
            font-size: 16px;
            font-weight: 600;
            color: #0a2540;
            margin-bottom: 5px;
        }
        
        .task-meta {
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: #64748b;
        }
        
        .task-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-pending { background: #f59e0b20; color: #f59e0b; }
        .status-in-progress { background: #3b82f620; color: #3b82f6; }
        .status-completed { background: #10b98120; color: #10b981; }
        
        .progress-bar {
            width: 100px;
            height: 6px;
            background: #e2e8f0;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: #c19a6b;
            border-radius: 3px;
        }
        
        .task-actions {
            display: flex;
            gap: 10px;
        }
        
        .task-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            background: #f1f5f9;
        }
        
        .task-btn:hover {
            background: #c19a6b;
            color: white;
        }
        
        .new-task-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #c19a6b;
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(193,154,107,0.3);
            transition: all 0.3s;
            z-index: 100;
        }
        
        .new-task-btn:hover {
            transform: scale(1.1);
            background: #b38b5f;
        }
    </style>
</head>
<body>
    <div class="staff-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="staff-avatar" id="userAvatar">S</div>
                <h3 id="userName">Loading...</h3>
                <div class="service-number-small" id="userServiceNumber"></div>
                <span class="department-badge" id="userDepartment"></span>
            </div>

            <nav class="nav-menu">
                <div class="nav-item" onclick="location.href='/dashboard.html'">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </div>
                <div class="nav-item" onclick="location.href='/tasks.html'" class="active">
                    <i class="fas fa-tasks"></i> My Tasks
                </div>
                <div class="nav-item" onclick="location.href='/schedule.html'">
                    <i class="fas fa-calendar"></i> Schedule
                </div>
                <div class="nav-item" onclick="location.href='/attendance.html'">
                    <i class="fas fa-clock"></i> Attendance
                </div>
                <div class="nav-item" onclick="location.href='/leave.html'">
                    <i class="fas fa-umbrella-beach"></i> Leave
                </div>
                <div class="nav-item" onclick="location.href='/profile.html'">
                    <i class="fas fa-user"></i> Profile
                </div>
                <div class="nav-item" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </div>
            </nav>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <h1>My Tasks</h1>
                <div class="service-info">
                    <i class="fas fa-id-card"></i>
                    <span id="headerServiceNumber"></span>
                </div>
            </div>

            <!-- Task Filters -->
            <div class="task-filters">
                <button class="filter-btn active" onclick="filterTasks('all')">All Tasks</button>
                <button class="filter-btn" onclick="filterTasks('pending')">Pending</button>
                <button class="filter-btn" onclick="filterTasks('in-progress')">In Progress</button>
                <button class="filter-btn" onclick="filterTasks('completed')">Completed</button>
                <button class="filter-btn" onclick="filterTasks('high')">High Priority</button>
            </div>

            <!-- Tasks List -->
            <div id="tasksList">
                <!-- Tasks will be loaded here -->
            </div>

            <!-- New Task Button -->
            <button class="new-task-btn" onclick="openNewTaskModal()">
                <i class="fas fa-plus"></i>
            </button>
        </main>
    </div>

    <!-- New Task Modal -->
    <div id="taskModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
        <div class="modal-content" style="background: white; border-radius: 16px; padding: 30px; width: 90%; max-width: 500px;">
            <h2 style="margin-bottom: 20px;">Create New Task</h2>
            <form id="taskForm">
                <div class="form-group">
                    <label>Task Title</label>
                    <input type="text" class="form-control" id="taskTitle" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea class="form-control" id="taskDesc" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label>Priority</label>
                    <select class="form-control" id="taskPriority">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Due Date</label>
                    <input type="date" class="form-control" id="taskDueDate" required>
                </div>
                <button type="submit" class="btn btn-primary">Create Task</button>
                <button type="button" class="btn btn-outline" onclick="closeTaskModal()" style="margin-top: 10px;">Cancel</button>
            </form>
        </div>
    </div>

    <script src="/assets/js/staff.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCOcCDPqRSlAMJJBEeNchTA1qO9tl9Nldw",
            authDomain: "xtaagc.firebaseapp.com",
            projectId: "xtaagc"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentStaff = null;
        let allTasks = [];

        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = '/';
                return;
            }
            
            await loadStaffData(user.uid);
            loadTasks();
        });

        async function loadStaffData(uid) {
            const doc = await db.collection('staff').doc(uid).get();
            currentStaff = { id: doc.id, ...doc.data() };
            document.getElementById('userName').textContent = currentStaff.fullName;
            document.getElementById('userServiceNumber').textContent = currentStaff.serviceNumber;
            document.getElementById('userDepartment').textContent = currentStaff.departmentName;
            document.getElementById('headerServiceNumber').textContent = currentStaff.serviceNumber;
            document.getElementById('userAvatar').textContent = currentStaff.fullName.charAt(0);
        }

        async function loadTasks() {
            const snapshot = await db.collection('tasks')
                .where('assignedTo', '==', currentStaff.id)
                .orderBy('createdAt', 'desc')
                .get();
            
            allTasks = [];
            snapshot.forEach(doc => allTasks.push({ id: doc.id, ...doc.data() }));
            
            renderTasks(allTasks);
        }

        function renderTasks(tasks) {
            const container = document.getElementById('tasksList');
            
            if (tasks.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: #64748b;">No tasks found</div>';
                return;
            }
            
            container.innerHTML = tasks.map(task => {
                const priorityClass = `task-priority-${task.priority}`;
                const statusClass = `status-${task.status || 'pending'}`;
                const progress = task.progress || 0;
                
                const dueDate = new Date(task.dueDate);
                const today = new Date();
                const isOverdue = dueDate < today && task.status !== 'completed';
                
                return `
                    <div class="task-card ${priorityClass}" data-task-id="${task.id}">
                        <div style="flex: 1;">
                            <div class="task-title">${task.title}</div>
                            <div style="color: #64748b; font-size: 13px; margin-bottom: 10px;">${task.description}</div>
                            <div class="task-meta">
                                <span><i class="fas fa-calendar"></i> Due: ${task.dueDate} ${isOverdue ? '<span style="color: #ef4444;">(Overdue)</span>' : ''}</span>
                                <span><i class="fas fa-flag"></i> ${task.priority}</span>
                            </div>
                            <div style="margin-top: 10px;">
                                <div style="display: flex; align-items: center; gap: 10px;">
                                    <span class="task-status ${statusClass}">${task.status || 'pending'}</span>
                                    <div class="progress-bar">
                                        <div class="progress-fill" style="width: ${progress}%;"></div>
                                    </div>
                                    <span>${progress}%</span>
                                </div>
                            </div>
                        </div>
                        <div class="task-actions">
                            <button class="task-btn" onclick="updateTaskStatus('${task.id}', 'in-progress')" title="Start"><i class="fas fa-play"></i></button>
                            <button class="task-btn" onclick="updateTaskProgress('${task.id}')" title="Update Progress"><i class="fas fa-sync-alt"></i></button>
                            <button class="task-btn" onclick="completeTask('${task.id}')" title="Complete"><i class="fas fa-check"></i></button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterTasks(filter) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            let filtered = [];
            
            if (filter === 'all') {
                filtered = allTasks;
            } else if (filter === 'high') {
                filtered = allTasks.filter(t => t.priority === 'high');
            } else {
                filtered = allTasks.filter(t => t.status === filter);
            }
            
            renderTasks(filtered);
        }

        function openNewTaskModal() {
            document.getElementById('taskModal').style.display = 'flex';
        }

        function closeTaskModal() {
            document.getElementById('taskModal').style.display = 'none';
        }

        document.getElementById('taskForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const taskData = {
                title: document.getElementById('taskTitle').value,
                description: document.getElementById('taskDesc').value,
                priority: document.getElementById('taskPriority').value,
                dueDate: document.getElementById('taskDueDate').value,
                assignedTo: currentStaff.id,
                assignedBy: 'self',
                status: 'pending',
                progress: 0,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                createdBy: currentStaff.fullName
            };
            
            await db.collection('tasks').add(taskData);
            STAFF.showToast('Task created successfully!', 'success');
            closeTaskModal();
            loadTasks();
        });

        async function updateTaskStatus(taskId, status) {
            await db.collection('tasks').doc(taskId).update({ status });
            STAFF.showToast(`Task marked as ${status}`, 'success');
            loadTasks();
        }

        async function updateTaskProgress(taskId) {
            const newProgress = prompt('Enter progress percentage (0-100):');
            if (newProgress !== null) {
                await db.collection('tasks').doc(taskId).update({ 
                    progress: parseInt(newProgress),
                    status: parseInt(newProgress) === 100 ? 'completed' : 'in-progress'
                });
                STAFF.showToast('Progress updated', 'success');
                loadTasks();
            }
        }

        async function completeTask(taskId) {
            await db.collection('tasks').doc(taskId).update({ 
                status: 'completed',
                progress: 100,
                completedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            STAFF.showToast('Task completed!', 'success');
            loadTasks();
        }

        window.onclick = function(event) {
            const modal = document.getElementById('taskModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        };
    </script>
</body>
</html>
