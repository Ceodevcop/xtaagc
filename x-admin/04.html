<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 XTAAGC - Super Admin (Firebase 8)</title>
    <!-- Firebase 8.10.1 SDK (Compatibility Version) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            padding: 40px;
        }
        h1 {
            color: #333;
            margin-bottom: 5px;
            font-size: 28px;
            text-align: center;
        }
        .project-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
            margin: 10px auto 20px;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            width: 100%;
        }
        .version-badge {
            background: #28a745;
            color: white;
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
            margin-left: 10px;
        }
        .status-container {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }
        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            font-weight: bold;
        }
        .input-group {
            margin-bottom: 15px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 120px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-success {
            background: #28a745;
            color: white;
        }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        .btn-info {
            background: #17a2b8;
            color: white;
        }
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .user-info {
            text-align: center;
            margin-bottom: 20px;
        }
        .user-email {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            word-break: break-all;
        }
        .user-uid {
            font-size: 12px;
            color: #666;
            font-family: monospace;
            background: #e9ecef;
            padding: 8px;
            border-radius: 5px;
            margin: 10px 0;
            word-break: break-all;
        }
        .admin-status {
            font-size: 16px;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            text-align: center;
        }
        .admin-status.active {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .admin-status.inactive {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .admin-status.checking {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }
        .claims-box {
            background: #2d2d2d;
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            text-align: left;
            white-space: pre-wrap;
        }
        .claims-box.show {
            display: block;
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
        }
        .notification.show {
            transform: translateX(0);
        }
        .notification.success {
            background: #28a745;
        }
        .notification.error {
            background: #dc3545;
        }
        .notification.info {
            background: #17a2b8;
        }
        .link-button {
            background: none;
            border: none;
            color: #667eea;
            text-decoration: underline;
            cursor: pointer;
            font-size: 13px;
            padding: 5px;
        }
        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 12px;
            color: #888;
        }
        .hidden {
            display: none !important;
        }
        .init-status {
            text-align: center;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .init-status.success {
            background: #d4edda;
            color: #155724;
        }
        .init-status.error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div id="notification" class="notification"></div>
    
    <div class="container">
        <h1>🔥 XTAAGC</h1>
        <div class="project-badge">
            Project: xtaagc 
            <span class="version-badge">Firebase 8.10.1</span>
        </div>

        <!-- Firebase Status -->
        <div id="firebaseStatus" class="init-status">⏳ Loading Firebase...</div>

        <!-- Loading State -->
        <div id="loadingView" class="status-container hidden">
            <div class="loading-spinner" style="width: 40px; height: 40px; margin: 0 auto;"></div>
            <p style="margin-top: 15px; color: #666; text-align: center;">Initializing...</p>
        </div>

        <!-- Unauthenticated View -->
        <div id="unauthView" class="status-container">
            <div class="user-avatar">👤</div>
            <p style="color: #666; margin-bottom: 20px; text-align: center;">Sign in to get super admin access</p>
            
            <div class="input-group">
                <input type="email" id="emailInput" placeholder="Email" autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" id="passwordInput" placeholder="Password" autocomplete="off">
            </div>
            
            <div class="button-group">
                <button class="btn-primary" onclick="handleSignUp()" id="signUpBtn">
                    ✨ Sign Up & Get Admin
                </button>
            </div>
            
            <p style="margin-top: 15px; text-align: center;">
                <button class="link-button" onclick="toggleMode()" id="toggleModeBtn">
                    Already have an account? Sign in
                </button>
            </p>
        </div>

        <!-- Authenticated View -->
        <div id="authView" class="status-container hidden">
            <div class="user-avatar" id="userAvatar">👤</div>
            
            <div class="user-info">
                <div class="user-email" id="displayEmail"></div>
                <div class="user-uid" id="displayUid"></div>
            </div>
            
            <div id="adminStatus" class="admin-status checking">
                <span class="loading-spinner"></span> Checking status...
            </div>
            
            <div id="claimsDisplay" class="claims-box"></div>
            
            <div class="button-group">
                <button class="btn-success" onclick="makeSuperAdmin()" id="makeAdminBtn">
                    👑 Make Super Admin
                </button>
                <button class="btn-info" onclick="refreshToken()" id="refreshBtn">
                    🔄 Refresh Token
                </button>
                <button class="btn-danger" onclick="signOut()">
                    🚪 Sign Out
                </button>
            </div>
        </div>

        <!-- Cloud Function Code -->
        <div id="codeView" class="claims-box"></div>

        <div class="footer">
            <p>✅ Firebase 8.10.1 • Project: xtaagc</p>
        </div>
    </div>

    <script>
        // ==================== FIREBASE 8 CONFIG ====================
        const firebaseConfig = {
            apiKey: "AIzaSyAI1MrcP977UgRLQoePxl64JOSyj9v4WpI",
            authDomain: "xtaagc.firebaseapp.com",
            projectId: "xtaagc",
            storageBucket: "xtaagc.firebasestorage.app",
            messagingSenderId: "256073982437",
            appId: "1:256073982437:web:8da63bb7acc86c0ca98f0c"
        };

        // ==================== GLOBAL VARIABLES ====================
        let auth = null;
        let currentUser = null;
        let isSignUpMode = true;

        // ==================== SAFE ELEMENT SELECTOR ====================
        function getElement(id) {
            const element = document.getElementById(id);
            if (!element) {
                console.warn(`Element '${id}' not found`);
                return null;
            }
            return element;
        }

        // ==================== INITIALIZE FIREBASE 8 ====================
        function initializeFirebase() {
            const statusEl = getElement('firebaseStatus');
            
            try {
                console.log('Initializing Firebase 8...');
                console.log('Firebase object:', typeof firebase);
                
                // Check if Firebase is loaded
                if (typeof firebase === 'undefined') {
                    throw new Error('Firebase SDK not loaded. Check script URLs.');
                }
                
                // Initialize Firebase
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                    console.log('Firebase initialized successfully');
                }
                
                // Get Auth instance
                auth = firebase.auth();
                
                // Update status
                if (statusEl) {
                    statusEl.className = 'init-status success';
                    statusEl.textContent = '✅ Firebase 8.10.1 initialized successfully';
                }
                
                // Set up auth observer
                setupAuthObserver();
                
                return true;
            } catch (error) {
                console.error('Firebase init error:', error);
                
                if (statusEl) {
                    statusEl.className = 'init-status error';
                    statusEl.textContent = '❌ Error: ' + error.message;
                }
                
                showNotification('Firebase init failed: ' + error.message, 'error');
                return false;
            }
        }

        // ==================== AUTH OBSERVER (Firebase 8 style) ====================
        function setupAuthObserver() {
            if (!auth) {
                console.error('Auth not initialized');
                return;
            }

            auth.onAuthStateChanged(function(user) {
                console.log('Auth state changed:', user ? 'User logged in' : 'No user');
                currentUser = user;
                
                if (user) {
                    showView('authView');
                    updateUserInfo(user);
                    checkAdminStatus(user);
                } else {
                    showView('unauthView');
                    resetAuthView();
                }
            }, function(error) {
                console.error('Auth observer error:', error);
                showNotification('Auth error: ' + error.message, 'error');
            });
        }

        // ==================== SHOW VIEW ====================
        function showView(viewId) {
            const loadingView = getElement('loadingView');
            const unauthView = getElement('unauthView');
            const authView = getElement('authView');
            
            if (loadingView) loadingView.classList.add('hidden');
            if (unauthView) unauthView.classList.add('hidden');
            if (authView) authView.classList.add('hidden');
            
            const targetView = getElement(viewId);
            if (targetView) {
                targetView.classList.remove('hidden');
            }
        }

        // ==================== UPDATE USER INFO ====================
        function updateUserInfo(user) {
            if (!user) return;
            
            const emailEl = getElement('displayEmail');
            const uidEl = getElement('displayUid');
            const avatarEl = getElement('userAvatar');
            
            if (emailEl) emailEl.textContent = user.email || 'No email';
            if (uidEl) uidEl.textContent = `UID: ${user.uid}`;
            if (avatarEl) avatarEl.textContent = user.email ? user.email[0].toUpperCase() : '👤';
        }

        // ==================== RESET AUTH VIEW ====================
        function resetAuthView() {
            const emailEl = getElement('displayEmail');
            const uidEl = getElement('displayUid');
            const claimsEl = getElement('claimsDisplay');
            const codeEl = getElement('codeView');
            const statusEl = getElement('adminStatus');
            
            if (emailEl) emailEl.textContent = '';
            if (uidEl) uidEl.textContent = '';
            if (claimsEl) claimsEl.classList.remove('show');
            if (codeEl) codeEl.classList.remove('show');
            
            if (statusEl) {
                statusEl.className = 'admin-status checking';
                statusEl.innerHTML = '<span class="loading-spinner"></span> Checking status...';
            }
        }

        // ==================== CHECK ADMIN STATUS ====================
        async function checkAdminStatus(user) {
            if (!user || !auth) return;

            const statusEl = getElement('adminStatus');
            const claimsEl = getElement('claimsDisplay');
            
            try {
                // Force token refresh to get latest claims
                const tokenResult = await user.getIdTokenResult(true);
                const claims = tokenResult.claims;
                
                // Display claims
                if (claimsEl) {
                    claimsEl.textContent = JSON.stringify(claims, null, 2);
                    claimsEl.classList.add('show');
                }
                
                // Check if admin
                const isAdmin = claims.role === 'super-admin' || claims.admin === true;
                
                if (statusEl) {
                    statusEl.className = isAdmin ? 'admin-status active' : 'admin-status inactive';
                    statusEl.innerHTML = isAdmin ? 
                        '✅ SUPER ADMIN ACTIVE' : 
                        '❌ Regular User - Click "Make Super Admin"';
                }
                
                if (isAdmin) {
                    showNotification('Super admin verified!', 'success');
                }
                
            } catch (error) {
                console.error('Error checking admin status:', error);
                if (statusEl) {
                    statusEl.className = 'admin-status inactive';
                    statusEl.innerHTML = '❌ Error checking status';
                }
            }
        }

        // ==================== HANDLE SIGN UP/SIGN IN ====================
        async function handleSignUp() {
            const emailInput = getElement('emailInput');
            const passwordInput = getElement('passwordInput');
            
            if (!emailInput || !passwordInput) {
                showNotification('Form inputs not found', 'error');
                return;
            }
            
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            if (!email || !password) {
                showNotification('Please enter email and password', 'error');
                return;
            }

            if (password.length < 6) {
                showNotification('Password must be at least 6 characters', 'error');
                return;
            }

            setButtonsDisabled(true);
            showNotification('Processing...', 'info');

            try {
                if (!auth) {
                    initializeFirebase();
                }

                let userCredential;
                
                if (isSignUpMode) {
                    // Sign up
                    userCredential = await auth.createUserWithEmailAndPassword(email, password);
                    showNotification('Account created! Generating setup code...', 'success');
                    showCloudFunctionCode(userCredential.user.uid);
                } else {
                    // Sign in
                    userCredential = await auth.signInWithEmailAndPassword(email, password);
                    showNotification('Signed in successfully!', 'success');
                }
                
                // Clear inputs
                emailInput.value = '';
                passwordInput.value = '';
                
            } catch (error) {
                console.error('Auth error:', error);
                
                let message = error.message;
                if (error.code === 'auth/email-already-in-use') {
                    message = 'Email already exists. Switch to sign in mode.';
                    toggleMode();
                } else if (error.code === 'auth/user-not-found') {
                    message = 'User not found. Switch to sign up mode.';
                    if (!isSignUpMode) toggleMode();
                } else if (error.code === 'auth/wrong-password') {
                    message = 'Wrong password';
                } else if (error.code === 'auth/network-request-failed') {
                    message = 'Network error. Check your connection.';
                }
                
                showNotification('Error: ' + message, 'error');
            } finally {
                setButtonsDisabled(false);
            }
        }

        // ==================== TOGGLE MODE ====================
        function toggleMode() {
            isSignUpMode = !isSignUpMode;
            
            const btn = getElement('signUpBtn');
            const toggleBtn = getElement('toggleModeBtn');
            
            if (btn) {
                btn.innerHTML = isSignUpMode ? 
                    '✨ Sign Up & Get Admin' : 
                    '🔐 Sign In';
            }
            
            if (toggleBtn) {
                toggleBtn.textContent = isSignUpMode ? 
                    'Already have an account? Sign in' : 
                    'Need an account? Sign up';
            }
        }

        // ==================== MAKE SUPER ADMIN ====================
        function makeSuperAdmin() {
            if (!currentUser) {
                showNotification('No user logged in', 'error');
                return;
            }

            showCloudFunctionCode(currentUser.uid);
        }

        // ==================== SHOW CLOUD FUNCTION CODE ====================
        function showCloudFunctionCode(uid) {
            const codeEl = getElement('codeView');
            if (!codeEl) return;
            
            const code = `// ===== CLOUD FUNCTION FOR AUTO SUPER ADMIN =====
// Deploy this to Firebase Functions (Node.js 14+)

const functions = require('firebase-functions');
const admin = require('firebase-admin');
admin.initializeApp();

// Automatically make every new user a super admin
exports.autoMakeSuperAdmin = functions.auth.user().onCreate(async (user) => {
    try {
        await admin.auth().setCustomUserClaims(user.uid, {
            role: 'super-admin',
            admin: true,
            permissions: [
                'manage_users',
                'manage_content',
                'view_analytics',
                'delete_data',
                'manage_admins'
            ],
            project: 'xtaagc',
            access_level: 999,
            granted_at: new Date().toISOString()
        });
        
        console.log(\`✅ Super admin created for: \${user.uid}\`);
        return null;
    } catch (error) {
        console.error('Error:', error);
        return null;
    }
});

// Manual trigger for existing users
exports.setSuperAdmin = functions.https.onCall(async (data, context) => {
    if (!context.auth) {
        throw new functions.https.HttpsError('unauthenticated', 'Must be logged in');
    }
    
    try {
        await admin.auth().setCustomUserClaims(context.auth.uid, {
            role: 'super-admin',
            admin: true,
            permissions: ['manage_users', 'manage_content', 'view_analytics', 'delete_data'],
            project: 'xtaagc',
            access_level: 999
        });
        
        return { success: true, message: 'Super admin set!' };
    } catch (error) {
        throw new functions.https.HttpsError('internal', error.message);
    }
});

// To deploy:
// 1. npm install -g firebase-tools
// 2. firebase login
// 3. firebase init functions
// 4. Choose TypeScript or JavaScript
// 5. Copy this code to functions/index.js
// 6. firebase deploy --only functions

// Current UID: ${uid}`;

            codeEl.textContent = code;
            codeEl.classList.add('show');
            showNotification('Cloud Function code generated!', 'success');
        }

        // ==================== REFRESH TOKEN ====================
        async function refreshToken() {
            if (!currentUser) {
                showNotification('No user logged in', 'error');
                return;
            }

            setButtonsDisabled(true);
            
            try {
                await currentUser.getIdTokenResult(true);
                await checkAdminStatus(currentUser);
                showNotification('Token refreshed!', 'success');
            } catch (error) {
                showNotification('Error: ' + error.message, 'error');
            } finally {
                setButtonsDisabled(false);
            }
        }

        // ==================== SIGN OUT ====================
        function signOut() {
            if (!auth) {
                showNotification('Auth not initialized', 'error');
                return;
            }

            setButtonsDisabled(true);
            
            auth.signOut().then(function() {
                showNotification('Signed out successfully', 'success');
            }).catch(function(error) {
                showNotification('Error: ' + error.message, 'error');
            }).finally(function() {
                setButtonsDisabled(false);
            });
        }

        // ==================== DISABLE BUTTONS ====================
        function setButtonsDisabled(disabled) {
            const buttons = document.querySelectorAll('button');
            buttons.forEach(function(btn) {
                if (btn) btn.disabled = disabled;
            });
        }

        // ==================== SHOW NOTIFICATION ====================
        function showNotification(message, type) {
            const notification = getElement('notification');
            if (!notification) return;
            
            notification.className = 'notification ' + type;
            notification.innerHTML = message;
            notification.classList.add('show');
            
            setTimeout(function() {
                notification.classList.remove('show');
            }, 5000);
        }

        // ==================== INITIALIZE ====================
        function init() {
            console.log('Page loading...');
            console.log('Firebase version:', typeof firebase !== 'undefined' ? firebase.SDK_VERSION : 'not loaded');
            
            // Check if Firebase is loaded
            if (typeof firebase === 'undefined') {
                const statusEl = getElement('firebaseStatus');
                if (statusEl) {
                    statusEl.className = 'init-status error';
                    statusEl.textContent = '❌ Firebase SDK not loaded. Check script URLs.';
                }
                showNotification('Firebase SDK not loaded. Check your internet connection.', 'error');
                return;
            }
            
            // Initialize Firebase
            setTimeout(function() {
                initializeFirebase();
            }, 100);
        }

        // Start when page loads
        window.addEventListener('load', init);
    </script>
</body>
</html>
